<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ぷよぷよとーと。〜ぺろぺろありーなしたかった〜</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overscroll-behavior: contain;
  }
  body {
    background: #222;
    color: #eee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 8px;
    box-sizing: border-box;
  }
  h1 { margin: 6px 4px; font-size: 18px; text-align: center; }
  #wrap { display: flex; gap: 16px; align-items: flex-start; max-width: 100%; }
  canvas {
    background: #111; border: 2px solid #555;
    image-rendering: pixelated;
    touch-action: none;
    max-width: 100%;
    height: auto;
  }
  #field { display: block; }
  #info { font-size: 13px; line-height: 1.55; }
  #info h2 { margin: 4px 0; font-size: 15px; }
  kbd {
    background: #444; border-radius: 3px; padding: 1px 5px;
    border: 1px solid #666; font-size: 12px;
  }
  #score { font-size: 22px; font-weight: bold; color: #ffd; }
  #portalBtn {
    position: fixed;
    top: 6px;
    left: 6px;
    z-index: 80;
    background: rgba(30, 40, 70, 0.85);
    color: #fff;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: bold;
    border: 1px solid #80a0d0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  #portalBtn:active { transform: translateY(1px); opacity: 0.85; }
  @media (max-width: 720px) {
    #portalBtn { font-size: 10px; padding: 4px 8px; }
  }
  #over {
    position: fixed; inset: 0; display: none; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.75); font-size: 36px;
    flex-direction: column; z-index: 100;
  }
  #over button {
    margin-top: 20px; font-size: 18px; padding: 10px 24px;
    cursor: pointer;
  }

  /* タイトルへ戻るボタン（上部・スマホのみ） */
  #topbar {
    display: none;
    width: 100%;
    max-width: 420px;
    justify-content: center;
    margin-bottom: 2px;
  }
  #topbar #backBtn {
    background: linear-gradient(to bottom, #4a3030, #2a1818);
    color: #ffb6c0;
    border: 1px solid #844;
    border-radius: 8px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: bold;
    min-height: 28px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #topbar #backBtn:active { background: linear-gradient(to bottom, #7a3a3a, #4a2020); }

  /* タッチ操作パッド */
  #pad {
    display: none;
    gap: 6px;
    flex-direction: column;
    align-items: stretch;
    width: 100%;
    max-width: 420px;
    margin-top: 10px;
    touch-action: none;
  }
  #pad .row { display: flex; gap: 6px; justify-content: center; }
  #pad button {
    flex: 1;
    min-height: 54px;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(to bottom, #3a3a52, #1a1a2a);
    color: #fff;
    border: 1px solid #555;
    border-radius: 10px;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
  }
  #pad button:active,
  #pad button.pressed {
    background: linear-gradient(to bottom, #5a6090, #3a4070);
    transform: translateY(1px);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
  }
  #pad .small { font-size: 13px; }
  #pad .wide { flex: 2; }
  #pad .danger { background: linear-gradient(to bottom, #4a3030, #2a1818); }
  #pad .go { background: linear-gradient(to bottom, #5e3030, #3a1818); border-color: #b24; }

  /* スマホ/狭い画面向けレイアウト — スクロールなしで全体が収まるようにする */
  @media (max-width: 720px) {
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body {
      padding: 2px;
      height: 100dvh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2px;
    }
    h1 { font-size: 11px; line-height: 1.2; margin: 2px 0; text-align: center; }
    #wrap { flex-direction: column; align-items: center; gap: 4px; width: 100%; flex: 0 0 auto; }
    #info {
      order: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      width: 100%;
      justify-content: center;
      align-items: center;
      font-size: 11px;
      line-height: 1.2;
      padding: 0 4px;
      box-sizing: border-box;
    }
    #info h2 { font-size: 10px; margin: 0 4px 0 0; display: inline; }
    #info > div {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-direction: row;
    }
    #info #score, #info #best, #info #chain { font-size: 14px; line-height: 1; }
    #info .hide-mobile { display: none; }
    /* 横からNEXTキャンバスを小さく並べる */
    #next {
      width: 28px;
      height: 42px;
      display: inline-block;
      vertical-align: middle;
    }
    /* タイトルへボタンは画面最上部（すべての要素の上）に配置（誤タップ防止） */
    #topbar {
      order: -100;
      display: flex;
      flex: 0 0 auto;
      padding: 2px 4px;
      justify-content: flex-end;
      width: 100%;
      max-width: none;
    }
    #topbar #backBtn {
      font-size: 10px;
      padding: 2px 10px;
      min-height: 22px;
      opacity: 0.7;
    }
    /* タイトル h1 を非表示にして縦スペースを稼ぐ */
    h1 { display: none; }
    /* フィールドを縦ビューポートにフィット */
    #field {
      order: 2;
      display: block;
      width: auto;
      height: calc(100dvh - 245px);
      max-height: 640px;
      min-height: 160px;
      aspect-ratio: 1 / 2;
      max-width: 92vw;
    }
    #pad {
      order: 3;
      display: flex;
      margin-top: 2px;
      max-width: 100%;
      width: 100%;
      flex: 0 0 auto;
    }
    #pad .row { gap: 4px; }
    #pad button {
      min-height: 48px;
      font-size: 15px;
      padding: 0;
      border-radius: 8px;
    }
    #pad .small { font-size: 11px; }
  }
</style>
</head>
<body>
<a id="portalBtn" href="https://reuji436.github.io/saku/">🏠 ポータル</a>
<h1>ぷよぷよとーと。〜ぺろぺろありーなしたかった〜</h1>
<div id="wrap">
  <canvas id="field" width="320" height="640"></canvas>
  <div id="info">
    <div><h2>SCORE</h2><div id="score">0</div></div>
    <div><h2>BEST</h2><div id="best" style="color:#ffb6d4">0</div></div>
    <div><h2>CHAIN</h2><div id="chain">0</div></div>
    <h2>NEXT</h2>
    <canvas id="next" width="64" height="96"></canvas>
    <h2>操作</h2>
    <div>
      <span class="hide-mobile"><kbd>←</kbd><kbd>→</kbd> 移動<br>
      <kbd>↓</kbd> ソフトドロップ<br>
      <kbd>Z</kbd> 左回転<br>
      <kbd>X</kbd> 右回転<br>
      <kbd>Space</kbd> ハードドロップ<br>
      <kbd>Esc</kbd> タイトルへ戻る</span>
    </div>
  </div>
</div>
<div id="topbar">
  <button id="backBtn" data-key="Escape" data-once>✖ タイトルへ</button>
</div>

<div id="pad">
  <div class="row">
    <button data-key="KeyZ" data-once>↺</button>
    <button data-key="ArrowLeft" data-repeat class="wide">◀</button>
    <button data-key="ArrowRight" data-repeat class="wide">▶</button>
    <button data-key="KeyX" data-once>↻</button>
  </div>
  <div class="row">
    <button data-key="ArrowDown" data-hold class="wide">▼ ソフト</button>
    <button data-key="Space" data-once class="wide go">⚡ ドロップ</button>
  </div>
</div>

<div id="over">
  <div>GAME OVER</div>
  <div style="font-size: 14px; margin-top: 12px; color: #bbb;">Esc でタイトルへ</div>
  <button onclick="location.reload()">RESTART</button>
</div>

<script>
(() => {
  const COLS = 10, ROWS = 21, VISIBLE_ROWS = 20;
  const CELL = 32;
  const COLORS = ['#ff4b4b', '#4bff4b', '#4b7bff', '#ffee4b', '#c44bff'];
  const DARKEN = ['#992828', '#289928', '#283f99', '#999128', '#70289b'];
  const EMPTY = -1;
  const SPECIAL = -2;   // 特殊ぷよのセル
  const SPECIAL_W = 2;
  const SPECIAL_H = 3;

  const field = document.getElementById('field');
  const fctx = field.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const chainEl = document.getElementById('chain');
  const overEl = document.getElementById('over');
  const bestEl = document.getElementById('best');

  const grid = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));

  function randColor() { return Math.floor(Math.random() * COLORS.length); }
  function makePair() { return { a: randColor(), b: randColor() }; }

  let current = null;  // ペア: { kind:'pair', a, b, col, row, rot } / 特殊: { kind:'special', type, col, row }
  let nextPair = makePair();

  // === 特殊ぷよ管理 ===
  let specials = [];  // [{ id, type:'saku'|'kuru', row, col, turnsLeft }]
  const specialCellMap = new Map();  // row*COLS+col → special
  let nextSpecialId = 1;
  let spawnCount = 0;
  let nextIsSpecial = null;  // 'saku' | 'kuru' | null
  // 爆発エフェクト予約（resolveStep の最初で処理）
  let pendingSpecialFX = null;
  let score = 0;
  let lastChain = 0;
  let state = 'title';    // title / falling / resolving / clearing / gravity / gameover
  let titleFrame = 0;
  let gameFrame = 0;
  let shakeT = 0;
  let shakeAmp = 0;
  const fieldStars = Array.from({length: 30}, () => ({
    x: Math.random(), y: Math.random(),
    s: 0.5 + Math.random() * 1.5,
    v: 0.2 + Math.random() * 0.8,
    ph: Math.random() * Math.PI * 2,
  }));
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('puyotooot_best') || '0') || 0; } catch(e) {}
  setTimeout(() => { if (bestEl) bestEl.textContent = bestScore; }, 0);
  let dropTimer = 0;
  const DROP_INTERVAL = 90; // frames at 60fps — ゆっくり
  let softDrop = false;

  function spawn() {
    spawnCount++;
    // 5ターンごとに70%で特殊ぷよ
    let spawnSpecialNow = null;
    if (spawnCount % 5 === 0 && Math.random() < 0.7) {
      spawnSpecialNow = Math.random() < 0.5 ? 'saku' : 'kuru';
    }
    if (nextIsSpecial) { spawnSpecialNow = nextIsSpecial; nextIsSpecial = null; }

    if (spawnSpecialNow) {
      current = {
        kind: 'special',
        type: spawnSpecialNow,
        col: Math.floor((COLS - SPECIAL_W) / 2),
        row: SPECIAL_H - 1,  // 下端が row、上部は上 hidden から
      };
      if (!validSpecial(current)) {
        state = 'gameover';
        overEl.style.display = 'flex';
        saveBestScore();
        speakSad('ぺろぺろありーなしたかった・・・');
      }
      return;
    }
    current = {
      kind: 'pair',
      a: nextPair.a,
      b: nextPair.b,
      col: Math.floor(COLS / 2) - 1,
      row: 1,
      rot: 0,
    };
    nextPair = makePair();
    const [ax, ay, bx, by] = pairCells(current);
    if (grid[ay]?.[ax] !== EMPTY || grid[by]?.[bx] !== EMPTY) {
      state = 'gameover';
      overEl.style.display = 'flex';
      saveBestScore();
      speakSad('ぺろぺろありーなしたかった・・・');
    }
  }

  function saveBestScore() {
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('puyotooot_best', String(bestScore)); } catch(e) {}
    }
    if (bestEl) bestEl.textContent = bestScore;
  }

  function specialCells(p) {
    // p.col, p.row = 左上アンカー基準ではなく「下端」を基準にする：row は下端
    // 実装: row は bottom 行。cells は (row - 2 .. row) の 3 行×2 列
    const cells = [];
    for (let dr = 0; dr < SPECIAL_H; dr++) {
      for (let dc = 0; dc < SPECIAL_W; dc++) {
        cells.push([p.col + dc, p.row - (SPECIAL_H - 1) + dr]);
      }
    }
    return cells;
  }

  function validSpecial(p) {
    const cells = specialCells(p);
    for (const [x, y] of cells) {
      if (x < 0 || x >= COLS || y >= ROWS) return false;
      if (y >= 0 && grid[y][x] !== EMPTY) return false;
    }
    return true;
  }

  function pairCells(p) {
    const ax = p.col, ay = p.row;
    let bx = ax, by = ay;
    if (p.rot === 0) by = ay - 1;
    else if (p.rot === 1) bx = ax + 1;
    else if (p.rot === 2) by = ay + 1;
    else if (p.rot === 3) bx = ax - 1;
    return [ax, ay, bx, by];
  }

  function valid(p) {
    const [ax, ay, bx, by] = pairCells(p);
    for (const [x, y] of [[ax, ay], [bx, by]]) {
      if (x < 0 || x >= COLS || y >= ROWS) return false;
      if (y >= 0 && grid[y][x] !== EMPTY) return false;
    }
    return true;
  }

  function tryMove(dx, dy) {
    if (!current) return false;
    if (current.kind === 'special') {
      const p = { ...current, col: current.col + dx, row: current.row + dy };
      if (validSpecial(p)) { current = p; return true; }
      return false;
    }
    const p = { ...current, col: current.col + dx, row: current.row + dy };
    if (valid(p)) { current = p; return true; }
    return false;
  }

  function tryRotate(dir) {
    if (!current) return false;
    if (current.kind === 'special') return false;  // 特殊ぷよは回転不可
    const newRot = (current.rot + dir + 4) % 4;
    const p = { ...current, rot: newRot };
    if (valid(p)) { current = p; return true; }
    for (const dx of [-1, 1]) {
      const p2 = { ...p, col: p.col + dx };
      if (valid(p2)) { current = p2; return true; }
    }
    const p3 = { ...p, row: p.row - 1 };
    if (valid(p3)) { current = p3; return true; }
    return false;
  }

  function lockPair() {
    if (current.kind === 'special') { lockSpecial(); return; }
    const [ax, ay, bx, by] = pairCells(current);
    if (ax === bx && ay < by) {
      placeWithGravity(bx, current.b);
      placeWithGravity(ax, current.a);
    } else {
      placeWithGravity(ax, current.a);
      placeWithGravity(bx, current.b);
    }
    current = null;
    decrementKuruCountdowns();
    state = 'resolving';
    resolveStep(0);
  }

  function lockSpecial() {
    const type = current.type;
    const cells = specialCells(current);
    const anchorR = current.row - (SPECIAL_H - 1);  // 上端
    const anchorC = current.col;
    const sp = {
      id: nextSpecialId++,
      type,
      row: anchorR,
      col: anchorC,
      turnsLeft: type === 'kuru' ? 3 : 0,
    };
    specials.push(sp);
    for (const [x, y] of cells) {
      grid[y][x] = SPECIAL;
      specialCellMap.set(y * COLS + x, sp);
    }
    current = null;

    // くるちは次の自ターンから数えるので、ここではデクリメントしない他のくるち分だけ
    decrementKuruCountdowns({ except: sp });

    // さくち：即時かめはめ波
    if (type === 'saku') {
      triggerSaku(sp);
      return;
    }
    // くるち：通常のチェイン判定へ（カウントダウンは次ターン）
    state = 'resolving';
    resolveStep(0);
  }

  function decrementKuruCountdowns(opt = {}) {
    for (const sp of specials) {
      if (sp.type !== 'kuru') continue;
      if (opt.except && opt.except.id === sp.id) continue;
      if (sp.triggered) continue;  // すでに発動予約済み
      sp.turnsLeft--;
      if (sp.turnsLeft <= 0) {
        sp.triggered = true;
        pendingKuruTriggers.push(sp);
      }
    }
  }

  let pendingKuruTriggers = [];

  function removeSpecial(sp) {
    specials = specials.filter(s => s.id !== sp.id);
    for (const [key, v] of [...specialCellMap.entries()]) {
      if (v.id === sp.id) specialCellMap.delete(key);
    }
  }

  function clearSpecialCells(sp) {
    for (let dr = 0; dr < SPECIAL_H; dr++) {
      for (let dc = 0; dc < SPECIAL_W; dc++) {
        const r = sp.row + dr, c = sp.col + dc;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) grid[r][c] = EMPTY;
      }
    }
    removeSpecial(sp);
  }

  function triggerSaku(sp) {
    specialCutin = {
      type: 'saku',
      timer: 130, maxTimer: 130,
      sp,
    };
    try { sfxKamehameha(); } catch(e) {}
    // 声合成（フォルマント）も並行して鳴らす：TTSが動かない端末でも「かめはめは〜」に聞こえる
    try { setTimeout(() => voiceKamehameha(), 50); } catch(e) {}
    speakSaku();
  }

  function commitSakuClear(sp) {
    const cells = [];
    for (let r = sp.row; r < sp.row + SPECIAL_H; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] !== EMPTY) cells.push([r, c]);
      }
    }
    clearAnimCells = cells;
    explosionMode = false;
    animTimer = 70;
    state = 'clearing';
    pendingChain = 0;
    sakuFX = {
      topY: (sp.row - 1) * CELL,
      botY: (sp.row + 2) * CELL,
      centerY: ((sp.row - 1) + SPECIAL_H / 2) * CELL,
      timer: 70, maxTimer: 70,
    };
    pendingSpecialClear = { type: 'saku', special: sp };
    shakeT = 45; shakeAmp = 20;
  }

  function triggerKuru(sp) {
    specialCutin = {
      type: 'kuru',
      timer: 130, maxTimer: 130,
      sp,
    };
    try { sfxShockwave(); } catch(e) {}
    // 声合成（フォルマント）も並行して鳴らす：TTSが動かない端末でも声になる
    try { setTimeout(() => voiceOyasai(), 50); } catch(e) {}
    try { speakKuru(); } catch (e) { console.error('speakKuru failed', e); }
  }

  function commitKuruClear(sp) {
    const cells = new Set();
    const add = (r, c) => {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
      if (grid[r][c] !== EMPTY) cells.add(r * COLS + c);
    };
    for (let dr = 0; dr < SPECIAL_H; dr++)
      for (let dc = 0; dc < SPECIAL_W; dc++)
        add(sp.row + dr, sp.col + dc);
    for (let dr = 0; dr < SPECIAL_H; dr++) {
      const r = sp.row + dr;
      for (let k = 1; k <= 5; k++) {
        add(r, sp.col - k);
        add(r, sp.col + SPECIAL_W - 1 + k);
      }
    }
    for (let dc = 0; dc < SPECIAL_W; dc++) {
      const c = sp.col + dc;
      for (let k = 1; k <= 5; k++) {
        add(sp.row - k, c);
        add(sp.row + SPECIAL_H - 1 + k, c);
      }
    }
    const list = [...cells].map(k => [Math.floor(k / COLS), k % COLS]);
    clearAnimCells = list;
    explosionMode = false;
    animTimer = 70;
    state = 'clearing';
    pendingChain = 0;
    kuruFX = {
      px: sp.col * CELL + SPECIAL_W * CELL / 2,
      py: (sp.row - 1) * CELL + SPECIAL_H * CELL / 2,
      timer: 70, maxTimer: 70,
    };
    pendingSpecialClear = { type: 'kuru', special: sp };
    shakeT = 45; shakeAmp = 18;
  }

  function speakSaku() {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.resume();
      const u = new SpeechSynthesisUtterance('かめはめはー！');
      u.lang = 'ja-JP';
      // iOS互換のため pitch/rate を穏当な値に（0.5〜1.5を推奨）
      u.pitch = 0.7;
      u.rate = 0.9;
      u.volume = 1.0;
      // voice 指定は外す（iOSで指定ボイスが無いと無音化する事がある）
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  function speakKuru() {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.resume();
      const u = new SpeechSynthesisUtterance('おやさいはたべませーん！');
      u.lang = 'ja-JP';
      u.pitch = 1.5;
      u.rate = 1.05;
      u.volume = 1.0;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  let sakuFX = null;
  let kuruFX = null;
  let pendingSpecialClear = null;
  let specialCutin = null;  // { type, timer, maxTimer, sp }

  function placeWithGravity(col, color) {
    // 上から下に走査し、最初の障害物（色ぷよ or SPECIAL）の直前に置く
    let lastEmpty = -1;
    for (let r = 0; r < ROWS; r++) {
      if (grid[r][col] !== EMPTY) {
        if (lastEmpty >= 0) grid[lastEmpty][col] = color;
        return;
      }
      lastEmpty = r;
    }
    if (lastEmpty >= 0) grid[lastEmpty][col] = color;
  }

  // ペアを通常にロックし、aとbを正しい位置に置く（既に現在の位置に）
  // 分離後、重力で落とす
  function applyGravity() {
    // SPECIAL セルは固定（壁扱い）で、上のぷよは SPECIAL をすり抜けずに積み上がる
    let moved = false;
    for (let c = 0; c < COLS; c++) {
      let write = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] === SPECIAL) {
          // SPECIAL 自身の行はそのまま（動かさない）
          write = r - 1;
          continue;
        }
        if (grid[r][c] !== EMPTY) {
          if (write !== r) {
            grid[write][c] = grid[r][c];
            grid[r][c] = EMPTY;
            moved = true;
          }
          write--;
        }
      }
    }
    return moved;
  }

  function findGroups() {
    const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    const groups = [];
    for (let r = 1; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === EMPTY || grid[r][c] === SPECIAL || visited[r][c]) continue;
        const color = grid[r][c];
        const stack = [[r, c]];
        const cells = [];
        while (stack.length) {
          const [y, x] = stack.pop();
          if (y < 1 || y >= ROWS || x < 0 || x >= COLS) continue;
          if (visited[y][x] || grid[y][x] !== color) continue;
          visited[y][x] = true;
          cells.push([y, x]);
          stack.push([y+1, x], [y-1, x], [y, x+1], [y, x-1]);
        }
        if (cells.length >= 4) groups.push({ color, cells });
      }
    }
    return groups;
  }

  const CHAIN_BONUS = [0, 8, 16, 32, 64, 96, 128, 160, 192, 224, 256, 288, 320, 352, 384, 416, 448, 480, 512];
  const COLOR_BONUS = [0, 3, 6, 12, 24];
  const GROUP_BONUS = [0, 0, 0, 0, 0, 2, 3, 4, 5, 6, 7, 10];

  function calcScore(groups, chain) {
    let cleared = 0, colors = new Set(), groupBonus = 0;
    for (const g of groups) {
      cleared += g.cells.length;
      colors.add(g.color);
      const n = Math.min(g.cells.length, 11);
      groupBonus += GROUP_BONUS[n];
    }
    const cb = CHAIN_BONUS[Math.min(chain, CHAIN_BONUS.length - 1)];
    const colB = COLOR_BONUS[Math.min(colors.size, COLOR_BONUS.length - 1)];
    const bonus = Math.max(1, cb + colB + groupBonus);
    return cleared * 10 * bonus;
  }

  let chainCount = 0;
  let clearAnimCells = null;
  let animTimer = 0;

  function resolveStep(chain) {
    const groups = findGroups();
    if (groups.length === 0) {
      // 連鎖終了：保留中のくるち発動があれば先に処理
      while (pendingKuruTriggers.length) {
        const next = pendingKuruTriggers.shift();
        if (specials.find(s => s.id === next.id)) {
          try { triggerKuru(next); }
          catch (err) { console.error('triggerKuru error', err); continue; }
          return;
        }
      }
      chainCount = chain;
      chainEl.textContent = chain;
      state = 'falling';
      spawn();
      return;
    }
    chainCount = chain + 1;
    chainEl.textContent = chainCount;
    score += calcScore(groups, chainCount);
    scoreEl.textContent = score;

    const voiceIdx = Math.floor(Math.random() * VOICE_LINES.length);
    explosionMode = false;

    // 消すセルを記録
    clearAnimCells = [];
    for (const g of groups) for (const [y, x] of g.cells) {
      clearAnimCells.push([y, x]);
    }
    animTimer = 50;
    state = 'clearing';
    pendingChain = chainCount;

    triggerVoice(voiceIdx);
  }

  // === 消去時のセリフ ===
  const VOICE_LINES = [
    'くるみちゃーん！！',
    'さくち♡',
    'ぺろぺろありーなたてろ',
  ];
  const VOICE_COLORS = ['#ffdd55', '#ff99cc', '#88ffcc'];
  const SPECIAL_IDX = 2;  // ぺろぺろありーなたてろ
  let floatMessages = [];
  let cutin = null;        // { timer, maxTimer, text, sakura:[] }
  let sakuraLingering = [];  // 余韻で舞い続ける桜
  let explosionMode = false; // 「ぺろぺろ」発動中の爆発表示フラグ

  // 利用可能な音声の準備（野太い男声を探す）
  let cachedVoices = [];
  function reloadVoices() {
    try { cachedVoices = window.speechSynthesis.getVoices(); } catch (e) {}
  }
  if (window.speechSynthesis) {
    reloadVoices();
    window.speechSynthesis.onvoiceschanged = reloadVoices;
  }

  function pickDeepVoice() {
    if (!cachedVoices.length) reloadVoices();
    const ja = cachedVoices.filter(v => /ja|japan/i.test(v.lang));
    // 日本語男声を明示優先（Hattoriが一番低い）
    const preferred = ['Hattori', 'Otoya', 'Ichiro'];
    for (const name of preferred) {
      const hit = ja.find(v => v.name.includes(name));
      if (hit) return { voice: hit, useRomaji: false };
    }
    // Kyoko（女声）は除外
    const nonKyoko = ja.find(v => !/Kyoko/i.test(v.name));
    if (nonKyoko) return { voice: nonKyoko, useRomaji: false };
    // フォールバック: 英語の低めの男声 + ローマ字読み
    const enMale = cachedVoices.find(v =>
      /en/i.test(v.lang) && /Daniel|Alex|Fred|Ralph|Aaron|Lee|Bruce/i.test(v.name)
    );
    if (enMale) return { voice: enMale, useRomaji: true };
    return { voice: null, useRomaji: false };
  }

  // 野太く深い低音ドローン（ボス登場っぽい余韻）
  let audioCtx = null;

  // === BGMエンジン ===
  let bgmTimer = null;
  let bgmNodes = [];
  let bgmMaster = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // iOS Safari 対策：音声合成のロック解除 & 生存維持
  let audioPrimed = false;
  function primeAudio() {
    try { ensureAudio(); } catch (e) {}
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.getVoices();
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      if (!audioPrimed) {
        audioPrimed = true;
        // iOS では聞こえるレベルのプライムが必要。短い「あ」で TTS エンジンを起動
        const u = new SpeechSynthesisUtterance('あ');
        u.volume = 1;
        u.rate = 3;
        u.pitch = 1;
        u.lang = 'ja-JP';
        window.speechSynthesis.speak(u);
      }
    } catch (e) {}
  }

  // 定期的に resume してスリープを防ぐ（iOS Safari は ~15 秒で pause になるバグあり）
  setInterval(() => {
    try {
      if (window.speechSynthesis && !window.speechSynthesis.speaking) {
        // 何も喋っていないときに resume を叩いておく
        window.speechSynthesis.resume();
      }
    } catch (e) {}
  }, 5000);

  // スマホ向けの安全な発話ヘルパー
  function speakSafe(text, opts = {}) {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.resume();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = opts.lang || 'ja-JP';
      u.pitch = opts.pitch ?? 1;
      u.rate = opts.rate ?? 1;
      u.volume = opts.volume ?? 1;
      if (opts.voice) u.voice = opts.voice;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  // === Web Audio の効果音（TTSが鳴らない環境でも確実に聞こえる）===
  function sfxBlipSequence(notes, opts = {}) {
    try {
      ensureAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const type = opts.type || 'square';
      const gain = opts.gain ?? 0.12;
      for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = n.f;
        g.gain.setValueAtTime(0, now + n.t);
        g.gain.linearRampToValueAtTime(gain, now + n.t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
        o.connect(g).connect(audioCtx.destination);
        o.start(now + n.t);
        o.stop(now + n.t + n.d + 0.02);
      }
    } catch(e) {}
  }

  // かめはめ波 (saku): 重厚なチャージ→発射（音量控えめ）
  function sfxKamehameha() {
    try {
      ensureAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      // マスターゲインで全体を絞る
      const master = audioCtx.createGain();
      master.gain.value = 0.35;
      master.connect(audioCtx.destination);
      // 上昇するチャージ音
      const o1 = audioCtx.createOscillator();
      const g1 = audioCtx.createGain();
      o1.type = 'sawtooth';
      o1.frequency.setValueAtTime(120, now);
      o1.frequency.exponentialRampToValueAtTime(900, now + 1.3);
      g1.gain.setValueAtTime(0, now);
      g1.gain.linearRampToValueAtTime(0.07, now + 0.25);
      g1.gain.setValueAtTime(0.07, now + 1.2);
      g1.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      o1.connect(g1).connect(master);
      o1.start(now);
      o1.stop(now + 1.55);
      // 発射の低音ドン
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(70, now + 1.3);
      o2.frequency.exponentialRampToValueAtTime(30, now + 1.8);
      g2.gain.setValueAtTime(0, now + 1.3);
      g2.gain.linearRampToValueAtTime(0.18, now + 1.32);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 1.9);
      o2.connect(g2).connect(master);
      o2.start(now + 1.3);
      o2.stop(now + 1.95);
      // ビームのホワイトノイズ
      const bufSize = Math.floor(audioCtx.sampleRate * 1.2);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * 0.45;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 1200;
      filt.Q.value = 0.7;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0, now + 1.3);
      ng.gain.linearRampToValueAtTime(0.09, now + 1.4);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 2.3);
      src.connect(filt).connect(ng).connect(master);
      src.start(now + 1.3);
      src.stop(now + 2.4);
    } catch(e) {}
  }
  // === フォルマント風の「声っぽい」合成（Web Audio、TTSが鳴らない端末でも声になる）===
  // 母音ごとの F1/F2 フォルマント周波数（典型値）
  const VOWELS = {
    a: { f1: 800,  f2: 1200 },
    i: { f1: 300,  f2: 2400 },
    u: { f1: 300,  f2: 900  },
    e: { f1: 500,  f2: 1800 },
    o: { f1: 500,  f2: 1000 },
    n: { f1: 280,  f2: 1200 },  // 鼻母音近似
  };

  function synthSyllables(syllables, opts = {}) {
    try {
      ensureAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime + 0.01;
      const baseFreq = opts.baseFreq ?? 220;  // ピッチ（Hz）
      const syllDur = opts.syllDur ?? 0.13;
      const masterGain = opts.gain ?? 0.28;
      const pitchContour = opts.pitchContour || (i => 1);
      const master = audioCtx.createGain();
      master.gain.value = masterGain;
      master.connect(audioCtx.destination);
      for (let i = 0; i < syllables.length; i++) {
        const v = VOWELS[syllables[i]] || VOWELS.a;
        const t0 = now + i * syllDur;
        const freq = baseFreq * pitchContour(i, syllables.length);
        // 子音っぽい一瞬のノイズ（ts, k, p の代替）
        if (opts.consonantNoise) {
          const bufSize = Math.floor(audioCtx.sampleRate * 0.03);
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let j = 0; j < bufSize; j++) d[j] = (Math.random()*2-1) * 0.4;
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const nf = audioCtx.createBiquadFilter();
          nf.type = 'highpass';
          nf.frequency.value = 2000;
          const ng = audioCtx.createGain();
          ng.gain.setValueAtTime(0.15, t0);
          ng.gain.exponentialRampToValueAtTime(0.001, t0 + 0.025);
          src.connect(nf).connect(ng).connect(master);
          src.start(t0);
          src.stop(t0 + 0.035);
        }
        // 声帯音源（sawtooth）
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        // 軽いビブラート
        const vib = audioCtx.createOscillator();
        vib.type = 'sine';
        vib.frequency.value = 6;
        const vibGain = audioCtx.createGain();
        vibGain.gain.value = freq * 0.02;
        vib.connect(vibGain).connect(osc.frequency);
        // F1 バンドパス
        const f1 = audioCtx.createBiquadFilter();
        f1.type = 'bandpass';
        f1.frequency.value = v.f1;
        f1.Q.value = 6;
        // F2 バンドパス
        const f2 = audioCtx.createBiquadFilter();
        f2.type = 'bandpass';
        f2.frequency.value = v.f2;
        f2.Q.value = 7;
        // 振幅エンベロープ
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, t0);
        env.gain.linearRampToValueAtTime(1, t0 + 0.02);
        env.gain.setValueAtTime(1, t0 + syllDur * 0.55);
        env.gain.exponentialRampToValueAtTime(0.001, t0 + syllDur * 0.95);
        // 2つのフォルマント出力を混ぜる
        const mix = audioCtx.createGain();
        mix.gain.value = 0.5;
        osc.connect(f1);
        osc.connect(f2);
        f1.connect(mix);
        f2.connect(mix);
        mix.connect(env).connect(master);
        osc.start(t0);
        vib.start(t0);
        osc.stop(t0 + syllDur + 0.05);
        vib.stop(t0 + syllDur + 0.05);
      }
    } catch (e) {}
  }

  function sfxShockwave() {
