<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>スーパードラゴンボール・咲玖</title>
<style>
  :root { --bg: #101018; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; touch-action: manipulation; }
  #wrap {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    max-width: 960px;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
  #hud { position: absolute; top: 4px; left: 4px; display: flex; gap: 6px; pointer-events: none; font-size: 13px; z-index: 10; }
  #portalBtn { background: rgba(80,60,40,0.75); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid #c0a070; text-decoration: none; pointer-events: auto; opacity: 0.7; }
  #portalBtn:hover { opacity: 1; }
  #portalBtn:active { transform: translateY(1px); opacity: 0.85; }

  /* タッチ／マウス共通の操作UI（PCでも表示） */
  #touchUI { position: absolute; left: 0; right: 0; bottom: 0; top: 0; pointer-events: none; }
  #chargeBtn { position: absolute; left: 20px; bottom: 20px; width: 96px; height: 96px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(128,176,255,0.85), rgba(32,64,160,0.85)); border: 3px solid rgba(96,160,255,0.9); color: #fff; font-weight: bold; font-size: 16px; pointer-events: auto; touch-action: none; text-shadow: 0 1px 0 #000; line-height: 1.1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; opacity: 0.88; }
  #chargeBtn:active { transform: scale(0.94); opacity: 1; }
  #chargeBtn small { font-size: 9px; font-weight: normal; opacity: 0.85; }

  /* 縦持ち警告（スマホのみ） */
  #rotatePrompt {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    font-size: 20px;
    padding: 20px;
    gap: 20px;
  }
  #rotatePrompt .icon {
    font-size: 80px;
    animation: rotateTip 1.6s ease-in-out infinite;
  }
  @keyframes rotateTip {
    0%, 100% { transform: rotate(0); }
    50% { transform: rotate(90deg); }
  }
  /* スマホの縦向き時だけ表示 */
  @media (max-width: 900px) and (orientation: portrait) {
    #rotatePrompt { display: flex; }
    #wrap { visibility: hidden; }
  }
</style>
</head>
<body>
<div id="rotatePrompt">
  <div class="icon">📱</div>
  <div>スマホを<b style="color:#ffee40">横向き</b>にしてね！</div>
  <div style="font-size:14px;opacity:0.8;">横持ち専用のゲームです</div>
</div>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="hud">
    <a id="portalBtn" href="./">🏠</a>
  </div>
  <div id="touchUI">
    <button id="chargeBtn">必殺技<small>かめはめ波</small></button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  // hudStats 削除（HUDはCanvas内で描画）

  // ====== ゲーム状態 ======
  const STATE = { TITLE: 'title', CHAR_SELECT: 'charSelect', STAGE_SELECT: 'stageSelect', BOSS_INTRO: 'bossIntro', PLAYING: 'playing', DEAD: 'dead', STAGE_CLEAR: 'stageClear', CLEARED: 'cleared', GAMEOVER: 'gameover' };
  let state = STATE.TITLE;
  let stateTimer = 0;

  // ====== オートセーブ ======
  const SAVE_KEY = 'sakudragon_save_v1';
  function saveGame() {
    try {
      const data = {
        stageIdx: currentStageIdx,
        charIdx: selectIdx,
        transform: player.transform,
        hp: player.hp,
        kiGauge: player.kiGauge,
        power: player.power,
        totalScore,
        comboMax,
        timestamp: Date.now(),
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (e) {}
  }
  function loadSave() {
    try {
      const s = localStorage.getItem(SAVE_KEY);
      return s ? JSON.parse(s) : null;
    } catch (e) { return null; }
  }
  function clearSave() {
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  }
  // ====== クリア済みステージ記録 ======
  const CLEARED_KEY = 'sakudragon_cleared_v1';
  function getClearedStages() {
    try {
      const s = localStorage.getItem(CLEARED_KEY);
      return s ? new Set(JSON.parse(s)) : new Set();
    } catch (e) { return new Set(); }
  }
  function markStageCleared(idx) {
    try {
      const set = getClearedStages();
      set.add(idx);
      localStorage.setItem(CLEARED_KEY, JSON.stringify([...set]));
    } catch (e) {}
  }
  function hasAnyCleared() {
    return getClearedStages().size > 0;
  }

  // ====== 入力 ======
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
    if (state === STATE.TITLE && (e.code === 'Space' || e.code === 'Enter')) gotoCharSelect();
    else if (state === STATE.CHAR_SELECT) {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') { selectIdx = (selectIdx + CHARACTERS.length - 1) % CHARACTERS.length; charSelectTapped = selectIdx; }
      else if (e.code === 'ArrowRight' || e.code === 'KeyD') { selectIdx = (selectIdx + 1) % CHARACTERS.length; charSelectTapped = selectIdx; }
      else if (e.code === 'Space' || e.code === 'Enter') {
        if (pendingStageSelectIdx !== null) { const idx = pendingStageSelectIdx; pendingStageSelectIdx = null; startStageFromSelect(idx); }
        else startGame();
      }
    } else if (state === STATE.GAMEOVER) {
      if (e.code === 'Space' || e.code === 'Enter') state = STATE.TITLE;
    } else if (state === STATE.BOSS_INTRO) {
      if ((e.code === 'Space' || e.code === 'Enter') && bossIntroAnim > 20) beginStagePlay();
    } else if (state === STATE.CLEARED) {
      if ((e.code === 'Space' || e.code === 'Enter') && stateTimer > 120) {
        clearSave();
        endingPetals = null;
        state = STATE.TITLE;
      }
    }
    // デバッグ：プレイ中に数字キー0-5で変身段階強制切替
    if (state === STATE.PLAYING) {
      const digit = { Digit0: 0, Digit1: 1, Digit2: 2, Digit3: 3, Digit4: 4, Digit5: 5 }[e.code];
      if (digit !== undefined) {
        player.transform = digit;
        player.power = 0;
        player.invuln = 30;
        if (digit > 0) {
          banner = { text: TRANSFORM_NAMES[digit] + '（デバッグ）', color: auraColorFor(digit), life: 80, maxLife: 80 };
          const auraCol = auraColorFor(digit);
          for (let i = 0; i < 40; i++) {
            const a = (i / 40) * Math.PI * 2;
            const sp = 3 + Math.random() * 3;
            spawnParticle(player.x, player.y, {
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              life: 60, color: auraCol, size: 3,
            });
          }
          sfxTransform();
        }
      }
      // K で気ゲージMAX
      if (e.code === 'KeyK') player.kiGauge = player.kiGaugeMax;
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  const chargeBtn = document.getElementById('chargeBtn');
  let stickVec = { x: 0, y: 0 };  // キーボード互換用（使わない）
  let fireHeld = false;
  let chargeHeld = false;

  // 画面ドラッグでプレイヤー移動（相対ドラッグ方式・マルチタッチ対応）
  let dragActive = false;
  let dragTouchId = null;  // 追跡中の指のID（マルチタッチ対応）
  let dragStart = { x: 0, y: 0 };
  let dragStartPlayer = { x: 0, y: 0 };

  function canvasPosFromClient(cx, cy) {
    const rect = cv.getBoundingClientRect();
    return {
      x: (cx - rect.left) * (W / rect.width),
      y: (cy - rect.top) * (H / rect.height),
    };
  }
  function dragStartHandler(e, touch) {
    if (state !== STATE.PLAYING) return;
    if (dragActive) return;
    let cx, cy, id;
    if (touch) { cx = touch.clientX; cy = touch.clientY; id = touch.identifier; }
    else { cx = e.clientX; cy = e.clientY; id = 'mouse'; }
    const pos = canvasPosFromClient(cx, cy);
    dragActive = true;
    dragTouchId = id;
    dragStart.x = pos.x; dragStart.y = pos.y;
    dragStartPlayer.x = player.x; dragStartPlayer.y = player.y;
  }
  function dragMoveHandler(e, touch) {
    if (!dragActive) return;
    if (state !== STATE.PLAYING) { dragActive = false; dragTouchId = null; return; }
    let cx, cy;
    if (touch) { cx = touch.clientX; cy = touch.clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    const pos = canvasPosFromClient(cx, cy);
    const dx = pos.x - dragStart.x;
    const dy = pos.y - dragStart.y;
    player.x = dragStartPlayer.x + dx;
    player.y = dragStartPlayer.y + dy;
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(H * 0.35, Math.min(H - player.r - 20, player.y));
  }
  function dragEndHandler() {
    dragActive = false;
    dragTouchId = null;
  }
  cv.addEventListener('touchstart', e => {
    if (dragTouchId !== null) return;
    const t = e.changedTouches[0];
    dragStartHandler(e, t);
  }, { passive: true });
  cv.addEventListener('touchmove', e => {
    // 追跡中の指だけ拾う
    if (dragTouchId === null || dragTouchId === 'mouse') return;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].identifier === dragTouchId) {
        dragMoveHandler(e, e.touches[i]);
        e.preventDefault();
        return;
      }
    }
  }, { passive: false });
  cv.addEventListener('touchend', e => {
    if (dragTouchId === null || dragTouchId === 'mouse') return;
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === dragTouchId) {
        dragEndHandler();
        return;
      }
    }
  });
  cv.addEventListener('touchcancel', () => dragEndHandler());
  cv.addEventListener('mousedown', e => { dragStartHandler(e); });
  window.addEventListener('mousemove', e => { if (dragTouchId === 'mouse') dragMoveHandler(e); });
  window.addEventListener('mouseup', () => { if (dragTouchId === 'mouse') dragEndHandler(); });

  // ため撃ちボタン
  chargeBtn.addEventListener('touchstart', e => { chargeHeld = true; e.preventDefault(); }, { passive: false });
  chargeBtn.addEventListener('touchend', e => { chargeHeld = false; e.preventDefault(); }, { passive: false });
  chargeBtn.addEventListener('touchcancel', () => { chargeHeld = false; });
  chargeBtn.addEventListener('mousedown', e => { chargeHeld = true; });
  chargeBtn.addEventListener('mouseup', e => { chargeHeld = false; });

  // タッチ／クリック：タイトル・キャラ選択・ゲームオーバー時の操作
  function getCanvasPos(e) {
    const rect = cv.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return {
      x: (t.clientX - rect.left) * (W / rect.width),
      y: (t.clientY - rect.top) * (H / rect.height),
    };
  }
  function handleCanvasTap(e) {
    ensureAudio();
    if (state === STATE.TITLE) {
      const pos = getCanvasPos(e);
      const inBtn = (b) => b && pos.x > b.x && pos.x < b.x + b.w && pos.y > b.y && pos.y < b.y + b.h;
      if (inBtn(titleContinueBtn)) { continueGame(); return; }
      if (inBtn(titleStageSelectBtn)) { gotoStageSelect(); return; }
      if (inBtn(titleNewBtn)) { clearSave(); gotoCharSelect(); return; }
      gotoCharSelect();
      return;
    }
    if (state === STATE.STAGE_SELECT) {
      const pos = getCanvasPos(e);
      // 戻るボタン
      if (stageSelectBackBtn && pos.x > stageSelectBackBtn.x && pos.x < stageSelectBackBtn.x + stageSelectBackBtn.w && pos.y > stageSelectBackBtn.y && pos.y < stageSelectBackBtn.y + stageSelectBackBtn.h) {
        state = STATE.TITLE;
        return;
      }
      // ステージカード
      for (const btn of stageSelectButtons) {
        if (pos.x > btn.x && pos.x < btn.x + btn.w && pos.y > btn.y && pos.y < btn.y + btn.h) {
          if (btn.unlocked) {
            beep(880, 0.08, 'square', 0.12);
            // キャラ選択経由で開始
            charSelectTapped = null;
            pendingStageSelectIdx = btn.idx;
            state = STATE.CHAR_SELECT;
            stateTimer = 0;
          }
          return;
        }
      }
      return;
    }
    if (state === STATE.CHAR_SELECT) {
      const pos = getCanvasPos(e);
      const cardW = 260, cardH = 320, gap = 60;
      const totalW = cardW * CHARACTERS.length + gap * (CHARACTERS.length - 1);
      const startX = (W - totalW) / 2;
      for (let i = 0; i < CHARACTERS.length; i++) {
        const cx = startX + i * (cardW + gap);
        const cy = 120;
        if (pos.x >= cx && pos.x <= cx + cardW && pos.y >= cy && pos.y <= cy + cardH) {
          selectIdx = i;
          charSelectTapped = i;
          if (pendingStageSelectIdx !== null) {
            const idx = pendingStageSelectIdx;
            pendingStageSelectIdx = null;
            startStageFromSelect(idx);
          } else {
            startGame();
          }
          return;
        }
      }
      return;
    }
    if (state === STATE.GAMEOVER) { state = STATE.TITLE; return; }
    if (state === STATE.BOSS_INTRO && bossIntroAnim > 20) { beginStagePlay(); return; }
    if (state === STATE.CLEARED) {
      // エンディング：序盤は読ませる（最低2秒待ち）
      if (stateTimer > 120) {
        clearSave();
        endingPetals = null;
        state = STATE.TITLE;
      }
      return;
    }
  }
  let charSelectTapped = null;  // タップ選択状態
  cv.addEventListener('click', handleCanvasTap);
  cv.addEventListener('touchend', e => { handleCanvasTap(e); e.preventDefault(); }, { passive: false });

  // ====== 音（Web Audio API） ======
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  // ====== ふりがな付きテキスト描画 ======
  // 書式: '[漢字|かんじ]' が漢字＋ふりがなになる。通常の文字はそのまま。
  // 例: '覚醒…[界王拳|かいおうけん]！'
  function drawRubyText(text, x, y, opts) {
    opts = opts || {};
    const size = opts.size || 24;
    const rubySize = opts.rubySize || Math.max(9, Math.floor(size * 0.4));
    const align = opts.align || 'center';
    const fill = opts.fill || '#fff';
    const stroke = opts.stroke || '#000';
    const strokeW = opts.strokeW || Math.max(2, Math.floor(size / 7));
    const mainFont = `${opts.bold !== false ? 'bold ' : ''}${size}px ${opts.family || 'sans-serif'}`;
    const rubyFont = `bold ${rubySize}px sans-serif`;

    // パース：[kanji|furi] を検出
    const segments = [];
    const regex = /\[([^\|\]]+)\|([^\]]+)\]/g;
    let lastIdx = 0, m;
    while ((m = regex.exec(text)) !== null) {
      if (m.index > lastIdx) segments.push({ t: 'plain', s: text.slice(lastIdx, m.index) });
      segments.push({ t: 'ruby', s: m[1], r: m[2] });
      lastIdx = m.index + m[0].length;
    }
    if (lastIdx < text.length) segments.push({ t: 'plain', s: text.slice(lastIdx) });

    // 合計幅測定
    ctx.save();
    ctx.font = mainFont;
    let totalW = 0;
    for (const s of segments) totalW += ctx.measureText(s.s).width;

    // 開始X
    let curX;
    if (align === 'center') curX = x - totalW / 2;
    else if (align === 'right') curX = x - totalW;
    else curX = x;

    // 描画
    ctx.textBaseline = 'alphabetic';
    ctx.lineJoin = 'round';
    for (const s of segments) {
      ctx.font = mainFont;
      const w = ctx.measureText(s.s).width;
      ctx.textAlign = 'left';
      ctx.lineWidth = strokeW;
      ctx.strokeStyle = stroke;
      ctx.strokeText(s.s, curX, y);
      ctx.fillStyle = fill;
      ctx.fillText(s.s, curX, y);
      if (s.t === 'ruby') {
        ctx.font = rubyFont;
        ctx.textAlign = 'center';
        ctx.lineWidth = Math.max(1, strokeW - 1);
        ctx.strokeText(s.r, curX + w / 2, y - size * 0.95);
        ctx.fillStyle = fill;
        ctx.fillText(s.r, curX + w / 2, y - size * 0.95);
      }
      curX += w;
    }
    ctx.restore();
  }

  function beep(freq, dur, type, vol) {
    try {
      ensureAudio(); if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  function sfxShoot() { beep(740, 0.08, 'square', 0.08); setTimeout(()=>beep(420, 0.06, 'square', 0.06), 30); }
  function sfxHit() { beep(180, 0.08, 'sawtooth', 0.12); }
  function sfxExplode() { beep(90, 0.3, 'sawtooth', 0.18); setTimeout(()=>beep(60, 0.2, 'sawtooth', 0.12), 50); }
  function sfxTransform() {
    ensureAudio(); if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [440, 659, 880, 1319].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(f, now + i * 0.12);
      g.gain.setValueAtTime(0.001, now + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.2, now + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.6);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.65);
    });
  }
  function sfxBoss() {
    ensureAudio(); if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(90, now);
    o.frequency.exponentialRampToValueAtTime(60, now + 0.8);
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 1.0);
  }

  // ====== キャラクター定義 ======
  const CHARACTERS = [
    {
      id: 'saku', name: 'さく',
      hp: 10, speed: 3.4, atkDmg: 1, atkRate: 10,
      hairCol: '#1a1008', skinCol: '#ffddbb',
      shirtCol: '#ff7020',  // オレンジ道着
      pantsCol: '#ff7020',  // オレンジ（上下同色）
      innerCol: '#2060c0',  // 青インナー
      beltCol: '#1a4098',   // 青帯
      bootCol: '#1a3070',   // 紺ブーツ
      desc: 'バランス型・火力UP',
    },
    {
      id: 'kurumi', name: 'くるみ',
      hp: 8, speed: 4.2, atkDmg: 1, atkRate: 7,
      hairCol: '#9a5a2a', skinCol: '#ffddbb',
      shirtCol: '#ff7020',
      pantsCol: '#ff7020',
      innerCol: '#2060c0',
      beltCol: '#1a4098',
      bootCol: '#1a3070',
      desc: 'スピード型・連射UP',
    },
  ];
  let selectIdx = 0;

  // ====== プレイヤー ======
  const TRANSFORM_NAMES = [
    'ノーマル',
    '[界王拳|かいおうけん]',
    'スーパーサイヤ[人|じん]',
    '[超|ちょう]サイヤ[人|じん]2',
    '[超|ちょう]サイヤ[人|じん]3',
    '[超|ちょう]サイヤ[人|じん]4',
    '[超|ちょう]サイヤ[人|じん]ゴッド',
    '[超|ちょう]サイヤ[人|じん]ブルー',
    '[身勝手|みがって]の[極意|ごくい]「[兆|きざし]」',
    '[身勝手|みがって]の[極意|ごくい]',
    '[悟飯|ごはん]ビースト',
  ];
  const TRANSFORM_MAX = 10;
  const TRANSFORM_COST = [25, 35, 50, 65, 80, 120, 160, 200, 250, 300];

  // ====== ステージ構成 ======
  const STAGES_CONFIG = [
    {
      num: 1, name: '[地球|ちきゅう]',
      bossType: 'piccolo', bossName: 'ピッコロとーと',
      bossHp: 55, bossColor: '#68b868', beamColor: '#a0f080',
      triggerKills: 40,
      enemyMultiplier: 0.7,
      transformUnlock: 0,
      bossIntroLine: 'フッ…[吾輩|わがはい]こそピッコロとーと。この[星|ほし]を[支配|しはい]するのは[我|われ]だ！',
      // 地球：青空と緑の地平線
      bgPalette: { top: '#88c8f0', mid: '#50a8e0', bot: '#3a7a40' },
      bgStyle: 'earth',
      eventText: 'ピッコロとーと、待ち構える！',
    },
    {
      num: 2, name: '[荒野|こうや]',
      bossType: 'vegeta', bossName: 'ベジとーと',
      bossHp: 75, bossColor: '#d0a080', beamColor: '#ff80ff',
      triggerKills: 55,

  const MAX_PARTICLES = 120;
  const MAX_ENEMY_PROJECTILES = 50;
  function spawnParticle(x, y, opts) {
    // 上限を超えたら古いものを削除（パフォーマンス維持）
    if (particles.length >= MAX_PARTICLES) particles.splice(0, 10);
    particles.push({
      x, y,
      vx: (opts.vx != null) ? opts.vx : (Math.random() - 0.5) * 4,
      vy: (opts.vy != null) ? opts.vy : (Math.random() - 0.5) * 4,
      life: opts.life || 30, maxLife: opts.life || 30,
      color: opts.color || '#fff', size: opts.size || 3,
      gravity: opts.gravity || 0,
    });
  }

  function spawnExplosion(x, y, color, count) {
    count = Math.min(count || 14, 30);  // 最大30個に制限
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2 + Math.random() * 4;
      spawnParticle(x, y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 28 + Math.random() * 18,
        color: color || ['#ffcc40','#ff8020','#ffee80'][Math.floor(Math.random()*3)],
        size: 2 + Math.random() * 2,
      });
    }
  }

  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color: color || '#fff', life: 40, maxLife: 40 });
  }
