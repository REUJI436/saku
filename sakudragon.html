      type: stg.bossType, name: stg.bossName,
      x: W/2, y: 80, r: 28,
      hp: stg.bossHp, maxHp: stg.bossHp,
      vx: 0, vy: 0, speed: 1.8 + currentStageIdx * 0.15,
      dmg: 2 + Math.floor(currentStageIdx * 0.5),
      attackCD: 100, phase: 0, anim: 0, hurtTimer: 0, dead: false,
      beamCharging: 0, beamFiring: 0, beamAngle: 0,
      color: stg.bossColor, beamColor: stg.beamColor,
      engaged: true,
      // セル専用：瞬間移動クールダウン
      teleportCD: 200,
      // 魔神ブウ専用：ホーミング弾CD
      homingCD: 180,
    };
    banner = { text: stg.bossName + ' 降臨！', color: stg.bossColor, life: 140, maxLife: 140 };
    sfxBoss(); addShake(16);
  }

  // ====== ゲームループ ======
  function gotoCharSelect() {
    ensureAudio();
    state = STATE.CHAR_SELECT;
    stateTimer = 0;
    charSelectTapped = null;
    beep(880, 0.1, 'triangle', 0.14);
  }
  function gotoStageSelect() {
    ensureAudio();
    state = STATE.STAGE_SELECT;
    stateTimer = 0;
    beep(660, 0.1, 'triangle', 0.14);
  }
  let pendingStageSelectIdx = null;

  function continueGame() {
    ensureAudio();
    const sv = loadSave();
    if (!sv) { gotoCharSelect(); return; }
    selectIdx = sv.charIdx || 0;
    resetPlayer(CHARACTERS[selectIdx]);
    currentStageIdx = sv.stageIdx || 0;
    player.transform = sv.transform || 0;
    player.hp = sv.hp || player.maxHp;
    player.kiGauge = sv.kiGauge || 0;
    player.power = sv.power || 0;
    totalScore = sv.totalScore || 0;
    comboMax = sv.comboMax || 0;
    startStage();
  }

  function startGame() {
    ensureAudio();
    resetPlayer(CHARACTERS[selectIdx]);
    currentStageIdx = 0;
    totalScore = 0;
    comboMax = 0;
    startStage();
    // デバッグ：URL ?transform=N で開始変身段階指定（0-5）
    const params = new URLSearchParams(window.location.search);
    const tInit = parseInt(params.get('transform'));
    if (!isNaN(tInit) && tInit >= 0 && tInit <= TRANSFORM_MAX) {
      player.transform = tInit;
      banner = { text: TRANSFORM_NAMES[tInit] + '（デバッグ）', color: auraColorFor(tInit), life: 140, maxLife: 140 };
    }
    if (params.get('maxki') === '1') player.kiGauge = player.kiGaugeMax;
    // デバッグ：?stage=N で任意のステージから開始（1〜5）
    const stageParam = parseInt(params.get('stage'));
    if (!isNaN(stageParam) && stageParam >= 1 && stageParam <= STAGES_CONFIG.length) {
      currentStageIdx = stageParam - 1;
      startStage();
    }
  }

  function startStage() {
    const stg = STAGES_CONFIG[currentStageIdx];
    enemies = []; projectiles = []; enemyProjectiles = []; particles = []; popups = [];
    boss = null; banner = null; bannerSub = null;
    comboCount = 0; comboTimer = 0;
    saveGame();
    // プレイヤー位置リセット（HPは引継ぎ）
    player.x = W/2; player.y = H - 100;
    player.vx = 0; player.vy = 0;
    player.invuln = 60;
    player.kiGauge = Math.min(player.kiGaugeMax, player.kiGauge + 30);
    if (currentStageIdx > 0) {
      const healAmt = Math.ceil(player.maxHp * 0.6);
      player.hp = Math.min(player.maxHp, player.hp + healAmt);
    }
    waveState = { waveIdx: 0, spawnTimer: 30, inWave: false, bossSpawned: false, bossTriggerKills: stg.triggerKills };
    player.kills = 0;
    currentBgPalette = stg.bgPalette;
    // ボス入場カットイン → ゲームプレイ開始の流れ
    if (stg.bossIntroLine) {
      state = STATE.BOSS_INTRO;
      stateTimer = 0;
      bossIntroAnim = 0;
      sfxBoss();
    } else {
      beginStagePlay();
    }
  }

  function beginStagePlay() {
    const stg = STAGES_CONFIG[currentStageIdx];
    state = STATE.PLAYING;
    stateTimer = 0;
    banner = { text: `STAGE ${stg.num} - ${stg.name}`, color: '#ffee40', life: 160, maxLife: 160 };
    beep(660, 0.1, 'square', 0.14);
    setTimeout(() => beep(990, 0.12, 'square', 0.1), 120);
    // プリルードセリフ＆変身イベント
    if (stg.preludeLines && stg.preludeLines.length > 0) {
      const lines = stg.preludeLines;
      const lineDur = 2400;
      let t = 2000;
      lines.forEach((line, i) => {
        setTimeout(() => {
          if (state !== STATE.PLAYING) return;
          banner = { text: line, color: i === lines.length - 1 ? '#ffa040' : '#ffffff', life: 150, maxLife: 150 };
          beep(500 + i * 80, 0.08, 'triangle', 0.1);
        }, t);
        t += lineDur;
      });
      // 変身段階が上がる場合だけ変身演出
      if (stg.transformUnlock > 0 && player.transform < stg.transformUnlock) {
        setTimeout(() => {
          if (state === STATE.PLAYING) {
            triggerScriptedTransform(stg.transformUnlock, stg.eventText, stg.eventFlavor);
          }
        }, t + 500);
      }
    }
  }
  let bossIntroAnim = 0;

  function triggerScriptedTransform(toLevel, eventText, flavor) {
    player.transform = toLevel;
    player.power = 0;
    player.invuln = 60;
    const auraCol = auraColorFor(toLevel);
    banner = { text: eventText, color: auraCol, life: 180, maxLife: 180 };
    if (flavor) {
      setTimeout(() => {
        bannerSub = { text: flavor, color: '#fff', life: 140, maxLife: 140 };
      }, 400);
    }
    sfxTransform();
    addShake(24);
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * Math.PI * 2;
      const sp = 3 + Math.random() * 4;
      spawnParticle(player.x, player.y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 80, color: auraCol, size: 3,
      });
    }
  }

  function nextStage() {
    currentStageIdx++;
    if (currentStageIdx >= STAGES_CONFIG.length) {
      // 全ステージクリア
      state = STATE.CLEARED;
      stateTimer = 0;
      banner = { text: 'すべてのとーとを倒した！', color: '#ffee40', life: 240, maxLife: 240 };
      return;
    }
    startStage();
  }

  // ====== 敵ウェーブ管理 ======
  let waveState = null;
  const WAVES = [
    { saibai: 24, spawnInterval: 22, spawnBurst: 2 },                              // 序盤
    { saibai: 30, namek: 6, spawnInterval: 18, spawnBurst: 2 },
    { saibai: 40, namek: 14, spawnInterval: 16, spawnBurst: 2, banner: '敵の増援！' },
    { saibai: 50, namek: 20, freezer: 4, spawnInterval: 14, spawnBurst: 3 },
    { saibai: 60, namek: 28, freezer: 8, spawnInterval: 12, spawnBurst: 3, banner: '激戦…！' },
    { saibai: 72, namek: 36, freezer: 12, spawnInterval: 10, spawnBurst: 4 },
    { saibai: 90, namek: 48, freezer: 16, spawnInterval: 9, spawnBurst: 4, banner: 'ボス接近…！' },
  ];

  function updateWaves() {
    if (boss) return;
    if (waveState.bossSpawned) return;
    if (player.kills >= waveState.bossTriggerKills) {
      waveState.bossSpawned = true;
      // 場の雑魚は消さない（でも以降は湧きを止める）
      setTimeout(() => { spawnBoss(); }, 500);
      return;
    }
    waveState.spawnTimer--;
    if (waveState.spawnTimer <= 0) {
      if (!waveState.inWave) {
        // 次のウェーブ開始
        waveState.inWave = true;
        const w = WAVES[Math.min(waveState.waveIdx, WAVES.length - 1)];
        waveState.currentWave = { ...w };
        // ステージ固有の敵数倍率・同時スポーン数ボーナスを適用
        const stg = STAGES_CONFIG[currentStageIdx];
        const mult = (stg && stg.enemyMultiplier) || 1;
        if (mult !== 1) {
          for (const k of ['saibai','namek','freezer']) {
            if (waveState.currentWave[k] != null) {
              waveState.currentWave[k] = Math.ceil(waveState.currentWave[k] * mult);
            }
          }
        }
        if (stg && stg.spawnBurstBonus) {
          waveState.currentWave.spawnBurst = (waveState.currentWave.spawnBurst || 1) + stg.spawnBurstBonus;
        }
        waveState.spawnTimer = w.spawnInterval;
        // ウェーブバナー（演出）
        if (w.banner) {
          banner = { text: w.banner, color: '#ff8040', life: 90, maxLife: 90 };
        }
      } else {
        const w = waveState.currentWave;
        const types = [];
        for (const k in w) { if (k !== 'spawnInterval' && k !== 'spawnBurst' && w[k] > 0) types.push(k); }
        if (types.length === 0) {
          waveState.inWave = false;
          waveState.spawnTimer = 60;
          waveState.waveIdx++;
          return;
        }
        // 複数体を同時スポーン（一騎当千感）
        const burst = w.spawnBurst || 1;
        for (let b = 0; b < burst && types.length > 0; b++) {
          const t = types[Math.floor(Math.random() * types.length)];
          spawnEnemy(t);
          w[t]--;
          if (w[t] <= 0) {
            const idx = types.indexOf(t);
            if (idx >= 0) types.splice(idx, 1);
          }
        }
        waveState.spawnTimer = w.spawnInterval;
      }
    }
  }

  // ====== プレイヤー更新 ======
  function updatePlayer() {
    if (player.invuln > 0) player.invuln--;
    player.anim += 0.2;

    // 移動
    let mx = 0, my = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) mx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) my -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) my += 1;
    if (stickVec.x !== 0 || stickVec.y !== 0) { mx = stickVec.x; my = stickVec.y; }
    const mag = Math.hypot(mx, my);
    if (mag > 1) { mx /= mag; my /= mag; }

    const speedBoost = 1 + player.transform * 0.15;
    const actualSpeed = player.speed * speedBoost;
    player.x += mx * actualSpeed;
    player.y += my * actualSpeed;
    // 縦スクロール：プレイヤーは画面の下半分＋αの範囲で移動
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(H * 0.35, Math.min(H - player.r - 20, player.y));
    if (mx !== 0) player.facing = mx > 0 ? 1 : -1;
    player.moving = mag > 0.1;

    // 自動連射：変身段階で発射間隔UP
    if (player.shotCD > 0) player.shotCD--;
    if (player.shotCD <= 0 && !player.ultActive) {
      // 発射間隔：各ティアで -4F（Kaioken 以降は段階的に速く）
      const atkRate = Math.max(6, player.atkRate - player.transform * 4);
      player.shotCD = atkRate;
      spawnKiBlast();
      // 音は連射で 1/2 に間引き
      player.shotSoundTick = (player.shotSoundTick || 0) + 1;
      if (player.shotSoundTick % 2 === 0) sfxShoot();
    }

    // 必殺技ゲージ：時間経過で蓄積
    if (!player.ultActive) {
      player.kiGauge = Math.min(player.kiGaugeMax, player.kiGauge + 0.18);
    }

    // 必殺技発動：Z / Shift / Space / 必殺技ボタン
    const ultKey = keys['KeyZ'] || keys['ShiftLeft'] || keys['Space'] || chargeHeld || fireHeld;
    if (ultKey && player.kiGauge >= player.kiGaugeMax && !player.ultActive) {
      fireKamehameha();
    }

    // 必殺技発動中の更新
    if (player.ultActive) {
      updateKamehameha();
    }
  }

  function spawnKiBlast() {
    const sp = 10;
    const isSaku = player.charId === 'saku';
    const r = isSaku ? 12 : 7;
    const dmg = player.atkDmg + Math.floor(player.transform * 0.6) + (isSaku ? 1 : 0);
    let shots;
    if (player.transform <= 2) shots = 1;
    else if (player.transform === 6) shots = 3;
    else if (player.transform === 7) shots = 5;  // ブルー
    else if (player.transform === 8) shots = 5;  // 身勝手兆（斜め追加）
    else if (player.transform === 9) shots = 5;  // 身勝手（斜め4追加）
    else if (player.transform === 10) shots = 7; // ビースト（斜め4追加）
    else shots = player.transform - 1;
    const spacing = isSaku ? 22 : 12;
    // 直進の弾
    for (let i = 0; i < shots; i++) {
      const offset = (i - (shots - 1) / 2) * spacing;
      projectiles.push({
        x: player.x + offset,
        y: player.y - player.r,
        vx: 0,
        vy: -sp,
        life: 90, dmg, r,
        transform: player.transform,
      });
    }
    // ゴッド：斜め2発追加
    if (player.transform === 6) {
      const diagAng = 0.35;
      for (const s of [-1, 1]) {
        const ang = -Math.PI / 2 + s * diagAng;
        projectiles.push({
          x: player.x + s * spacing * 1.4,
          y: player.y - player.r,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          life: 90, dmg, r,
          transform: player.transform,
        });
      }
    }
    // 身勝手兆：斜め2発追加（合計7発）
    if (player.transform === 8) {
      for (const s of [-1, 1]) {
        const ang = -Math.PI / 2 + s * 0.4;
        projectiles.push({
          x: player.x + s * spacing * 1.6,
          y: player.y - player.r,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          life: 90, dmg, r,
          transform: player.transform,
        });
      }
    }
    // 身勝手：斜め4発追加（合計9発・内外2段階）
    if (player.transform === 9) {
      for (const s of [-1, 1]) {
        for (const [ang, mult] of [[0.3, 1.4], [0.55, 2.0]]) {
          const a = -Math.PI / 2 + s * ang;
          projectiles.push({
            x: player.x + s * spacing * mult,
            y: player.y - player.r,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 90, dmg, r,
            transform: player.transform,
          });
        }
      }
    }
    // ビースト：斜め4発追加（合計11発）
    if (player.transform === 10) {
      for (const s of [-1, 1]) {
        for (const [ang, mult] of [[0.28, 1.5], [0.55, 2.3]]) {
          const a = -Math.PI / 2 + s * ang;
          projectiles.push({
            x: player.x + s * spacing * mult,
            y: player.y - player.r,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 90, dmg, r,
            transform: player.transform,
          });
        }
      }
    }
  }

  function damagePlayer(dmg) {
    if (player.invuln > 0) return;
    if (player.ultActive) return;  // かめはめ波発動中は無敵
    player.hp -= dmg;
    player.invuln = 90;  // 無敵時間（60→90）
    addShake(10);
    sfxHit();
    if (player.hp <= 0) {
      player.hp = 0;
      state = STATE.DEAD;
      stateTimer = 0;
      spawnExplosion(player.x, player.y, '#ffcc40', 50);
      sfxExplode();
      banner = { text: 'やられた…！', color: '#ff4040', life: 150, maxLife: 150 };
      // 2.5秒後に現在ステージを最初からやり直し
      setTimeout(() => {
        if (state === STATE.DEAD) {
          // 変身段階はステージのunlock値に戻す
          const stg = STAGES_CONFIG[currentStageIdx];
          player.transform = stg ? stg.transformUnlock : 0;
          player.power = 0;
          player.hp = player.maxHp;
          startStage();
        }
      }, 2500);
    }
  }

  function gainPower(amount) {
    if (player.transform >= TRANSFORM_MAX) return;
    // パワー取得は現在ステージで解放される変身段階までに制限
    // （それ以上は各ステージ入場時のスクリプトイベントで解放）
    const stg = STAGES_CONFIG[currentStageIdx];
    const cap = stg ? stg.transformUnlock : TRANSFORM_MAX;
    if (player.transform >= cap) return;
    player.power += amount;
    const needed = TRANSFORM_COST[player.transform];
    if (player.power >= needed) {
      triggerTransform();
    }
  }

  function triggerTransform() {
    player.transform = Math.min(TRANSFORM_MAX, player.transform + 1);
    player.power = 0;
    player.invuln = 40;
    const name = TRANSFORM_NAMES[player.transform];
    banner = { text: name + ' 覚醒！', color: auraColorFor(player.transform), life: 140, maxLife: 140 };
    sfxTransform();
    addShake(22);
    // オーラ爆発
    const auraCol = auraColorFor(player.transform);
    for (let i = 0; i < 50; i++) {
      const a = (i / 50) * Math.PI * 2;
      const sp = 3 + Math.random() * 4;
      spawnParticle(player.x, player.y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 70, color: auraCol, size: 3,
      });
    }
  }

  function auraColorFor(t) {
    switch (t) {
      case 1: return '#ff4040';
      case 2: return '#ffee40';
      case 3: return '#ffff80';
      case 4: return '#ffdc20';
      case 5: return '#ff6010';
      case 6: return '#ff3030';
      case 7: return '#4080ff';
      case 8: return '#c0d0ff';  // 薄青白（身勝手兆）
      case 9: return '#e0e0f0';  // 白銀（身勝手）
      case 10: return '#fff0d0'; // 眩しい白金（ビースト）
      default: return '#ffffff';
    }
  }

  // ====== 必殺技：かめはめ波 ======
  function fireKamehameha() {
    player.kiGauge = 0;
    // カットイン演出：発動前の 50F 間キャラアップ＋「かめはめ波！」文字
    player.ultActive = { timer: 120, phase: 'cutin', enemiesHit: new Set(), cutinTimer: 50 };
    banner = null;
    addShake(22);
    // キュイーン：カットイン時の鳴き上がり
    sfxCutinCharge();
  }

  // キュイーン：エネルギーをためる音（cutin 時）
  function sfxCutinCharge() {
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    // 高音のサイン波が下から上へスウィープ
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, now);
    o.frequency.exponentialRampToValueAtTime(2400, now + 0.85);
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(0.28, now + 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.95);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 1.0);
    // 倍音を重ねて「キュイーン」感を強化
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(360, now);
    o2.frequency.exponentialRampToValueAtTime(3200, now + 0.85);
    g2.gain.setValueAtTime(0.001, now);
    g2.gain.exponentialRampToValueAtTime(0.12, now + 0.5);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.95);
    o2.connect(g2).connect(audioCtx.destination);
    o2.start(now); o2.stop(now + 1.0);
  }

  // ドカーン：発射の爆発音
  function sfxKameBoom() {
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    // 低い鈍い爆音（サインベース）
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(120, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.8);
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(0.45, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 1.2);
    // 歪んだ中音（迫力）
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = 'sawtooth';
    o2.frequency.setValueAtTime(280, now);
    o2.frequency.exponentialRampToValueAtTime(80, now + 0.9);
    g2.gain.setValueAtTime(0.001, now);
    g2.gain.exponentialRampToValueAtTime(0.3, now + 0.04);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.95);
    o2.connect(g2).connect(audioCtx.destination);
    o2.start(now); o2.stop(now + 1.0);
    // ノイズバースト（ドッ！）
    try {
      const bufSize = audioCtx.sampleRate * 0.25;
      const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
      const nsrc = audioCtx.createBufferSource();
      nsrc.buffer = noiseBuf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.35, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 900;
      nsrc.connect(filter).connect(ng).connect(audioCtx.destination);
      nsrc.start(now);
    } catch (e) {}
  }

  function updateKamehameha() {
    const u = player.ultActive;
    u.timer--;
    // phase: cutin(120-70F) → charge(70-40F) → fire(40-0F)
    const prevPhase = u.phase;
    if (u.timer > 70) { u.phase = 'cutin'; }
    else if (u.timer > 40) { u.phase = 'charge'; }
    else { u.phase = 'fire'; }
    // 発射フェーズに切り替わった瞬間に「ドカーン！」
    if (u.phase === 'fire' && prevPhase === 'charge') {
      sfxKameBoom();
      addShake(22);
    }
    if (u.phase === 'fire') {
      // 当たり判定：プレイヤーの x を中心とした縦の帯
      const bw = 60;  // ビーム幅
      const bx1 = player.x - bw/2;
      const bx2 = player.x + bw/2;
      // 敵：範囲内なら即死
      for (const e of enemies) {
        if (e.dead) continue;
        if (e.x + e.r > bx1 && e.x - e.r < bx2 && e.y < player.y) {
          e.dead = true;
          spawnExplosion(e.x, e.y, e.color, 18);
          addPopup(e.x, e.y, '+' + e.score, '#80d0ff');
          player.kills++;
          gainPower(e.score / 200);
        }
      }
      // ボス：範囲内なら1F毎にダメージ
      if (boss && !boss.dead) {
        if (boss.x + boss.r > bx1 && boss.x - boss.r < bx2) {
          boss.hp -= 0.8;  // 40Fで32ダメージ
          boss.hurtTimer = 8;
          // 派手な衝撃演出：毎フレームスパーク＋リズミカルに揺れ＋衝撃音
          if (u.timer % 2 === 0) {
            for (let i = 0; i < 4; i++) {
              const a = Math.random() * Math.PI * 2;
              const sp = 3 + Math.random() * 5;
              spawnParticle(boss.x + (Math.random()-0.5)*24, boss.y, {
                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                life: 14 + Math.random() * 8,
                color: ['#ffffff','#80d0ff','#ffee80'][Math.floor(Math.random()*3)],
                size: 2 + Math.random() * 2,
              });
            }
          }
          if (u.timer % 5 === 0) {
            addShake(6);
            beep(400 + Math.random() * 200, 0.04, 'square', 0.08);
          }
          // ボスが衝撃で微振動
          boss.x += (Math.random() - 0.5) * 2.5;
          boss.y += (Math.random() - 0.5) * 1.5;
          if (boss.hp <= 0) {
            killBoss();
          }
        }
      }
      // 敵弾を消去
      enemyProjectiles = enemyProjectiles.filter(p => !(p.x > bx1 && p.x < bx2 && p.y < player.y));
    }
    if (u.timer <= 0) {
      player.ultActive = null;
      // かめはめ波終了後も 60F（約1秒）無敵を維持
      player.invuln = Math.max(player.invuln, 60);
    }
  }

  // ====== 敵更新 ======
  function updateEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      e.anim += 0.1;
      e.patternT += 0.035;
      if (e.hurtTimer > 0) e.hurtTimer--;
      // 縦スクロール：基本は下方向に降ってくる
      const descend = e.speed;
      e.y += descend;
      // 横方向のパターン
      if (e.pattern === 0) {
        // 直進
      } else if (e.pattern === 1) {
        // 正弦波で揺れる
        e.x = e.baseX + Math.sin(e.patternT * 2) * 60;
      } else if (e.pattern === 2) {
        // 緩やかにプレイヤーのx座標に寄る
        const dx = player.x - e.x;
        e.x += Math.sign(dx) * Math.min(Math.abs(dx), 0.6);
      }
      // シュート持ち（フリーザ兵）：画面上部1/3に留まって撃ってくる
      if (e.shooter) {
        if (e.y > H * 0.4) {
          // 一度下がりすぎたら登らないが、減速
          e.y -= descend * 0.8;
        }
        e.shotCD--;
        if (e.shotCD <= 0) {
          e.shotCD = 100 + Math.random() * 60;
          // プレイヤーに向けて下に撃つ
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          pushEnemyProjectile({
            x: e.x, y: e.y, vx: (dx / d) * 5, vy: (dy / d) * 5,
            r: 6, life: 180, dmg: e.dmg, color: '#ff80ff',
          });
          beep(220, 0.1, 'sawtooth', 0.08);
        }
      }
      // 画面外（下）に行ったら消滅
      if (e.y > H + 60) {
        e.dead = true;
        // スコアは入らず
      }
      // プレイヤーと接触
      const playerD = Math.hypot(player.x - e.x, player.y - e.y);
      if (playerD < player.r + e.r - 2) {
        damagePlayer(e.dmg);
        // ノックバック（敵を下に押しやる）
        e.y += 8;
      }
    }
    // 自プロジェクタイルとの衝突（SSJ以降は貫通・最大5体まで）
    for (const p of projectiles) {
      if (!p.hitSet) p.hitSet = new Set();
      const pierce = (p.transform >= 2);
      const maxHits = pierce ? 5 : 1;
      for (const e of enemies) {
        if (e.dead) continue;
        if (p.hitSet.has(e)) continue;
        const d = Math.hypot(p.x - e.x, p.y - e.y);
        if (d < p.r + e.r) {
          e.hp -= p.dmg;
          e.hurtTimer = 15;
          p.hitSet.add(e);
          if (p.hitSet.size >= maxHits) p.life = 0;
          // ヒットスパーク（抑えめ）
          for (let i = 0; i < 3; i++) {
            spawnParticle(p.x, p.y, {
              vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
              life: 15, color: '#ffee80', size: 2.5,
            });
          }
          if (e.hp <= 0) {
            e.dead = true;
            comboCount++;
            if (comboCount > comboMax) comboMax = comboCount;
            comboTimer = 90;
            spawnExplosion(e.x, e.y, e.color, 12);
            addPopup(e.x, e.y, '+' + e.score, '#ffee80');
            player.kills++;
            totalScore += e.score;
            gainPower(e.score / 200);
            sfxExplode();
          }
          if (!pierce) break;
        }
      }
      // ボス衝突
      if (boss && !boss.dead && p.life > 0) {
        const d = Math.hypot(p.x - boss.x, p.y - boss.y);
        if (d < p.r + boss.r) {
          boss.hp -= p.dmg;
          boss.hurtTimer = 15;
          p.life = 0;
          for (let i = 0; i < 6; i++) {
            spawnParticle(p.x, p.y, {
              vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
              life: 18, color: '#ffee80', size: 2.5,
            });
          }
          if (boss.hp <= 0) {
            killBoss();
          } else {
            addShake(5);
            sfxHit();
          }
        }
      }
    }
    enemies = enemies.filter(e => !e.dead);
    projectiles = projectiles.filter(p => p.life > 0);
  }

  function pushEnemyProjectile(p) {
    if (enemyProjectiles.length >= MAX_ENEMY_PROJECTILES) {
      enemyProjectiles.shift();  // 上限超で古いのから削除
    }
    enemyProjectiles.push(p);
  }
  // ====== 敵弾更新 ======
  function updateEnemyProjectiles() {
    for (const p of enemyProjectiles) {
      // ホーミング弾：追尾
      if (p.homing && p.life > 30) {
        const dx = player.x - p.x, dy = player.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d > 0) {
          const turnRate = 0.08;
          p.vx = p.vx * (1 - turnRate) + (dx / d) * 4 * turnRate;
          p.vy = p.vy * (1 - turnRate) + (dy / d) * 4 * turnRate;
        }
      }
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      // プレイヤーに当たる
      const d = Math.hypot(p.x - player.x, p.y - player.y);
      if (d < p.r + player.r - 2 && player.invuln === 0) {
        damagePlayer(p.dmg);
        p.life = 0;
      }
      if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) p.life = 0;
    }
    enemyProjectiles = enemyProjectiles.filter(p => p.life > 0);
  }

  // ====== プロジェクタイル移動 ======
  function updateProjectiles() {
    for (const p of projectiles) {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) p.life = 0;
    }
  }

  // ====== ボス更新 ======
  function updateBoss() {
    if (!boss) return;
    if (boss.dead) { updateBossDefeat(); return; }
    boss.anim += 0.1;
    if (boss.hurtTimer > 0) boss.hurtTimer--;
    const enraged = boss.hp / boss.maxHp < 0.4;

    // 移動：画面上部で左右に揺れる（縦スクロールSTG風）
    const spd = enraged ? boss.speed * 1.5 : boss.speed;
    if (boss.beamFiring <= 0 && boss.beamCharging <= 0) {
      // x方向：プレイヤーに緩く寄る＋正弦波で揺れる
      const dx = player.x - boss.x;
      const tx = player.x + Math.sin(boss.anim * 0.6) * 200;
      const diff = tx - boss.x;
      boss.x += Math.sign(diff) * Math.min(Math.abs(diff), spd);
      // y方向：画面上部1/4あたりを目指す
      const targetY = H * 0.18 + Math.sin(boss.anim * 0.3) * 20;
      const ty = targetY - boss.y;
      boss.y += Math.sign(ty) * Math.min(Math.abs(ty), spd * 0.6);
    }
    boss.x = Math.max(boss.r, Math.min(W - boss.r, boss.x));
    boss.y = Math.max(boss.r + 20, Math.min(H * 0.45, boss.y));

    // 攻撃パターン
    boss.attackCD--;
    if (boss.beamCharging > 0) {
      boss.beamCharging--;
      // チャージ中に予告線の角度を先にロック（chargeの最後1/4になる直前）
      if (boss.beamCharging === 30) {
        // ここで角度をロック（プレイヤーはこれ以降の時間で避ける）
        boss.beamAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.beamLocked = true;
      } else if (boss.beamCharging > 30) {
        // ロック前は予告線がプレイヤーを追尾（プレイヤーに見せて警告）
        boss.beamAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.beamLocked = false;
      }
      if (boss.beamCharging === 0) {
        // 本ビーム発射
        boss.beamFiring = 45;
        addShake(8);
        ensureAudio();
        if (audioCtx) {
          const now = audioCtx.currentTime;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(440, now);
          o.frequency.exponentialRampToValueAtTime(110, now + 1.0);
          g.gain.setValueAtTime(0.2, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
          o.connect(g).connect(audioCtx.destination);
          o.start(now); o.stop(now + 1.2);
        }
      }
    } else if (boss.beamFiring > 0) {
      boss.beamFiring--;
      // ビーム当たり判定
      const bx = boss.x, by = boss.y;
      const ang = boss.beamAngle;
      const bendLen = 600;
      const bw = 24;
      // 線分とプレイヤーの最短距離
      const px = player.x - bx, py = player.y - by;
      const t = Math.max(0, Math.min(bendLen, px * Math.cos(ang) + py * Math.sin(ang)));
      const nx = bx + Math.cos(ang) * t;
      const ny = by + Math.sin(ang) * t;
      const dist = Math.hypot(player.x - nx, player.y - ny);
      if (dist < bw/2 + player.r - 4 && player.invuln === 0) {
        damagePlayer(boss.dmg);
      }
    } else if (boss.attackCD <= 0) {
      // 次の攻撃をボス種別ごとに選ぶ
      pickBossAttack(enraged);
    }

    // プレイヤーと接触
    const pd = Math.hypot(player.x - boss.x, player.y - boss.y);
    if (pd < boss.r + player.r - 4 && player.invuln === 0) {
      damagePlayer(boss.dmg);
    }
  }

  // ====== ボス撃破演出（ド派手版） ======
  let bossShockwaves = [];  // 拡大するリング
  function killBoss() {
    boss.dead = true;
    boss.defeatTimer = 0;
    boss.vanished = false;
    bossShockwaves = [];
    // ステージクリア記録
    markStageCleared(currentStageIdx);
    banner = { text: (boss.name || 'とーと') + ' [撃破|げきは]！', color: '#80ff80', life: 260, maxLife: 260 };
    addShake(28);
    screenFlash = 0.7;
    // 初回の衝撃爆発
    spawnExplosion(boss.x, boss.y, '#ffffff', 18);
    spawnExplosion(boss.x, boss.y, '#ffcc40', 14);
    sfxExplode();
    addBossShockwave(boss.x, boss.y, 150, '#ffee80');
    // 地響き
    lowImpactSound();
    // 敵弾は全消滅
    enemyProjectiles = [];
    // 残敵も巻き込み爆発
    for (const e of enemies) {
      if (!e.dead) {
        e.dead = true;
        spawnExplosion(e.x, e.y, e.color, 6);
      }
    }
  }

  function addBossShockwave(x, y, maxR, color) {
    bossShockwaves.push({ x, y, r: 0, maxR, life: 45, maxLife: 45, color });
  }

  function lowImpactSound() {
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(70, now);
    o.frequency.exponentialRampToValueAtTime(28, now + 1.2);
    g.gain.setValueAtTime(0.5, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 1.4);
  }

  function updateBossDefeat() {
    boss.defeatTimer++;
    const t = boss.defeatTimer;
    // 0〜140F：ボス周囲で連鎖爆発（徐々に頻度UP）
    if (t < 140) {
      const interval = t < 40 ? 10 : t < 90 ? 6 : 4;
      if (t % interval === 0) {
        const ox = (Math.random() - 0.5) * boss.r * 3.2;
        const oy = (Math.random() - 0.5) * boss.r * 2.6;
        const cols = ['#ffcc40','#ff8020','#ffee80','#ffffff','#ff5020'];
        spawnExplosion(boss.x + ox, boss.y + oy, cols[Math.floor(Math.random() * cols.length)], 10);
        addShake(3 + Math.floor(t / 30));
        beep(100 + Math.random() * 250, 0.07, 'sawtooth', 0.09);
      }
      // 中間フェーズの衝撃波＆フラッシュ
      if (t === 40) {
        addBossShockwave(boss.x, boss.y, 220, '#ffcc40');
        screenFlash = 0.5;
        addShake(14);
        sfxExplode();
      }
      if (t === 90) {
        addBossShockwave(boss.x, boss.y, 280, '#ff8020');
        screenFlash = 0.6;
        addShake(18);
        sfxExplode();
        lowImpactSound();
      }
    }
    // 140F：巨大爆発＆ボス消滅
    if (t === 140) {
      spawnExplosion(boss.x, boss.y, '#ffffff', 50);
      spawnExplosion(boss.x, boss.y, '#ffcc40', 35);
      spawnExplosion(boss.x, boss.y, boss.color || '#80ff80', 35);
      // ボスのパーツが四方に飛散
      for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2;
        const sp = 5 + Math.random() * 5;
        particles.push({
          x: boss.x, y: boss.y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
          life: 90, maxLife: 90,
          color: boss.color || '#80ff80',
          size: 5 + Math.random() * 3,
          gravity: 0.25,
        });
      }
      // 3重の超ド級ショックウェーブ
      addBossShockwave(boss.x, boss.y, 450, '#ffffff');
      addBossShockwave(boss.x, boss.y, 380, '#ffee80');
      addBossShockwave(boss.x, boss.y, 520, '#ffcc40');
      addShake(40);
      screenFlash = 1.0;
      sfxExplode();
      lowImpactSound();
      // 最後の1発・超低音
      ensureAudio();
      if (audioCtx) {
        const now = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(90, now);
        o.frequency.exponentialRampToValueAtTime(25, now + 1.5);
        g.gain.setValueAtTime(0.6, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
        o.connect(g).connect(audioCtx.destination);
        o.start(now); o.stop(now + 1.7);
      }
      boss.vanished = true;
    }
    // ショックウェーブ更新
    for (const sw of bossShockwaves) {
      sw.life--;
      const pr = 1 - sw.life / sw.maxLife;
      sw.r = sw.maxR * pr;
    }
    bossShockwaves = bossShockwaves.filter(sw => sw.life > 0);
    // 180F：余韻フェーズ終了 → STAGE_CLEAR へ
    if (t === 180) {
      const isLast = (currentStageIdx >= STAGES_CONFIG.length - 1);
      if (isLast) {
        state = STATE.CLEARED;
        stateTimer = 0;
      } else {
        state = STATE.STAGE_CLEAR;
        stateTimer = 0;
        setTimeout(() => {
          if (state === STATE.STAGE_CLEAR) nextStage();
        }, 2800);  // STAGE_CLEAR 2.8秒（余韻を長く）
      }
    }
  }
  // ショックウェーブの描画（drawGame 内で呼ぶ）
  function drawBossShockwaves() {
    for (const sw of bossShockwaves) {
      const alpha = Math.max(0, sw.life / sw.maxLife);
      ctx.save();
      ctx.strokeStyle = sw.color;
      ctx.globalAlpha = alpha * 0.9;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 2;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r * 0.8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ====== ボス別攻撃パターン ======
  function pickBossAttack(enraged) {
    if (!boss) return;
    const type = boss.type;
    const rand = Math.random();
    if (type === 'piccolo') {
      // 魔貫光殺砲 / 散弾
      if (rand < 0.4 || enraged) {
        startBossBeam(enraged);
      } else {
        spreadKi(enraged ? 5 : 3, 0.25, 4.5);
        boss.attackCD = enraged ? 40 : 65;
      }
    } else if (type === 'vegeta') {
      // ギャリック砲（ビーム）／ラピッドファイア
      if (rand < 0.35 || enraged) {
        startBossBeam(enraged);
      } else {
        // ラピッドファイア：連射で8発
        rapidFire(enraged ? 10 : 8, 4.8);
        boss.attackCD = enraged ? 50 : 80;
      }
    } else if (type === 'freezer') {
      // デスボール（ゆっくり大玉）／散弾／ビーム
      if (rand < 0.3) startBossBeam(enraged);
      else if (rand < 0.65) {
        deathBall(enraged);
        boss.attackCD = enraged ? 60 : 90;
      } else {
        spreadKi(enraged ? 7 : 5, 0.28, 4.2);
        boss.attackCD = enraged ? 40 : 60;
      }
    } else if (type === 'cell') {
      // テレポート→ビーム／散弾／広角スプレッド
      if (rand < 0.4 || enraged) {
        // テレポート前に位置を変える
        teleport();
        setTimeout(() => { if (boss && !boss.dead) startBossBeam(enraged); }, 300);
        boss.attackCD = enraged ? 100 : 160;
      } else {
        spreadKi(enraged ? 9 : 7, 0.22, 4.6);
        boss.attackCD = enraged ? 45 : 70;
      }
    } else if (type === 'buu') {
      // ホーミング弾／ビーム／散弾
      if (rand < 0.3) startBossBeam(enraged);
      else if (rand < 0.65 || enraged) {
        spawnHomingShots(enraged ? 5 : 3);
        boss.attackCD = enraged ? 70 : 100;
      } else {
        spreadKi(enraged ? 8 : 6, 0.30, 4.0);
        boss.attackCD = enraged ? 40 : 60;
      }
    } else {
      // デフォルト
      if (rand < 0.35) startBossBeam(enraged);
      else {
        spreadKi(3, 0.25, 4.5);
        boss.attackCD = 70;
      }
    }
  }

  function startBossBeam(enraged) {
    boss.beamCharging = enraged ? 70 : 110;
    boss.beamLocked = false;
    boss.attackCD = enraged ? 120 : 180;
  }

  function spreadKi(count, spread, speed) {
    for (let i = 0; i < count; i++) {
      const baseAng = Math.atan2(player.y - boss.y, player.x - boss.x);
      const ang = baseAng + (i - (count - 1) / 2) * spread;
      pushEnemyProjectile({
        x: boss.x, y: boss.y,
        vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        r: 8, life: 160, dmg: boss.dmg, color: boss.beamColor || '#a0f080',
      });
    }
    beep(180, 0.12, 'sawtooth', 0.1);
  }

  function rapidFire(count, speed) {
    // 一瞬で連射：setTimeout でずらしながら発射
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        if (!boss || boss.dead) return;
        const ang = Math.atan2(player.y - boss.y, player.x - boss.x) + (Math.random() - 0.5) * 0.15;
        pushEnemyProjectile({
          x: boss.x, y: boss.y,
          vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
          r: 6, life: 140, dmg: boss.dmg, color: boss.beamColor || '#ffb080',
        });
        beep(260, 0.05, 'square', 0.08);
      }, i * 60);
    }
  }

  function deathBall(enraged) {
    const ang = Math.atan2(player.y - boss.y, player.x - boss.x);
    const sp = enraged ? 3.2 : 2.4;
    pushEnemyProjectile({
      x: boss.x, y: boss.y + 20,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      r: 18, life: 300, dmg: boss.dmg + 1, color: boss.beamColor || '#ff80ff',
      deathBall: true,
    });
    beep(120, 0.3, 'sawtooth', 0.15);
  }

  function teleport() {
    if (!boss) return;
    // 画面揺れ＋煙
    addShake(8);
    for (let i = 0; i < 20; i++) {
      spawnParticle(boss.x, boss.y, {
        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
        life: 40, color: '#60ff80', size: 3,
      });
    }
    // 新しい位置へ（プレイヤー上方、左右どちらか）
    const side = Math.random() < 0.5 ? -1 : 1;
    boss.x = W/2 + side * 200;
    boss.y = H * 0.18;
    for (let i = 0; i < 20; i++) {
      spawnParticle(boss.x, boss.y, {
        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
        life: 40, color: '#60ff80', size: 3,
      });
    }
    beep(500, 0.15, 'sine', 0.15);
  }

  function spawnHomingShots(count) {
    if (!boss.homingShots) boss.homingShots = [];
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2;
      const proj = {
        x: boss.x, y: boss.y,
        vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2,
        r: 7, life: 180, dmg: boss.dmg, color: boss.beamColor || '#ff80ff',
        homing: true,
      };
      pushEnemyProjectile(proj);
      boss.homingShots.push(proj);
    }
    beep(320, 0.12, 'triangle', 0.12);
    // ホーミング弾は通常弾と一緒に更新される。homingフラグで追尾処理
  }

  // ====== パーティクル ======
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.vy += p.gravity || 0;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
    for (const pu of popups) {
      pu.life--;
      pu.y -= 0.6;
    }
    popups = popups.filter(p => p.life > 0);
  }

  // ====== 描画 ======
  function draw() {
    // 画面揺れ
    let sx = 0, sy = 0;
    if (cameraShake > 0) {
      sx = (Math.random() - 0.5) * cameraShake;
      sy = (Math.random() - 0.5) * cameraShake;
      cameraShake *= 0.85;
      if (cameraShake < 0.5) cameraShake = 0;
    }
    ctx.save();
    ctx.translate(sx, sy);

    if (state === STATE.TITLE) drawTitle();
    else if (state === STATE.CHAR_SELECT) drawCharSelect();
    else if (state === STATE.STAGE_SELECT) drawStageSelect();
    else if (state === STATE.BOSS_INTRO) drawBossIntro();
    else drawGame();

    // 画面フラッシュ（ボス撃破などの演出）
    if (screenFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
      ctx.fillRect(0, 0, W, H);
      screenFlash = Math.max(0, screenFlash - 0.04);
    }

    ctx.restore();
  }

  // スクロール背景用の星データ（2レイヤーに削減）
  const starLayers = [];
  for (let layer = 0; layer < 2; layer++) {
    const speed = 0.8 + layer * 1.4;
    const count = 20 + layer * 15;
    const size = 0.8 + layer * 0.8;
    const brightness = 0.3 + layer * 0.3;
    const stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, size, speed, brightness });
    }
    starLayers.push(stars);
  }
  // 背景グラデをキャッシュ（パレット変更時のみ再生成）
  let cachedBgPal = null, cachedBgGrad = null;
  function drawBackground() {
    const pal = currentBgPalette || { top: '#040012', mid: '#100828', bot: '#20104a' };
    if (cachedBgPal !== pal) {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, pal.top);
      g.addColorStop(0.5, pal.mid);
      g.addColorStop(1, pal.bot);
      cachedBgGrad = g;
      cachedBgPal = pal;
    }
    ctx.fillStyle = cachedBgGrad;
    ctx.fillRect(0, 0, W, H);
    // 星（最小コストで）
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (const stars of starLayers) {
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
      }
    }
    // 星を一括描画（fillStyle 1 回）
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (const s of starLayers[0]) ctx.fillRect(s.x, s.y, s.size, s.size * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (const s of starLayers[1]) ctx.fillRect(s.x, s.y, s.size, s.size * 2);
  }

  // ====== タイトル画面 ======
  function drawTitle() {
    // 背景：ブロリー風の紺色グラデ
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0a1438');
    g.addColorStop(0.5, '#1a2878');
    g.addColorStop(1, '#060a1c');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // 星
    for (let i = 0; i < 80; i++) {
      const x = (i * 197) % W;
      const y = (i * 131 + 17) % (H * 0.6);
      const b = 0.3 + 0.6 * (Math.sin(stateTimer * 0.05 + i) * 0.5 + 0.5);
      ctx.fillStyle = `rgba(255,255,255,${b})`;
      ctx.fillRect(x, y, i % 4 === 0 ? 2 : 1, i % 4 === 0 ? 2 : 1);
    }

    // 下から立ち昇る緑・黄のオーラ
    for (let i = 0; i < 6; i++) {
      const ax = W/2 + Math.sin(stateTimer * 0.04 + i * 1.3) * 80;
      const ay = H + 40;
      const ar = 320 + Math.sin(stateTimer * 0.06 + i) * 30;
      const ag = ctx.createRadialGradient(ax, ay, 40, ax, ay, ar);
      ag.addColorStop(0, 'rgba(200,255,120,0.45)');
      ag.addColorStop(0.4, 'rgba(80,200,60,0.3)');
      ag.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI * 2); ctx.fill();
    }
    // 立ち昇る炎の線
    for (let i = 0; i < 14; i++) {
      const bx = 80 + i * 60 + Math.sin(stateTimer * 0.1 + i) * 10;
      const by = H - (stateTimer * 3 + i * 40) % (H + 200);
      const h = 60 + (i % 3) * 20;
      const fg = ctx.createLinearGradient(bx, by, bx, by - h);
      fg.addColorStop(0, 'rgba(180,255,80,0.5)');
      fg.addColorStop(1, 'rgba(255,255,180,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(bx - 2, by - h, 4, h);
    }

    // 背景の稲妻（ブルーの気）
    ctx.save();
    ctx.strokeStyle = `rgba(120,180,255,${0.3 + 0.2 * Math.sin(stateTimer * 0.2)})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const seed = Math.floor(stateTimer / 20) + i;
      const sx = ((seed * 73) % W);
      const sy = ((seed * 41) % 100) + 30;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      let cx = sx, cy = sy;
      for (let j = 0; j < 5; j++) {
        cx += (((seed + j) * 37) % 40) - 20;
        cy += 20 + ((seed + j) * 13) % 20;
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
    ctx.restore();

    // キャラクター：さく（左）とくるみ（右）をSSJブルーで配置
    const sakuChar = { ...CHARACTERS[0], hairCol: '#3078ff' };
    const kurumiChar = { ...CHARACTERS[1], hairCol: '#3078ff' };
    // オーラ（青）
    const auraBlue = (cx, cy) => {
      for (let k = 0; k < 4; k++) {
        const rr = 90 + Math.sin(stateTimer * 0.08 + k) * 12;
        const ag = ctx.createRadialGradient(cx, cy, 20, cx, cy, rr);
        ag.addColorStop(0, 'rgba(120,180,255,0.55)');
        ag.addColorStop(0.6, 'rgba(60,120,255,0.25)');
        ag.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = ag;
        ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.fill();
      }
    };
    auraBlue(220, 200);
    auraBlue(740, 200);
    drawCharPortrait(sakuChar, 220, 210, 4.2);
    drawCharPortrait(kurumiChar, 740, 210, 4.2);

    // タイトルロゴ（中央）
    const tcx = W/2 + 20, tcy = 260;
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // 上：ドラゴンボール「超」風
    ctx.font = 'bold 36px serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText('スーパードラゴンボール', tcx, tcy - 30);
    const g3 = ctx.createLinearGradient(0, tcy - 50, 0, tcy - 10);
    g3.addColorStop(0, '#ffee60');
    g3.addColorStop(1, '#ff9020');
    ctx.fillStyle = g3;
    ctx.fillText('スーパードラゴンボール', tcx, tcy - 30);

    // 下：「咲玖」（赤字）
    ctx.font = 'bold 72px serif';
    ctx.lineWidth = 10; ctx.strokeStyle = '#000';
    ctx.strokeText('咲玖', tcx, tcy + 30);
    const g4 = ctx.createLinearGradient(0, tcy, 0, tcy + 70);
    g4.addColorStop(0, '#ff4020');
    g4.addColorStop(0.5, '#ff6030');
    g4.addColorStop(1, '#c01810');
    ctx.fillStyle = g4;
    ctx.fillText('咲玖', tcx, tcy + 30);
    // ふりがな「さく」
    ctx.font = 'bold 18px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText('さく', tcx, tcy + 78);
    ctx.fillStyle = '#ffffff';
    ctx.fillText('さく', tcx, tcy + 78);

    // 赤い星（タイトル上にアクセント）
    const starX = tcx - 165, starY = tcy - 30;
    ctx.fillStyle = '#d02020';
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const ang = -Math.PI/2 + i * Math.PI / 5;
      const rr = i % 2 === 0 ? 14 : 6;
      const px = starX + Math.cos(ang) * rr;
      const py = starY + Math.sin(ang) * rr;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // メニュー：はじめから / つづきから / ステージ選択
    const sv = loadSave();
    const hasCleared = hasAnyCleared();
    const btnW = 240, btnH = 42;
    const gap = 8;
    const count = 1 + (sv ? 1 : 0) + (hasCleared ? 1 : 0);
    const totalH = count * btnH + (count - 1) * gap;
    const startY = H - 40 - totalH;
    let curY = startY + btnH / 2;
    const nx = W/2;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 20px sans-serif';

    // はじめから
    drawMenuBtn(nx, curY, btnW, btnH, 'はじめから', 'rgba(80,40,10,0.85)', '#ffa040', '#ffee80');
    titleNewBtn = { x: nx - btnW/2, y: curY - btnH/2, w: btnW, h: btnH };
    curY += btnH + gap;

    // つづきから
    if (sv) {
      drawMenuBtn(nx, curY, btnW, btnH, 'つづきから', 'rgba(10,40,80,0.85)', '#60a0ff', '#80c0ff');
      titleContinueBtn = { x: nx - btnW/2, y: curY - btnH/2, w: btnW, h: btnH };
      curY += btnH + gap;
    } else {
      titleContinueBtn = null;
    }

    // ステージ選択
    if (hasCleared) {
      drawMenuBtn(nx, curY, btnW, btnH, 'ステージ[選択|せんたく]', 'rgba(20,60,30,0.85)', '#60c080', '#a0ffa0');
      titleStageSelectBtn = { x: nx - btnW/2, y: curY - btnH/2, w: btnW, h: btnH };
      curY += btnH + gap;
    } else {
      titleStageSelectBtn = null;
    }

    ctx.restore();
  }
  let titleNewBtn = null, titleContinueBtn = null, titleStageSelectBtn = null;

  function drawMenuBtn(cx, cy, w, h, label, bg, border, textCol) {
    ctx.fillStyle = bg;
    ctx.fillRect(cx - w/2, cy - h/2, w, h);
    ctx.strokeStyle = border;
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - w/2, cy - h/2, w, h);
    drawRubyText(label, cx, cy + 7, { size: 20, fill: textCol, strokeW: 4 });
  }

  // ====== キャラ選択画面 ======
  function drawCharSelect() {
    // 背景
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, 0, W, H);
    // タイトル
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 36px serif';
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.strokeText('キャラを えらんで', W/2, 70);
    ctx.fillStyle = '#ffee60';
    ctx.fillText('キャラを えらんで', W/2, 70);
    ctx.restore();

    // キャラ表示
    const cardW = 260, cardH = 320;
    const gap = 60;
    const totalW = cardW * CHARACTERS.length + gap * (CHARACTERS.length - 1);
    const startX = (W - totalW) / 2;
    for (let i = 0; i < CHARACTERS.length; i++) {
      const c = CHARACTERS[i];
      const cx = startX + i * (cardW + gap);
      const cy = 120;
      const selected = (i === selectIdx);
      // カード
      ctx.save();
      if (selected) {
        ctx.shadowColor = '#ffee60';
        ctx.shadowBlur = 20;
      }
      ctx.fillStyle = selected ? '#3a3050' : '#202028';
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = selected ? '#ffee60' : '#606070';
      ctx.lineWidth = selected ? 4 : 2;
      ctx.strokeRect(cx, cy, cardW, cardH);
      // キャラ絵
      drawCharPortrait(c, cx + cardW/2, cy + 140, selected ? 4 : 3.2);
      // 名前
      ctx.textAlign = 'center';
      ctx.font = 'bold 32px serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText(c.name, cx + cardW/2, cy + 240);
      ctx.fillStyle = selected ? '#ffee60' : '#fff';
      ctx.fillText(c.name, cx + cardW/2, cy + 240);
      // スタッツ
      ctx.font = '14px sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('HP: ' + c.hp + '  SPEED: ' + c.speed, cx + cardW/2, cy + 270);
      ctx.fillText(c.desc, cx + cardW/2, cy + 290);
      ctx.restore();
    }
    // 操作説明
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    const hintText = 'キャラをタップして スタート！';
    ctx.strokeText(hintText, W/2, H - 55);
    // 点滅
    const pulse = Math.floor(stateTimer / 20) % 2 === 0 ? '#ffee40' : '#ffa040';
    ctx.fillStyle = pulse;
    ctx.fillText(hintText, W/2, H - 55);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#999';
    ctx.fillText('PC：← → で選択、Space でスタート', W/2, H - 25);
    ctx.restore();
  }

  function drawCharPortrait(c, cx, cy, scale) {
    // 全身キャラ絵（スタンド姿）
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 30, 12, 3, 0, 0, Math.PI*2); ctx.fill();
    // 脚（オレンジ道着）
    ctx.fillStyle = c.pantsCol;
    ctx.fillRect(-6, 14, 5, 14);
    ctx.fillRect(1, 14, 5, 14);
    // 足首の青いバンド
    ctx.fillStyle = c.bootCol || '#1a3070';
    ctx.fillRect(-7, 26, 7, 3);
    ctx.fillRect(1, 26, 7, 3);
    // ブーツ（紺）
    ctx.fillStyle = c.bootCol || '#1a3070';
    ctx.fillRect(-7, 29, 7, 3);
    ctx.fillRect(1, 29, 7, 3);
    // 胴（オレンジ道着）
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-9, -2, 18, 16);
    // 青いインナー（Vネック部・襟元）
    ctx.fillStyle = c.innerCol || '#2060c0';
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.lineTo(4, -2);
    ctx.lineTo(0, 4);
    ctx.closePath();
    ctx.fill();
    // 青い帯
    ctx.fillStyle = c.beltCol || '#1a4098';
    ctx.fillRect(-9, 10, 18, 4);
    // 帯の結び目（やや暗い青）
    ctx.fillStyle = '#102860';
    ctx.fillRect(-2, 10, 4, 4);
    // 腕（オレンジ）
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-12, 0, 4, 10);
    ctx.fillRect(8, 0, 4, 10);
    // 手首の青いリストバンド
    ctx.fillStyle = c.innerCol || '#2060c0';
    ctx.fillRect(-12, 10, 4, 2.5);
    ctx.fillRect(8, 10, 4, 2.5);
    // 手
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(-10, 14, 2, 0, Math.PI*2);
    ctx.arc(10, 14, 2, 0, Math.PI*2);
    ctx.fill();
    // 首
    ctx.fillStyle = c.skinCol;
    ctx.fillRect(-2, -5, 4, 4);
    // 頭
    ctx.beginPath();
    ctx.arc(0, -12, 9, 0, Math.PI*2);
    ctx.fill();
    // 髪（目は y=-12。前髪は y=-14 までで止める）
    ctx.fillStyle = c.hairCol;
    if (c.id === 'saku') {
      // さくの髪：頭頂部から側面（耳の上）まで、前髪は額のみ
      ctx.beginPath();
      ctx.arc(0, -12, 9, Math.PI, 0);        // 頭頂の丸みだけ
      ctx.lineTo(9, -14);
      ctx.lineTo(-9, -14);
      ctx.closePath();
      ctx.fill();
      // 斜めの前髪（サイドスイープ・額のみ、目にかからない）
      ctx.beginPath();
      ctx.moveTo(-9, -15);
      ctx.bezierCurveTo(-6, -13, 0, -13.5, 5, -14);
      ctx.bezierCurveTo(8, -14.5, 9, -15.5, 9, -17);
      ctx.lineTo(8, -15);
      ctx.lineTo(-9, -15);
      ctx.closePath();
      ctx.fill();
      // サイドのもみあげ（耳の上まで、目の高さで止める）
      ctx.beginPath();
      ctx.moveTo(-9, -14);
      ctx.lineTo(-9, -11);
      ctx.lineTo(-7, -11);
      ctx.lineTo(-7, -14);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(9, -14);
      ctx.lineTo(9, -11);
      ctx.lineTo(7, -11);
      ctx.lineTo(7, -14);
      ctx.closePath();
      ctx.fill();
      // ハイライト（サラサラ感）
      ctx.strokeStyle = '#3a2820';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(-5, -18); ctx.lineTo(-2, -20);
      ctx.moveTo(2, -19); ctx.lineTo(5, -17);
      ctx.stroke();
    } else {
      // くるみ：ミディアム。顔（-21〜-3, eyes -12）を覆わないよう側面だけ描画
      // 左のサイド毛束（耳の横を通って肩まで）
      ctx.beginPath();
      ctx.moveTo(-10, -18);
      ctx.bezierCurveTo(-13, -10, -13, 0, -11, 6);
      ctx.lineTo(-7, 6);
      ctx.bezierCurveTo(-6, 0, -6, -6, -9, -18);
      ctx.closePath();
      ctx.fill();
      // 右のサイド毛束
      ctx.beginPath();
      ctx.moveTo(10, -18);
      ctx.bezierCurveTo(13, -10, 13, 0, 11, 6);
      ctx.lineTo(7, 6);
      ctx.bezierCurveTo(6, 0, 6, -6, 9, -18);
      ctx.closePath();
      ctx.fill();
      // 頭頂部（額より上だけ）
      ctx.beginPath();
      ctx.arc(0, -15, 10, Math.PI, 0);
      ctx.lineTo(9, -15);
      ctx.lineTo(-9, -15);
      ctx.closePath();
      ctx.fill();
      // 前髪（額のみ・y=-15 〜 -18で、目 y=-12 には絶対かけない）
      ctx.beginPath();
      ctx.moveTo(-9, -18);
      ctx.quadraticCurveTo(-3, -15, 0, -15);
      ctx.quadraticCurveTo(4, -15.5, 9, -16);
      ctx.lineTo(8, -19);
      ctx.bezierCurveTo(4, -21, -4, -21, -9, -18);
      ctx.closePath();
      ctx.fill();
      // ハイライト
      ctx.strokeStyle = '#b88050';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-6, -19); ctx.lineTo(-2, -21);
      ctx.moveTo(3, -21); ctx.lineTo(7, -18);
      ctx.stroke();
      // ピンクリボン（頭頂の左サイド）
      ctx.fillStyle = '#ff80b0';
      ctx.beginPath();
      ctx.moveTo(-11, -20);
      ctx.lineTo(-7, -22);
      ctx.lineTo(-7, -17);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-3, -20);
      ctx.lineTo(-7, -22);
      ctx.lineTo(-7, -17);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d06090';
      ctx.fillRect(-8, -21, 2, 3);
    }
    // 目（イケメンは少し細目、くるみは大きく丸い）
    const eyeW = c.id === 'saku' ? 1.4 : 1.8;
    const eyeH = c.id === 'saku' ? 1.7 : 2.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-3, -12, eyeW, eyeH, 0, 0, Math.PI*2);
    ctx.ellipse(3, -12, eyeW, eyeH, 0, 0, Math.PI*2);
    ctx.fill();
    // 瞳
    const eyeColor = c.id === 'saku' ? '#2a1a0a' : '#8a4820';  // さく:濃茶, くるみ:明茶
    ctx.fillStyle = eyeColor;
    ctx.beginPath();
    ctx.ellipse(-3, -12, eyeW*0.7, eyeH*0.7, 0, 0, Math.PI*2);
    ctx.ellipse(3, -12, eyeW*0.7, eyeH*0.7, 0, 0, Math.PI*2);
    ctx.fill();
    // キラキラハイライト
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3.3, -12.5, 0.4, 0, Math.PI*2);
    ctx.arc(2.7, -12.5, 0.4, 0, Math.PI*2);
    ctx.fill();
    // まつげ（くるみは長め）
    if (c.id === 'kurumi') {
      ctx.strokeStyle = '#2a1608';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-5, -13.5); ctx.lineTo(-5.5, -14.5);
      ctx.moveTo(-4, -14); ctx.lineTo(-4, -15);
      ctx.moveTo(5, -13.5); ctx.lineTo(5.5, -14.5);
      ctx.moveTo(4, -14); ctx.lineTo(4, -15);
      ctx.stroke();
    } else {
      // さく：涼やかな眉
      ctx.strokeStyle = '#1a1008';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-5, -14.5); ctx.lineTo(-1.5, -14.8);
      ctx.moveTo(1.5, -14.8); ctx.lineTo(5, -14.5);
      ctx.stroke();
    }
    // 口
    ctx.strokeStyle = '#a05030';
    ctx.lineWidth = 0.8;
    if (c.id === 'saku') {
      // イケメン：薄く微笑
      ctx.beginPath();
      ctx.moveTo(-1.5, -8); ctx.lineTo(1.5, -8);
      ctx.stroke();
    } else {
      // くるみ：ニコニコ
      ctx.beginPath();
      ctx.arc(0, -8, 1.5, 0.1*Math.PI, 0.9*Math.PI);
      ctx.stroke();
      // ほっぺ（かわいく濃い）
      ctx.fillStyle = 'rgba(255,140,170,0.7)';
      ctx.beginPath();
      ctx.arc(-6, -9, 1.8, 0, Math.PI*2);
      ctx.arc(6, -9, 1.8, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ====== ステージ選択画面 ======
  let stageSelectButtons = [];
  function drawStageSelect() {
    // 背景
    ctx.fillStyle = '#080020';
    ctx.fillRect(0, 0, W, H);
    // 星
    for (let i = 0; i < 80; i++) {
      const x = (i * 137) % W;
      const y = (i * 97 + 13) % H;
      ctx.fillStyle = `rgba(255,255,255,${0.2 + (i % 3) * 0.2})`;
      ctx.fillRect(x, y, i % 4 === 0 ? 2 : 1, i % 4 === 0 ? 2 : 1);
    }
    // タイトル
    drawRubyText('ステージ [選択|せんたく]', W/2, 50, { size: 34, fill: '#ffee60', strokeW: 6, family: 'serif' });

    // 戻るボタン
    const backX = 70, backY = 50;
    ctx.fillStyle = 'rgba(80,40,40,0.9)';
    ctx.fillRect(backX - 45, backY - 18, 90, 36);
    ctx.strokeStyle = '#c08080';
    ctx.lineWidth = 2;
    ctx.strokeRect(backX - 45, backY - 18, 90, 36);
    drawRubyText('[戻|もど]る', backX, backY + 6, { size: 16, fill: '#ffccaa', strokeW: 3 });
    stageSelectBackBtn = { x: backX - 45, y: backY - 18, w: 90, h: 36 };

    // ステージ一覧（2列 × 3行）
    const cleared = getClearedStages();
    const cols = 3, rows = Math.ceil(STAGES_CONFIG.length / cols);
    const cardW = 260, cardH = 120;
    const gapX = 20, gapY = 16;
    const totalW = cardW * cols + gapX * (cols - 1);
    const startX = (W - totalW) / 2;
    const startCardY = 110;
    stageSelectButtons = [];
    for (let i = 0; i < STAGES_CONFIG.length; i++) {
      const stg = STAGES_CONFIG[i];
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = startX + col * (cardW + gapX);
      const cy = startCardY + row * (cardH + gapY);
      const unlocked = cleared.has(i) || i === 0 || cleared.has(i - 1);  // 前ステージクリアで開放、常に1面は開放
      stageSelectButtons.push({ x: cx, y: cy, w: cardW, h: cardH, idx: i, unlocked });
      // カード背景
      if (unlocked) {
        const pal = stg.bgPalette;
        const g = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
        g.addColorStop(0, pal.top);
        g.addColorStop(1, pal.bot);
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = '#20202a';
      }
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.strokeStyle = unlocked ? '#ffee60' : '#4a4a58';
      ctx.lineWidth = unlocked ? 3 : 2;
      ctx.strokeRect(cx, cy, cardW, cardH);
      // クリア済みマーク
      if (cleared.has(i)) {
        ctx.fillStyle = '#20a040';
        ctx.beginPath(); ctx.arc(cx + cardW - 20, cy + 20, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✓', cx + cardW - 20, cy + 26);
      }
      // ロックアイコン
      if (!unlocked) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(cx, cy, cardW, cardH);
        ctx.font = 'bold 48px sans-serif';
        ctx.fillStyle = '#888';
        ctx.textAlign = 'center';
        ctx.fillText('🔒', cx + cardW/2, cy + cardH/2 + 16);
        continue;
      }
      // ステージ情報
      drawRubyText(`STAGE ${stg.num}`, cx + cardW/2, cy + 28, { size: 20, fill: '#ffee80', strokeW: 4, family: 'serif' });
      drawRubyText(stg.name, cx + cardW/2, cy + 60, { size: 22, fill: '#ffffff', strokeW: 5, family: 'serif' });
      drawRubyText(stg.bossName, cx + cardW/2, cy + 95, { size: 15, fill: '#ffaa80', strokeW: 3 });
    }

    // 操作説明
    drawRubyText('[前|まえ]のステージクリアで[開放|かいほう]', W/2, H - 12, { size: 13, fill: '#aaaaaa', strokeW: 2 });
  }
  let stageSelectBackBtn = null;

  function startStageFromSelect(idx) {

  // ====== ボス入場カットイン ======

    const stg = STAGES_CONFIG[currentStageIdx];

    ctx.fillStyle = '#050014';
    ctx.fillRect(0, 0, W, H);
    // ステージカラーのフェードグラデ
    const pal = stg.bgPalette || { top: '#040012', mid: '#100828', bot: '#20104a' };
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, pal.top);
    bg.addColorStop(1, pal.bot);
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    // 放射状スポットライト
    const spotG = ctx.createRadialGradient(W/2, H/2 - 60, 50, W/2, H/2, 480);
    spotG.addColorStop(0, 'rgba(255,240,180,0.25)');
    spotG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotG;
    ctx.fillRect(0, 0, W, H);

    // ステージ名（上）
    drawRubyText(`STAGE ${stg.num} - ${stg.name}`, W/2, 60, { size: 26, fill: '#ffee80', strokeW: 5, family: 'serif' });

    // ボスのポートレート（中央・大きめ）
    const bcx = W / 2;
    const bcy = 230;
    ctx.save();
    ctx.translate(bcx, bcy);
    ctx.scale(3.2, 3.2);
    const mockBoss = {
      x: 0, y: 0, r: 28,
      hp: 100, maxHp: 100,
      color: stg.bossColor, beamColor: stg.beamColor,
      anim: bossIntroAnim * 0.08,
      hurtTimer: 0,
    };
    const drawer = BOSS_DRAWERS[stg.bossType] || BOSS_DRAWERS.piccolo;
    // 影だけ別にキャンセル（translateで済ます）
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(0, 31, 24, 5, 0, 0, Math.PI*2); ctx.fill();
    drawer(0, 0, mockBoss);
    drawTotoGlasses(0, -13);
    ctx.restore();

    // ボス名タブ
    const nameBoxW = 320, nameBoxH = 36;
    const nbx = W/2 - nameBoxW/2, nby = 360;
