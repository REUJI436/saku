    ctx.strokeStyle = '#c0a070';
    ctx.lineWidth = 2;
    ctx.strokeRect(nbx, nby, nameBoxW, nameBoxH);
    drawRubyText(stg.bossName, W/2, nby + 24, { size: 22, fill: '#ffaa60', strokeW: 4, family: 'serif' });

    // セリフボックス
    const boxY = 410;
    const boxH = 80;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(24, boxY, W - 48, boxH);
    ctx.strokeStyle = 'rgba(200,230,255,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, boxY, W - 48, boxH);
    // セリフ本文（複数行対応）
    drawRubyText(stg.bossIntroLine, W/2, boxY + 48, { size: 20, fill: '#ffffff', strokeW: 4, family: 'serif' });

    // 「タップで進む」点滅
    if (bossIntroAnim > 40 && Math.floor(bossIntroAnim / 30) % 2 === 0) {
      drawRubyText('タップ / Space キーで[進|すす]む', W/2, H - 18, { size: 14, fill: '#ffcc80', strokeW: 3 });
    }
  }

  // ====== ステージ切替フェード ======
  // STAGE_CLEAR 後半で暗転、新ステージ開始直後に明転
  let stageFadeTimer = 0;  // 次ステージへのフェードカウント
  function drawStageTransitionFade() {
    let alpha = 0;
    let showNext = false;
    if (state === STATE.STAGE_CLEAR && stateTimer > 100) {
      // 100F〜160F で 0→1 に暗転
      alpha = Math.min(1, (stateTimer - 100) / 60);
      showNext = stateTimer > 130;
    } else if (state === STATE.PLAYING && stateTimer < 50 && currentStageIdx > 0 && !boss) {
      // 新ステージ開始直後：黒から明転
      alpha = Math.max(0, 1 - stateTimer / 50);
    }
    if (alpha <= 0) return;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.92})`;
    ctx.fillRect(0, 0, W, H);
    // 暗転中に次ステージ名を浮かび上がらせる
    if (showNext) {
      const nextStg = STAGES_CONFIG[currentStageIdx + 1];
      if (nextStg) {
        const t = Math.min(1, (stateTimer - 130) / 30);
        ctx.globalAlpha = t;
        drawRubyText(`[次|つぎ]のステージ`, W/2, H/2 - 40, { size: 22, fill: '#cccccc', strokeW: 4 });
        drawRubyText(nextStg.name, W/2, H/2 + 10, { size: 44, fill: '#ffee60', strokeW: 6, family: 'serif' });
        drawRubyText(nextStg.bossName + ' [登場|とうじょう]', W/2, H/2 + 60, { size: 20, fill: '#ffaa60', strokeW: 4 });
      }
    }
    ctx.restore();
  }

  // ====== エンディング画面 ======
  function drawEndingScene() {
    const t = stateTimer;

    // 背景：夕焼け空
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#ffa060');
    g.addColorStop(0.4, '#ff80a0');
    g.addColorStop(0.7, '#8060a0');
    g.addColorStop(1, '#302048');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // 夕日
    const sunY = H - 130;
    ctx.fillStyle = 'rgba(255, 230, 140, 0.9)';
    ctx.beginPath();
    ctx.arc(W/2, sunY, 70, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 180, 0.5)';
    ctx.beginPath();
    ctx.arc(W/2, sunY, 100, 0, Math.PI * 2);
    ctx.fill();

    // 地平線（シルエット）
    ctx.fillStyle = '#1a1028';
    ctx.fillRect(0, H - 100, W, 100);
    // 山のシルエット
    ctx.fillStyle = '#2a1840';
    ctx.beginPath();
    ctx.moveTo(0, H - 100);
    ctx.lineTo(120, H - 150);
    ctx.lineTo(240, H - 110);
    ctx.lineTo(380, H - 170);
    ctx.lineTo(500, H - 130);
    ctx.lineTo(620, H - 180);
    ctx.lineTo(760, H - 120);
    ctx.lineTo(880, H - 160);
    ctx.lineTo(W, H - 120);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // 桜吹雪（ゆっくり降る）
    if (!endingPetals) {
      endingPetals = [];
      for (let i = 0; i < 30; i++) {
        endingPetals.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: 0.5 + Math.random() * 0.5,
          vy: 0.4 + Math.random() * 0.4,
          rot: Math.random() * Math.PI * 2,
          rotSp: (Math.random() - 0.5) * 0.05,
          size: 3 + Math.random() * 2,
        });
      }
    }
    for (const p of endingPetals) {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotSp;
      if (p.y > H) { p.y = -5; p.x = Math.random() * W; }
      if (p.x > W) p.x = 0;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = '#ffc0d8';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // さく & くるみ 並んで立つ（夕日を見つめる）
    drawCharPortrait(CHARACTERS[0], W/2 - 80, H - 80, 3.5);
    drawCharPortrait(CHARACTERS[1], W/2 + 80, H - 80, 3.5);

    // セリフ 順番に表示
    const lines = [
      { start: 40,  text: 'さくとくるみの[活躍|かつやく]によって、',  color: '#ffffff' },
      { start: 180, text: '[世界|せかい]に[平和|へいわ]が[訪|おとず]れた…', color: '#ffffff' },
      { start: 340, text: '――しかし、[戦|たたか]いは[続|つづ]く。',    color: '#ffccaa' },
      { start: 500, text: 'まだ[見|み]ぬ[強敵|きょうてき]を[求|もと]めて――', color: '#ff9060' },
    ];
    let textY = 96;
    for (const l of lines) {
      if (t < l.start) continue;
      const age = t - l.start;
      const alpha = Math.min(1, age / 40);
      ctx.save();
      ctx.globalAlpha = alpha;
      drawRubyText(l.text, W/2, textY, { size: 24, fill: l.color, strokeW: 5, family: 'serif' });
      ctx.restore();
      textY += 42;
    }

    // To Be Continued...（最後のセリフの後）
    if (t > 680) {
      const alpha = Math.min(1, (t - 680) / 60);
      const pulse = 0.8 + 0.2 * Math.sin(t * 0.06);
      ctx.save();
      ctx.globalAlpha = alpha * pulse;
      ctx.textAlign = 'center';
      ctx.font = 'bold 42px serif';
      ctx.lineWidth = 7; ctx.strokeStyle = '#000';
      ctx.strokeText('To Be Continued…', W/2, H/2 + 50);
      const g2 = ctx.createLinearGradient(0, H/2 + 20, 0, H/2 + 60);
      g2.addColorStop(0, '#ffee40');
      g2.addColorStop(1, '#ff6020');
      ctx.fillStyle = g2;
      ctx.fillText('To Be Continued…', W/2, H/2 + 50);
      ctx.restore();
    }

    // スタッツ & 「タイトルへ」（全セリフ後）
    if (t > 820) {
      const alpha = Math.min(1, (t - 820) / 60);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = '#ffee80';
      ctx.fillText(`SCORE: ${totalScore.toLocaleString()}　MAX COMBO: ${comboMax}`, W/2, H - 26);
      // 点滅プロンプト
      if (Math.floor(t / 30) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.fillText('タップ or Space キーでタイトルへ', W/2, H - 6);
      }
      ctx.restore();
    }
  }
  let endingPetals = null;

  // ====== ゲーム画面 ======
  function drawGame() {
    drawBackground();

    // ボス・敵・プレイヤーの描画順
    drawEnemyProjectiles();
    drawEnemies();
    if (boss) drawBoss();
    drawPlayer();
    drawProjectiles();
    drawParticles();
    drawPopups();
    // ボス爆散ショックウェーブ（HUD下に重ね描画）
    drawBossShockwaves();
    drawHUD();
    if (banner) drawBanner();
    // かめはめ波カットイン（HUDの上に重ねて描画）
    drawKamehameHaCutin();
    // ステージ切替フェード（STAGE_CLEAR 後半と新ステージ開始直後）
    drawStageTransitionFade();

    if (state === STATE.STAGE_CLEAR) {
      // 画面は暗転せず、キャラの飛び立ちが見えるようにする
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 44px serif';
      ctx.lineWidth = 7; ctx.strokeStyle = '#000';
      const stg = STAGES_CONFIG[currentStageIdx];
      // 画面上部に「STAGE X CLEAR!」
      ctx.strokeText(`STAGE ${stg.num} CLEAR!`, W/2, 80);
      const g = ctx.createLinearGradient(0, 50, 0, 100);
      g.addColorStop(0, '#ffee60');
      g.addColorStop(1, '#ff8030');
      ctx.fillStyle = g;
      ctx.fillText(`STAGE ${stg.num} CLEAR!`, W/2, 80);
      // 画面下部に統計
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      ctx.strokeText(`KILLS: ${player.kills}　MAX COMBO: ${comboMax}　SCORE: ${totalScore.toLocaleString()}`, W/2, H - 60);
      ctx.fillText(`KILLS: ${player.kills}　MAX COMBO: ${comboMax}　SCORE: ${totalScore.toLocaleString()}`, W/2, H - 60);
      // 次ステージ予告
      const nextStg = STAGES_CONFIG[currentStageIdx + 1];
      if (nextStg) {
        drawRubyText(`[次|つぎ]：${nextStg.name}（${nextStg.bossName}）`, W/2, H - 30, { size: 15, fill: '#a0c0ff', strokeW: 3 });
      }
      ctx.restore();
    } else if (state === STATE.CLEARED) {
      drawEndingScene();
    } else if (state === STATE.GAMEOVER) {
      ctx.fillStyle = 'rgba(80,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 56px serif';
      ctx.lineWidth = 8; ctx.strokeStyle = '#000';
      ctx.strokeText('GAME OVER', W/2, H/2 - 20);
      ctx.fillStyle = '#ff4040';
      ctx.fillText('GAME OVER', W/2, H/2 - 20);
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText('キル数: ' + player.kills, W/2, H/2 + 30);
      ctx.fillText('タップ or Space キーでタイトルへ', W/2, H/2 + 70);
      ctx.restore();
    }
  }

  function drawPlayer() {
    const x = player.x, y = player.y;
    const t = player.transform;
    const flash = (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0);
    ctx.save();
    if (flash) ctx.globalAlpha = 0.5;

    // オーラ（軽量化：ソリッドな半透明円を2枚重ね）
    if (t >= 1) {
      const auraR = 28 + Math.sin(player.anim * 0.5) * 4 + t * 3;
      const auraColors = [
        null,
        ['rgba(255,60,60,0.45)', 'rgba(200,30,30,0.25)'],
        ['rgba(255,230,80,0.45)', 'rgba(255,150,40,0.25)'],
        ['rgba(255,240,120,0.5)', 'rgba(180,220,255,0.25)'],
        ['rgba(255,230,60,0.55)', 'rgba(255,160,30,0.3)'],
        ['rgba(255,100,40,0.55)', 'rgba(200,30,20,0.3)'],
        ['rgba(255,60,80,0.6)', 'rgba(255,180,80,0.4)'],
        ['rgba(80,140,255,0.6)', 'rgba(200,230,255,0.35)'],
        ['rgba(200,220,255,0.55)', 'rgba(240,245,255,0.35)'],  // 8 身勝手兆
        ['rgba(240,240,255,0.65)', 'rgba(200,220,255,0.4)'],   // 9 身勝手
        ['rgba(255,240,200,0.75)', 'rgba(255,255,220,0.5)'],   // 10 ビースト
      ];
      const col = auraColors[t];
      ctx.fillStyle = col[1];
      ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = col[0];
      ctx.beginPath(); ctx.arc(x, y, auraR * 0.6, 0, Math.PI * 2); ctx.fill();
      // 上方向のオーラ炎
      const flameCount = 6 + t;
      for (let i = 0; i < flameCount; i++) {
        const a = -Math.PI/2 + (i - (flameCount - 1) / 2) * 0.2;
        const fr = 18 + Math.sin(player.anim * 0.4 + i) * 4;
        const fx = x + Math.cos(a) * fr;
        const fy = y + Math.sin(a) * fr - 10;
        let flameCol;
        if (t === 1) flameCol = `rgba(255,80,60,0.6)`;
        else if (t === 5) flameCol = `rgba(255,120,40,0.7)`;
        else flameCol = `rgba(255,${200 + Math.sin(player.anim*0.5+i)*40},60,0.6)`;
        ctx.fillStyle = flameCol;
        ctx.beginPath();
        ctx.ellipse(fx, fy, 3, 7, 0, 0, Math.PI*2);
        ctx.fill();
      }
      // SSJ2以降：青白い稲妻
      if (t >= 3) {
        ctx.strokeStyle = 'rgba(180,220,255,0.7)';
        ctx.lineWidth = 1.5;
        const bolts = 3 + (t - 3);
        for (let i = 0; i < bolts; i++) {
          const a = (Math.random() * Math.PI * 2);
          const r1 = auraR * 0.5;
          const r2 = auraR * 1.1;
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * r1, y + Math.sin(a) * r1);
          const midA = a + (Math.random() - 0.5) * 0.4;
          const midR = (r1 + r2) / 2;
          ctx.lineTo(x + Math.cos(midA) * midR, y + Math.sin(midA) * midR);
          ctx.lineTo(x + Math.cos(a) * r2, y + Math.sin(a) * r2);
          ctx.stroke();
        }
      }
    }

    // 必殺技チャージ演出（発動前の気溜め）
    if (player.ultActive && player.ultActive.phase === 'charge') {
      const c = 1 - (player.ultActive.timer - 40) / 30;
      const cR = 14 + c * 22;
      // 両手を腰に構える感じの気弾
      ctx.fillStyle = `rgba(140,220,255,${0.4 + c * 0.5})`;
      ctx.beginPath();
      ctx.arc(x, y + 6, cR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255,255,255,${c})`;
      ctx.beginPath();
      ctx.arc(x, y + 6, cR * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // 収束粒子
      for (let i = 0; i < 6; i++) {
        const a = player.anim + i * 1.1;
        const r = cR + 14 + Math.sin(a) * 4;
        ctx.fillStyle = `rgba(140,210,255,${0.6 * c})`;
        ctx.beginPath();
        ctx.arc(x + Math.cos(a) * r, y + 6 + Math.sin(a) * r, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }

    drawCharInBattle(player, x, y, t);
    ctx.restore();

    // かめはめ波ビーム（本体の後に上書き描画）
    if (player.ultActive && player.ultActive.phase === 'fire') {
      drawKamehameha();
    }
  }

  // かめはめ波カットイン（発動前の演出）
  function drawKamehameHaCutin() {
    const u = player.ultActive;
    if (!u || u.phase !== 'cutin') return;
    const elapsed = 120 - u.timer;  // 0〜50
    const progress = Math.min(1, elapsed / 50);

    // 画面全体を暗くする
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${0.55 * progress})`;
    ctx.fillRect(0, 0, W, H);

    // 斜めスピードライン
    ctx.strokeStyle = `rgba(255,255,255,${0.3 * progress})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 16; i++) {
      const y = (i * 47 + elapsed * 8) % H;
      const len = 80 + (i * 13) % 80;
      ctx.beginPath();
      ctx.moveTo(W - 10 - len, y);
      ctx.lineTo(W - 10, y + 10);
      ctx.stroke();
    }
    for (let i = 0; i < 12; i++) {
      const y = (i * 53 + elapsed * 10) % H;
      const len = 60 + (i * 17) % 60;
      ctx.beginPath();
      ctx.moveTo(10, y);
      ctx.lineTo(10 + len, y + 8);
      ctx.stroke();
    }

    // 斜めの赤いフラッシュ帯（背景）
    const flashW = W * 0.8 * progress;
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.rotate(-0.15);
    const gg = ctx.createLinearGradient(-flashW/2, 0, flashW/2, 0);
    gg.addColorStop(0, 'rgba(255,140,40,0)');
    gg.addColorStop(0.5, 'rgba(255,180,60,0.7)');
    gg.addColorStop(1, 'rgba(255,80,20,0)');
    ctx.fillStyle = gg;
    ctx.fillRect(-flashW/2, -120, flashW, 240);
    ctx.restore();

    // キャラのアップ絵（左側からスライドイン）
    const slideX = -200 + progress * 220;  // -200 → 20
    const cy = H / 2;
    ctx.save();
    ctx.translate(slideX + 200, cy);
    // 背面の白円（アップを目立たせる）
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(0, 0, 120, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.stroke();
    // キャラポートレート（スケール大きめ）
    const char = CHARACTERS.find(ch => ch.id === player.charId) || CHARACTERS[0];
    drawCharPortrait(char, 0, 40, 6);
    ctx.restore();

    // 「かめはめ波ーーッ！！」文字（右側からスライドイン）
    const textX = W + 200 - progress * 400;  // W+200 → W-200
    ctx.save();
    ctx.translate(textX, cy - 20);
    ctx.rotate(-0.12);
    ctx.font = 'bold 64px serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#000';
    ctx.strokeText('かめはめ波', 0, 0);
    const tg = ctx.createLinearGradient(0, -30, 0, 30);
    tg.addColorStop(0, '#80d0ff');
    tg.addColorStop(0.5, '#ffffff');
    tg.addColorStop(1, '#4080d0');
    ctx.fillStyle = tg;
    ctx.fillText('かめはめ波', 0, 0);
    ctx.font = 'bold 56px serif';
    ctx.lineWidth = 9;
    ctx.strokeStyle = '#000';
    ctx.strokeText('――ッ！！', 0, 62);
    ctx.fillStyle = '#ffee40';
    ctx.fillText('――ッ！！', 0, 62);
    ctx.restore();

    // ラスト数Fは白フラッシュで次フェーズへ
    if (u.timer <= 72 && u.timer >= 70) {
      ctx.fillStyle = `rgba(255,255,255,${0.9})`;
      ctx.fillRect(0, 0, W, H);
    }
    ctx.restore();
  }

  function drawKamehameha() {
    const u = player.ultActive;
    if (!u) return;
    const progress = 1 - u.timer / 40;
    const x = player.x;
    const topY = 0;
    const botY = player.y - 6;
    // 外側グロー
    const outW = 90 + Math.sin(u.timer * 0.4) * 10;
    const og = ctx.createLinearGradient(x - outW/2, 0, x + outW/2, 0);
    og.addColorStop(0, 'rgba(100,200,255,0)');
    og.addColorStop(0.5, 'rgba(180,230,255,0.75)');
    og.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = og;
    ctx.fillRect(x - outW/2, topY, outW, botY);
    // 中間
    const midW = 50;
    ctx.fillStyle = 'rgba(140,230,255,0.9)';
    ctx.fillRect(x - midW/2, topY, midW, botY);
    // 白コア
    const coreW = 24;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - coreW/2, topY, coreW, botY);
    // 発射口の大輝き
    const glowR = 40 + Math.sin(u.timer * 0.4) * 8;
    const gg = ctx.createRadialGradient(x, botY, 5, x, botY, glowR);
    gg.addColorStop(0, 'rgba(255,255,255,0.9)');
    gg.addColorStop(0.4, 'rgba(140,230,255,0.6)');
    gg.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(x, botY, glowR, 0, Math.PI*2);
    ctx.fill();
    // ランダムな電光
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
      const sy = Math.random() * botY;
      ctx.beginPath();
      ctx.moveTo(x - 4 + (Math.random() - 0.5) * 6, sy);
      ctx.lineTo(x + 4 + (Math.random() - 0.5) * 6, sy + 8);
      ctx.stroke();
    }
  }

  // バトル中のキャラ描画（トップダウン）
  function drawCharInBattle(c, x, y, transformLvl) {
    ctx.save();
    ctx.translate(x, y);
    const facing = c.facing || 1;
    if (facing < 0) ctx.scale(-1, 1);
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 14, 10, 3, 0, 0, Math.PI*2); ctx.fill();
    // 脚
    const legBob = c.moving ? Math.sin(c.anim * 2) * 2 : 0;
    ctx.fillStyle = c.pantsCol;
    ctx.fillRect(-5, 3 + legBob, 4, 10);
    ctx.fillRect(1, 3 - legBob, 4, 10);
    // 胴（道着）
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-7, -6, 14, 12);
    // SSJ4：上半身の赤い毛
    if (transformLvl === 5) {
      ctx.fillStyle = '#c03020';
      // 肩と胸の赤い毛（細かい線）
      for (let i = 0; i < 8; i++) {
        const hx = -6 + i * 1.8;
        ctx.beginPath();
        ctx.moveTo(hx, -5);
        ctx.lineTo(hx + Math.sin(player.anim + i) * 0.5, -9);
        ctx.stroke();
      }
      ctx.strokeStyle = '#a01810';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 10; i++) {
        ctx.beginPath();
        ctx.moveTo(-7 + i * 1.4, -6);
        ctx.lineTo(-7 + i * 1.4 + Math.sin(i) * 0.6, -10);
        ctx.stroke();
      }
      // 腕にも赤い毛
      ctx.fillStyle = '#c03020';
      ctx.fillRect(-10, -5, 3, 3);
      ctx.fillRect(7, -5, 3, 3);
    }
    // 襟元の青いVインナー
    ctx.fillStyle = c.innerCol || '#2060c0';
    ctx.beginPath();
    ctx.moveTo(-3, -6); ctx.lineTo(3, -6); ctx.lineTo(0, -2); ctx.closePath();
    ctx.fill();
    // 青い帯
    ctx.fillStyle = c.beltCol || '#1a4098';
    ctx.fillRect(-7, 2, 14, 3);
    // 腕（オレンジ）
    const armSwing = c.moving ? Math.sin(c.anim * 2) * 3 : 0;
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-10, -5 + armSwing, 3, 9);
    ctx.fillRect(7, -5 - armSwing, 3, 9);
    // 手首の青いリストバンド
    ctx.fillStyle = c.innerCol || '#2060c0';
    ctx.fillRect(-10, 4 + armSwing, 3, 1.5);
    ctx.fillRect(7, 4 - armSwing, 3, 1.5);
    // 手
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(-8.5, 5 + armSwing, 1.8, 0, Math.PI*2);
    ctx.arc(8.5, 5 - armSwing, 1.8, 0, Math.PI*2);
    ctx.fill();
    // 頭
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(0, -11, 7, 0, Math.PI*2);
    ctx.fill();
    // 髪の色：SSJ(2+)は金髪、SSJ4は赤
    // transform: 0=ノーマル, 1=Kaioken(元の色), 2-4=SSJ系(金), 5=SSJ4(赤）
    let hairCol;
    if (transformLvl >= 2 && transformLvl <= 4) hairCol = '#ffdc20';  // 金
    else if (transformLvl === 5) hairCol = '#c02010';  // 暗赤（SSJ4）
    else if (transformLvl === 6) hairCol = '#ff2828';  // 鮮やかな赤（ゴッド）
    else if (transformLvl === 7) hairCol = '#3078ff';  // 青（ブルー）
    else if (transformLvl === 8) hairCol = '#c8c8d8';  // 薄銀（身勝手兆）
    else if (transformLvl === 9) hairCol = '#e8e8f0';  // 銀白（身勝手）
    else if (transformLvl === 10) hairCol = '#ffffff'; // 純白（ビースト）
    else hairCol = c.hairCol;
    ctx.fillStyle = hairCol;

    // 目の位置：y=-11、頭：y=-11 半径7。前髪は y=-13 以上で止める
    const isSaku = (c.charId === 'saku' || c.id === 'saku');
    if (isSaku) {
      if (transformLvl === 4) {
        // SSJ3：後ろに流れる長い金髪＋頭頂の逆立ち
        // 後ろ髪（キャラ本体の後ろを流れる・体は隠さない）
        ctx.save();
        ctx.fillStyle = hairCol;
        // 左右の長い毛束
        ctx.beginPath();
        ctx.moveTo(-8, -13);
        ctx.bezierCurveTo(-13, -5, -12, 4, -10, 14);
        ctx.lineTo(-6, 14);
        ctx.bezierCurveTo(-5, 4, -5, -5, -6, -13);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(8, -13);
        ctx.bezierCurveTo(13, -5, 12, 4, 10, 14);
        ctx.lineTo(6, 14);
        ctx.bezierCurveTo(5, 4, 5, -5, 6, -13);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        // 頭頂の逆立った金髪
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.moveTo(-8, -14);
        ctx.lineTo(-10, -24);
        ctx.lineTo(-5, -17);
        ctx.lineTo(-3, -26);
        ctx.lineTo(0, -18);
        ctx.lineTo(3, -26);
        ctx.lineTo(5, -17);
        ctx.lineTo(10, -24);
        ctx.lineTo(8, -14);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffffa0';
        ctx.fillRect(-1, -22, 1.5, 8);
      } else if (transformLvl === 5) {
        // SSJ4：短い赤ヘアー（サラサラベース・赤）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.lineTo(8, -13);
        ctx.lineTo(-8, -13);
        ctx.closePath();
        ctx.fill();
        // サイドに流れる前髪（赤）
        ctx.beginPath();
        ctx.moveTo(-8, -15);
        ctx.quadraticCurveTo(-3, -13, 4, -14);
        ctx.quadraticCurveTo(7, -14.5, 8, -16);
        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      } else if (transformLvl >= 2) {
        // SSJ/SSJ2：逆立った金髪
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.moveTo(-8, -13);
        ctx.lineTo(-6, -22);
        ctx.lineTo(-2, -15);
        ctx.lineTo(1, -23);
        ctx.lineTo(5, -15);
        ctx.lineTo(8, -22);
        ctx.lineTo(8, -13);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffffa0';
        ctx.fillRect(-1, -20, 1.5, 6);
      } else {
        // ノーマル/界王拳：サラサラ黒髪（目にかからない）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.lineTo(8, -13);
        ctx.lineTo(-8, -13);
        ctx.closePath();
        ctx.fill();
        // 斜めの前髪（額のみ）
        ctx.beginPath();
        ctx.moveTo(-8, -15);
        ctx.quadraticCurveTo(-3, -13, 4, -14);
        ctx.quadraticCurveTo(7, -14.5, 8, -16);
        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // くるみ：サイド毛束＋頭頂＋前髪の分離構造（顔を覆わない）
      ctx.fillStyle = hairCol;
      if (transformLvl === 4) {
        // SSJ3：長い金髪（膝下まで）
        // 左長い毛束
        ctx.beginPath();
        ctx.moveTo(-9, -16);
        ctx.bezierCurveTo(-13, -5, -12, 5, -10, 14);
        ctx.lineTo(-6, 14);
        ctx.bezierCurveTo(-5, 5, -6, -5, -7, -16);
        ctx.closePath(); ctx.fill();
        // 右長い毛束
        ctx.beginPath();
        ctx.moveTo(9, -16);
        ctx.bezierCurveTo(13, -5, 12, 5, 10, 14);
        ctx.lineTo(6, 14);
        ctx.bezierCurveTo(5, 5, 6, -5, 7, -16);
        ctx.closePath(); ctx.fill();
      } else {
        // ノーマル/界王拳/SSJ/SSJ2/SSJ4：ミディアム
        // 左サイド毛束（肩まで）
        ctx.beginPath();
        ctx.moveTo(-9, -16);
        ctx.quadraticCurveTo(-11, -6, -9, 3);
        ctx.lineTo(-6, 3);
        ctx.quadraticCurveTo(-7, -6, -7, -16);
        ctx.closePath(); ctx.fill();
        // 右サイド毛束
        ctx.beginPath();
        ctx.moveTo(9, -16);
        ctx.quadraticCurveTo(11, -6, 9, 3);
        ctx.lineTo(6, 3);
        ctx.quadraticCurveTo(7, -6, 7, -16);
        ctx.closePath(); ctx.fill();
      }
      // 頭頂（y=-13以上だけ、face circle 上半分を覆う）
      ctx.beginPath();
      ctx.arc(0, -13, 8, Math.PI, 0);
      ctx.lineTo(8, -13);
      ctx.lineTo(-8, -13);
      ctx.closePath(); ctx.fill();
      // 頭頂の逆立ち（SSJ/SSJ2/SSJ4 のみ）
      if (transformLvl >= 2 && transformLvl !== 4) {
        ctx.beginPath();
        ctx.moveTo(-8, -14); ctx.lineTo(-5, -20); ctx.lineTo(-1, -15);
        ctx.lineTo(2, -21); ctx.lineTo(5, -15); ctx.lineTo(8, -20);
        ctx.lineTo(8, -14);
        ctx.closePath(); ctx.fill();
      }
      // 前髪（額のみ・y=-14〜-18、目 y=-11 には絶対かけない）
      ctx.beginPath();
      ctx.moveTo(-8, -17);
      ctx.quadraticCurveTo(-3, -14, 1, -14);
      ctx.quadraticCurveTo(5, -15, 8, -15);
      ctx.lineTo(7, -17);
      ctx.bezierCurveTo(3, -19, -3, -19, -8, -17);
      ctx.closePath(); ctx.fill();
      // ピンクリボン（サイドにちょこん）
      ctx.fillStyle = '#ff80b0';
      ctx.beginPath();
      ctx.moveTo(-10, -18); ctx.lineTo(-7, -20); ctx.lineTo(-7, -16); ctx.closePath();
      ctx.moveTo(-4, -18); ctx.lineTo(-7, -20); ctx.lineTo(-7, -16); ctx.closePath();
      ctx.fill();
    }
    // 目の色：各段階ごとに変化
    let eyeCol = '#000';
    if (transformLvl >= 2 && transformLvl <= 4) eyeCol = '#40c8ff';
    else if (transformLvl === 5) eyeCol = '#ff4040';
    else if (transformLvl === 6) eyeCol = '#ff2050';
    else if (transformLvl === 7) eyeCol = '#80e0ff';
    else if (transformLvl === 8) eyeCol = '#80a0ff';  // 身勝手兆：薄青
    else if (transformLvl === 9) eyeCol = '#c0d0ff';  // 身勝手：銀青
    else if (transformLvl === 10) eyeCol = '#fff080'; // ビースト：金
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = eyeCol;
    ctx.beginPath();
    ctx.arc(-2.5, -11, 0.9, 0, Math.PI*2);
    ctx.arc(2.5, -11, 0.9, 0, Math.PI*2);
    ctx.fill();
    // 口（真面目な感じ）
    ctx.strokeStyle = '#a05030';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(-1.5, -7); ctx.lineTo(1.5, -7);
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      const x = e.x, y = e.y;
      ctx.save();
      if (e.hurtTimer > 0 && Math.floor(e.hurtTimer/2) % 2 === 0) ctx.globalAlpha = 0.5;
      // 影
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath(); ctx.ellipse(x, y + e.r + 2, e.r * 0.8, 3, 0, 0, Math.PI*2); ctx.fill();
      // 敵本体
      if (e.type === 'saibai') {
        // サイバイマン風：緑の小型兵
        const bob = Math.sin(e.anim * 2) * 1.5;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.ellipse(x, y + bob, e.r, e.r * 1.1, 0, 0, Math.PI*2);
        ctx.fill();
        // 模様
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.arc(x, y + bob, e.r * 0.55, 0, Math.PI*2);
        ctx.fill();
        // 目（赤）
        ctx.fillStyle = '#ff2020';
        ctx.beginPath();
        ctx.arc(x - 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.arc(x + 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.fill();
        // 牙
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x - 2, y + bob + 2); ctx.lineTo(x - 3, y + bob + 6); ctx.lineTo(x - 1, y + bob + 4); ctx.closePath();
        ctx.moveTo(x + 2, y + bob + 2); ctx.lineTo(x + 3, y + bob + 6); ctx.lineTo(x + 1, y + bob + 4); ctx.closePath();
        ctx.fill();
      } else if (e.type === 'namek') {
        // ナメック戦士風：大型緑
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // 耳
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.ellipse(x - e.r + 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.ellipse(x + e.r - 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.fill();
        // 顔ライン
        ctx.strokeStyle = e.coreCol;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - 4, y - 6); ctx.lineTo(x - 6, y - 2);
        ctx.moveTo(x + 4, y - 6); ctx.lineTo(x + 6, y - 2);
        ctx.stroke();
        // 目
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 5, y - 3, 3, 2);
        ctx.fillRect(x + 2, y - 3, 3, 2);
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 4, y - 2.5, 1.5, 1.5);
        ctx.fillRect(x + 3, y - 2.5, 1.5, 1.5);
        // 口（しかめ）
        ctx.strokeStyle = '#102a08';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 4, y + 4); ctx.lineTo(x + 4, y + 4);
        ctx.stroke();
      } else if (e.type === 'freezer') {
        // フリーザ兵風：赤
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // スコアターっぽい目
        ctx.fillStyle = '#00cccc';
        ctx.fillRect(x - 8, y - 4, 16, 4);
        ctx.fillStyle = '#008080';
        ctx.fillRect(x - 8, y - 4, 16, 1);
        // 赤目
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(x - 4, y - 3, 2, 2);
        ctx.fillRect(x + 2, y - 3, 2, 2);
        // 口
        ctx.fillStyle = '#701010';
        ctx.fillRect(x - 3, y + 3, 6, 2);
      }
      // HP バー（最大HP以下のみ）
      if (e.hp < e.maxHp) {
        const barW = e.r * 2, barH = 3;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW, barH);
        ctx.fillStyle = '#ff6060';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW * (e.hp / e.maxHp), barH);
      }
      ctx.restore();
    }
  }

  function drawBoss() {
    if (!boss) return;
    if (boss.vanished) return;
    const x = boss.x, y = boss.y;
    ctx.save();
    if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/3) % 2 === 0) ctx.globalAlpha = 0.5;
    // 撃破演出中：全体的に白く点滅＋時間経過で透明度UP
    if (boss.dead) {
      const fade = Math.max(0, 1 - boss.defeatTimer / 80);
      ctx.globalAlpha = fade * (Math.floor(boss.defeatTimer / 3) % 2 === 0 ? 1 : 0.35);
    }

    // ビームチャージ演出
    if (boss.beamCharging > 0) {
      // 予告レーザー（赤い細い線・ロック前は追尾、ロック後は固定）
      const ang = boss.beamAngle;
      const warnLen = 800;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ロック前は点滅細線、ロック後は太く警告
      const locked = boss.beamLocked;
      const blink = Math.floor(boss.anim * 4) % 2 === 0 ? 1 : 0.3;
      if (!locked) {
        ctx.strokeStyle = `rgba(255,80,80,${0.35 * blink})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
      } else {
        // ロック後は太めの赤（警告・固定）
        ctx.strokeStyle = `rgba(255,40,60,${0.7 * blink})`;
        ctx.lineWidth = 8;
        ctx.setLineDash([]);
      }
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(warnLen, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // チャージ光（本体の周り）
      const total = 110;
      const c = 1 - boss.beamCharging / total;
      const cR = 15 + c * 22;
      ctx.fillStyle = `rgba(160,255,160,${0.2 + c * 0.4})`;
      ctx.beginPath();
      ctx.arc(x, y, cR, 0, Math.PI*2);
      ctx.fill();
      // 指ビーム（額に集中）
      ctx.fillStyle = `rgba(255,255,255,${c})`;
      ctx.beginPath();
      ctx.arc(x, y - 20, 3 + c * 4, 0, Math.PI*2);
      ctx.fill();
    }

    // ビーム発射中
    if (boss.beamFiring > 0) {
      const ang = boss.beamAngle;
      const bLen = 600;
      const bw = 24;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ボスタイプごとのビーム色
      const bcol = boss.beamColor || '#a0f080';
      const hexToRgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
      const [br, bgc, bb] = hexToRgb(bcol);
      const bg = ctx.createLinearGradient(0, -bw, 0, bw);
      bg.addColorStop(0, `rgba(${br},${bgc},${bb},0)`);
      bg.addColorStop(0.5, `rgba(${br},${bgc},${bb},0.7)`);
      bg.addColorStop(1, `rgba(${br},${bgc},${bb},0)`);
      ctx.fillStyle = bg;
      ctx.fillRect(0, -bw, bLen, bw * 2);
      // 内側の白コア
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, -4, bLen, 8);
      ctx.restore();
    }

    // ボスタイプごとの描画
    // 共通：影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(x, y + boss.r + 3, boss.r * 0.85, 5, 0, 0, Math.PI*2); ctx.fill();

    const drawer = BOSS_DRAWERS[boss.type] || BOSS_DRAWERS.piccolo;
    drawer(x, y, boss);

    // とーとメガネ（全ボス共通）
    drawTotoGlasses(x, y - 13);

    // 激昂オーラ（HP40%以下で赤くなる）
    if (boss.hp / boss.maxHp < 0.4) {
      const auraR = boss.r + 22 + Math.sin(boss.anim * 0.5) * 6;
      ctx.fillStyle = 'rgba(200,80,80,0.3)';
      ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,100,80,0.2)';
      ctx.beginPath(); ctx.arc(x, y, auraR * 0.7, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawTotoGlasses(gx, gy) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 3, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 3, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx - 2, gy); ctx.lineTo(gx + 2, gy);
    ctx.stroke();
    // メガネ内の目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 1.6, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 1.6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 0.9, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 0.9, 0, Math.PI*2);
    ctx.fill();
  }

  // ====== ボス別の描画関数 ======
  const BOSS_DRAWERS = {
    // ピッコロとーと
    piccolo(x, y, b) {
      // 体（緑の肌）
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫マント
      ctx.fillStyle = '#7030a0';
      ctx.beginPath();
      ctx.ellipse(x, y + 6, b.r * 1.15, b.r * 0.8, 0, 0, Math.PI);
      ctx.fill();
      // 道着
      ctx.fillStyle = '#a060a0';
      ctx.fillRect(x - 14, y - 2, 28, 16);
      // 帯
      ctx.fillStyle = '#ffee60';
      ctx.fillRect(x - 14, y + 10, 28, 4);
      // 頭
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // アンテナ
      ctx.strokeStyle = '#68b868';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 24); ctx.lineTo(x - 6, y - 32);
      ctx.moveTo(x + 4, y - 24); ctx.lineTo(x + 6, y - 32);
      ctx.stroke();
      // ターバン（白）
      ctx.fillStyle = '#f0f0e0';
      ctx.fillRect(x - 12, y - 20, 24, 7);
      ctx.strokeStyle = '#a0a090'; ctx.lineWidth = 0.8;
      ctx.strokeRect(x - 12, y - 20, 24, 7);
      // 尖った耳
      ctx.fillStyle = '#68b868';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 14); ctx.lineTo(x - 18, y - 18); ctx.lineTo(x - 11, y - 10); ctx.closePath();
      ctx.moveTo(x + 12, y - 14); ctx.lineTo(x + 18, y - 18); ctx.lineTo(x + 11, y - 10); ctx.closePath();
      ctx.fill();
      // 口（真一文字）
      ctx.strokeStyle = '#204020';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 7); ctx.lineTo(x + 4, y - 7);
      ctx.stroke();
    },
    // ベジとーと（ベジータ風）
    vegeta(x, y, b) {
      // 戦闘服（サイヤ人アーマー）
      ctx.fillStyle = '#e8e8f0';  // 白いアーマー
      ctx.fillRect(x - 16, y - 4, 32, 18);
      // 金色のショルダー
      ctx.fillStyle = '#ffd040';
      ctx.fillRect(x - 17, y - 6, 7, 8);
      ctx.fillRect(x + 10, y - 6, 7, 8);
      // 青いインナー
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 10, y - 2, 20, 10);
      // 青ブーツの上部
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 12, y + 12, 24, 4);
      // 頭（肌色）
      ctx.fillStyle = '#f5d8a8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 髪（ベジータ風の逆立ちV字）
      ctx.fillStyle = '#1a0808';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 22);
      ctx.lineTo(x - 9, y - 32);
      ctx.lineTo(x - 3, y - 24);
      ctx.lineTo(x - 1, y - 34);
      ctx.lineTo(x + 1, y - 24);
      ctx.lineTo(x + 3, y - 34);
      ctx.lineTo(x + 9, y - 32);
      ctx.lineTo(x + 11, y - 22);
      ctx.lineTo(x + 11, y - 14);
      ctx.lineTo(x - 11, y - 14);
      ctx.closePath();
      ctx.fill();
      // スカウター（ベジータっぽい赤い縁）
      ctx.strokeStyle = '#ff4030';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(x + 9, y - 13); ctx.lineTo(x + 16, y - 15);
      ctx.stroke();
      // 口（ドヤ顔）
      ctx.strokeStyle = '#6a3030';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 6); ctx.quadraticCurveTo(x, y - 4, x + 3, y - 6);
      ctx.stroke();
    },
    // フリーザとーと（白＋紫・最終形態風）
    freezer(x, y, b) {
      // 体（白＋紫のバイオスーツ風）
      ctx.fillStyle = '#e8e4f0';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫の装甲プレート
      ctx.fillStyle = '#8040b0';
      ctx.fillRect(x - 14, y - 2, 28, 6);  // 胸
      ctx.fillRect(x - 14, y + 10, 28, 4);  // 腰
      // 肩プレート
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.arc(x - 14, y - 4, 6, 0, Math.PI*2);
      ctx.arc(x + 14, y - 4, 6, 0, Math.PI*2);
      ctx.fill();
      // 頭（白）
      ctx.fillStyle = '#f0ecf8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の紫プレート（王冠状）
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 10, y - 26);
      ctx.lineTo(x - 4, y - 20);
      ctx.lineTo(x, y - 28);
      ctx.lineTo(x + 4, y - 20);
      ctx.lineTo(x + 10, y - 26);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // 口（不敵な笑み）
      ctx.strokeStyle = '#6030a0';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 3, x + 4, y - 6);
      ctx.stroke();
      // 尻尾（背後に見えるヒント）
      ctx.strokeStyle = '#a070d0';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + b.r - 2, y + 8);
      ctx.quadraticCurveTo(x + b.r + 14, y + 18, x + b.r + 8, y + 26);
      ctx.stroke();
    },
    // セルとーと（完全体・緑＋黒斑点）
    cell(x, y, b) {
      // 体（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 黒い外殻プレート
      ctx.fillStyle = '#282820';
      ctx.fillRect(x - 14, y - 4, 28, 6);
      ctx.fillRect(x - 14, y + 6, 28, 4);
      // 緑の胸プレート
      ctx.fillStyle = '#a0d068';
      ctx.beginPath();
      ctx.ellipse(x, y + 2, 10, 5, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の黒いリング
      ctx.strokeStyle = '#282820';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y - 14, 11, 0, Math.PI*2);
      ctx.stroke();
      // ツノ（頭頂）
      ctx.fillStyle = '#282820';
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 24); ctx.lineTo(x - 10, y - 34); ctx.lineTo(x - 4, y - 26); ctx.closePath();
      ctx.moveTo(x + 8, y - 24); ctx.lineTo(x + 10, y - 34); ctx.lineTo(x + 4, y - 26); ctx.closePath();
      ctx.fill();
      // 口（邪悪）
      ctx.strokeStyle = '#402010';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 8, x + 4, y - 6);
      ctx.stroke();
      // 背中の翼（前方向にちらりと）
      ctx.fillStyle = 'rgba(100,150,80,0.6)';
      ctx.beginPath();
      ctx.moveTo(x - b.r, y + 2); ctx.lineTo(x - b.r - 10, y - 8); ctx.lineTo(x - b.r - 4, y - 14); ctx.lineTo(x - b.r + 4, y - 4); ctx.closePath();
      ctx.moveTo(x + b.r, y + 2); ctx.lineTo(x + b.r + 10, y - 8); ctx.lineTo(x + b.r + 4, y - 14); ctx.lineTo(x + b.r - 4, y - 4); ctx.closePath();
      ctx.fill();
    },
    // 魔神とーと（魔人ブウ風・ピンクでぽっちゃり）
    buu(x, y, b) {
      // 丸々とした体（ピンク・大きめ）
      ctx.fillStyle = '#ff98c0';
      ctx.beginPath(); ctx.arc(x, y + 3, b.r + 4, 0, Math.PI*2); ctx.fill();
      // 黒いベスト
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(x - 16, y - 4, 32, 16);
      // 金縁
      ctx.fillStyle = '#ffdc40';
      ctx.fillRect(x - 16, y - 4, 32, 2);
      ctx.fillRect(x - 16, y + 10, 32, 2);
      // 白いマント・肩の布
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x - 18, y - 3, 4, 10);
      ctx.fillRect(x + 14, y - 3, 4, 10);
      // 頭（丸いピンク）
      ctx.fillStyle = '#ffaccc';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // 頭頂のアンテナ（触手っぽい）
      ctx.strokeStyle = '#ffaccc';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(x, y - 26);
      ctx.quadraticCurveTo(x + 8, y - 34, x + 4, y - 40);
      ctx.stroke();
      // 頭の黒い穴（魔人ブウの特徴）
      ctx.fillStyle = '#1a0818';
      ctx.beginPath();
      ctx.ellipse(x - 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.ellipse(x + 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
      // 口（大きく開いた笑い）
      ctx.fillStyle = '#601030';
      ctx.beginPath();
      ctx.ellipse(x, y - 6, 5, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
    },
    // 黄金フリザとーと（ゴールデンフリーザ）
    goldfrieza(x, y, b) {
      // 胴（黄金・細身）
      ctx.fillStyle = '#ffc830';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫の装甲プレート
      ctx.fillStyle = '#5020a0';
      ctx.fillRect(x - 14, y - 4, 28, 6);
      ctx.fillRect(x - 14, y + 8, 28, 4);
      // 肩のプレート
      ctx.fillStyle = '#5020a0';
      ctx.beginPath();
      ctx.arc(x - 14, y - 4, 6, 0, Math.PI*2);
      ctx.arc(x + 14, y - 4, 6, 0, Math.PI*2);
      ctx.fill();
      // 胸の紫クリスタル
      ctx.fillStyle = '#8040d0';
      ctx.beginPath();
      ctx.ellipse(x, y + 2, 5, 4, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭（黄金・長頭）
      ctx.fillStyle = '#ffc830';
      ctx.beginPath();
      ctx.ellipse(x, y - 14, 11, 13, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭頂の紫プレート
      ctx.fillStyle = '#5020a0';
      ctx.beginPath();
      ctx.ellipse(x, y - 22, 8, 6, 0, 0, Math.PI*2);
      ctx.fill();
      // 口（不敵な笑み）
      ctx.strokeStyle = '#6030a0';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 4, x + 4, y - 6);
      ctx.stroke();
      // 尻尾（背後・黄金）
      ctx.strokeStyle = '#ffb820';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x + b.r - 2, y + 8);
      ctx.quadraticCurveTo(x + b.r + 18, y + 22, x + b.r + 10, y + 32);
      ctx.stroke();
      // 光彩（黄金の輝き）
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(b.anim * 0.5);
      ctx.fillStyle = '#fff080';
      ctx.beginPath(); ctx.arc(x - 4, y - 17, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    },
    // ヒッとーと（第6宇宙の暗殺者）
    hit(x, y, b) {
      // 紫の肌
      ctx.fillStyle = '#7058a8';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 黒いチュニック
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(x - 14, y - 4, 28, 18);
      // 赤い帯
      ctx.fillStyle = '#c03020';
      ctx.fillRect(x - 14, y + 8, 28, 3);
      // 黄色の留め具
      ctx.fillStyle = '#ffcc40';
      ctx.beginPath();
      ctx.arc(x, y + 9.5, 2.5, 0, Math.PI*2);
      ctx.fill();
      // マント（背後・紫）
      ctx.fillStyle = '#5840a0';
      ctx.beginPath();
      ctx.moveTo(x - b.r + 2, y - 2);
      ctx.lineTo(x - b.r - 12, y + 20);
      ctx.lineTo(x - b.r, y + 14);
      ctx.closePath();
      ctx.moveTo(x + b.r - 2, y - 2);
      ctx.lineTo(x + b.r + 12, y + 20);
      ctx.lineTo(x + b.r, y + 14);
      ctx.closePath();
      ctx.fill();
      // 頭（紫・フード形）
      ctx.fillStyle = '#7058a8';
      ctx.beginPath();
      ctx.ellipse(x, y - 14, 11, 12, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭頂のフード型の黒
      ctx.fillStyle = '#1a1a28';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 16);
      ctx.lineTo(x, y - 28);
      ctx.lineTo(x + 11, y - 16);
      ctx.closePath();
      ctx.fill();
      // 口（無表情）
      ctx.strokeStyle = '#2a0a2a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 7); ctx.lineTo(x + 3, y - 7);
      ctx.stroke();
    },
    // 合体ザマとーと
    zamasu(x, y, b) {
      // 緑の肌
      ctx.fillStyle = '#6ca868';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 黒い道衣
      ctx.fillStyle = '#1a1820';
      ctx.fillRect(x - 14, y - 4, 28, 18);
      // 赤い縁取り
      ctx.fillStyle = '#c03030';
      ctx.fillRect(x - 14, y - 4, 28, 2);
      ctx.fillRect(x - 14, y + 12, 28, 2);
      // 黄色のベルトアクセサリー
      ctx.fillStyle = '#ffcc40';
      ctx.beginPath();
      ctx.arc(x, y + 10, 2.5, 0, Math.PI*2);
      ctx.fill();
      // 白い肩当て
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x - 17, y - 4, 4, 8);
      ctx.fillRect(x + 13, y - 4, 4, 8);
      // 頭（緑）
      ctx.fillStyle = '#6ca868';
      ctx.beginPath();
      ctx.arc(x, y - 14, 12, 0, Math.PI*2);
      ctx.fill();
      // 白い髪（逆立ち）
      ctx.fillStyle = '#f0f0f0';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 14, y - 30);
      ctx.lineTo(x - 8, y - 22);
      ctx.lineTo(x - 4, y - 32);
      ctx.lineTo(x, y - 24);
      ctx.lineTo(x + 4, y - 32);
      ctx.lineTo(x + 8, y - 22);
      ctx.lineTo(x + 14, y - 30);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // ポタラ（耳のアクセサリー）
      ctx.fillStyle = '#ffcc40';
      ctx.beginPath();
      ctx.arc(x - 12, y - 12, 2.5, 0, Math.PI*2);
      ctx.arc(x + 12, y - 12, 2.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c08020';
      ctx.beginPath();
      ctx.arc(x - 12, y - 12, 1.5, 0, Math.PI*2);
      ctx.arc(x + 12, y - 12, 1.5, 0, Math.PI*2);
      ctx.fill();
      // 口（薄い笑み）
      ctx.strokeStyle = '#204020';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 6); ctx.quadraticCurveTo(x, y - 5, x + 3, y - 6);
      ctx.stroke();
      // 右半身のひび割れ（不死の代償）
      ctx.strokeStyle = '#1a0818';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(x + 6, y - 10); ctx.lineTo(x + 10, y);
      ctx.moveTo(x + 8, y - 6); ctx.lineTo(x + 12, y + 4);
      ctx.stroke();
    },
    // 最強ジレとーと（ジレン）
    jiren(x, y, b) {
      // 胴（灰色の道着）
      ctx.fillStyle = '#3a3a48';
      ctx.fillRect(x - 15, y - 4, 30, 18);
      // 赤＆黒の模様（プライドトルーパーズ）
      ctx.fillStyle = '#a01820';
      ctx.fillRect(x - 15, y + 8, 30, 6);
      // 銀のベルト
      ctx.fillStyle = '#8a8a9a';
      ctx.fillRect(x - 15, y + 6, 30, 2);
      // 頭（灰白色）
      ctx.fillStyle = '#d0c8d0';
      ctx.beginPath();
      ctx.arc(x, y - 14, 13, 0, Math.PI*2);
      ctx.fill();
      // ハゲ頭部分（紫影）
      ctx.fillStyle = '#9888a0';
      ctx.beginPath();
      ctx.arc(x, y - 20, 8, Math.PI, 0);
      ctx.fill();
      // 大きな目（黒）
      ctx.fillStyle = '#201820';
      ctx.beginPath();
      ctx.ellipse(x - 5, y - 14, 3.5, 2.5, 0, 0, Math.PI*2);
      ctx.ellipse(x + 5, y - 14, 3.5, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
      // 眉毛（細く怒ってる）
      ctx.strokeStyle = '#201820';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(x - 9, y - 17); ctx.lineTo(x - 2, y - 18);
      ctx.moveTo(x + 2, y - 18); ctx.lineTo(x + 9, y - 17);
      ctx.stroke();
      // 口（真一文字）
      ctx.strokeStyle = '#4a3848';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 7); ctx.lineTo(x + 4, y - 7);
      ctx.stroke();
    },
    // 伝説ブロとーと（ブロリー）
    broly(x, y, b) {
      // 筋肉質の胴（肌色）
      ctx.fillStyle = '#e8b888';
      ctx.beginPath();
      ctx.arc(x, y, b.r + 2, 0, Math.PI*2);
      ctx.fill();
      // 赤茶の腰布
      ctx.fillStyle = '#c02020';
      ctx.fillRect(x - 14, y + 4, 28, 12);
      // 金の帯
      ctx.fillStyle = '#ffcc40';
      ctx.fillRect(x - 14, y + 4, 28, 2);
      // 肩のリング装飾
      ctx.fillStyle = '#ffcc40';
      ctx.beginPath();
      ctx.arc(x - 15, y - 4, 3, 0, Math.PI*2);
      ctx.arc(x + 15, y - 4, 3, 0, Math.PI*2);
      ctx.fill();
      // 金のチョーカー
      ctx.fillStyle = '#ffcc40';
      ctx.fillRect(x - 7, y - 6, 14, 2);
      // 頭
      ctx.fillStyle = '#e8b888';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 逆立ち緑髪（伝説の超サイヤ人）
      ctx.fillStyle = '#88c060';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 16, y - 34);
      ctx.lineTo(x - 8, y - 24);
      ctx.lineTo(x - 4, y - 36);
      ctx.lineTo(x, y - 26);
      ctx.lineTo(x + 4, y - 36);
      ctx.lineTo(x + 8, y - 24);
      ctx.lineTo(x + 16, y - 34);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // 白目（伝説時の虚ろな目）
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x - 5, y - 14, 2.5, 0, Math.PI*2);
      ctx.arc(x + 5, y - 14, 2.5, 0, Math.PI*2);
      ctx.fill();
      // 口（絶叫）
      ctx.fillStyle = '#4a1a0a';
      ctx.beginPath();
      ctx.ellipse(x, y - 7, 3, 2, 0, 0, Math.PI*2);

    },
    // 宇宙最強グラノとーと
    granola(x, y, b) {
      // 灰緑色の胴
      ctx.fillStyle = '#88a878';
      ctx.fillRect(x - 14, y - 4, 28, 16);
      // 茶色のベスト
      ctx.fillStyle = '#9a7048';
      ctx.fillRect(x - 14, y - 4, 28, 8);
      // マフラー（薄灰）
      ctx.fillStyle = '#d0d8d0';
      ctx.fillRect(x - 16, y - 6, 32, 4);
      ctx.fillRect(x - 20, y - 2, 4, 10);
      // 頭（肌色）
      ctx.fillStyle = '#e8b0a0';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 緑髪（逆立ち・グラノラの特徴）
      ctx.fillStyle = '#8ad0a8';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 10, y - 28);
      ctx.lineTo(x - 4, y - 22);
      ctx.lineTo(x, y - 30);
      ctx.lineTo(x + 4, y - 22);
      ctx.lineTo(x + 10, y - 28);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // スカウター（片目の機械）
      ctx.fillStyle = '#404040';
      ctx.fillRect(x + 2, y - 16, 10, 3);
      ctx.fillStyle = '#40e0e8';
      ctx.fillRect(x + 4, y - 15.5, 6, 2);
      // 目
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x - 5, y - 14, 1.5, 0, Math.PI*2);
      ctx.fill();
      // 口（鋭い）
      ctx.strokeStyle = '#6a3030';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.lineTo(x + 4, y - 6);

    },
    // 絶対者ガスとーと
    gas(x, y, b) {
      // ターコイズの肌
      ctx.fillStyle = '#6090a0';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 白い道衣（ネック）
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x - 14, y - 4, 28, 4);
      // 赤いベスト
      ctx.fillStyle = '#a02020';
      ctx.fillRect(x - 14, y, 28, 14);
      // 金のベルト
      ctx.fillStyle = '#ffcc40';
      ctx.fillRect(x - 14, y + 10, 28, 2);
      // 頭（ターコイズ）
      ctx.fillStyle = '#6090a0';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 紫色の長い髪（後ろになびく）
      ctx.fillStyle = '#402050';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 18);
      ctx.lineTo(x - 18, y - 4);
      ctx.lineTo(x - 16, y + 2);
      ctx.lineTo(x - 8, y - 10);
      ctx.closePath();
      ctx.moveTo(x + 11, y - 18);
      ctx.lineTo(x + 18, y - 4);
      ctx.lineTo(x + 16, y + 2);
      ctx.lineTo(x + 8, y - 10);
      ctx.closePath();
      ctx.fill();
      // 長い尖った耳
      ctx.fillStyle = '#6090a0';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 14); ctx.lineTo(x - 16, y - 10); ctx.lineTo(x - 9, y - 8); ctx.closePath();
      ctx.moveTo(x + 11, y - 14); ctx.lineTo(x + 16, y - 10); ctx.lineTo(x + 9, y - 8); ctx.closePath();
      ctx.fill();
      // 目（赤）
      ctx.fillStyle = '#ff4040';
      ctx.beginPath();
      ctx.arc(x - 5, y - 14, 1.5, 0, Math.PI*2);
      ctx.arc(x + 5, y - 14, 1.5, 0, Math.PI*2);

      // 口
      ctx.strokeStyle = '#301820';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 7); ctx.lineTo(x + 3, y - 7);

    },
    // ガンとーと（1号・2号が並んで立つ）
    gamma(x, y, b) {
      // 2体で構成：1号（右）と2号（左）を少しずらして描画
      for (const [dx, numStr] of [[-b.r * 0.5, '2'], [b.r * 0.5, '1']]) {
        const gx = x + dx, gy = y;
        // 黄色のスーツ
        ctx.fillStyle = '#ffd848';
        ctx.beginPath();
        ctx.arc(gx, gy, b.r * 0.65, 0, Math.PI*2);
        ctx.fill();
        // 銀色のボタン
        ctx.fillStyle = '#d0d0d0';
        ctx.fillRect(gx - 1, gy - 2, 2, 2);
        ctx.fillRect(gx - 1, gy + 2, 2, 2);
        // マント（1号は赤、2号は青）
        ctx.fillStyle = numStr === '1' ? '#c02020' : '#2060c0';
        ctx.beginPath();
        ctx.moveTo(gx + b.r * 0.5, gy - 4);
        ctx.lineTo(gx + b.r * 0.8 + 6, gy + 10);
        ctx.lineTo(gx + b.r * 0.5, gy + 10);
        ctx.closePath();
        ctx.fill();
        // ヘルメット
        ctx.fillStyle = '#c0c0c8';
        ctx.beginPath();
        ctx.arc(gx, gy - 11, 7, 0, Math.PI*2);
        ctx.fill();
        // アンテナ（頭頂）
        ctx.strokeStyle = '#808080';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(gx, gy - 18); ctx.lineTo(gx, gy - 22);
        ctx.stroke();
        ctx.fillStyle = '#ff4040';
        ctx.beginPath(); ctx.arc(gx, gy - 22, 1.2, 0, Math.PI*2); ctx.fill();
        // 番号
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(numStr, gx, gy + 4);
        // 目（黄色の目）
        ctx.fillStyle = '#ffdc20';
        ctx.beginPath();
        ctx.ellipse(gx, gy - 11, 3, 2, 0, 0, Math.PI*2);
        ctx.fill();
      }
    },
    // 最終兵器セルマックとーと
    cellmax(x, y, b) {
      // 巨大な緑の胴（ベースはセルより大きく）
      ctx.fillStyle = '#78b058';
      ctx.beginPath();
      ctx.ellipse(x, y + 2, b.r + 4, b.r + 2, 0, 0, Math.PI*2);
      ctx.fill();
      // 赤い模様（制御不能の暴走化）
      ctx.fillStyle = '#c03020';
      ctx.beginPath();
      ctx.ellipse(x, y, 12, 7, 0, 0, Math.PI*2);
      ctx.fill();
      // 紫の斑点
      ctx.fillStyle = '#6030a0';
      for (const [dx, dy] of [[-10, -3], [12, 0], [-8, 6], [8, 7]]) {
        ctx.beginPath();
        ctx.arc(x + dx, y + dy, 2, 0, Math.PI*2);
        ctx.fill();
      }
      // 頭（緑・怒りの形相）
      ctx.fillStyle = '#78b058';
      ctx.beginPath(); ctx.arc(x, y - 14, 14, 0, Math.PI*2); ctx.fill();
      // 黒い装甲（前面）
      ctx.fillStyle = '#2a2820';
      ctx.fillRect(x - 10, y - 13, 20, 5);
      // 2本のツノ（上向き）
      ctx.fillStyle = '#ffcc40';
      ctx.beginPath();
      ctx.moveTo(x - 10, y - 24);
      ctx.lineTo(x - 14, y - 36);
      ctx.lineTo(x - 6, y - 26);
      ctx.closePath();
      ctx.moveTo(x + 10, y - 24);
      ctx.lineTo(x + 14, y - 36);
      ctx.lineTo(x + 6, y - 26);
      ctx.closePath();
      ctx.fill();
      // 赤い邪悪な目
      ctx.fillStyle = '#ff2020';
      ctx.beginPath();
      ctx.ellipse(x - 5, y - 11, 2.5, 2, 0, 0, Math.PI*2);
      ctx.ellipse(x + 5, y - 11, 2.5, 2, 0, 0, Math.PI*2);
      ctx.fill();
      // 大きな口（牙）
      ctx.fillStyle = '#1a0818';
      ctx.fillRect(x - 5, y - 6, 10, 4);
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(x - 5 + i * 2.5, y - 2);
        ctx.lineTo(x - 4 + i * 2.5, y);
        ctx.lineTo(x - 3.5 + i * 2.5, y - 2);
        ctx.closePath();
        ctx.fill();
      }
    },
    // ビルス様（破壊神・紫の猫型ヒューマノイド）
    bills(x, y, b) {
      // 紫の肌の胴
      ctx.fillStyle = '#9862c4';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // エジプト風の胴衣（青と赤のチュニック）
      ctx.fillStyle = '#4a5090';
      ctx.fillRect(x - 14, y - 2, 28, 16);
      // 首回りのゴールドアクセサリー
      ctx.fillStyle = '#ffdc40';
      ctx.fillRect(x - 12, y - 6, 24, 4);
      ctx.strokeStyle = '#a06020';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(x - 12, y - 6, 24, 4);
      // 赤いベルト
      ctx.fillStyle = '#c03020';
      ctx.fillRect(x - 14, y + 10, 28, 4);
      // 金のベルトバックル
      ctx.fillStyle = '#ffdc40';
      ctx.fillRect(x - 3, y + 9, 6, 6);
      // 頭（紫・長い顔）
      ctx.fillStyle = '#9862c4';
      ctx.beginPath();
      ctx.ellipse(x, y - 14, 11, 13, 0, 0, Math.PI*2);
      ctx.fill();
      // 長く尖った耳（猫っぽい）
      ctx.beginPath();
      ctx.moveTo(x - 10, y - 20);
      ctx.lineTo(x - 15, y - 34);
      ctx.lineTo(x - 4, y - 22);
      ctx.closePath();
      ctx.moveTo(x + 10, y - 20);
      ctx.lineTo(x + 15, y - 34);
      ctx.lineTo(x + 4, y - 22);
      ctx.closePath();
      ctx.fill();
      // 耳の内側（ピンク）
      ctx.fillStyle = '#d88ee0';
      ctx.beginPath();
      ctx.moveTo(x - 10, y - 22);
      ctx.lineTo(x - 13, y - 30);
      ctx.lineTo(x - 7, y - 23);
      ctx.closePath();
      ctx.moveTo(x + 10, y - 22);
      ctx.lineTo(x + 13, y - 30);
      ctx.lineTo(x + 7, y - 23);
      ctx.closePath();
      ctx.fill();
      // 目（黄金・鋭い）
      ctx.fillStyle = '#ffdc20';
      ctx.beginPath();
      ctx.ellipse(x - 5, y - 15, 3, 2.2, 0, 0, Math.PI*2);
      ctx.ellipse(x + 5, y - 15, 3, 2.2, 0, 0, Math.PI*2);
      ctx.fill();
      // 黒い縦長の瞳（猫目）
      ctx.fillStyle = '#1a0018';
      ctx.fillRect(x - 5.5, y - 16.5, 1, 3);
      ctx.fillRect(x + 4.5, y - 16.5, 1, 3);
      // 鼻（小さな黒い点）
      ctx.fillStyle = '#1a0018';
      ctx.beginPath();
      ctx.arc(x, y - 10, 0.8, 0, Math.PI*2);
      ctx.fill();
      // 口
      ctx.strokeStyle = '#3a0a2a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 7);
      ctx.quadraticCurveTo(x, y - 6, x + 3, y - 7);
      ctx.stroke();
      // 頭頂の装飾（破壊神の羽毛的な飾り）
      ctx.fillStyle = '#4060a0';
      ctx.fillRect(x - 3, y - 28, 6, 5);
      ctx.fillStyle = '#ffdc40';
      ctx.beginPath();
      ctx.arc(x, y - 26, 1.5, 0, Math.PI*2);
      ctx.fill();
    },
  };

  function drawProjectiles() {
    for (const p of projectiles) {
      ctx.save();
      // 変身段階ごとの色
      let bodyCol, glowCol;
      if (p.transform === 1) {
        bodyCol = '#ff5050'; glowCol = 'rgba(255,60,60,0.5)';  // 界王拳赤
      } else if (p.transform >= 2 && p.transform <= 4) {
        bodyCol = '#ffee40'; glowCol = 'rgba(255,255,100,0.5)';  // SSJ金
      } else if (p.transform === 5) {
        bodyCol = '#ff7030'; glowCol = 'rgba(255,140,40,0.6)';  // SSJ4赤金
      } else {
        bodyCol = '#ffcc30'; glowCol = 'rgba(255,200,60,0.4)';  // ノーマル
      }
      ctx.fillStyle = glowCol;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = bodyCol;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawEnemyProjectiles() {
    for (const p of enemyProjectiles) {
      ctx.save();
      ctx.fillStyle = `${p.color}`;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = p.life / p.maxLife;
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPopups() {
    for (const pu of popups) {
      const a = Math.min(1, pu.life / 20);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      ctx.strokeText(pu.text, pu.x, pu.y);
      ctx.fillStyle = pu.color;
      ctx.fillText(pu.text, pu.x, pu.y);
      ctx.restore();
    }
  }

  function drawHUD() {
    // プレイヤー HP バー（左上・ポータルボタンの下に充分余裕を取る）
    const hpW = 220, hpH = 14;
    const hpX = 12, hpY = 80;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#ff6060';
    ctx.fillRect(hpX + 2, hpY + 2, (hpW - 4) * (player.hp / player.maxHp), hpH - 4);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('HP', hpX + 4, hpY - 2);
    // パワーゲージ（次の変身まで）
    const pwY = hpY + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, pwY, hpW, hpH);
    const pg = ctx.createLinearGradient(hpX, pwY, hpX + hpW, pwY);
    pg.addColorStop(0, '#ffee40');
    pg.addColorStop(1, '#ff8020');
    ctx.fillStyle = pg;
    const nextCost = player.transform < TRANSFORM_MAX ? TRANSFORM_COST[player.transform] : 1;
    const pwPct = Math.min(1, player.power / nextCost);
    ctx.fillRect(hpX + 2, pwY + 2, (hpW - 4) * pwPct, hpH - 4);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(hpX, pwY, hpW, hpH);
    ctx.fillStyle = '#fff';
    const pwLabel = player.transform < TRANSFORM_MAX
      ? `POWER → ${TRANSFORM_NAMES[player.transform + 1]}`
      : 'POWER MAX';
    ctx.fillText(pwLabel, hpX + 4, pwY - 2);

    // 気ゲージ（かめはめ波）
    const kiY = pwY + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, kiY, hpW, hpH);
    const kiFull = player.kiGauge >= player.kiGaugeMax;
    const kig = ctx.createLinearGradient(hpX, kiY, hpX + hpW, kiY);
    if (kiFull) {
      // MAX は点滅グラデ
      const t = Math.sin(Date.now() * 0.008);
      kig.addColorStop(0, `rgba(180,${200 + t * 50},255,1)`);
      kig.addColorStop(1, '#ffffff');
    } else {
      kig.addColorStop(0, '#40a0ff');
      kig.addColorStop(1, '#80d0ff');
    }
    ctx.fillStyle = kig;
    const kiPct = Math.min(1, player.kiGauge / player.kiGaugeMax);
    ctx.fillRect(hpX + 2, kiY + 2, (hpW - 4) * kiPct, hpH - 4);
    ctx.strokeStyle = kiFull ? '#ffee80' : '#fff';
    ctx.lineWidth = kiFull ? 2 : 1;
    ctx.strokeRect(hpX, kiY, hpW, hpH);
    ctx.lineWidth = 1;
    ctx.fillStyle = '#fff';
    ctx.fillText(kiFull ? '気 MAX！必殺技OK' : '気（かめはめ波）', hpX + 4, kiY - 2);

    // スコア
    ctx.textAlign = 'right';
    ctx.font = 'bold 15px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText('SCORE: ' + totalScore.toLocaleString(), W - 12, 30);
    ctx.fillStyle = '#ffee40';
    ctx.fillText('SCORE: ' + totalScore.toLocaleString(), W - 12, 30);
    // キル数（スコアの下）
    ctx.fillStyle = '#fff';
    ctx.strokeText('KILLS: ' + player.kills, W - 12, 50);
    ctx.fillText('KILLS: ' + player.kills, W - 12, 50);
    // コンボ表示（右上に小さく）
    if (comboCount >= 3) {
      const t = Math.min(1, comboTimer / 90);
      ctx.save();
      ctx.globalAlpha = t;
      ctx.textAlign = 'right';
      ctx.font = 'bold 18px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      const hue = (comboCount * 10) % 360;
      const txt = `${comboCount} COMBO`;
      ctx.strokeText(txt, W - 12, 72);
      ctx.fillStyle = `hsl(${hue},100%,70%)`;
      ctx.fillText(txt, W - 12, 72);
      ctx.restore();
    }
    // 変身状態（コンボの下）
    if (player.transform >= 1) {
      const label = TRANSFORM_NAMES[player.transform];
      const ty = (comboCount >= 3) ? 96 : 74;
      drawRubyText(label, W - 12, ty, { size: 14, align: 'right', fill: auraColorFor(player.transform), strokeW: 3 });
    }
    ctx.restore();

    // ボスHPバー（上部中央）
    if (boss && !boss.dead) {
      const bw = W * 0.5;
      const bx = (W - bw) / 2;
      const by = 16;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bx, by, bw, 18);
      const bg = ctx.createLinearGradient(bx, by, bx + bw, by);
      bg.addColorStop(0, '#ff4040');
      bg.addColorStop(1, '#a01010');
      ctx.fillStyle = bg;
      ctx.fillRect(bx + 2, by + 2, (bw - 4) * (boss.hp / boss.maxHp), 14);
      ctx.strokeStyle = '#ffa050';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bw, 18);
      drawRubyText(boss.name, W/2, by + 14, { size: 13, fill: '#fff', strokeW: 3 });
      ctx.restore();
    }
  }

  function drawBanner() {
    if (!banner) return;
    const t = banner.life / banner.maxLife;
    const alpha = Math.min(1, t * 4, (banner.life > banner.maxLife - 20) ? (banner.maxLife - banner.life) / 20 : 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H/2 - 44, W, 90);
    drawRubyText(banner.text, W/2, H/2 + 5, { size: 34, fill: banner.color || '#ffee40', strokeW: 6, family: 'serif' });
    ctx.restore();
    banner.life--;
    if (banner.life <= 0) banner = null;
    // サブバナー
    if (bannerSub) {
      const t2 = bannerSub.life / bannerSub.maxLife;
      const alpha2 = Math.min(1, t2 * 4, (bannerSub.life > bannerSub.maxLife - 15) ? (bannerSub.maxLife - bannerSub.life) / 15 : 1);
      ctx.save();
      ctx.globalAlpha = alpha2;
      drawRubyText(bannerSub.text, W/2, H/2 + 48, { size: 18, fill: bannerSub.color || '#fff', strokeW: 4 });
      ctx.restore();
      bannerSub.life--;
      if (bannerSub.life <= 0) bannerSub = null;
    }
  }

  // ====== メイン更新 ======
  function update() {
    stateTimer++;
    if (state === STATE.PLAYING) {
      updatePlayer();
      updateEnemies();
      updateProjectiles();
      updateEnemyProjectiles();
      updateBoss();
      updateWaves();
      updateParticles();
    } else if (state === STATE.STAGE_CLEAR) {
      updateParticles();
      updateProjectiles();
      // プレイヤーを画面上に飛ばす
      player.y -= 4.5;
      // 推進トレイル
      if (Math.random() < 0.6) {
        spawnParticle(player.x + (Math.random() - 0.5) * 10, player.y + player.r + 4, {
          vx: (Math.random() - 0.5) * 1.5, vy: 3 + Math.random() * 2,
          life: 22, color: ['#ffcc40','#ff8020','#ffee80'][Math.floor(Math.random() * 3)],
          size: 2.5 + Math.random() * 1.5,
        });
      }
      // オーラ粒子（上方向に吹き出す）
      if (Math.random() < 0.4) {
        const a = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
        spawnParticle(player.x + (Math.random() - 0.5) * 14, player.y, {
          vx: Math.cos(a) * 3, vy: Math.sin(a) * 3 - 1,
          life: 28, color: '#fff8c0', size: 2.5,
        });
      }
    } else if (state === STATE.DEAD) {
      updateParticles();
      updateEnemyProjectiles();
    } else if (state === STATE.CLEARED || state === STATE.GAMEOVER) {
      updateParticles();
    }
    // コンボタイマー（キルが止まるとリセット）
    if (state === STATE.PLAYING) {
      if (comboTimer > 0) comboTimer--;
      else comboCount = 0;
    }
  }

  // 必殺技ボタンの表示・非表示
  function updateChargeBtnVisibility() {
    // プレイ中のみ表示（タイトル/キャラ選択/ボス入場/死亡/クリア中は非表示）
    const visible = (state === STATE.PLAYING);
    chargeBtn.style.display = visible ? 'flex' : 'none';
  }

  // メインループ
  function loop() {
    update();
    draw();
    updateChargeBtnVisibility();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
