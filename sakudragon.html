        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      } else if (transformLvl >= 2) {
        // SSJ/SSJ2：逆立った金髪
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.moveTo(-8, -13);
        ctx.lineTo(-6, -22);
        ctx.lineTo(-2, -15);
        ctx.lineTo(1, -23);
        ctx.lineTo(5, -15);
        ctx.lineTo(8, -22);
        ctx.lineTo(8, -13);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffffa0';
        ctx.fillRect(-1, -20, 1.5, 6);
      } else {
        // ノーマル/界王拳：サラサラ黒髪（目にかからない）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.lineTo(8, -13);
        ctx.lineTo(-8, -13);
        ctx.closePath();
        ctx.fill();
        // 斜めの前髪（額のみ）
        ctx.beginPath();
        ctx.moveTo(-8, -15);
        ctx.quadraticCurveTo(-3, -13, 4, -14);
        ctx.quadraticCurveTo(7, -14.5, 8, -16);
        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // くるみ
      if (transformLvl === 4) {
        // SSJ3：後ろに長く流れる金髪（左右）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.moveTo(-9, -13);
        ctx.bezierCurveTo(-14, -5, -13, 5, -10, 14);
        ctx.lineTo(-5, 14);
        ctx.bezierCurveTo(-4, 5, -5, -5, -7, -13);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(9, -13);
        ctx.bezierCurveTo(14, -5, 13, 5, 10, 14);
        ctx.lineTo(5, 14);
        ctx.bezierCurveTo(4, 5, 5, -5, 7, -13);
        ctx.closePath();
        ctx.fill();
        // 頭頂
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.lineTo(8, -13);
        ctx.lineTo(-8, -13);
        ctx.closePath();
        ctx.fill();
      } else if (transformLvl === 5) {
        // SSJ4：赤ミディアム
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.bezierCurveTo(10, -8, 10, -4, 8, -2);
        ctx.lineTo(-8, -2);
        ctx.bezierCurveTo(-10, -4, -10, -8, -10, -12);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-8, -15);
        ctx.quadraticCurveTo(-3, -13, 0, -14);
        ctx.quadraticCurveTo(4, -14.5, 8, -15);
        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      } else if (transformLvl >= 2) {
        // SSJ/SSJ2：金ミディアム（少し逆立ち）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.bezierCurveTo(10, -8, 10, -4, 8, -2);
        ctx.lineTo(-8, -2);
        ctx.bezierCurveTo(-10, -4, -10, -8, -10, -12);
        ctx.closePath();
        ctx.fill();
        // 頭頂の逆立ち
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.moveTo(-8, -14); ctx.lineTo(-5, -20); ctx.lineTo(-1, -15);
        ctx.lineTo(2, -21); ctx.lineTo(5, -15); ctx.lineTo(8, -20);
        ctx.lineTo(8, -14);
        ctx.closePath();
        ctx.fill();
      } else {
        // ノーマル/界王拳：ミディアム（ふんわり・肩まで）
        ctx.fillStyle = hairCol;
        ctx.beginPath();
        ctx.arc(0, -13, 8, Math.PI, 0);
        ctx.bezierCurveTo(10, -8, 10, -2, 8, 0);
        ctx.lineTo(6, 2);
        ctx.bezierCurveTo(3, -2, -3, -2, -6, 2);
        ctx.lineTo(-8, 0);
        ctx.bezierCurveTo(-10, -2, -10, -8, -10, -12);
        ctx.closePath();
        ctx.fill();
        // 前髪（ふわっと・額のみ）
        ctx.beginPath();
        ctx.moveTo(-8, -16);
        ctx.quadraticCurveTo(-3, -13, 0, -14);
        ctx.quadraticCurveTo(4, -14.5, 8, -15);
        ctx.lineTo(7, -13);
        ctx.lineTo(-7, -13);
        ctx.closePath();
        ctx.fill();
      }
      // ピンクリボン（サイドにちょこん）
      ctx.fillStyle = '#ff80b0';
      ctx.beginPath();
      ctx.moveTo(-10, -17); ctx.lineTo(-7, -19); ctx.lineTo(-7, -15); ctx.closePath();
      ctx.moveTo(-4, -17); ctx.lineTo(-7, -19); ctx.lineTo(-7, -15); ctx.closePath();
      ctx.fill();
    }
    // 目の色：SSJ以降は青、SSJ4は赤、界王拳は変わらず
    let eyeCol = '#000';
    if (transformLvl >= 2 && transformLvl <= 4) eyeCol = '#40c8ff';
    else if (transformLvl === 5) eyeCol = '#ff4040';
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = eyeCol;
    ctx.beginPath();
    ctx.arc(-2.5, -11, 0.9, 0, Math.PI*2);
    ctx.arc(2.5, -11, 0.9, 0, Math.PI*2);
    ctx.fill();
    // 口（真面目な感じ）
    ctx.strokeStyle = '#a05030';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(-1.5, -7); ctx.lineTo(1.5, -7);
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      const x = e.x, y = e.y;
      ctx.save();
      if (e.hurtTimer > 0 && Math.floor(e.hurtTimer/2) % 2 === 0) ctx.globalAlpha = 0.5;
      // 影
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath(); ctx.ellipse(x, y + e.r + 2, e.r * 0.8, 3, 0, 0, Math.PI*2); ctx.fill();
      // 敵本体
      if (e.type === 'saibai') {
        // サイバイマン風：緑の小型兵
        const bob = Math.sin(e.anim * 2) * 1.5;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.ellipse(x, y + bob, e.r, e.r * 1.1, 0, 0, Math.PI*2);
        ctx.fill();
        // 模様
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.arc(x, y + bob, e.r * 0.55, 0, Math.PI*2);
        ctx.fill();
        // 目（赤）
        ctx.fillStyle = '#ff2020';
        ctx.beginPath();
        ctx.arc(x - 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.arc(x + 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.fill();
        // 牙
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x - 2, y + bob + 2); ctx.lineTo(x - 3, y + bob + 6); ctx.lineTo(x - 1, y + bob + 4); ctx.closePath();
        ctx.moveTo(x + 2, y + bob + 2); ctx.lineTo(x + 3, y + bob + 6); ctx.lineTo(x + 1, y + bob + 4); ctx.closePath();
        ctx.fill();
      } else if (e.type === 'namek') {
        // ナメック戦士風：大型緑
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // 耳
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.ellipse(x - e.r + 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.ellipse(x + e.r - 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.fill();
        // 顔ライン
        ctx.strokeStyle = e.coreCol;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - 4, y - 6); ctx.lineTo(x - 6, y - 2);
        ctx.moveTo(x + 4, y - 6); ctx.lineTo(x + 6, y - 2);
        ctx.stroke();
        // 目
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 5, y - 3, 3, 2);
        ctx.fillRect(x + 2, y - 3, 3, 2);
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 4, y - 2.5, 1.5, 1.5);
        ctx.fillRect(x + 3, y - 2.5, 1.5, 1.5);
        // 口（しかめ）
        ctx.strokeStyle = '#102a08';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 4, y + 4); ctx.lineTo(x + 4, y + 4);
        ctx.stroke();
      } else if (e.type === 'freezer') {
        // フリーザ兵風：赤
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // スコアターっぽい目
        ctx.fillStyle = '#00cccc';
        ctx.fillRect(x - 8, y - 4, 16, 4);
        ctx.fillStyle = '#008080';
        ctx.fillRect(x - 8, y - 4, 16, 1);
        // 赤目
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(x - 4, y - 3, 2, 2);
        ctx.fillRect(x + 2, y - 3, 2, 2);
        // 口
        ctx.fillStyle = '#701010';
        ctx.fillRect(x - 3, y + 3, 6, 2);
      }
      // HP バー（最大HP以下のみ）
      if (e.hp < e.maxHp) {
        const barW = e.r * 2, barH = 3;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW, barH);
        ctx.fillStyle = '#ff6060';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW * (e.hp / e.maxHp), barH);
      }
      ctx.restore();
    }
  }

  function drawBoss() {
    if (!boss) return;
    const x = boss.x, y = boss.y;
    ctx.save();
    if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/3) % 2 === 0) ctx.globalAlpha = 0.5;

    // ビームチャージ演出
    if (boss.beamCharging > 0) {
      // 予告レーザー（赤い細い線・ロック前は追尾、ロック後は固定）
      const ang = boss.beamAngle;
      const warnLen = 800;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ロック前は点滅細線、ロック後は太く警告
      const locked = boss.beamLocked;
      const blink = Math.floor(boss.anim * 4) % 2 === 0 ? 1 : 0.3;
      if (!locked) {
        ctx.strokeStyle = `rgba(255,80,80,${0.35 * blink})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
      } else {
        // ロック後は太めの赤（警告・固定）
        ctx.strokeStyle = `rgba(255,40,60,${0.7 * blink})`;
        ctx.lineWidth = 8;
        ctx.setLineDash([]);
      }
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(warnLen, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // チャージ光（本体の周り）
      const total = 110;
      const c = 1 - boss.beamCharging / total;
      const cR = 15 + c * 22;
      ctx.fillStyle = `rgba(160,255,160,${0.2 + c * 0.4})`;
      ctx.beginPath();
      ctx.arc(x, y, cR, 0, Math.PI*2);
      ctx.fill();
      // 指ビーム（額に集中）
      ctx.fillStyle = `rgba(255,255,255,${c})`;
      ctx.beginPath();
      ctx.arc(x, y - 20, 3 + c * 4, 0, Math.PI*2);
      ctx.fill();
    }

    // ビーム発射中
    if (boss.beamFiring > 0) {
      const ang = boss.beamAngle;
      const bLen = 600;
      const bw = 24;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ボスタイプごとのビーム色
      const bcol = boss.beamColor || '#a0f080';
      const hexToRgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
      const [br, bgc, bb] = hexToRgb(bcol);
      const bg = ctx.createLinearGradient(0, -bw, 0, bw);
      bg.addColorStop(0, `rgba(${br},${bgc},${bb},0)`);
      bg.addColorStop(0.5, `rgba(${br},${bgc},${bb},0.7)`);
      bg.addColorStop(1, `rgba(${br},${bgc},${bb},0)`);
      ctx.fillStyle = bg;
      ctx.fillRect(0, -bw, bLen, bw * 2);
      // 内側の白コア
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, -4, bLen, 8);
      ctx.restore();
    }

    // ボスタイプごとの描画
    // 共通：影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(x, y + boss.r + 3, boss.r * 0.85, 5, 0, 0, Math.PI*2); ctx.fill();

    const drawer = BOSS_DRAWERS[boss.type] || BOSS_DRAWERS.piccolo;
    drawer(x, y, boss);

    // とーとメガネ（全ボス共通）
    drawTotoGlasses(x, y - 13);

    // 激昂オーラ（HP40%以下で赤くなる）
    if (boss.hp / boss.maxHp < 0.4) {
      const auraR = boss.r + 22 + Math.sin(boss.anim * 0.5) * 6;
      ctx.fillStyle = 'rgba(200,80,80,0.3)';
      ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,100,80,0.2)';
      ctx.beginPath(); ctx.arc(x, y, auraR * 0.7, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawTotoGlasses(gx, gy) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 3, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 3, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx - 2, gy); ctx.lineTo(gx + 2, gy);
    ctx.stroke();
    // メガネ内の目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 1.6, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 1.6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 0.9, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 0.9, 0, Math.PI*2);
    ctx.fill();
  }

  // ====== ボス別の描画関数 ======
  const BOSS_DRAWERS = {
    // ピッコロとーと
    piccolo(x, y, b) {
      // 体（緑の肌）
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫マント
      ctx.fillStyle = '#7030a0';
      ctx.beginPath();
      ctx.ellipse(x, y + 6, b.r * 1.15, b.r * 0.8, 0, 0, Math.PI);
      ctx.fill();
      // 道着
      ctx.fillStyle = '#a060a0';
      ctx.fillRect(x - 14, y - 2, 28, 16);
      // 帯
      ctx.fillStyle = '#ffee60';
      ctx.fillRect(x - 14, y + 10, 28, 4);
      // 頭
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // アンテナ
      ctx.strokeStyle = '#68b868';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 24); ctx.lineTo(x - 6, y - 32);
      ctx.moveTo(x + 4, y - 24); ctx.lineTo(x + 6, y - 32);
      ctx.stroke();
      // ターバン（白）
      ctx.fillStyle = '#f0f0e0';
      ctx.fillRect(x - 12, y - 20, 24, 7);
      ctx.strokeStyle = '#a0a090'; ctx.lineWidth = 0.8;
      ctx.strokeRect(x - 12, y - 20, 24, 7);
      // 尖った耳
      ctx.fillStyle = '#68b868';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 14); ctx.lineTo(x - 18, y - 18); ctx.lineTo(x - 11, y - 10); ctx.closePath();
      ctx.moveTo(x + 12, y - 14); ctx.lineTo(x + 18, y - 18); ctx.lineTo(x + 11, y - 10); ctx.closePath();
      ctx.fill();
      // 口（真一文字）
      ctx.strokeStyle = '#204020';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 7); ctx.lineTo(x + 4, y - 7);
      ctx.stroke();
    },
    // ベジとーと（ベジータ風）
    vegeta(x, y, b) {
      // 戦闘服（サイヤ人アーマー）
      ctx.fillStyle = '#e8e8f0';  // 白いアーマー
      ctx.fillRect(x - 16, y - 4, 32, 18);
      // 金色のショルダー
      ctx.fillStyle = '#ffd040';
      ctx.fillRect(x - 17, y - 6, 7, 8);
      ctx.fillRect(x + 10, y - 6, 7, 8);
      // 青いインナー
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 10, y - 2, 20, 10);
      // 青ブーツの上部
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 12, y + 12, 24, 4);
      // 頭（肌色）
      ctx.fillStyle = '#f5d8a8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 髪（ベジータ風の逆立ちV字）
      ctx.fillStyle = '#1a0808';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 22);
      ctx.lineTo(x - 9, y - 32);
      ctx.lineTo(x - 3, y - 24);
      ctx.lineTo(x - 1, y - 34);
      ctx.lineTo(x + 1, y - 24);
      ctx.lineTo(x + 3, y - 34);
      ctx.lineTo(x + 9, y - 32);
      ctx.lineTo(x + 11, y - 22);
      ctx.lineTo(x + 11, y - 14);
      ctx.lineTo(x - 11, y - 14);
      ctx.closePath();
      ctx.fill();
      // スカウター（ベジータっぽい赤い縁）
      ctx.strokeStyle = '#ff4030';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(x + 9, y - 13); ctx.lineTo(x + 16, y - 15);
      ctx.stroke();
      // 口（ドヤ顔）
      ctx.strokeStyle = '#6a3030';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 6); ctx.quadraticCurveTo(x, y - 4, x + 3, y - 6);
      ctx.stroke();
    },
    // フリーザとーと（白＋紫・最終形態風）
    freezer(x, y, b) {
      // 体（白＋紫のバイオスーツ風）
      ctx.fillStyle = '#e8e4f0';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫の装甲プレート
      ctx.fillStyle = '#8040b0';
      ctx.fillRect(x - 14, y - 2, 28, 6);  // 胸
      ctx.fillRect(x - 14, y + 10, 28, 4);  // 腰
      // 肩プレート
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.arc(x - 14, y - 4, 6, 0, Math.PI*2);
      ctx.arc(x + 14, y - 4, 6, 0, Math.PI*2);
      ctx.fill();
      // 頭（白）
      ctx.fillStyle = '#f0ecf8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の紫プレート（王冠状）
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 10, y - 26);
      ctx.lineTo(x - 4, y - 20);
      ctx.lineTo(x, y - 28);
      ctx.lineTo(x + 4, y - 20);
      ctx.lineTo(x + 10, y - 26);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // 口（不敵な笑み）
      ctx.strokeStyle = '#6030a0';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 3, x + 4, y - 6);
      ctx.stroke();
      // 尻尾（背後に見えるヒント）
      ctx.strokeStyle = '#a070d0';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + b.r - 2, y + 8);
      ctx.quadraticCurveTo(x + b.r + 14, y + 18, x + b.r + 8, y + 26);
      ctx.stroke();
    },
    // セルとーと（完全体・緑＋黒斑点）
    cell(x, y, b) {
      // 体（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 黒い外殻プレート
      ctx.fillStyle = '#282820';
      ctx.fillRect(x - 14, y - 4, 28, 6);
      ctx.fillRect(x - 14, y + 6, 28, 4);
      // 緑の胸プレート
      ctx.fillStyle = '#a0d068';
      ctx.beginPath();
      ctx.ellipse(x, y + 2, 10, 5, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の黒いリング
      ctx.strokeStyle = '#282820';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y - 14, 11, 0, Math.PI*2);
      ctx.stroke();
      // ツノ（頭頂）
      ctx.fillStyle = '#282820';
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 24); ctx.lineTo(x - 10, y - 34); ctx.lineTo(x - 4, y - 26); ctx.closePath();
      ctx.moveTo(x + 8, y - 24); ctx.lineTo(x + 10, y - 34); ctx.lineTo(x + 4, y - 26); ctx.closePath();
      ctx.fill();
      // 口（邪悪）
      ctx.strokeStyle = '#402010';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 8, x + 4, y - 6);
      ctx.stroke();
      // 背中の翼（前方向にちらりと）
      ctx.fillStyle = 'rgba(100,150,80,0.6)';
      ctx.beginPath();
      ctx.moveTo(x - b.r, y + 2); ctx.lineTo(x - b.r - 10, y - 8); ctx.lineTo(x - b.r - 4, y - 14); ctx.lineTo(x - b.r + 4, y - 4); ctx.closePath();
      ctx.moveTo(x + b.r, y + 2); ctx.lineTo(x + b.r + 10, y - 8); ctx.lineTo(x + b.r + 4, y - 14); ctx.lineTo(x + b.r - 4, y - 4); ctx.closePath();
      ctx.fill();
    },
    // 魔神とーと（魔人ブウ風・ピンクでぽっちゃり）
    buu(x, y, b) {
      // 丸々とした体（ピンク・大きめ）
      ctx.fillStyle = '#ff98c0';
      ctx.beginPath(); ctx.arc(x, y + 3, b.r + 4, 0, Math.PI*2); ctx.fill();
      // 黒いベスト
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(x - 16, y - 4, 32, 16);
      // 金縁
      ctx.fillStyle = '#ffdc40';
      ctx.fillRect(x - 16, y - 4, 32, 2);
      ctx.fillRect(x - 16, y + 10, 32, 2);
      // 白いマント・肩の布
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x - 18, y - 3, 4, 10);
      ctx.fillRect(x + 14, y - 3, 4, 10);
      // 頭（丸いピンク）
      ctx.fillStyle = '#ffaccc';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // 頭頂のアンテナ（触手っぽい）
      ctx.strokeStyle = '#ffaccc';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(x, y - 26);
      ctx.quadraticCurveTo(x + 8, y - 34, x + 4, y - 40);
      ctx.stroke();
      // 頭の黒い穴（魔人ブウの特徴）
      ctx.fillStyle = '#1a0818';
      ctx.beginPath();
      ctx.ellipse(x - 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.ellipse(x + 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
      // 口（大きく開いた笑い）
      ctx.fillStyle = '#601030';
      ctx.beginPath();
      ctx.ellipse(x, y - 6, 5, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
    },
  };

  function drawProjectiles() {
    for (const p of projectiles) {
      ctx.save();
      // 変身段階ごとの色
      let bodyCol, glowCol;
      if (p.transform === 1) {
        bodyCol = '#ff5050'; glowCol = 'rgba(255,60,60,0.5)';  // 界王拳赤
      } else if (p.transform >= 2 && p.transform <= 4) {
        bodyCol = '#ffee40'; glowCol = 'rgba(255,255,100,0.5)';  // SSJ金
      } else if (p.transform === 5) {
        bodyCol = '#ff7030'; glowCol = 'rgba(255,140,40,0.6)';  // SSJ4赤金
      } else {
        bodyCol = '#ffcc30'; glowCol = 'rgba(255,200,60,0.4)';  // ノーマル
      }
      ctx.fillStyle = glowCol;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = bodyCol;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawEnemyProjectiles() {
    for (const p of enemyProjectiles) {
      ctx.save();
      ctx.fillStyle = `${p.color}`;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = p.life / p.maxLife;
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPopups() {
    for (const pu of popups) {
      const a = Math.min(1, pu.life / 20);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      ctx.strokeText(pu.text, pu.x, pu.y);
      ctx.fillStyle = pu.color;
      ctx.fillText(pu.text, pu.x, pu.y);
      ctx.restore();
    }
  }

  function drawHUD() {
    // プレイヤー HP バー（左上・ポータルボタンの下）
    const hpW = 220, hpH = 14;
    const hpX = 12, hpY = 52;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#ff6060';
    ctx.fillRect(hpX + 2, hpY + 2, (hpW - 4) * (player.hp / player.maxHp), hpH - 4);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('HP', hpX + 4, hpY - 2);
    // パワーゲージ（次の変身まで）
    const pwY = hpY + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, pwY, hpW, hpH);
    const pg = ctx.createLinearGradient(hpX, pwY, hpX + hpW, pwY);
    pg.addColorStop(0, '#ffee40');
    pg.addColorStop(1, '#ff8020');
    ctx.fillStyle = pg;
    const nextCost = player.transform < TRANSFORM_MAX ? TRANSFORM_COST[player.transform] : 1;
    const pwPct = Math.min(1, player.power / nextCost);
    ctx.fillRect(hpX + 2, pwY + 2, (hpW - 4) * pwPct, hpH - 4);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(hpX, pwY, hpW, hpH);
    ctx.fillStyle = '#fff';
    const pwLabel = player.transform < TRANSFORM_MAX
      ? `POWER → ${TRANSFORM_NAMES[player.transform + 1]}`
      : 'POWER MAX';
    ctx.fillText(pwLabel, hpX + 4, pwY - 2);

    // 気ゲージ（かめはめ波）
    const kiY = pwY + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hpX, kiY, hpW, hpH);
    const kiFull = player.kiGauge >= player.kiGaugeMax;
    const kig = ctx.createLinearGradient(hpX, kiY, hpX + hpW, kiY);
    if (kiFull) {
      // MAX は点滅グラデ
      const t = Math.sin(Date.now() * 0.008);
      kig.addColorStop(0, `rgba(180,${200 + t * 50},255,1)`);
      kig.addColorStop(1, '#ffffff');
    } else {
      kig.addColorStop(0, '#40a0ff');
      kig.addColorStop(1, '#80d0ff');
    }
    ctx.fillStyle = kig;
    const kiPct = Math.min(1, player.kiGauge / player.kiGaugeMax);
    ctx.fillRect(hpX + 2, kiY + 2, (hpW - 4) * kiPct, hpH - 4);
    ctx.strokeStyle = kiFull ? '#ffee80' : '#fff';
    ctx.lineWidth = kiFull ? 2 : 1;
    ctx.strokeRect(hpX, kiY, hpW, hpH);
    ctx.lineWidth = 1;
    ctx.fillStyle = '#fff';
    ctx.fillText(kiFull ? '気 MAX！必殺技OK' : '気（かめはめ波）', hpX + 4, kiY - 2);

    // スコア
    ctx.textAlign = 'right';
    ctx.font = 'bold 15px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText('SCORE: ' + totalScore.toLocaleString(), W - 12, 30);
    ctx.fillStyle = '#ffee40';
    ctx.fillText('SCORE: ' + totalScore.toLocaleString(), W - 12, 30);
    // キル数（スコアの下）
    ctx.fillStyle = '#fff';
    ctx.strokeText('KILLS: ' + player.kills, W - 12, 50);
    ctx.fillText('KILLS: ' + player.kills, W - 12, 50);
    // コンボ表示（右上に小さく）
    if (comboCount >= 3) {
      const t = Math.min(1, comboTimer / 90);
      ctx.save();
      ctx.globalAlpha = t;
      ctx.textAlign = 'right';
      ctx.font = 'bold 18px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      const hue = (comboCount * 10) % 360;
      const txt = `${comboCount} COMBO`;
      ctx.strokeText(txt, W - 12, 72);
      ctx.fillStyle = `hsl(${hue},100%,70%)`;
      ctx.fillText(txt, W - 12, 72);
      ctx.restore();
    }
    // 変身状態（コンボの下）
    if (player.transform >= 1) {
      ctx.textAlign = 'right';
      ctx.font = 'bold 13px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      const label = TRANSFORM_NAMES[player.transform];
      const ty = (comboCount >= 3) ? 94 : 72;  // コンボ表示中は下に、なければコンボ位置に
      ctx.strokeText(label, W - 12, ty);
      ctx.fillStyle = auraColorFor(player.transform);
      ctx.fillText(label, W - 12, ty);
    }
    ctx.restore();

    // ボスHPバー（上部中央）
    if (boss && !boss.dead) {
      const bw = W * 0.5;
      const bx = (W - bw) / 2;
      const by = 16;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bx, by, bw, 18);
      const bg = ctx.createLinearGradient(bx, by, bx + bw, by);
      bg.addColorStop(0, '#ff4040');
      bg.addColorStop(1, '#a01010');
      ctx.fillStyle = bg;
      ctx.fillRect(bx + 2, by + 2, (bw - 4) * (boss.hp / boss.maxHp), 14);
      ctx.strokeStyle = '#ffa050';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bw, 18);
      ctx.textAlign = 'center';
      ctx.font = 'bold 13px sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = '#000';
      ctx.strokeText(boss.name, W/2, by + 13);
      ctx.fillStyle = '#fff';
      ctx.fillText(boss.name, W/2, by + 13);
      ctx.restore();
    }
  }

  function drawBanner() {
    if (!banner) return;
    const t = banner.life / banner.maxLife;
    const alpha = Math.min(1, t * 4, (banner.life > banner.maxLife - 20) ? (banner.maxLife - banner.life) / 20 : 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H/2 - 40, W, 80);
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText(banner.text, W/2, H/2);
    ctx.fillStyle = banner.color || '#ffee40';
    ctx.fillText(banner.text, W/2, H/2);
    ctx.restore();
    banner.life--;
    if (banner.life <= 0) banner = null;
    // サブバナー
    if (bannerSub) {
      const t2 = bannerSub.life / bannerSub.maxLife;
      const alpha2 = Math.min(1, t2 * 4, (bannerSub.life > bannerSub.maxLife - 15) ? (bannerSub.maxLife - bannerSub.life) / 15 : 1);
      ctx.save();
      ctx.globalAlpha = alpha2;
      ctx.textAlign = 'center';
      ctx.font = 'bold 18px sans-serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText(bannerSub.text, W/2, H/2 + 40);
      ctx.fillStyle = bannerSub.color || '#fff';
      ctx.fillText(bannerSub.text, W/2, H/2 + 40);
      ctx.restore();
      bannerSub.life--;
      if (bannerSub.life <= 0) bannerSub = null;
    }
  }

  // ====== メイン更新 ======
  function update() {
    stateTimer++;
    if (state === STATE.PLAYING) {
      updatePlayer();
      updateEnemies();
      updateProjectiles();
      updateEnemyProjectiles();
      updateBoss();
      updateWaves();
      updateParticles();
    } else if (state === STATE.STAGE_CLEAR) {
      updateParticles();
      updateProjectiles();
    } else if (state === STATE.DEAD) {
      updateParticles();
      updateEnemyProjectiles();
    } else if (state === STATE.CLEARED || state === STATE.GAMEOVER) {
      updateParticles();
    }
    // コンボタイマー（キルが止まるとリセット）
    if (state === STATE.PLAYING) {
      if (comboTimer > 0) comboTimer--;
      else comboCount = 0;
    }
  }

  // メインループ
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
