<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>スーパードラゴンボール・咲玖</title>
<style>
  :root { --bg: #101018; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; touch-action: manipulation; }
  #wrap {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    max-width: 960px;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
  #hud { position: absolute; top: 6px; left: 6px; right: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; pointer-events: none; font-size: 13px; }
  #hud .box { background: rgba(0,0,0,0.55); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; }
  #portalBtn { background: linear-gradient(to bottom, #806040, #403020); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #c0a070; text-decoration: none; pointer-events: auto; }
  #portalBtn:active { transform: translateY(1px); opacity: 0.85; }

  /* タッチ／マウス共通の操作UI（PCでも表示） */
  #touchUI { position: absolute; left: 0; right: 0; bottom: 0; top: 0; pointer-events: none; }
  #chargeBtn { position: absolute; right: 20px; bottom: 20px; width: 96px; height: 96px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(128,176,255,0.85), rgba(32,64,160,0.85)); border: 3px solid rgba(96,160,255,0.9); color: #fff; font-weight: bold; font-size: 16px; pointer-events: auto; touch-action: none; text-shadow: 0 1px 0 #000; line-height: 1.1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; opacity: 0.88; }
  #chargeBtn:active { transform: scale(0.94); opacity: 1; }
  #chargeBtn small { font-size: 9px; font-weight: normal; opacity: 0.85; }

  /* 縦持ち警告（スマホのみ） */
  #rotatePrompt {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    font-size: 20px;
    padding: 20px;
    gap: 20px;
  }
  #rotatePrompt .icon {
    font-size: 80px;
    animation: rotateTip 1.6s ease-in-out infinite;
  }
  @keyframes rotateTip {
    0%, 100% { transform: rotate(0); }
    50% { transform: rotate(90deg); }
  }
  /* スマホの縦向き時だけ表示 */
  @media (max-width: 900px) and (orientation: portrait) {
    #rotatePrompt { display: flex; }
    #wrap { visibility: hidden; }
  }
</style>
</head>
<body>
<div id="rotatePrompt">
  <div class="icon">📱</div>
  <div>スマホを<b style="color:#ffee40">横向き</b>にしてね！</div>
  <div style="font-size:14px;opacity:0.8;">横持ち専用のゲームです</div>
</div>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="hud">
    <a id="portalBtn" href="./">🏠</a>
    <div class="box" id="hudStats"></div>
  </div>
  <div id="touchUI">
    <button id="chargeBtn">必殺技<small>かめはめ波</small></button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const hudStats = document.getElementById('hudStats');

  // ====== ゲーム状態 ======
  const STATE = { TITLE: 'title', CHAR_SELECT: 'charSelect', PLAYING: 'playing', STAGE_CLEAR: 'stageClear', CLEARED: 'cleared', GAMEOVER: 'gameover' };
  let state = STATE.TITLE;
  let stateTimer = 0;

  // ====== 入力 ======
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
    if (state === STATE.TITLE && (e.code === 'Space' || e.code === 'Enter')) gotoCharSelect();
    else if (state === STATE.CHAR_SELECT) {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') { selectIdx = (selectIdx + CHARACTERS.length - 1) % CHARACTERS.length; charSelectTapped = selectIdx; }
      else if (e.code === 'ArrowRight' || e.code === 'KeyD') { selectIdx = (selectIdx + 1) % CHARACTERS.length; charSelectTapped = selectIdx; }
      else if (e.code === 'Space' || e.code === 'Enter') startGame();
    } else if (state === STATE.GAMEOVER || state === STATE.CLEARED) {
      if (e.code === 'Space' || e.code === 'Enter') state = STATE.TITLE;
    }
    // デバッグ：プレイ中に数字キー0-5で変身段階強制切替
    if (state === STATE.PLAYING) {
      const digit = { Digit0: 0, Digit1: 1, Digit2: 2, Digit3: 3, Digit4: 4, Digit5: 5 }[e.code];
      if (digit !== undefined) {
        player.transform = digit;
        player.power = 0;
        player.invuln = 30;
        if (digit > 0) {
          banner = { text: TRANSFORM_NAMES[digit] + '（デバッグ）', color: auraColorFor(digit), life: 80, maxLife: 80 };
          const auraCol = auraColorFor(digit);
          for (let i = 0; i < 40; i++) {
            const a = (i / 40) * Math.PI * 2;
            const sp = 3 + Math.random() * 3;
            spawnParticle(player.x, player.y, {
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              life: 60, color: auraCol, size: 3,
            });
          }
          sfxTransform();
        }
      }
      // K で気ゲージMAX
      if (e.code === 'KeyK') player.kiGauge = player.kiGaugeMax;
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  const chargeBtn = document.getElementById('chargeBtn');
  let stickVec = { x: 0, y: 0 };  // キーボード互換用（使わない）
  let fireHeld = false;
  let chargeHeld = false;

  // 画面ドラッグでプレイヤー移動（相対ドラッグ方式・マルチタッチ対応）
  let dragActive = false;
  let dragTouchId = null;  // 追跡中の指のID（マルチタッチ対応）
  let dragStart = { x: 0, y: 0 };
  let dragStartPlayer = { x: 0, y: 0 };

  function canvasPosFromClient(cx, cy) {
    const rect = cv.getBoundingClientRect();
    return {
      x: (cx - rect.left) * (W / rect.width),
      y: (cy - rect.top) * (H / rect.height),
    };
  }
  function dragStartHandler(e, touch) {
    if (state !== STATE.PLAYING) return;
    if (dragActive) return;
    let cx, cy, id;
    if (touch) { cx = touch.clientX; cy = touch.clientY; id = touch.identifier; }
    else { cx = e.clientX; cy = e.clientY; id = 'mouse'; }
    const pos = canvasPosFromClient(cx, cy);
    dragActive = true;
    dragTouchId = id;
    dragStart.x = pos.x; dragStart.y = pos.y;
    dragStartPlayer.x = player.x; dragStartPlayer.y = player.y;
  }
  function dragMoveHandler(e, touch) {
    if (!dragActive) return;
    if (state !== STATE.PLAYING) { dragActive = false; dragTouchId = null; return; }
    let cx, cy;
    if (touch) { cx = touch.clientX; cy = touch.clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    const pos = canvasPosFromClient(cx, cy);
    const dx = pos.x - dragStart.x;
    const dy = pos.y - dragStart.y;
    player.x = dragStartPlayer.x + dx;
    player.y = dragStartPlayer.y + dy;
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(H * 0.35, Math.min(H - player.r - 20, player.y));
  }
  function dragEndHandler() {
    dragActive = false;
    dragTouchId = null;
  }
  cv.addEventListener('touchstart', e => {
    if (dragTouchId !== null) return;
    const t = e.changedTouches[0];
    dragStartHandler(e, t);
  }, { passive: true });
  cv.addEventListener('touchmove', e => {
    // 追跡中の指だけ拾う
    if (dragTouchId === null || dragTouchId === 'mouse') return;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].identifier === dragTouchId) {
        dragMoveHandler(e, e.touches[i]);
        e.preventDefault();
        return;
      }
    }
  }, { passive: false });
  cv.addEventListener('touchend', e => {
    if (dragTouchId === null || dragTouchId === 'mouse') return;
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === dragTouchId) {
        dragEndHandler();
        return;
      }
    }
  });
  cv.addEventListener('touchcancel', () => dragEndHandler());
  cv.addEventListener('mousedown', e => { dragStartHandler(e); });
  window.addEventListener('mousemove', e => { if (dragTouchId === 'mouse') dragMoveHandler(e); });
  window.addEventListener('mouseup', () => { if (dragTouchId === 'mouse') dragEndHandler(); });

  // ため撃ちボタン
  chargeBtn.addEventListener('touchstart', e => { chargeHeld = true; e.preventDefault(); }, { passive: false });
  chargeBtn.addEventListener('touchend', e => { chargeHeld = false; e.preventDefault(); }, { passive: false });
  chargeBtn.addEventListener('touchcancel', () => { chargeHeld = false; });
  chargeBtn.addEventListener('mousedown', e => { chargeHeld = true; });
  chargeBtn.addEventListener('mouseup', e => { chargeHeld = false; });

  // タッチ／クリック：タイトル・キャラ選択・ゲームオーバー時の操作
  function getCanvasPos(e) {
    const rect = cv.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return {
      x: (t.clientX - rect.left) * (W / rect.width),
      y: (t.clientY - rect.top) * (H / rect.height),
    };
  }
  function handleCanvasTap(e) {
    ensureAudio();
    if (state === STATE.TITLE) { gotoCharSelect(); return; }
    if (state === STATE.CHAR_SELECT) {
      const pos = getCanvasPos(e);
      // キャラカードの当たり判定：1タップで即スタート
      const cardW = 260, cardH = 320, gap = 60;
      const totalW = cardW * CHARACTERS.length + gap * (CHARACTERS.length - 1);
      const startX = (W - totalW) / 2;
      for (let i = 0; i < CHARACTERS.length; i++) {
        const cx = startX + i * (cardW + gap);
        const cy = 120;
        if (pos.x >= cx && pos.x <= cx + cardW && pos.y >= cy && pos.y <= cy + cardH) {
          selectIdx = i;
          charSelectTapped = i;
          startGame();
          return;
        }
      }
      return;
    }
    if (state === STATE.GAMEOVER || state === STATE.CLEARED) { state = STATE.TITLE; return; }
  }
  let charSelectTapped = null;  // タップ選択状態
  cv.addEventListener('click', handleCanvasTap);
  cv.addEventListener('touchend', e => { handleCanvasTap(e); e.preventDefault(); }, { passive: false });

  // ====== 音（Web Audio API） ======
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol) {
    try {
      ensureAudio(); if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  function sfxShoot() { beep(740, 0.08, 'square', 0.08); setTimeout(()=>beep(420, 0.06, 'square', 0.06), 30); }
  function sfxHit() { beep(180, 0.08, 'sawtooth', 0.12); }
  function sfxExplode() { beep(90, 0.3, 'sawtooth', 0.18); setTimeout(()=>beep(60, 0.2, 'sawtooth', 0.12), 50); }
  function sfxTransform() {
    ensureAudio(); if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [440, 659, 880, 1319].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(f, now + i * 0.12);
      g.gain.setValueAtTime(0.001, now + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.2, now + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.6);
      o.connect(g).connect(audioCtx.destination);
      o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.65);
    });
  }
  function sfxBoss() {
    ensureAudio(); if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(90, now);
    o.frequency.exponentialRampToValueAtTime(60, now + 0.8);
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    o.connect(g).connect(audioCtx.destination);
    o.start(now); o.stop(now + 1.0);
  }

  // ====== キャラクター定義 ======
  const CHARACTERS = [
    {
      id: 'saku', name: 'さく',
      hp: 10, speed: 3.4, atkDmg: 1, atkRate: 14,
      hairCol: '#1a1008', skinCol: '#ffddbb',
      shirtCol: '#ff6030', pantsCol: '#204080',
      desc: 'バランス型・火力UP',
    },
    {
      id: 'kurumi', name: 'くるみ',
      hp: 8, speed: 4.2, atkDmg: 1, atkRate: 10,
      hairCol: '#9a5a2a', skinCol: '#ffddbb',
      shirtCol: '#ffffff', pantsCol: '#ff80b0',
      desc: 'スピード型・連射UP',
    },
  ];
  let selectIdx = 0;

  // ====== プレイヤー ======
  const TRANSFORM_NAMES = ['ノーマル', '界王拳', 'スーパーサイヤ人', '超サイヤ人2', '超サイヤ人3', '超サイヤ人4'];
  const TRANSFORM_MAX = 5;
  // 各ティアに必要な power（累積ではなく各ティアごとリセット）
  const TRANSFORM_COST = [25, 35, 50, 65, 80];

  // ====== ステージ構成 ======
  const STAGES_CONFIG = [
    {
      num: 1, name: '地球',
      bossType: 'piccolo', bossName: 'ピッコロとーと',
      bossHp: 55, bossColor: '#68b868', beamColor: '#a0f080',
      triggerKills: 30,
      transformUnlock: 0,
      // 地球：青空と緑の地平線
      bgPalette: { top: '#88c8f0', mid: '#50a8e0', bot: '#3a7a40' },
      bgStyle: 'earth',
      eventText: 'ピッコロとーと、待ち構える！',
    },
    {
      num: 2, name: '荒野',
      bossType: 'vegeta', bossName: 'ベジとーと',
      bossHp: 75, bossColor: '#d0a080', beamColor: '#ff80ff',
      triggerKills: 40,
      transformUnlock: 1,
      // 荒野：茜空と砂塵
      bgPalette: { top: '#e8a050', mid: '#c87030', bot: '#8a5028' },
      bgStyle: 'wasteland',
      preludeLines: [
        'ベジとーと：「フン…この程度か」',
        'さく：「くっ…もっと力が…！」',
      ],
      eventText: '覚醒…界王拳！',
      eventFlavor: '闘いの熱で さくの内なる力が目覚める',
    },
    {
      num: 3, name: 'ナメック星',
      bossType: 'freezer', bossName: 'フリーザとーと',
      bossHp: 100, bossColor: '#e8e8f8', beamColor: '#c080ff',
      triggerKills: 50,
      transformUnlock: 2,
      // ナメック星：緑の空と青い水
      bgPalette: { top: '#a0e060', mid: '#70c060', bot: '#3088a8' },
      bgStyle: 'namek',
      preludeLines: [
        'フリーザとーと：「クソムシどもが…消えろ」',
        'さく：「…許さない…！」',
        'さく：「許さないぞォォォッ！！」',
      ],
      eventText: '怒り爆発…スーパーサイヤ人！',
      eventFlavor: '仲間の危機が 伝説の力を呼び覚ます',
    },
    {
      num: 4, name: '地球（夕景）',
      bossType: 'cell', bossName: 'セルとーと',
      bossHp: 130, bossColor: '#80b060', beamColor: '#60ffa0',
      triggerKills: 60,
      transformUnlock: 3,
      // 地球（夕焼け）：オレンジ→紫
      bgPalette: { top: '#ff9060', mid: '#d04080', bot: '#3a2850' },
      bgStyle: 'earth-sunset',
      preludeLines: [
        'セルとーと：「さあ…完全体を見せてやろう」',
        'さく：「（ぐっ…押されてる…）」',
        'さく：「…限界？そんなもの、越えてやる…！」',
      ],
      eventText: '超越…超サイヤ人2！',
      eventFlavor: '雷鳴とともに 新たな境地へ',
    },
    {
      num: 5, name: '界王神界',
      bossType: 'buu', bossName: '魔神とーと',
      bossHp: 180, bossColor: '#ff80b0', beamColor: '#ffb0d8',
      triggerKills: 70,
      transformUnlock: 4,
      // 界王神界：ピンク空と黄金の雲、神秘的な紫
      bgPalette: { top: '#ffccea', mid: '#ffd890', bot: '#c890d8' },
      bgStyle: 'kaio',
      preludeLines: [
        '魔神とーと：「フォッフォッフォ…オイシソウ…」',
        'さく：「……もう失うものは、何もない」',
        'さく：「この一撃に…全てを懸ける！！」',
      ],
      eventText: '限界突破…超サイヤ人3！',
      eventFlavor: '宇宙を揺るがす 究極の気',
    },
  ];
  let currentStageIdx = 0;
  const player = {
    x: W/2, y: H - 100, r: 14, facing: 1, hp: 10, maxHp: 10,
    vx: 0, vy: 0, speed: 3, atkRate: 14, atkDmg: 1,
    shotCD: 0, invuln: 0,
    transform: 0,  // 0: ノーマル, 1: 界王拳, 2: SSJ, 3: SSJ2, 4: SSJ3, 5: SSJ4
    power: 0,
    kiGauge: 0, kiGaugeMax: 100,  // 必殺技ゲージ
    ultActive: null,  // { timer } ... かめはめ波発動中
    kills: 0,
    charId: 'saku',
    hairCol: '#1a1008', skinCol: '#ffddbb',
    shirtCol: '#ff6030', pantsCol: '#204080',
    anim: 0,
  };
  function resetPlayer(char) {
    player.charId = char.id;
    player.maxHp = char.hp; player.hp = char.hp;
    player.speed = char.speed;
    player.atkRate = char.atkRate;
    player.atkDmg = char.atkDmg;
    player.hairCol = char.hairCol;
    player.skinCol = char.skinCol;
    player.shirtCol = char.shirtCol;
    player.pantsCol = char.pantsCol;
    player.x = W/2; player.y = H - 100;
    player.vx = 0; player.vy = 0;
    player.facing = 1;
    player.shotCD = 0; player.invuln = 0;
    player.transform = 0; player.power = 0; player.kills = 0;
    player.kiGauge = 0; player.ultActive = null;
    player.anim = 0;
  }

  // ====== エンティティ管理 ======
  let enemies = [];
  let projectiles = [];
  let enemyProjectiles = [];
  let particles = [];
  let boss = null;
  let popups = [];
  let banner = null;
  let bannerSub = null;  // サブバナー（フレーバーテキスト）
  let currentBgPalette = { top: '#040012', mid: '#100828', bot: '#20104a' };
  let cameraShake = 0;

  function addShake(v) { cameraShake = Math.max(cameraShake, v); }

  function spawnParticle(x, y, opts) {
    particles.push({
      x, y,
      vx: (opts.vx != null) ? opts.vx : (Math.random() - 0.5) * 4,
      vy: (opts.vy != null) ? opts.vy : (Math.random() - 0.5) * 4,
      life: opts.life || 30, maxLife: opts.life || 30,
      color: opts.color || '#fff', size: opts.size || 3,
      gravity: opts.gravity || 0,
    });
  }

  function spawnExplosion(x, y, color, count) {
    count = count || 18;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2 + Math.random() * 4;
      spawnParticle(x, y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 30 + Math.random() * 20,
        color: color || ['#ffcc40','#ff8020','#ffee80'][Math.floor(Math.random()*3)],
        size: 2 + Math.random() * 2,
      });
    }
  }

  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color: color || '#fff', life: 40, maxLife: 40 });
  }

  // ====== 敵 ======
  const ENEMY_TYPES = {
    saibai: {  // サイバイマン風・緑の小型兵
      hp: 1, speed: 1.4, r: 13, dmg: 1, color: '#4ca040', coreCol: '#2a6020', score: 100,
    },
    namek: {  // 兵士風・大型
      hp: 1, speed: 1.0, r: 16, dmg: 1, color: '#8ad090', coreCol: '#406028', score: 250,
    },
    freezer: {  // 兵長・赤い
      hp: 1, speed: 1.6, r: 14, dmg: 2, color: '#e04040', coreCol: '#702020', score: 400, shooter: true,
    },
  };

  function spawnEnemy(type) {
    const t = ENEMY_TYPES[type];
    // 画面上端から降ってくる（縦スクロールシューティング）
    const x = 40 + Math.random() * (W - 80);
    const y = -30 - Math.random() * 40;
    // 横方向の揺れパターン：0=直進, 1=正弦波, 2=プレイヤーに寄る
    const pattern = t.shooter ? 2 : Math.floor(Math.random() * 3);
    enemies.push({
      type, x, y, r: t.r, hp: t.hp, maxHp: t.hp, speed: t.speed,
      dmg: t.dmg, color: t.color, coreCol: t.coreCol, score: t.score,
      shooter: !!t.shooter, shotCD: 60 + Math.random() * 60,
      anim: Math.random() * Math.PI * 2, hurtTimer: 0, dead: false,
      pattern, baseX: x, patternT: 0,
    });
  }

  // ====== ボス（ピッコロとーと） ======
  function spawnBoss() {
    const stg = STAGES_CONFIG[currentStageIdx];
    boss = {
      type: stg.bossType, name: stg.bossName,
      x: W/2, y: 80, r: 28,
      hp: stg.bossHp, maxHp: stg.bossHp,
      vx: 0, vy: 0, speed: 1.8 + currentStageIdx * 0.15,
      dmg: 2 + Math.floor(currentStageIdx * 0.5),
      attackCD: 100, phase: 0, anim: 0, hurtTimer: 0, dead: false,
      beamCharging: 0, beamFiring: 0, beamAngle: 0,
      color: stg.bossColor, beamColor: stg.beamColor,
      engaged: true,
      // セル専用：瞬間移動クールダウン
      teleportCD: 200,
      // 魔神ブウ専用：ホーミング弾CD
      homingCD: 180,
    };
    banner = { text: stg.bossName + ' 降臨！', color: stg.bossColor, life: 140, maxLife: 140 };
    sfxBoss(); addShake(16);
  }

  // ====== ゲームループ ======
  function gotoCharSelect() {
    ensureAudio();
    state = STATE.CHAR_SELECT;
    stateTimer = 0;
    charSelectTapped = null;
    beep(880, 0.1, 'triangle', 0.14);
  }

  function startGame() {
    ensureAudio();
    resetPlayer(CHARACTERS[selectIdx]);
    currentStageIdx = 0;
    startStage();
    // デバッグ：URL ?transform=N で開始変身段階指定（0-5）
    const params = new URLSearchParams(window.location.search);
    const tInit = parseInt(params.get('transform'));
    if (!isNaN(tInit) && tInit >= 0 && tInit <= TRANSFORM_MAX) {
      player.transform = tInit;
      banner = { text: TRANSFORM_NAMES[tInit] + '（デバッグ）', color: auraColorFor(tInit), life: 140, maxLife: 140 };
    }
    if (params.get('maxki') === '1') player.kiGauge = player.kiGaugeMax;
    // デバッグ：?stage=N で任意のステージから開始（1〜5）
    const stageParam = parseInt(params.get('stage'));
    if (!isNaN(stageParam) && stageParam >= 1 && stageParam <= STAGES_CONFIG.length) {
      currentStageIdx = stageParam - 1;
      startStage();
    }
  }

  function startStage() {
    const stg = STAGES_CONFIG[currentStageIdx];
    enemies = []; projectiles = []; enemyProjectiles = []; particles = []; popups = [];
    boss = null; banner = null;
    // プレイヤー位置リセット（HPは引継ぎ）
    player.x = W/2; player.y = H - 100;
    player.vx = 0; player.vy = 0;
    player.invuln = 60;
    player.kiGauge = Math.min(player.kiGaugeMax, player.kiGauge + 30);  // 新ステージで少し回復
    if (currentStageIdx > 0) {
      // ステージ間で HP を最大値まで 60% 回復
      const healAmt = Math.ceil(player.maxHp * 0.6);
      player.hp = Math.min(player.maxHp, player.hp + healAmt);
    }
    waveState = { waveIdx: 0, spawnTimer: 30, inWave: false, bossSpawned: false, bossTriggerKills: stg.triggerKills };
    player.kills = 0;  // ステージごとキルカウントリセット
    state = STATE.PLAYING;
    stateTimer = 0;
    // 背景パレット更新
    currentBgPalette = stg.bgPalette;
    // イントロバナー
    banner = { text: `STAGE ${stg.num} - ${stg.name}`, color: '#ffee40', life: 160, maxLife: 160 };
    beep(660, 0.1, 'square', 0.14);
    setTimeout(() => beep(990, 0.12, 'square', 0.1), 120);
    // 変身イベント（ステージ2以降、未到達の変身を強制解放）
    if (stg.transformUnlock > 0 && player.transform < stg.transformUnlock) {
      // 前置きセリフを順番に表示
      const lines = stg.preludeLines || [];
      const lineDur = 1500;
      let t = 1800;  // ステージ名バナー終了後
      lines.forEach((line, i) => {
        setTimeout(() => {
          if (state !== STATE.PLAYING) return;
          banner = { text: line, color: i === lines.length - 1 ? '#ffa040' : '#ffffff', life: 90, maxLife: 90 };
          beep(500 + i * 80, 0.08, 'triangle', 0.1);
        }, t);
        t += lineDur;
      });
      // 最後のセリフ後に変身
      setTimeout(() => {
        if (state === STATE.PLAYING) {
          triggerScriptedTransform(stg.transformUnlock, stg.eventText, stg.eventFlavor);
        }
      }, t + 200);
    }
  }

  function triggerScriptedTransform(toLevel, eventText, flavor) {
    player.transform = toLevel;
    player.power = 0;
    player.invuln = 60;
    const auraCol = auraColorFor(toLevel);
    banner = { text: eventText, color: auraCol, life: 180, maxLife: 180 };
    if (flavor) {
      setTimeout(() => {
        bannerSub = { text: flavor, color: '#fff', life: 140, maxLife: 140 };
      }, 400);
    }
    sfxTransform();
    addShake(24);
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * Math.PI * 2;
      const sp = 3 + Math.random() * 4;
      spawnParticle(player.x, player.y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 80, color: auraCol, size: 3,
      });
    }
  }

  function nextStage() {
    currentStageIdx++;
    if (currentStageIdx >= STAGES_CONFIG.length) {
      // 全ステージクリア
      state = STATE.CLEARED;
      stateTimer = 0;
      banner = { text: 'すべてのとーとを倒した！', color: '#ffee40', life: 240, maxLife: 240 };
      return;
    }
    startStage();
  }

  // ====== 敵ウェーブ管理 ======
  let waveState = null;
  const WAVES = [
    { saibai: 14, spawnInterval: 30 },
    { saibai: 20, namek: 4, spawnInterval: 25 },
    { saibai: 24, namek: 10, freezer: 2, spawnInterval: 22 },
    { saibai: 30, namek: 14, freezer: 4, spawnInterval: 18 },
    { saibai: 36, namek: 18, freezer: 6, spawnInterval: 15 },
  ];

  function updateWaves() {
    if (boss) return;
    if (waveState.bossSpawned) return;
    if (player.kills >= waveState.bossTriggerKills) {
      waveState.bossSpawned = true;
      // 場の雑魚は消さない（でも以降は湧きを止める）
      setTimeout(() => { spawnBoss(); }, 500);
      return;
    }
    waveState.spawnTimer--;
    if (waveState.spawnTimer <= 0) {
      if (!waveState.inWave) {
        // 次のウェーブ開始
        waveState.inWave = true;
        const w = WAVES[Math.min(waveState.waveIdx, WAVES.length - 1)];
        waveState.currentWave = { ...w };
        waveState.spawnTimer = w.spawnInterval;
      } else {
        const w = waveState.currentWave;
        // 残敵タイプからランダムにスポーン
        const types = [];
        for (const k in w) { if (k !== 'spawnInterval' && w[k] > 0) types.push(k); }
        if (types.length === 0) {
          // ウェーブ終了、次へ
          waveState.inWave = false;
          waveState.spawnTimer = 90;
          waveState.waveIdx++;
          return;
        }
        const t = types[Math.floor(Math.random() * types.length)];
        spawnEnemy(t);
        w[t]--;
        waveState.spawnTimer = w.spawnInterval;
      }
    }
  }

  // ====== プレイヤー更新 ======
  function updatePlayer() {
    if (player.invuln > 0) player.invuln--;
    player.anim += 0.2;

    // 移動
    let mx = 0, my = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) mx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) my -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) my += 1;
    if (stickVec.x !== 0 || stickVec.y !== 0) { mx = stickVec.x; my = stickVec.y; }
    const mag = Math.hypot(mx, my);
    if (mag > 1) { mx /= mag; my /= mag; }

    const speedBoost = 1 + player.transform * 0.15;
    const actualSpeed = player.speed * speedBoost;
    player.x += mx * actualSpeed;
    player.y += my * actualSpeed;
    // 縦スクロール：プレイヤーは画面の下半分＋αの範囲で移動
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(H * 0.35, Math.min(H - player.r - 20, player.y));
    if (mx !== 0) player.facing = mx > 0 ? 1 : -1;
    player.moving = mag > 0.1;

    // 自動連射：変身段階で発射間隔UP
    if (player.shotCD > 0) player.shotCD--;
    if (player.shotCD <= 0 && !player.ultActive) {
      // 発射間隔：各ティアで -4F（Kaioken 以降は段階的に速く）
      const atkRate = Math.max(6, player.atkRate - player.transform * 4);
      player.shotCD = atkRate;
      spawnKiBlast();
      // 音は連射で 1/2 に間引き
      player.shotSoundTick = (player.shotSoundTick || 0) + 1;
      if (player.shotSoundTick % 2 === 0) sfxShoot();
    }

    // 必殺技ゲージ：時間経過で蓄積
    if (!player.ultActive) {
      player.kiGauge = Math.min(player.kiGaugeMax, player.kiGauge + 0.18);
    }

    // 必殺技発動：Z / Shift / Space / 必殺技ボタン
    const ultKey = keys['KeyZ'] || keys['ShiftLeft'] || keys['Space'] || chargeHeld || fireHeld;
    if (ultKey && player.kiGauge >= player.kiGaugeMax && !player.ultActive) {
      fireKamehameha();
    }

    // 必殺技発動中の更新
    if (player.ultActive) {
      updateKamehameha();
    }
  }

  function spawnKiBlast() {
    // 縦スクロール：真上に直進（全弾まっすぐ）
    const sp = 10;
    const dmg = player.atkDmg + Math.floor(player.transform * 0.6);
    const r = 5;
    // 弾数：ノーマル〜SSJ は 1発、SSJ2 で 2発、SSJ3 で 3発、SSJ4 で 4発
    // transform: 0=ノーマル, 1=Kaioken, 2=SSJ, 3=SSJ2, 4=SSJ3, 5=SSJ4
    let shots;
    if (player.transform <= 2) shots = 1;
    else shots = player.transform - 1;
    const spacing = 11;
    for (let i = 0; i < shots; i++) {
      const offset = (i - (shots - 1) / 2) * spacing;
      projectiles.push({
        x: player.x + offset,
        y: player.y - player.r,
        vx: 0,
        vy: -sp,
        life: 90, dmg, r,
        transform: player.transform,
      });
    }
  }

  function damagePlayer(dmg) {
    if (player.invuln > 0) return;
    player.hp -= dmg;
    player.invuln = 60;
    addShake(10);
    sfxHit();
    if (player.hp <= 0) {
      player.hp = 0;
      state = STATE.GAMEOVER;
      stateTimer = 0;
      spawnExplosion(player.x, player.y, '#ffcc40', 40);
      sfxExplode();
    }
  }

  function gainPower(amount) {
    if (player.transform >= TRANSFORM_MAX) return;
    player.power += amount;
    const needed = TRANSFORM_COST[player.transform];
    if (player.power >= needed) {
      triggerTransform();
    }
  }

  function triggerTransform() {
    player.transform = Math.min(TRANSFORM_MAX, player.transform + 1);
    player.power = 0;
    player.invuln = 40;
    const name = TRANSFORM_NAMES[player.transform];
    banner = { text: name + ' 覚醒！', color: auraColorFor(player.transform), life: 140, maxLife: 140 };
    sfxTransform();
    addShake(22);
    // オーラ爆発
    const auraCol = auraColorFor(player.transform);
    for (let i = 0; i < 50; i++) {
      const a = (i / 50) * Math.PI * 2;
      const sp = 3 + Math.random() * 4;
      spawnParticle(player.x, player.y, {
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 70, color: auraCol, size: 3,
      });
    }
  }

  function auraColorFor(t) {
    // 0:ノーマル, 1:界王拳(赤), 2:SSJ(金), 3:SSJ2(金+青電), 4:SSJ3(金), 5:SSJ4(赤)
    switch (t) {
      case 1: return '#ff4040';  // 赤（界王拳）
      case 2: return '#ffee40';  // 金（SSJ）
      case 3: return '#ffff80';  // 金＋青白い稲妻のベース
      case 4: return '#ffdc20';  // 金（SSJ3）
      case 5: return '#ff6010';  // 赤（SSJ4）
      default: return '#ffffff';
    }
  }

  // ====== 必殺技：かめはめ波 ======
  function fireKamehameha() {
    player.kiGauge = 0;
    player.ultActive = { timer: 70, phase: 'charge', enemiesHit: new Set() };
    banner = { text: 'かめはめ波ーっ！', color: '#80d0ff', life: 80, maxLife: 80 };
    addShake(18);
    ensureAudio();
    if (audioCtx) {
      const now = audioCtx.currentTime;
      // チャージ音
      const o1 = audioCtx.createOscillator();
      const g1 = audioCtx.createGain();
      o1.type = 'sine';
      o1.frequency.setValueAtTime(220, now);
      o1.frequency.exponentialRampToValueAtTime(880, now + 0.7);
      g1.gain.setValueAtTime(0.001, now);
      g1.gain.exponentialRampToValueAtTime(0.25, now + 0.6);
      g1.gain.exponentialRampToValueAtTime(0.001, now + 0.75);
      o1.connect(g1).connect(audioCtx.destination);
      o1.start(now); o1.stop(now + 0.8);
      // 発射音
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sawtooth';
      o2.frequency.setValueAtTime(1200, now + 0.7);
      o2.frequency.exponentialRampToValueAtTime(300, now + 1.8);
      g2.gain.setValueAtTime(0.001, now + 0.7);
      g2.gain.exponentialRampToValueAtTime(0.3, now + 0.75);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 1.9);
      o2.connect(g2).connect(audioCtx.destination);
      o2.start(now + 0.7); o2.stop(now + 2);
    }
  }

  function updateKamehameha() {
    const u = player.ultActive;
    u.timer--;
    // phase: 0-30F → charge, 30-70F → fire
    if (u.timer > 40) { u.phase = 'charge'; }
    else { u.phase = 'fire'; }
    if (u.phase === 'fire') {
      // 当たり判定：プレイヤーの x を中心とした縦の帯
      const bw = 60;  // ビーム幅
      const bx1 = player.x - bw/2;
      const bx2 = player.x + bw/2;
      // 敵：範囲内なら即死
      for (const e of enemies) {
        if (e.dead) continue;
        if (e.x + e.r > bx1 && e.x - e.r < bx2 && e.y < player.y) {
          e.dead = true;
          spawnExplosion(e.x, e.y, e.color, 18);
          addPopup(e.x, e.y, '+' + e.score, '#80d0ff');
          player.kills++;
          gainPower(e.score / 40);
        }
      }
      // ボス：範囲内なら1F毎にダメージ
      if (boss && !boss.dead) {
        if (boss.x + boss.r > bx1 && boss.x - boss.r < bx2) {
          boss.hp -= 0.6;  // 40Fで24ダメージ
          boss.hurtTimer = 5;
          if (boss.hp <= 0) {
            boss.dead = true;
            spawnExplosion(boss.x, boss.y, '#80ff80', 60);
            const isLast = (currentStageIdx >= STAGES_CONFIG.length - 1);
            banner = { text: (boss.name || 'とーと') + ' 撃破！', color: '#80ff80', life: 180, maxLife: 180 };
            addShake(25);
            sfxExplode();
            if (isLast) {
              state = STATE.CLEARED;
              stateTimer = 0;
            } else {
              state = STATE.STAGE_CLEAR;
              stateTimer = 0;
              setTimeout(() => {
                if (state === STATE.STAGE_CLEAR) nextStage();
              }, 3000);
            }
          }
        }
      }
      // 敵弾を消去
      enemyProjectiles = enemyProjectiles.filter(p => !(p.x > bx1 && p.x < bx2 && p.y < player.y));
    }
    if (u.timer <= 0) player.ultActive = null;
  }

  // ====== 敵更新 ======
  function updateEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      e.anim += 0.1;
      e.patternT += 0.035;
      if (e.hurtTimer > 0) e.hurtTimer--;
      // 縦スクロール：基本は下方向に降ってくる
      const descend = e.speed;
      e.y += descend;
      // 横方向のパターン
      if (e.pattern === 0) {
        // 直進
      } else if (e.pattern === 1) {
        // 正弦波で揺れる
        e.x = e.baseX + Math.sin(e.patternT * 2) * 60;
      } else if (e.pattern === 2) {
        // 緩やかにプレイヤーのx座標に寄る
        const dx = player.x - e.x;
        e.x += Math.sign(dx) * Math.min(Math.abs(dx), 0.6);
      }
      // シュート持ち（フリーザ兵）：画面上部1/3に留まって撃ってくる
      if (e.shooter) {
        if (e.y > H * 0.4) {
          // 一度下がりすぎたら登らないが、減速
          e.y -= descend * 0.8;
        }
        e.shotCD--;
        if (e.shotCD <= 0) {
          e.shotCD = 100 + Math.random() * 60;
          // プレイヤーに向けて下に撃つ
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          enemyProjectiles.push({
            x: e.x, y: e.y, vx: (dx / d) * 5, vy: (dy / d) * 5,
            r: 6, life: 180, dmg: e.dmg, color: '#ff80ff',
          });
          beep(220, 0.1, 'sawtooth', 0.08);
        }
      }
      // 画面外（下）に行ったら消滅
      if (e.y > H + 60) {
        e.dead = true;
        // スコアは入らず
      }
      // プレイヤーと接触
      const playerD = Math.hypot(player.x - e.x, player.y - e.y);
      if (playerD < player.r + e.r - 2) {
        damagePlayer(e.dmg);
        // ノックバック（敵を下に押しやる）
        e.y += 8;
      }
    }
    // 自プロジェクタイルとの衝突
    for (const p of projectiles) {
      for (const e of enemies) {
        if (e.dead) continue;
        const d = Math.hypot(p.x - e.x, p.y - e.y);
        if (d < p.r + e.r) {
          e.hp -= p.dmg;
          e.hurtTimer = 15;
          p.life = 0;
          // ヒットスパーク
          for (let i = 0; i < 5; i++) {
            spawnParticle(p.x, p.y, {
              vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
              life: 15, color: '#ffee80', size: 2,
            });
          }
          if (e.hp <= 0) {
            e.dead = true;
            spawnExplosion(e.x, e.y, e.color, 12);
            addPopup(e.x, e.y, '+' + e.score, '#ffee80');
            player.kills++;
            gainPower(e.score / 40);  // スコアに応じてパワーチャージ
            sfxExplode();
          }
          break;
        }
      }
      // ボス衝突
      if (boss && !boss.dead && p.life > 0) {
        const d = Math.hypot(p.x - boss.x, p.y - boss.y);
        if (d < p.r + boss.r) {
          boss.hp -= p.dmg;
          boss.hurtTimer = 15;
          p.life = 0;
          for (let i = 0; i < 6; i++) {
            spawnParticle(p.x, p.y, {
              vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
              life: 18, color: '#ffee80', size: 2.5,
            });
          }
          if (boss.hp <= 0) {
            boss.dead = true;
            spawnExplosion(boss.x, boss.y, boss.color || '#80ff80', 60);
            const isLast = (currentStageIdx >= STAGES_CONFIG.length - 1);
            banner = { text: (boss.name || 'とーと') + ' 撃破！', color: '#80ff80', life: 180, maxLife: 180 };
            addShake(25);
            sfxExplode();
            if (isLast) {
              // 最終ボス撃破 → 全クリア演出
              state = STATE.CLEARED;
              stateTimer = 0;
            } else {
              // 次ステージへ遷移（3秒後）
              state = STATE.STAGE_CLEAR;
              stateTimer = 0;
              setTimeout(() => {
                if (state === STATE.STAGE_CLEAR) {
                  nextStage();
                }
              }, 3000);
            }
          } else {
            addShake(5);
            sfxHit();
          }
        }
      }
    }
    enemies = enemies.filter(e => !e.dead);
    projectiles = projectiles.filter(p => p.life > 0);
  }

  // ====== 敵弾更新 ======
  function updateEnemyProjectiles() {
    for (const p of enemyProjectiles) {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      // プレイヤーに当たる
      const d = Math.hypot(p.x - player.x, p.y - player.y);
      if (d < p.r + player.r - 2 && player.invuln === 0) {
        damagePlayer(p.dmg);
        p.life = 0;
      }
      if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) p.life = 0;
    }
    enemyProjectiles = enemyProjectiles.filter(p => p.life > 0);
  }

  // ====== プロジェクタイル移動 ======
  function updateProjectiles() {
    for (const p of projectiles) {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) p.life = 0;
    }
  }

  // ====== ボス更新 ======
  function updateBoss() {
    if (!boss || boss.dead) return;
    boss.anim += 0.1;
    if (boss.hurtTimer > 0) boss.hurtTimer--;
    const enraged = boss.hp / boss.maxHp < 0.4;

    // 移動：画面上部で左右に揺れる（縦スクロールSTG風）
    const spd = enraged ? boss.speed * 1.5 : boss.speed;
    if (boss.beamFiring <= 0 && boss.beamCharging <= 0) {
      // x方向：プレイヤーに緩く寄る＋正弦波で揺れる
      const dx = player.x - boss.x;
      const tx = player.x + Math.sin(boss.anim * 0.6) * 200;
      const diff = tx - boss.x;
      boss.x += Math.sign(diff) * Math.min(Math.abs(diff), spd);
      // y方向：画面上部1/4あたりを目指す
      const targetY = H * 0.18 + Math.sin(boss.anim * 0.3) * 20;
      const ty = targetY - boss.y;
      boss.y += Math.sign(ty) * Math.min(Math.abs(ty), spd * 0.6);
    }
    boss.x = Math.max(boss.r, Math.min(W - boss.r, boss.x));
    boss.y = Math.max(boss.r + 20, Math.min(H * 0.45, boss.y));

    // 攻撃パターン
    boss.attackCD--;
    if (boss.beamCharging > 0) {
      boss.beamCharging--;
      // チャージ中に予告線の角度を先にロック（chargeの最後1/4になる直前）
      if (boss.beamCharging === 30) {
        // ここで角度をロック（プレイヤーはこれ以降の時間で避ける）
        boss.beamAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.beamLocked = true;
      } else if (boss.beamCharging > 30) {
        // ロック前は予告線がプレイヤーを追尾（プレイヤーに見せて警告）
        boss.beamAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.beamLocked = false;
      }
      if (boss.beamCharging === 0) {
        // 本ビーム発射
        boss.beamFiring = 45;
        addShake(8);
        ensureAudio();
        if (audioCtx) {
          const now = audioCtx.currentTime;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(440, now);
          o.frequency.exponentialRampToValueAtTime(110, now + 1.0);
          g.gain.setValueAtTime(0.2, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
          o.connect(g).connect(audioCtx.destination);
          o.start(now); o.stop(now + 1.2);
        }
      }
    } else if (boss.beamFiring > 0) {
      boss.beamFiring--;
      // ビーム当たり判定
      const bx = boss.x, by = boss.y;
      const ang = boss.beamAngle;
      const bendLen = 600;
      const bw = 24;
      // 線分とプレイヤーの最短距離
      const px = player.x - bx, py = player.y - by;
      const t = Math.max(0, Math.min(bendLen, px * Math.cos(ang) + py * Math.sin(ang)));
      const nx = bx + Math.cos(ang) * t;
      const ny = by + Math.sin(ang) * t;
      const dist = Math.hypot(player.x - nx, player.y - ny);
      if (dist < bw/2 + player.r - 4 && player.invuln === 0) {
        damagePlayer(boss.dmg);
      }
    } else if (boss.attackCD <= 0) {
      // 次の攻撃を選ぶ
      const r = Math.random();
      if (r < 0.35 || enraged) {
        // 魔貫光殺砲風ビーム（予告 → 本発射）
        // 激昂時も充分な回避時間を残す
        boss.beamCharging = enraged ? 70 : 110;
        boss.beamLocked = false;
        boss.attackCD = enraged ? 120 : 180;
      } else {
        // 気弾散弾
        const count = enraged ? 5 : 3;
        for (let i = 0; i < count; i++) {
          const baseAng = Math.atan2(player.y - boss.y, player.x - boss.x);
          const ang = baseAng + (i - (count-1)/2) * 0.25;
          enemyProjectiles.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(ang) * 4.5, vy: Math.sin(ang) * 4.5,
            r: 8, life: 160, dmg: boss.dmg, color: '#a0f080',
          });
        }
        boss.attackCD = enraged ? 45 : 70;
        beep(180, 0.12, 'sawtooth', 0.1);
      }
    }

    // プレイヤーと接触
    const pd = Math.hypot(player.x - boss.x, player.y - boss.y);
    if (pd < boss.r + player.r - 4 && player.invuln === 0) {
      damagePlayer(boss.dmg);
    }
  }

  // ====== パーティクル ======
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.vy += p.gravity || 0;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
    for (const pu of popups) {
      pu.life--;
      pu.y -= 0.6;
    }
    popups = popups.filter(p => p.life > 0);
  }

  // ====== 描画 ======
  function draw() {
    // 画面揺れ
    let sx = 0, sy = 0;
    if (cameraShake > 0) {
      sx = (Math.random() - 0.5) * cameraShake;
      sy = (Math.random() - 0.5) * cameraShake;
      cameraShake *= 0.85;
      if (cameraShake < 0.5) cameraShake = 0;
    }
    ctx.save();
    ctx.translate(sx, sy);

    if (state === STATE.TITLE) drawTitle();
    else if (state === STATE.CHAR_SELECT) drawCharSelect();
    else drawGame();

    ctx.restore();
  }

  // スクロール背景用の星データ（3レイヤー）
  const starLayers = [];
  for (let layer = 0; layer < 3; layer++) {
    const speed = 0.6 + layer * 1.2;
    const count = 30 + layer * 20;
    const size = 0.5 + layer * 0.8;
    const brightness = 0.25 + layer * 0.25;
    const stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size, speed, brightness,
      });
    }
    starLayers.push(stars);
  }
  function drawBackground() {
    // 空の深さ（ステージごとに色変わる）
    const pal = currentBgPalette || { top: '#040012', mid: '#100828', bot: '#20104a' };
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, pal.top);
    g.addColorStop(0.5, pal.mid);
    g.addColorStop(1, pal.bot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // スクロール星3レイヤー（遠近感）
    for (const stars of starLayers) {
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
        ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
        ctx.fillRect(s.x, s.y, s.size, s.size * 2);  // 縦に引き伸ばしてスピード感
      }
    }
  }

  // ====== タイトル画面 ======
  function drawTitle() {
    // 背景：深い宇宙
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#200818');
    g.addColorStop(1, '#080020');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // 星
    for (let i = 0; i < 120; i++) {
      const x = (i * 197) % W;
      const y = (i * 131 + 17) % H;
      const b = 0.3 + 0.6 * (Math.sin(stateTimer * 0.05 + i) * 0.5 + 0.5);
      ctx.fillStyle = `rgba(255,255,255,${b})`;
      ctx.fillRect(x, y, i % 4 === 0 ? 2 : 1, i % 4 === 0 ? 2 : 1);
    }
    // 炎のオーラ（タイトル裏）
    const tcx = W/2, tcy = H/2 - 40;
    for (let i = 0; i < 5; i++) {
      const r = 240 + Math.sin(stateTimer * 0.05 + i) * 20;
      const g2 = ctx.createRadialGradient(tcx, tcy, 30, tcx, tcy, r);
      g2.addColorStop(0, 'rgba(255,200,40,0.18)');
      g2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(tcx, tcy, r, 0, Math.PI * 2); ctx.fill();
    }

    // タイトル「スーパードラゴンボール」
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 46px serif';
    ctx.lineWidth = 7; ctx.strokeStyle = '#000';
    ctx.strokeText('スーパードラゴンボール', tcx, tcy - 40);
    const g3 = ctx.createLinearGradient(0, tcy - 60, 0, tcy - 20);
    g3.addColorStop(0, '#ffee60');
    g3.addColorStop(1, '#ff8020');
    ctx.fillStyle = g3;
    ctx.fillText('スーパードラゴンボール', tcx, tcy - 40);
    // サブタイトル「咲玖（さく）」
    ctx.font = 'bold 80px serif';
    ctx.lineWidth = 10; ctx.strokeStyle = '#000';
    ctx.strokeText('咲玖', tcx, tcy + 40);
    const g4 = ctx.createLinearGradient(0, tcy + 10, 0, tcy + 80);
    g4.addColorStop(0, '#ff6020');
    g4.addColorStop(0.5, '#ffc030');
    g4.addColorStop(1, '#ff3000');
    ctx.fillStyle = g4;
    ctx.fillText('咲玖', tcx, tcy + 40);
    // ふりがな
    ctx.font = 'bold 18px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText('さく', tcx, tcy + 94);
    ctx.fillStyle = '#ffffff';
    ctx.fillText('さく', tcx, tcy + 94);
    ctx.restore();

    // 「タップでスタート」点滅
    if (Math.floor(stateTimer / 30) % 2 === 0) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 22px sans-serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText('タップ / Space キーでスタート', W/2, H - 70);
      ctx.fillStyle = '#ffee80';
      ctx.fillText('タップ / Space キーでスタート', W/2, H - 70);
      ctx.restore();
    }
  }

  // ====== キャラ選択画面 ======
  function drawCharSelect() {
    // 背景
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, 0, W, H);
    // タイトル
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 36px serif';
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.strokeText('キャラを えらんで', W/2, 70);
    ctx.fillStyle = '#ffee60';
    ctx.fillText('キャラを えらんで', W/2, 70);
    ctx.restore();

    // キャラ表示
    const cardW = 260, cardH = 320;
    const gap = 60;
    const totalW = cardW * CHARACTERS.length + gap * (CHARACTERS.length - 1);
    const startX = (W - totalW) / 2;
    for (let i = 0; i < CHARACTERS.length; i++) {
      const c = CHARACTERS[i];
      const cx = startX + i * (cardW + gap);
      const cy = 120;
      const selected = (i === selectIdx);
      // カード
      ctx.save();
      if (selected) {
        ctx.shadowColor = '#ffee60';
        ctx.shadowBlur = 20;
      }
      ctx.fillStyle = selected ? '#3a3050' : '#202028';
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = selected ? '#ffee60' : '#606070';
      ctx.lineWidth = selected ? 4 : 2;
      ctx.strokeRect(cx, cy, cardW, cardH);
      // キャラ絵
      drawCharPortrait(c, cx + cardW/2, cy + 140, selected ? 4 : 3.2);
      // 名前
      ctx.textAlign = 'center';
      ctx.font = 'bold 32px serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText(c.name, cx + cardW/2, cy + 240);
      ctx.fillStyle = selected ? '#ffee60' : '#fff';
      ctx.fillText(c.name, cx + cardW/2, cy + 240);
      // スタッツ
      ctx.font = '14px sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('HP: ' + c.hp + '  SPEED: ' + c.speed, cx + cardW/2, cy + 270);
      ctx.fillText(c.desc, cx + cardW/2, cy + 290);
      ctx.restore();
    }
    // 操作説明
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    const hintText = 'キャラをタップして スタート！';
    ctx.strokeText(hintText, W/2, H - 55);
    // 点滅
    const pulse = Math.floor(stateTimer / 20) % 2 === 0 ? '#ffee40' : '#ffa040';
    ctx.fillStyle = pulse;
    ctx.fillText(hintText, W/2, H - 55);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#999';
    ctx.fillText('PC：← → で選択、Space でスタート', W/2, H - 25);
    ctx.restore();
  }

  function drawCharPortrait(c, cx, cy, scale) {
    // 全身キャラ絵（スタンド姿）
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 30, 12, 3, 0, 0, Math.PI*2); ctx.fill();
    // 脚
    ctx.fillStyle = c.pantsCol;
    ctx.fillRect(-6, 14, 5, 16);
    ctx.fillRect(1, 14, 5, 16);
    // 靴
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-7, 28, 7, 4);
    ctx.fillRect(1, 28, 7, 4);
    // 胴（道着風）
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-9, -2, 18, 18);
    // 帯
    ctx.fillStyle = '#ffee60';
    ctx.fillRect(-9, 10, 18, 3);
    // 腕
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-12, 0, 4, 12);
    ctx.fillRect(8, 0, 4, 12);
    // 手
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(-10, 13, 2, 0, Math.PI*2);
    ctx.arc(10, 13, 2, 0, Math.PI*2);
    ctx.fill();
    // 首
    ctx.fillStyle = c.skinCol;
    ctx.fillRect(-2, -5, 4, 4);
    // 頭
    ctx.beginPath();
    ctx.arc(0, -12, 9, 0, Math.PI*2);
    ctx.fill();
    // 髪
    ctx.fillStyle = c.hairCol;
    if (c.id === 'saku') {
      // さくの髪：つんつん
      ctx.beginPath();
      ctx.moveTo(-9, -14);
      ctx.lineTo(-7, -22);
      ctx.lineTo(-4, -16);
      ctx.lineTo(-1, -23);
      ctx.lineTo(2, -16);
      ctx.lineTo(5, -22);
      ctx.lineTo(8, -14);
      ctx.lineTo(8, -10);
      ctx.lineTo(-9, -10);
      ctx.closePath();
      ctx.fill();
    } else {
      // くるみの髪：ツインテール
      ctx.beginPath();
      ctx.arc(0, -14, 9, Math.PI, 0);
      ctx.lineTo(9, -10);
      ctx.lineTo(-9, -10);
      ctx.closePath();
      ctx.fill();
      // ツインテール
      ctx.beginPath();
      ctx.ellipse(-11, -4, 3, 9, -0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(11, -4, 3, 9, 0.3, 0, Math.PI*2);
      ctx.fill();
      // ピンクリボン
      ctx.fillStyle = '#ff80b0';
      ctx.beginPath();
      ctx.moveTo(-14, -8); ctx.lineTo(-11, -10); ctx.lineTo(-11, -4); ctx.closePath();
      ctx.moveTo(-8, -8); ctx.lineTo(-11, -10); ctx.lineTo(-11, -4); ctx.closePath();
      ctx.moveTo(14, -8); ctx.lineTo(11, -10); ctx.lineTo(11, -4); ctx.closePath();
      ctx.moveTo(8, -8); ctx.lineTo(11, -10); ctx.lineTo(11, -4); ctx.closePath();
      ctx.fill();
    }
    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-3, -12, 1.6, 2, 0, 0, Math.PI*2);
    ctx.ellipse(3, -12, 1.6, 2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-3, -12, 1, 0, Math.PI*2);
    ctx.arc(3, -12, 1, 0, Math.PI*2);
    ctx.fill();
    // 口
    ctx.strokeStyle = '#a05030';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0, -8, 1.5, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
    // ほっぺ（くるみのみ）
    if (c.id === 'kurumi') {
      ctx.fillStyle = 'rgba(255,120,160,0.6)';
      ctx.beginPath();
      ctx.arc(-6, -9, 1.5, 0, Math.PI*2);
      ctx.arc(6, -9, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ====== ゲーム画面 ======
  function drawGame() {
    drawBackground();

    // ボス・敵・プレイヤーの描画順
    drawEnemyProjectiles();
    drawEnemies();
    if (boss) drawBoss();
    drawPlayer();
    drawProjectiles();
    drawParticles();
    drawPopups();
    drawHUD();
    if (banner) drawBanner();

    if (state === STATE.STAGE_CLEAR) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 48px serif';
      ctx.lineWidth = 7; ctx.strokeStyle = '#000';
      const stg = STAGES_CONFIG[currentStageIdx];
      ctx.strokeText(`STAGE ${stg.num} CLEAR!`, W/2, H/2 - 10);
      const g = ctx.createLinearGradient(0, H/2 - 40, 0, H/2);
      g.addColorStop(0, '#ffee60');
      g.addColorStop(1, '#ff8030');
      ctx.fillStyle = g;
      ctx.fillText(`STAGE ${stg.num} CLEAR!`, W/2, H/2 - 10);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#fff';
      const nextStg = STAGES_CONFIG[currentStageIdx + 1];
      if (nextStg) ctx.fillText(`次：${nextStg.name}（${nextStg.bossName}）`, W/2, H/2 + 30);
      ctx.fillText('移動中...', W/2, H/2 + 60);
      ctx.restore();
    } else if (state === STATE.CLEARED) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 56px serif';
      ctx.lineWidth = 8; ctx.strokeStyle = '#000';
      ctx.strokeText('ALL STAGE CLEAR!', W/2, H/2 - 20);
      const g = ctx.createLinearGradient(0, H/2 - 50, 0, H/2);
      g.addColorStop(0, '#ffee60');
      g.addColorStop(1, '#ff8030');
      ctx.fillStyle = g;
      ctx.fillText('ALL STAGE CLEAR!', W/2, H/2 - 20);
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText('すべての とーと を 倒した！', W/2, H/2 + 30);
      ctx.fillText('タップ or Space キーでタイトルへ', W/2, H/2 + 70);
      ctx.restore();
    } else if (state === STATE.GAMEOVER) {
      ctx.fillStyle = 'rgba(80,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 56px serif';
      ctx.lineWidth = 8; ctx.strokeStyle = '#000';
      ctx.strokeText('GAME OVER', W/2, H/2 - 20);
      ctx.fillStyle = '#ff4040';
      ctx.fillText('GAME OVER', W/2, H/2 - 20);
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText('キル数: ' + player.kills, W/2, H/2 + 30);
      ctx.fillText('タップ or Space キーでタイトルへ', W/2, H/2 + 70);
      ctx.restore();
    }
  }

  function drawPlayer() {
    const x = player.x, y = player.y;
    const t = player.transform;
    const flash = (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0);
    ctx.save();
    if (flash) ctx.globalAlpha = 0.5;

    // オーラ（変身段階ごとに色と形が変わる）
    if (t >= 1) {
      const auraR = 28 + Math.sin(player.anim * 0.5) * 4 + t * 3;
      const ag = ctx.createRadialGradient(x, y, 5, x, y, auraR);
      if (t === 1) {
        // 界王拳：赤いオーラ
        ag.addColorStop(0, 'rgba(255,80,80,0.55)');
        ag.addColorStop(0.5, 'rgba(200,30,30,0.3)');
        ag.addColorStop(1, 'rgba(80,0,0,0)');
      } else if (t === 2) {
        // SSJ：金オーラ
        ag.addColorStop(0, 'rgba(255,238,100,0.55)');
        ag.addColorStop(0.5, 'rgba(255,170,40,0.3)');
        ag.addColorStop(1, 'rgba(255,100,20,0)');
      } else if (t === 3) {
        // SSJ2：金＋青白い稲妻
        ag.addColorStop(0, 'rgba(255,255,150,0.6)');
        ag.addColorStop(0.5, 'rgba(255,200,60,0.3)');
        ag.addColorStop(1, 'rgba(180,220,255,0)');
      } else if (t === 4) {
        // SSJ3：より激しい金オーラ
        ag.addColorStop(0, 'rgba(255,240,80,0.65)');
        ag.addColorStop(0.5, 'rgba(255,180,30,0.4)');
        ag.addColorStop(1, 'rgba(255,80,0,0)');
      } else if (t === 5) {
        // SSJ4：赤＋金
        ag.addColorStop(0, 'rgba(255,120,40,0.65)');
        ag.addColorStop(0.5, 'rgba(200,30,20,0.4)');
        ag.addColorStop(1, 'rgba(60,0,0,0)');
      }
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI * 2); ctx.fill();
      // 上方向のオーラ炎
      const flameCount = 6 + t;
      for (let i = 0; i < flameCount; i++) {
        const a = -Math.PI/2 + (i - (flameCount - 1) / 2) * 0.2;
        const fr = 18 + Math.sin(player.anim * 0.4 + i) * 4;
        const fx = x + Math.cos(a) * fr;
        const fy = y + Math.sin(a) * fr - 10;
        let flameCol;
        if (t === 1) flameCol = `rgba(255,80,60,0.6)`;
        else if (t === 5) flameCol = `rgba(255,120,40,0.7)`;
        else flameCol = `rgba(255,${200 + Math.sin(player.anim*0.5+i)*40},60,0.6)`;
        ctx.fillStyle = flameCol;
        ctx.beginPath();
        ctx.ellipse(fx, fy, 3, 7, 0, 0, Math.PI*2);
        ctx.fill();
      }
      // SSJ2以降：青白い稲妻
      if (t >= 3) {
        ctx.strokeStyle = 'rgba(180,220,255,0.7)';
        ctx.lineWidth = 1.5;
        const bolts = 3 + (t - 3);
        for (let i = 0; i < bolts; i++) {
          const a = (Math.random() * Math.PI * 2);
          const r1 = auraR * 0.5;
          const r2 = auraR * 1.1;
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * r1, y + Math.sin(a) * r1);
          const midA = a + (Math.random() - 0.5) * 0.4;
          const midR = (r1 + r2) / 2;
          ctx.lineTo(x + Math.cos(midA) * midR, y + Math.sin(midA) * midR);
          ctx.lineTo(x + Math.cos(a) * r2, y + Math.sin(a) * r2);
          ctx.stroke();
        }
      }
    }

    // 必殺技チャージ演出（発動前の気溜め）
    if (player.ultActive && player.ultActive.phase === 'charge') {
      const c = 1 - (player.ultActive.timer - 40) / 30;
      const cR = 14 + c * 22;
      // 両手を腰に構える感じの気弾
      ctx.fillStyle = `rgba(140,220,255,${0.4 + c * 0.5})`;
      ctx.beginPath();
      ctx.arc(x, y + 6, cR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255,255,255,${c})`;
      ctx.beginPath();
      ctx.arc(x, y + 6, cR * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // 収束粒子
      for (let i = 0; i < 6; i++) {
        const a = player.anim + i * 1.1;
        const r = cR + 14 + Math.sin(a) * 4;
        ctx.fillStyle = `rgba(140,210,255,${0.6 * c})`;
        ctx.beginPath();
        ctx.arc(x + Math.cos(a) * r, y + 6 + Math.sin(a) * r, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }

    drawCharInBattle(player, x, y, t);
    ctx.restore();

    // かめはめ波ビーム（本体の後に上書き描画）
    if (player.ultActive && player.ultActive.phase === 'fire') {
      drawKamehameha();
    }
  }

  function drawKamehameha() {
    const u = player.ultActive;
    if (!u) return;
    const progress = 1 - u.timer / 40;
    const x = player.x;
    const topY = 0;
    const botY = player.y - 6;
    // 外側グロー
    const outW = 90 + Math.sin(u.timer * 0.4) * 10;
    const og = ctx.createLinearGradient(x - outW/2, 0, x + outW/2, 0);
    og.addColorStop(0, 'rgba(100,200,255,0)');
    og.addColorStop(0.5, 'rgba(180,230,255,0.75)');
    og.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = og;
    ctx.fillRect(x - outW/2, topY, outW, botY);
    // 中間
    const midW = 50;
    ctx.fillStyle = 'rgba(140,230,255,0.9)';
    ctx.fillRect(x - midW/2, topY, midW, botY);
    // 白コア
    const coreW = 24;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - coreW/2, topY, coreW, botY);
    // 発射口の大輝き
    const glowR = 40 + Math.sin(u.timer * 0.4) * 8;
    const gg = ctx.createRadialGradient(x, botY, 5, x, botY, glowR);
    gg.addColorStop(0, 'rgba(255,255,255,0.9)');
    gg.addColorStop(0.4, 'rgba(140,230,255,0.6)');
    gg.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(x, botY, glowR, 0, Math.PI*2);
    ctx.fill();
    // ランダムな電光
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
      const sy = Math.random() * botY;
      ctx.beginPath();
      ctx.moveTo(x - 4 + (Math.random() - 0.5) * 6, sy);
      ctx.lineTo(x + 4 + (Math.random() - 0.5) * 6, sy + 8);
      ctx.stroke();
    }
  }

  // バトル中のキャラ描画（トップダウン）
  function drawCharInBattle(c, x, y, transformLvl) {
    ctx.save();
    ctx.translate(x, y);
    const facing = c.facing || 1;
    if (facing < 0) ctx.scale(-1, 1);
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 14, 10, 3, 0, 0, Math.PI*2); ctx.fill();
    // 脚
    const legBob = c.moving ? Math.sin(c.anim * 2) * 2 : 0;
    ctx.fillStyle = c.pantsCol;
    ctx.fillRect(-5, 3 + legBob, 4, 10);
    ctx.fillRect(1, 3 - legBob, 4, 10);
    // 胴（道着）
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-7, -6, 14, 12);
    // SSJ4：上半身の赤い毛
    if (transformLvl === 5) {
      ctx.fillStyle = '#c03020';
      // 肩と胸の赤い毛（細かい線）
      for (let i = 0; i < 8; i++) {
        const hx = -6 + i * 1.8;
        ctx.beginPath();
        ctx.moveTo(hx, -5);
        ctx.lineTo(hx + Math.sin(player.anim + i) * 0.5, -9);
        ctx.stroke();
      }
      ctx.strokeStyle = '#a01810';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 10; i++) {
        ctx.beginPath();
        ctx.moveTo(-7 + i * 1.4, -6);
        ctx.lineTo(-7 + i * 1.4 + Math.sin(i) * 0.6, -10);
        ctx.stroke();
      }
      // 腕にも赤い毛
      ctx.fillStyle = '#c03020';
      ctx.fillRect(-10, -5, 3, 3);
      ctx.fillRect(7, -5, 3, 3);
    }
    // 帯
    ctx.fillStyle = '#ffee60';
    ctx.fillRect(-7, 2, 14, 2);
    // 腕
    const armSwing = c.moving ? Math.sin(c.anim * 2) * 3 : 0;
    ctx.fillStyle = c.shirtCol;
    ctx.fillRect(-10, -5 + armSwing, 3, 10);
    ctx.fillRect(7, -5 - armSwing, 3, 10);
    // 手
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(-8.5, 5 + armSwing, 1.8, 0, Math.PI*2);
    ctx.arc(8.5, 5 - armSwing, 1.8, 0, Math.PI*2);
    ctx.fill();
    // 頭
    ctx.fillStyle = c.skinCol;
    ctx.beginPath();
    ctx.arc(0, -11, 7, 0, Math.PI*2);
    ctx.fill();
    // 髪の色：SSJ(2+)は金髪、SSJ4は赤
    // transform: 0=ノーマル, 1=Kaioken(元の色), 2-4=SSJ系(金), 5=SSJ4(赤）
    let hairCol;
    if (transformLvl >= 2 && transformLvl <= 4) hairCol = '#ffdc20';  // 金
    else if (transformLvl === 5) hairCol = '#c02010';  // 赤
    else hairCol = c.hairCol;
    ctx.fillStyle = hairCol;

    const isSaku = (c.charId === 'saku' || c.id === 'saku');
    if (isSaku) {
      if (transformLvl >= 4) {
        // SSJ3：膝下まで伸びた金髪
        ctx.beginPath();
        ctx.moveTo(-8, -14);
        ctx.lineTo(-11, -28);
        ctx.lineTo(-6, -20);
        ctx.lineTo(-3, -30);
        ctx.lineTo(0, -22);
        ctx.lineTo(3, -30);
        ctx.lineTo(6, -20);
        ctx.lineTo(11, -28);
        ctx.lineTo(8, -14);
        ctx.lineTo(8, -11);
        ctx.lineTo(-8, -11);
        ctx.closePath();
        ctx.fill();
        // 膝下まで長い髪（後ろに流れる）
        ctx.beginPath();
        ctx.moveTo(-8, -9);
        ctx.quadraticCurveTo(-11, 0, -10, 14);
        ctx.lineTo(-6, 14);
        ctx.quadraticCurveTo(-6, 4, -4, -9);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(8, -9);
        ctx.quadraticCurveTo(11, 0, 10, 14);
        ctx.lineTo(6, 14);
        ctx.quadraticCurveTo(6, 4, 4, -9);
        ctx.closePath();
        ctx.fill();
        // ハイライト
        ctx.fillStyle = '#ffffa0';
        ctx.fillRect(-3, -25, 1.5, 10);
      } else if (transformLvl >= 2) {
        // SSJ / SSJ2 / SSJ4：逆立った髪
        ctx.beginPath();
        ctx.moveTo(-7, -14);
        ctx.lineTo(-9, -26);
        ctx.lineTo(-5, -17);
        ctx.lineTo(-2, -28);
        ctx.lineTo(1, -18);
        ctx.lineTo(4, -28);
        ctx.lineTo(7, -17);
        ctx.lineTo(9, -24);
        ctx.lineTo(7, -11);
        ctx.lineTo(-7, -11);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = transformLvl === 5 ? '#ff8060' : '#ffffa0';
        ctx.fillRect(-2, -22, 1.5, 8);
      } else {
        // ノーマル / 界王拳：黒髪
        ctx.beginPath();
        ctx.moveTo(-7, -13);
        ctx.lineTo(-5, -18);
        ctx.lineTo(-2, -14);
        ctx.lineTo(0, -19);
        ctx.lineTo(2, -14);
        ctx.lineTo(5, -18);
        ctx.lineTo(7, -13);
        ctx.lineTo(7, -9);
        ctx.lineTo(-7, -9);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // くるみ髪：ツインテール
      if (transformLvl >= 4) {
        // SSJ3：金ロングツインテール（長い）
        ctx.beginPath();
        ctx.arc(0, -13, 7, Math.PI, 0);
        ctx.lineTo(7, -10); ctx.lineTo(-7, -10); ctx.closePath();
        ctx.fill();
        // 長い金ツインテール（膝下まで）
        ctx.beginPath();
        ctx.ellipse(-10, 4, 3, 16, -0.1, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(10, 4, 3, 16, 0.1, 0, Math.PI*2);
        ctx.fill();
        // 逆立ち部
        ctx.beginPath();
        ctx.moveTo(-11, -10); ctx.lineTo(-13, -22); ctx.lineTo(-8, -14); ctx.closePath();
        ctx.moveTo(11, -10); ctx.lineTo(13, -22); ctx.lineTo(8, -14); ctx.closePath();
        ctx.fill();
      } else if (transformLvl >= 2) {
        // SSJ系：金髪ツインテール（逆立ち気味）
        ctx.beginPath();
        ctx.arc(0, -13, 7, Math.PI, 0);
        ctx.lineTo(7, -10); ctx.lineTo(-7, -10); ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-10, -7); ctx.lineTo(-13, -18); ctx.lineTo(-9, -12); ctx.lineTo(-11, -20); ctx.lineTo(-7, -10); ctx.closePath();
        ctx.moveTo(10, -7); ctx.lineTo(13, -18); ctx.lineTo(9, -12); ctx.lineTo(11, -20); ctx.lineTo(7, -10); ctx.closePath();
        ctx.fill();
      } else {
        // ノーマル / 界王拳
        ctx.beginPath();
        ctx.arc(0, -13, 7, Math.PI, 0);
        ctx.lineTo(7, -10); ctx.lineTo(-7, -10); ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-9, -6, 2.5, 6, -0.3, 0, Math.PI*2);
        ctx.ellipse(9, -6, 2.5, 6, 0.3, 0, Math.PI*2);
        ctx.fill();
      }
      // ピンクリボン
      ctx.fillStyle = '#ff80b0';
      ctx.beginPath();
      ctx.arc(-9, -10, 1.5, 0, Math.PI*2);
      ctx.arc(9, -10, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    // 目の色：SSJ以降は青、SSJ4は赤、界王拳は変わらず
    let eyeCol = '#000';
    if (transformLvl >= 2 && transformLvl <= 4) eyeCol = '#40c8ff';
    else if (transformLvl === 5) eyeCol = '#ff4040';
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(2.5, -11, 1.3, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = eyeCol;
    ctx.beginPath();
    ctx.arc(-2.5, -11, 0.9, 0, Math.PI*2);
    ctx.arc(2.5, -11, 0.9, 0, Math.PI*2);
    ctx.fill();
    // 口（真面目な感じ）
    ctx.strokeStyle = '#a05030';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(-1.5, -7); ctx.lineTo(1.5, -7);
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      const x = e.x, y = e.y;
      ctx.save();
      if (e.hurtTimer > 0 && Math.floor(e.hurtTimer/2) % 2 === 0) ctx.globalAlpha = 0.5;
      // 影
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath(); ctx.ellipse(x, y + e.r + 2, e.r * 0.8, 3, 0, 0, Math.PI*2); ctx.fill();
      // 敵本体
      if (e.type === 'saibai') {
        // サイバイマン風：緑の小型兵
        const bob = Math.sin(e.anim * 2) * 1.5;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.ellipse(x, y + bob, e.r, e.r * 1.1, 0, 0, Math.PI*2);
        ctx.fill();
        // 模様
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.arc(x, y + bob, e.r * 0.55, 0, Math.PI*2);
        ctx.fill();
        // 目（赤）
        ctx.fillStyle = '#ff2020';
        ctx.beginPath();
        ctx.arc(x - 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.arc(x + 4, y + bob - 2, 1.8, 0, Math.PI*2);
        ctx.fill();
        // 牙
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x - 2, y + bob + 2); ctx.lineTo(x - 3, y + bob + 6); ctx.lineTo(x - 1, y + bob + 4); ctx.closePath();
        ctx.moveTo(x + 2, y + bob + 2); ctx.lineTo(x + 3, y + bob + 6); ctx.lineTo(x + 1, y + bob + 4); ctx.closePath();
        ctx.fill();
      } else if (e.type === 'namek') {
        // ナメック戦士風：大型緑
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // 耳
        ctx.fillStyle = e.coreCol;
        ctx.beginPath();
        ctx.ellipse(x - e.r + 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.ellipse(x + e.r - 2, y, 3, 5, 0, 0, Math.PI*2);
        ctx.fill();
        // 顔ライン
        ctx.strokeStyle = e.coreCol;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - 4, y - 6); ctx.lineTo(x - 6, y - 2);
        ctx.moveTo(x + 4, y - 6); ctx.lineTo(x + 6, y - 2);
        ctx.stroke();
        // 目
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 5, y - 3, 3, 2);
        ctx.fillRect(x + 2, y - 3, 3, 2);
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 4, y - 2.5, 1.5, 1.5);
        ctx.fillRect(x + 3, y - 2.5, 1.5, 1.5);
        // 口（しかめ）
        ctx.strokeStyle = '#102a08';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 4, y + 4); ctx.lineTo(x + 4, y + 4);
        ctx.stroke();
      } else if (e.type === 'freezer') {
        // フリーザ兵風：赤
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y, e.r, 0, Math.PI*2);
        ctx.fill();
        // スコアターっぽい目
        ctx.fillStyle = '#00cccc';
        ctx.fillRect(x - 8, y - 4, 16, 4);
        ctx.fillStyle = '#008080';
        ctx.fillRect(x - 8, y - 4, 16, 1);
        // 赤目
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(x - 4, y - 3, 2, 2);
        ctx.fillRect(x + 2, y - 3, 2, 2);
        // 口
        ctx.fillStyle = '#701010';
        ctx.fillRect(x - 3, y + 3, 6, 2);
      }
      // HP バー（最大HP以下のみ）
      if (e.hp < e.maxHp) {
        const barW = e.r * 2, barH = 3;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW, barH);
        ctx.fillStyle = '#ff6060';
        ctx.fillRect(x - barW/2, y - e.r - 8, barW * (e.hp / e.maxHp), barH);
      }
      ctx.restore();
    }
  }

  function drawBoss() {
    if (!boss) return;
    const x = boss.x, y = boss.y;
    ctx.save();
    if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/3) % 2 === 0) ctx.globalAlpha = 0.5;

    // ビームチャージ演出
    if (boss.beamCharging > 0) {
      // 予告レーザー（赤い細い線・ロック前は追尾、ロック後は固定）
      const ang = boss.beamAngle;
      const warnLen = 800;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ロック前は点滅細線、ロック後は太く警告
      const locked = boss.beamLocked;
      const blink = Math.floor(boss.anim * 4) % 2 === 0 ? 1 : 0.3;
      if (!locked) {
        ctx.strokeStyle = `rgba(255,80,80,${0.35 * blink})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
      } else {
        // ロック後は太めの赤（警告・固定）
        ctx.strokeStyle = `rgba(255,40,60,${0.7 * blink})`;
        ctx.lineWidth = 8;
        ctx.setLineDash([]);
      }
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(warnLen, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // チャージ光（本体の周り）
      const total = 110;
      const c = 1 - boss.beamCharging / total;
      const cR = 15 + c * 22;
      ctx.fillStyle = `rgba(160,255,160,${0.2 + c * 0.4})`;
      ctx.beginPath();
      ctx.arc(x, y, cR, 0, Math.PI*2);
      ctx.fill();
      // 指ビーム（額に集中）
      ctx.fillStyle = `rgba(255,255,255,${c})`;
      ctx.beginPath();
      ctx.arc(x, y - 20, 3 + c * 4, 0, Math.PI*2);
      ctx.fill();
    }

    // ビーム発射中
    if (boss.beamFiring > 0) {
      const ang = boss.beamAngle;
      const bLen = 600;
      const bw = 24;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // ボスタイプごとのビーム色
      const bcol = boss.beamColor || '#a0f080';
      const hexToRgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
      const [br, bgc, bb] = hexToRgb(bcol);
      const bg = ctx.createLinearGradient(0, -bw, 0, bw);
      bg.addColorStop(0, `rgba(${br},${bgc},${bb},0)`);
      bg.addColorStop(0.5, `rgba(${br},${bgc},${bb},0.7)`);
      bg.addColorStop(1, `rgba(${br},${bgc},${bb},0)`);
      ctx.fillStyle = bg;
      ctx.fillRect(0, -bw, bLen, bw * 2);
      // 内側の白コア
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, -4, bLen, 8);
      ctx.restore();
    }

    // ボスタイプごとの描画
    // 共通：影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(x, y + boss.r + 3, boss.r * 0.85, 5, 0, 0, Math.PI*2); ctx.fill();

    const drawer = BOSS_DRAWERS[boss.type] || BOSS_DRAWERS.piccolo;
    drawer(x, y, boss);

    // とーとメガネ（全ボス共通）
    drawTotoGlasses(x, y - 13);

    // 激昂オーラ（HP40%以下で赤くなる）
    if (boss.hp / boss.maxHp < 0.4) {
      const auraR = boss.r + 22 + Math.sin(boss.anim * 0.5) * 6;
      const ag = ctx.createRadialGradient(x, y, boss.r, x, y, auraR);
      ag.addColorStop(0, 'rgba(200,80,80,0)');
      ag.addColorStop(0.5, 'rgba(200,80,80,0.4)');
      ag.addColorStop(1, 'rgba(200,0,40,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(x, y, auraR, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawTotoGlasses(gx, gy) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 3, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 3, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx - 2, gy); ctx.lineTo(gx + 2, gy);
    ctx.stroke();
    // メガネ内の目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 1.6, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 1.6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(gx - 5, gy, 0.9, 0, Math.PI*2);
    ctx.arc(gx + 5, gy, 0.9, 0, Math.PI*2);
    ctx.fill();
  }

  // ====== ボス別の描画関数 ======
  const BOSS_DRAWERS = {
    // ピッコロとーと
    piccolo(x, y, b) {
      // 体（緑の肌）
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫マント
      ctx.fillStyle = '#7030a0';
      ctx.beginPath();
      ctx.ellipse(x, y + 6, b.r * 1.15, b.r * 0.8, 0, 0, Math.PI);
      ctx.fill();
      // 道着
      ctx.fillStyle = '#a060a0';
      ctx.fillRect(x - 14, y - 2, 28, 16);
      // 帯
      ctx.fillStyle = '#ffee60';
      ctx.fillRect(x - 14, y + 10, 28, 4);
      // 頭
      ctx.fillStyle = '#68b868';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // アンテナ
      ctx.strokeStyle = '#68b868';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 24); ctx.lineTo(x - 6, y - 32);
      ctx.moveTo(x + 4, y - 24); ctx.lineTo(x + 6, y - 32);
      ctx.stroke();
      // ターバン（白）
      ctx.fillStyle = '#f0f0e0';
      ctx.fillRect(x - 12, y - 20, 24, 7);
      ctx.strokeStyle = '#a0a090'; ctx.lineWidth = 0.8;
      ctx.strokeRect(x - 12, y - 20, 24, 7);
      // 尖った耳
      ctx.fillStyle = '#68b868';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 14); ctx.lineTo(x - 18, y - 18); ctx.lineTo(x - 11, y - 10); ctx.closePath();
      ctx.moveTo(x + 12, y - 14); ctx.lineTo(x + 18, y - 18); ctx.lineTo(x + 11, y - 10); ctx.closePath();
      ctx.fill();
      // 口（真一文字）
      ctx.strokeStyle = '#204020';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 7); ctx.lineTo(x + 4, y - 7);
      ctx.stroke();
    },
    // ベジとーと（ベジータ風）
    vegeta(x, y, b) {
      // 戦闘服（サイヤ人アーマー）
      ctx.fillStyle = '#e8e8f0';  // 白いアーマー
      ctx.fillRect(x - 16, y - 4, 32, 18);
      // 金色のショルダー
      ctx.fillStyle = '#ffd040';
      ctx.fillRect(x - 17, y - 6, 7, 8);
      ctx.fillRect(x + 10, y - 6, 7, 8);
      // 青いインナー
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 10, y - 2, 20, 10);
      // 青ブーツの上部
      ctx.fillStyle = '#2060c0';
      ctx.fillRect(x - 12, y + 12, 24, 4);
      // 頭（肌色）
      ctx.fillStyle = '#f5d8a8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 髪（ベジータ風の逆立ちV字）
      ctx.fillStyle = '#1a0808';
      ctx.beginPath();
      ctx.moveTo(x - 11, y - 22);
      ctx.lineTo(x - 9, y - 32);
      ctx.lineTo(x - 3, y - 24);
      ctx.lineTo(x - 1, y - 34);
      ctx.lineTo(x + 1, y - 24);
      ctx.lineTo(x + 3, y - 34);
      ctx.lineTo(x + 9, y - 32);
      ctx.lineTo(x + 11, y - 22);
      ctx.lineTo(x + 11, y - 14);
      ctx.lineTo(x - 11, y - 14);
      ctx.closePath();
      ctx.fill();
      // スカウター（ベジータっぽい赤い縁）
      ctx.strokeStyle = '#ff4030';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(x + 9, y - 13); ctx.lineTo(x + 16, y - 15);
      ctx.stroke();
      // 口（ドヤ顔）
      ctx.strokeStyle = '#6a3030';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 6); ctx.quadraticCurveTo(x, y - 4, x + 3, y - 6);
      ctx.stroke();
    },
    // フリーザとーと（白＋紫・最終形態風）
    freezer(x, y, b) {
      // 体（白＋紫のバイオスーツ風）
      ctx.fillStyle = '#e8e4f0';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 紫の装甲プレート
      ctx.fillStyle = '#8040b0';
      ctx.fillRect(x - 14, y - 2, 28, 6);  // 胸
      ctx.fillRect(x - 14, y + 10, 28, 4);  // 腰
      // 肩プレート
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.arc(x - 14, y - 4, 6, 0, Math.PI*2);
      ctx.arc(x + 14, y - 4, 6, 0, Math.PI*2);
      ctx.fill();
      // 頭（白）
      ctx.fillStyle = '#f0ecf8';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の紫プレート（王冠状）
      ctx.fillStyle = '#8040b0';
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 18);
      ctx.lineTo(x - 10, y - 26);
      ctx.lineTo(x - 4, y - 20);
      ctx.lineTo(x, y - 28);
      ctx.lineTo(x + 4, y - 20);
      ctx.lineTo(x + 10, y - 26);
      ctx.lineTo(x + 12, y - 18);
      ctx.closePath();
      ctx.fill();
      // 口（不敵な笑み）
      ctx.strokeStyle = '#6030a0';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 3, x + 4, y - 6);
      ctx.stroke();
      // 尻尾（背後に見えるヒント）
      ctx.strokeStyle = '#a070d0';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + b.r - 2, y + 8);
      ctx.quadraticCurveTo(x + b.r + 14, y + 18, x + b.r + 8, y + 26);
      ctx.stroke();
    },
    // セルとーと（完全体・緑＋黒斑点）
    cell(x, y, b) {
      // 体（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y, b.r, 0, Math.PI*2); ctx.fill();
      // 黒い外殻プレート
      ctx.fillStyle = '#282820';
      ctx.fillRect(x - 14, y - 4, 28, 6);
      ctx.fillRect(x - 14, y + 6, 28, 4);
      // 緑の胸プレート
      ctx.fillStyle = '#a0d068';
      ctx.beginPath();
      ctx.ellipse(x, y + 2, 10, 5, 0, 0, Math.PI*2);
      ctx.fill();
      // 頭（緑）
      ctx.fillStyle = '#78a850';
      ctx.beginPath(); ctx.arc(x, y - 14, 12, 0, Math.PI*2); ctx.fill();
      // 頭の黒いリング
      ctx.strokeStyle = '#282820';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y - 14, 11, 0, Math.PI*2);
      ctx.stroke();
      // ツノ（頭頂）
      ctx.fillStyle = '#282820';
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 24); ctx.lineTo(x - 10, y - 34); ctx.lineTo(x - 4, y - 26); ctx.closePath();
      ctx.moveTo(x + 8, y - 24); ctx.lineTo(x + 10, y - 34); ctx.lineTo(x + 4, y - 26); ctx.closePath();
      ctx.fill();
      // 口（邪悪）
      ctx.strokeStyle = '#402010';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 4, y - 6); ctx.quadraticCurveTo(x, y - 8, x + 4, y - 6);
      ctx.stroke();
      // 背中の翼（前方向にちらりと）
      ctx.fillStyle = 'rgba(100,150,80,0.6)';
      ctx.beginPath();
      ctx.moveTo(x - b.r, y + 2); ctx.lineTo(x - b.r - 10, y - 8); ctx.lineTo(x - b.r - 4, y - 14); ctx.lineTo(x - b.r + 4, y - 4); ctx.closePath();
      ctx.moveTo(x + b.r, y + 2); ctx.lineTo(x + b.r + 10, y - 8); ctx.lineTo(x + b.r + 4, y - 14); ctx.lineTo(x + b.r - 4, y - 4); ctx.closePath();
      ctx.fill();
    },
    // 魔神とーと（魔人ブウ風・ピンクでぽっちゃり）
    buu(x, y, b) {
      // 丸々とした体（ピンク・大きめ）
      ctx.fillStyle = '#ff98c0';
      ctx.beginPath(); ctx.arc(x, y + 3, b.r + 4, 0, Math.PI*2); ctx.fill();
      // 黒いベスト
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(x - 16, y - 4, 32, 16);
      // 金縁
      ctx.fillStyle = '#ffdc40';
      ctx.fillRect(x - 16, y - 4, 32, 2);
      ctx.fillRect(x - 16, y + 10, 32, 2);
      // 白いマント・肩の布
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(x - 18, y - 3, 4, 10);
      ctx.fillRect(x + 14, y - 3, 4, 10);
      // 頭（丸いピンク）
      ctx.fillStyle = '#ffaccc';
      ctx.beginPath(); ctx.arc(x, y - 14, 13, 0, Math.PI*2); ctx.fill();
      // 頭頂のアンテナ（触手っぽい）
      ctx.strokeStyle = '#ffaccc';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(x, y - 26);
      ctx.quadraticCurveTo(x + 8, y - 34, x + 4, y - 40);
      ctx.stroke();
      // 頭の黒い穴（魔人ブウの特徴）
      ctx.fillStyle = '#1a0818';
      ctx.beginPath();
      ctx.ellipse(x - 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.ellipse(x + 8, y - 17, 2, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
      // 口（大きく開いた笑い）
      ctx.fillStyle = '#601030';
      ctx.beginPath();
      ctx.ellipse(x, y - 6, 5, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
    },
  };

  function drawProjectiles() {
    for (const p of projectiles) {
      ctx.save();
      // 変身段階ごとの色
      let bodyCol, glowCol;
      if (p.transform === 1) {
        bodyCol = '#ff5050'; glowCol = 'rgba(255,60,60,0.5)';  // 界王拳赤
      } else if (p.transform >= 2 && p.transform <= 4) {
        bodyCol = '#ffee40'; glowCol = 'rgba(255,255,100,0.5)';  // SSJ金
