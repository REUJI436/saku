<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>キラキラ☆シールちょう</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; font-family: "Hiragino Maru Gothic ProN", "Comic Sans MS", "Yu Gothic", sans-serif; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(180deg, #ffe0f0 0%, #ffd6ec 50%, #c9e4ff 100%);
    touch-action: manipulation;
    color: #4a3050;
    overscroll-behavior: none;
    -webkit-touch-callout: none;
  }
  rt { font-size: 0.55em; color: #e91e63; font-weight: normal; }

  /* Portal back button */
  #portalBtn {
    position: fixed; top: 8px; left: 8px; z-index: 9999;
    background: linear-gradient(to bottom, #ff8fc0, #d63384);
    color: #fff; text-decoration: none;
    padding: 6px 10px; border-radius: 50%;
    font-size: 18px; font-weight: bold;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    touch-action: manipulation;
    display: inline-block; line-height: 1;
  }
  #portalBtn:active { transform: scale(0.92); opacity: 0.85; }

  /* Mute toggle */
  #muteBtn {
    position: fixed; top: 8px; right: 8px; z-index: 9999;
    background: linear-gradient(to bottom, #fff4a0, #ffd040);
    color: #6b4500; padding: 6px 10px; border-radius: 50%;
    font-size: 16px; font-weight: bold;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  #muteBtn:active { transform: scale(0.92); }

  /* Scenes */
  .scene {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .scene.active { display: flex; }

  /* Common buttons */
  .btn {
    background: linear-gradient(180deg, #ffb0d8 0%, #ff7ab8 100%);
    color: #fff;
    border: 3px solid #fff;
    border-radius: 22px;
    padding: 10px 18px;
    font-size: 17px;
    font-weight: bold;
    box-shadow: 0 4px 0 #c44d85, 0 6px 12px rgba(255,111,168,0.4);
    cursor: pointer;
    text-shadow: 1px 1px 0 #d63384;
    transition: transform 0.08s, box-shadow 0.08s;
    letter-spacing: 1px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c44d85, 0 2px 4px rgba(255,111,168,0.4); }
  .btn:disabled { opacity: 0.5; }
  .btn.purple { background: linear-gradient(180deg, #d6b0ff 0%, #a878f5 100%); box-shadow: 0 4px 0 #6030a0, 0 6px 12px rgba(168,120,245,0.4); text-shadow: 1px 1px 0 #6030a0; }
  .btn.blue { background: linear-gradient(180deg, #aee3ff 0%, #5cb8f5 100%); box-shadow: 0 4px 0 #2a6da6, 0 6px 12px rgba(92,184,245,0.4); text-shadow: 1px 1px 0 #2a6da6; }
  .btn.yellow { background: linear-gradient(180deg, #ffe89a 0%, #ffc94a 100%); box-shadow: 0 4px 0 #c08820, 0 6px 12px rgba(255,201,74,0.4); text-shadow: 1px 1px 0 #c08820; color: #6b4500; }
  .btn.green { background: linear-gradient(180deg, #c0f0a8 0%, #80d860 100%); box-shadow: 0 4px 0 #4a8030, 0 6px 12px rgba(128,216,96,0.4); text-shadow: 1px 1px 0 #4a8030; }
  .btn.gray { background: linear-gradient(180deg, #d8d8d8 0%, #a0a0a0 100%); box-shadow: 0 4px 0 #555, 0 6px 12px rgba(120,120,120,0.4); text-shadow: 1px 1px 0 #555; }

  /* ===== TITLE ===== */
  #title-scene {
    justify-content: center; align-items: center;
    padding: 20px; text-align: center;
    background:
      radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.4), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(201, 160, 255, 0.4), transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(255, 182, 193, 0.5), transparent 50%),
      linear-gradient(180deg, #ffe0f0 0%, #ffc9e6 40%, #ffb3d9 70%, #c0a0ff 100%);
    position: relative;
  }
  #title-scene h1 {
    font-size: clamp(32px, 9vw, 56px);
    font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(135deg, #ff4090, #ffd700, #ff6fa8, #c870ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-stroke: 2px #fff;
    margin-bottom: 10px;
    text-shadow: 0 4px 8px rgba(255,80,180,0.4);
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-6px) rotate(1deg); }
  }
  #title-scene .sub {
    font-size: 18px; color: #d63384; font-weight: bold;
    margin-bottom: 30px;
    text-shadow: 1px 1px 0 #fff;
  }
  #title-buttons {
    display: flex; flex-direction: column; gap: 14px;
    width: 80%; max-width: 320px;
  }
  #title-buttons .btn { font-size: 22px; padding: 16px 22px; }

  .title-deco {
    position: absolute; font-size: 34px;
    pointer-events: none;
    animation: floatDeco 3s ease-in-out infinite;
  }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-12px) rotate(8deg); }
  }

  /* ===== MAIN ===== */
  #main-scene {
    background:
      radial-gradient(circle at 30% 10%, rgba(255,200,230,0.5), transparent 40%),
      linear-gradient(180deg, #fff0f8 0%, #ffe0ee 100%);
  }
  #top-bar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 50px 6px 50px;
    background: linear-gradient(180deg, #ff80c0, #ff6fa8);
    color: #fff;
    border-bottom: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    font-weight: bold;
    font-size: 14px;
    height: 44px;
  }
  #stars-display {
    background: rgba(255,255,255,0.3);
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 16px;
    display: flex; align-items: center; gap: 4px;
  }
  #theme-name {
    font-size: 15px;
    text-shadow: 1px 1px 0 #c44d85;
  }

  /* Board (main canvas area) */
  #board-wrap {
    flex: 1;
    position: relative;
    margin: 6px;
    overflow: hidden;
    border-radius: 16px;
    border: 4px solid #fff;
    box-shadow: 0 4px 12px rgba(255,80,180,0.2);
  }
  #board {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }
  /* placed sticker */
  .placed {
    position: absolute;
    width: 64px; height: 64px;
    transform: translate(-50%,-50%);
    cursor: grab;
    transition: transform 0.1s;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
    touch-action: none;
  }
  .placed.dragging { z-index: 999; transform: translate(-50%,-50%) scale(1.15); filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4)); }
  .placed.removing { animation: stickerPop 0.3s forwards; }
  @keyframes stickerPop {
    to { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
  }

  /* Bottom shelf (inventory) */
  #bottom-bar {
    flex-shrink: 0;
    background: linear-gradient(180deg, #fff4ff, #ffe0f0);
    border-top: 3px solid #fff;
    box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
    padding: 4px 4px 6px;
    height: 150px;
    display: flex; flex-direction: column;
  }
  #cat-tabs {
    display: flex; gap: 3px;
    overflow-x: auto;
    padding: 2px;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0;
    background: #fff;
    border: 2px solid #ffb0d8;
    border-radius: 14px;
    padding: 3px 8px;
    font-size: 14px;
    font-weight: bold;
    color: #d63384;
    cursor: pointer;
    white-space: nowrap;
  }
  .cat-tab.active {
    background: linear-gradient(180deg, #ff80c0, #ff5096);
    color: #fff;
    border-color: #fff;
    box-shadow: 0 2px 4px rgba(255,80,180,0.4);
  }
  #inventory {
    flex: 1;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px;
    align-items: center;
    scrollbar-width: thin;
  }
  .inv-sticker {
    flex-shrink: 0;
    width: 64px; height: 64px;
    background: #fff;
    border: 2px solid #ffb0d8;
    border-radius: 14px;
    padding: 4px;
    cursor: grab;
    position: relative;
    touch-action: none;
    transition: transform 0.1s;
  }
  .inv-sticker:active { transform: scale(0.92); }
  .inv-sticker.empty { opacity: 0.3; cursor: default; }
  .inv-sticker .count {
    position: absolute;
    bottom: -4px; right: -4px;
    background: #ff5096;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 1px 5px;
    border-radius: 10px;
    border: 2px solid #fff;
    min-width: 18px; text-align: center;
  }
  .inv-sticker.rare { border-color: #5cb8f5; box-shadow: 0 0 6px rgba(92,184,245,0.5); }
  .inv-sticker.srare { border-color: #c870ff; box-shadow: 0 0 8px rgba(200,112,255,0.6); }
  .inv-sticker.urare {
    border-color: #ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,0.8);
    animation: shineUR 1.5s linear infinite;
  }
  @keyframes shineUR {
    0%,100% { box-shadow: 0 0 8px rgba(255,215,0,0.6); }
    50% { box-shadow: 0 0 16px rgba(255,215,0,1); }
  }

  /* Right command pad */
  #cmd-pad {
    position: fixed;
    top: 56px;
    right: 6px;
    display: flex; flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  .cmd-btn {
    width: 48px; height: 48px;
    background: linear-gradient(180deg, #fff, #ffe0f0);
    border: 3px solid #ff80c0;
    border-radius: 14px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 3px 0 #c44d85, 0 4px 8px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
  }
  .cmd-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c44d85; }

  /* Left small pad (size etc.) */
  #left-pad {
    position: fixed;
    top: 56px;
    left: 6px;
    display: flex; flex-direction: column;
    gap: 6px;
    z-index: 50;
  }

  /* Drag follower */
  #drag-follower {
    position: fixed;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 9000;
    transform: translate(-50%,-50%) scale(1.1);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    display: none;
  }

  /* Gacha overlay */
  #gacha-overlay {
    position: fixed; inset: 0;
    background: rgba(50,20,80,0.85);
    z-index: 5000;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #gacha-overlay.active { display: flex; }
  #gacha-box {
    width: 220px; height: 220px;
    position: relative;
    transition: transform 0.4s;
  }
  #gacha-box.shake { animation: gachaShake 0.4s ease-in-out 3; }
  @keyframes gachaShake {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-12deg); }
    75% { transform: rotate(12deg); }
  }
  #gacha-result {
    margin-top: 20px;
    text-align: center;
    color: #fff;
    display: none;
  }
  #gacha-result.show { display: block; animation: gachaResultIn 0.6s ease-out; }
  @keyframes gachaResultIn {
    0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  #gacha-result svg { width: 160px; height: 160px; filter: drop-shadow(0 0 20px gold); }
  #gacha-result .gname {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, #fff, #ffd700);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-top: 10px;
    -webkit-text-stroke: 1px #ff80c0;
  }
  #gacha-result .grarity {
    font-size: 18px;
    margin-top: 4px;
    font-weight: bold;
  }
  #gacha-buttons {
    margin-top: 22px;
    display: flex; gap: 14px;
    display: none;
  }
  #gacha-buttons.show { display: flex; }

  /* sparkles */
  .spark {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    animation: sparkAnim 0.8s ease-out forwards;
  }
  @keyframes sparkAnim {
    0% { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
    100% { transform: translate(var(--tx,0),var(--ty,-40px)) scale(1.3); opacity: 0; }
  }
  .ur-burst {
    position: fixed; inset: 0;
    z-index: 9999;
    pointer-events: none;
  }

  /* Theme picker */
  #theme-scene {
    background: linear-gradient(180deg, #ffe0f0 0%, #c0a0ff 100%);
    overflow-y: auto;
    padding: 50px 10px 20px;
    display: none;
  }
  #theme-scene.active { display: block; }
  #theme-scene h2 {
    text-align: center;
    color: #fff;
    font-size: 26px;
    text-shadow: 2px 2px 0 #d63384;
    margin: 4px 0 14px;
  }
  #theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 500px;
    margin: 0 auto;
  }
  .theme-card {
    aspect-ratio: 4/3;
    border-radius: 18px;
    border: 4px solid #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex; align-items: flex-end;
    transition: transform 0.1s;
  }
  .theme-card:active { transform: scale(0.96); }
  .theme-card .tlabel {
    width: 100%;
    background: rgba(255,255,255,0.85);
    padding: 6px;
    text-align: center;
    font-weight: bold;
    color: #d63384;
    font-size: 14px;
  }
  .theme-card.locked {
    filter: grayscale(0.7) brightness(0.7);
  }
  .theme-card.locked::after {
    content: '🔒';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
  }

  /* Album/Zukan */
  #zukan-scene {
    background: linear-gradient(180deg, #c0a0ff 0%, #ffb3d9 100%);
    overflow-y: auto;
    padding: 50px 10px 20px;
    display: none;
  }
  #zukan-scene.active { display: block; }
  #zukan-scene h2 {
    text-align: center;
    color: #fff;
    font-size: 26px;
    text-shadow: 2px 2px 0 #6030a0;
    margin: 4px 0 6px;
  }
  #zukan-progress {
    text-align: center;
    color: #fff;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 1px 1px 0 #6030a0;
  }
  .zukan-section {
    background: rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 8px;
    margin-bottom: 10px;
  }
  .zukan-section h3 {
    color: #6030a0;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .zukan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
    gap: 6px;
  }
  .zukan-cell {
    aspect-ratio: 1;
    background: #fff;
    border: 2px solid #c0a0ff;
    border-radius: 10px;
    padding: 4px;
    position: relative;
  }
  .zukan-cell.locked { background: #e8d8ff; }
  .zukan-cell.locked svg { filter: brightness(0); opacity: 0.2; }

  /* Mini game (renda) */
  #mini-overlay {
    position: fixed; inset: 0;
    background: rgba(255,200,240,0.95);
    z-index: 6000;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #mini-overlay.active { display: flex; }
  #mini-overlay h2 {
    font-size: 30px;
    color: #d63384;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 14px;
  }
  #mini-counter {
    font-size: 60px;
    font-weight: 900;
    color: #ff5096;
    text-shadow: 3px 3px 0 #fff;
  }
  #mini-timer {
    font-size: 22px;
    color: #6030a0;
    margin-bottom: 14px;
    font-weight: bold;
  }
  #mini-btn {
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 6px solid #fff;
    background: radial-gradient(circle at 30% 30%, #ff80c0, #d63384);
    color: #fff;
    font-size: 50px;
    box-shadow: 0 6px 0 #c44d85, 0 8px 16px rgba(0,0,0,0.3);
    cursor: pointer;
    margin-top: 16px;
  }
  #mini-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c44d85; }
  #mini-result { margin-top: 20px; font-size: 22px; color: #6030a0; font-weight: bold; }

  /* Card / Photo mode */
  #card-overlay {
    position: fixed; inset: 0;
    background: rgba(40,20,60,0.92);
    z-index: 6500;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #card-overlay.active { display: flex; }
  #card-canvas-wrap {
    background: #fff;
    border: 6px solid gold;
    border-radius: 18px;
    box-shadow: 0 0 30px gold;
    padding: 8px;
    max-width: 95vw;
    max-height: 70vh;
  }
  #card-canvas-wrap canvas, #card-canvas-wrap img {
    max-width: 100%;
    max-height: 60vh;
    display: block;
    border-radius: 10px;
  }
  #card-overlay .help {
    color: #fff; margin-top: 12px; font-size: 14px;
    text-align: center;
  }

  /* Modal */
  #modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 8000;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #modal-bg.active { display: flex; }
  #modal-box {
    background: #fff;
    border-radius: 18px;
    border: 4px solid #ff80c0;
    padding: 18px;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  #modal-title { font-size: 20px; color: #d63384; margin-bottom: 8px; font-weight: bold; }
  #modal-body { color: #555; margin-bottom: 14px; font-size: 16px; }
  #modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(50,20,80,0.85);
    color: #fff;
    padding: 10px 18px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: bold;
    z-index: 9500;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #toast.show { opacity: 1; }

  /* Floating sparkles around board */
  .bg-sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    opacity: 0.5;
    animation: bgSparkAnim 4s linear infinite;
  }
  @keyframes bgSparkAnim {
    0%,100% { transform: translateY(0) rotate(0); opacity: 0.3; }
    50% { transform: translateY(-12px) rotate(180deg); opacity: 0.8; }
  }

  /* Sticker glow on placement */
  .placed.justplaced { animation: placedAnim 0.5s; }
  @keyframes placedAnim {
    0% { transform: translate(-50%,-50%) scale(1.5); filter: drop-shadow(0 0 10px gold); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }

  /* Responsive tweaks */
  @media (max-height: 600px) {
    #bottom-bar { height: 120px; }
    .cmd-btn { width: 42px; height: 42px; font-size: 18px; }
  }
</style>
</head>
<body>

<a id="portalBtn" href="./" aria-label="ポータルへもどる">🏠</a>
<button id="muteBtn" aria-label="おとON/OFF">🔊</button>

<!-- ============= TITLE SCENE ============= -->
<div id="title-scene" class="scene active">
  <div class="title-deco" style="top:8%; left:10%;">⭐</div>
  <div class="title-deco" style="top:14%; right:12%; animation-delay:0.5s;">💖</div>
  <div class="title-deco" style="bottom:20%; left:8%; animation-delay:1s;">🌸</div>
  <div class="title-deco" style="bottom:30%; right:14%; animation-delay:1.5s;">✨</div>
  <div class="title-deco" style="top:30%; left:20%; animation-delay:0.8s;">🦄</div>
  <div class="title-deco" style="bottom:10%; right:20%; animation-delay:1.2s;">🌟</div>
  <h1>キラキラ☆<br>シールちょう</h1>
  <div class="sub">あつめて♪ はって♪ かわいくしよう！</div>
  <div id="title-buttons">
    <button class="btn" id="btn-new">✨ はじめる</button>
    <button class="btn purple" id="btn-continue">📖 つづきから</button>
    <button class="btn yellow" id="btn-zukan-from-title">🌟 シールずかん</button>
  </div>
</div>

<!-- ============= MAIN SCENE ============= -->
<div id="main-scene" class="scene">
  <div id="top-bar">
    <div id="theme-name">🌸 おはなばたけ</div>
    <div id="stars-display">⭐ <span id="stars-num">20</span></div>
  </div>
  <div id="board-wrap">

// ===================== UTIL =====================
function attachTap(el, fn) {
  if (!el) return;
  let touched = false;
  el.addEventListener('touchstart', () => { touched = true; }, { passive: true });
  el.addEventListener('touchend', (e) => {
    if (!touched || el.disabled) { touched = false; return; }
    touched = false;
    e.preventDefault();
    fn.call(el, e);
  }, { passive: false });
  el.addEventListener('touchcancel', () => { touched = false; }, { passive: true });
  el.addEventListener('click', (e) => fn.call(el, e));
}

function $(id) { return document.getElementById(id); }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function showToast(msg, ms) {
  const t = $('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms || 1500);
}

function showModal(title, body, buttons) {
  $('modal-title').innerHTML = title;
  $('modal-body').innerHTML = body;
  const bc = $('modal-buttons');
  bc.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (b.cls || '');
    btn.innerHTML = b.label;
    attachTap(btn, () => { hideModal(); if (b.fn) b.fn(); });
    bc.appendChild(btn);
  });
  $('modal-bg').classList.add('active');
}
function hideModal() { $('modal-bg').classList.remove('active'); }

function switchScene(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ===================== AUDIO =====================
let audioCtx = null;
let muted = false;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function sfx(freq, dur, type, vol) {
  if (muted) return;
  ensureAudio(); if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.15));
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + (dur || 0.15) + 0.05);
}
function sfxTap()    { sfx(880 + Math.random()*200, 0.04, 'sine', 0.06); }
function sfxPeta()   { sfx(660, 0.06, 'sine', 0.12); setTimeout(()=>sfx(880,0.05,'sine',0.1),40); }
function sfxRemove() { sfx(440, 0.08, 'triangle', 0.1); setTimeout(()=>sfx(330,0.1,'triangle',0.08),50); }
function sfxGet()    { sfx(660, 0.08, 'sine', 0.14); setTimeout(()=>sfx(880,0.08,'sine',0.14),80); setTimeout(()=>sfx(1175,0.16,'sine',0.16),160); }
function sfxRare()   { for (let i=0;i<6;i++) setTimeout(()=>sfx(440+i*120,0.08,'sine',0.12), i*70); }
function sfxUR()     { for (let i=0;i<10;i++) setTimeout(()=>sfx(523+i*80,0.1,'sine',0.16), i*60); setTimeout(()=>sfx(1568,0.4,'sine',0.18),700); }
function sfxOpen()   { sfx(330, 0.1, 'sine', 0.12); setTimeout(()=>sfx(523,0.1,'sine',0.12),100); setTimeout(()=>sfx(784,0.18,'sine',0.14),200); }
function sfxNoStar() { sfx(220, 0.18, 'triangle', 0.14); }
function sfxBgm() {
  // tiny twinkle melody loop (handled by interval)
}

// Soft BGM via interval
let bgmTimer = null;
const bgmNotes = [523, 659, 784, 1047, 784, 659, 523, 587, 659, 587];
let bgmIdx = 0;
function startBgm() {
  if (bgmTimer || muted) return;
  bgmTimer = setInterval(() => {
    if (muted) return;
    sfx(bgmNotes[bgmIdx % bgmNotes.length], 0.15, 'sine', 0.04);
    bgmIdx++;
  }, 600);
}
function stopBgm() {
  if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
}

// ===================== STATE =====================
const SAVE_KEY = 'sticker_book_v1';

const defaultState = () => ({
  stars: 20,
  lastStarTime: Date.now(),
  inventory: {}, // { stickerId: count }
  collected: {}, // { stickerId: true } (zukan)
  themePlacements: {}, // { themeId: [ { id, x, y, rot, scale } ] }
  unlockedThemes: { flower:true, sweets:true, cloud:true }, // start unlocked
  currentTheme: 'flower',
  lastBonus: 0, // unix ms of last daily bonus
  muted: false
});

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const o = JSON.parse(raw);
    state = Object.assign(defaultState(), o);
    // ensure nested
    state.inventory = state.inventory || {};
    state.collected = state.collected || {};
    state.themePlacements = state.themePlacements || {};
    state.unlockedThemes = state.unlockedThemes || { flower:true, sweets:true, cloud:true };
    return true;
  } catch(e) { return false; }
}
function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ===================== STAR REGEN =====================
const STAR_REGEN_MS = 5 * 60 * 1000; // 5 min per +1
const STAR_MAX = 99;

function regenStars() {
  const now = Date.now();
  const dt = now - (state.lastStarTime || now);
  if (dt >= STAR_REGEN_MS && state.stars < STAR_MAX) {
    const add = Math.min(Math.floor(dt / STAR_REGEN_MS), STAR_MAX - state.stars);
    state.stars += add;
    state.lastStarTime = now - (dt % STAR_REGEN_MS);
    saveState();
    updateStars();
  }
}
function updateStars() {
  $('stars-num').textContent = state.stars;
}

setInterval(regenStars, 30000); // every 30s check

// ===================== ZUKAN =====================
function buildZukan() {
  const wrap = $('zukan-content');
  wrap.innerHTML = '';
  const total = STICKERS.length;
  const got = Object.keys(state.collected).length;
  $('zukan-progress').textContent = `あつめたシール: ${got}/${total}`;

  CATEGORIES.forEach(cat => {
    const items = byCat[cat.id];
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.className = 'zukan-section';
    const h3 = document.createElement('h3');
    h3.textContent = cat.label;
    sec.appendChild(h3);
    const grid = document.createElement('div');
    grid.className = 'zukan-grid';
    items.forEach(s => {
      const cell = document.createElement('div');
      cell.className = 'zukan-cell ' + (state.collected[s.id] ? '' : 'locked');
      cell.innerHTML = s.draw();
      cell.title = state.collected[s.id] ? s.name : 'まだだよ';
      grid.appendChild(cell);
    });
    sec.appendChild(grid);
    wrap.appendChild(sec);
  });
}

// ===================== THEME PICKER =====================
function buildThemeGrid() {
  const grid = $('theme-grid');
  grid.innerHTML = '';
  THEMES.forEach((t, i) => {
    const card = document.createElement('div');
    const unlocked = !!state.unlockedThemes[t.id];
    card.className = 'theme-card' + (unlocked ? '' : ' locked');
    card.innerHTML = t.bg() + `<div class="tlabel">${t.emoji} ${t.name}</div>`;
    attachTap(card, () => {
      if (!unlocked) {
        // unlock cost: 30 stars
        if (state.stars >= 30) {
          showModal('だいしを かう？', `<div style="font-size:18px;">⭐30 で「${t.emoji} ${t.name}」を ひらこう！</div>`, [
            { label:'やめる', cls:'gray' },
            { label:'ひらく！', cls:'yellow', fn: () => {
              state.stars -= 30;
              state.unlockedThemes[t.id] = true;
              saveState();
              updateStars();
              buildThemeGrid();
              sfxRare();
              showToast('だいしが ふえたよ！🎉');
            } }
          ]);
        } else {
          showToast('⭐が たりないよ〜（30こ ひつよう）');
          sfxNoStar();
        }
        return;
      }
      sfxTap();
      state.currentTheme = t.id;
      saveState();
      switchScene('main-scene');
      renderBoard();
      updateThemeName();
    });
    grid.appendChild(card);
  });
}

function updateThemeName() {
  const t = THEMES.find(x => x.id === state.currentTheme) || THEMES[0];
  $('theme-name').textContent = `${t.emoji} ${t.name}`;
}

// ===================== INVENTORY UI =====================
let activeCat = 'animal';
let zukanFromMain = false;
function buildCategoryTabs() {
  const tabs = $('cat-tabs');
  tabs.innerHTML = '';
  CATEGORIES.forEach(c => {
    const t = document.createElement('div');
    t.className = 'cat-tab' + (c.id === activeCat ? ' active' : '');
    t.textContent = c.label;
    attachTap(t, () => {
      activeCat = c.id;
      buildCategoryTabs();
      buildInventory();
      sfxTap();
    });
    tabs.appendChild(t);
  });
}
function buildInventory() {
  const inv = $('inventory');
  inv.innerHTML = '';
  const items = byCat[activeCat] || [];
  items.forEach(s => {
    const c = state.inventory[s.id] || 0;
    const div = document.createElement('div');
    div.className = 'inv-sticker rarity-' + s.rarity + (c > 0 ? '' : ' empty');
    if (s.rarity === 'r')  div.classList.add('rare');
    if (s.rarity === 'sr') div.classList.add('srare');
    if (s.rarity === 'ur') div.classList.add('urare');
    div.innerHTML = s.draw() + (c > 0 ? `<div class="count">${c}</div>` : '');
    div.dataset.sid = s.id;
    if (c > 0) attachInvDrag(div, s);
    inv.appendChild(div);
  });
  if (!items.length) {
    inv.innerHTML = '<div style="color:#a06090;font-size:14px;padding:20px;">まだ ないよ〜</div>';
  }
}

// ===================== DRAG: INVENTORY -> BOARD =====================
const dragFollower = $('drag-follower');
let drag = null; // { sid, sticker, source: 'inv' | 'placed', placedIdx }

function startDrag(sticker, source, placedIdx, x, y) {
  drag = { sid: sticker.id, sticker, source, placedIdx };
  dragFollower.style.display = 'block';
  // Set image via SVG data url
  dragFollower.src = svgToDataURL(sticker.draw());
  moveDragFollower(x, y);
}
function moveDragFollower(x, y) {
  dragFollower.style.left = x + 'px';
  dragFollower.style.top = y + 'px';
}
function endDrag(x, y) {
  if (!drag) return;
  dragFollower.style.display = 'none';
  // Check if drop is over board
  const board = $('board');
  const rect = board.getBoundingClientRect();
  if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
    // place
    const bx = x - rect.left;
    const by = y - rect.top;
    if (drag.source === 'inv') {
      placeSticker(drag.sticker, bx, by);
    } else if (drag.source === 'placed') {
      // move existing
      const arr = state.themePlacements[state.currentTheme] || [];
      if (arr[drag.placedIdx]) {
        arr[drag.placedIdx].x = bx / rect.width;
        arr[drag.placedIdx].y = by / rect.height;
        saveState();
        renderBoard();
      }
    }
  } else {
    // not on board - cancel (no penalty)
    if (drag.source === 'placed') {
      // dropping outside in a "trash" gesture? - just leave it
    }
  }
  drag = null;
}

function svgToDataURL(svg) {
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

function attachInvDrag(el, sticker) {
  // touchstart -> moves -> touchend
  let started = false;
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    started = true;
    const t = e.touches[0];
    startDrag(sticker, 'inv', null, t.clientX, t.clientY);
    sfxTap();
  }, { passive: false });
  el.addEventListener('mousedown', (e) => {
    started = true;
    startDrag(sticker, 'inv', null, e.clientX, e.clientY);
    sfxTap();
  });
}

// global movement
document.addEventListener('touchmove', (e) => {
  if (!drag) return;
  const t = e.touches[0];
  if (t) moveDragFollower(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });
document.addEventListener('mousemove', (e) => {
  if (!drag) return;
  moveDragFollower(e.clientX, e.clientY);
});
document.addEventListener('touchend', (e) => {
  if (!drag) return;
  const t = e.changedTouches[0];
  if (t) endDrag(t.clientX, t.clientY);
  else endDrag(-1,-1);
}, { passive: false });
document.addEventListener('mouseup', (e) => {
  if (!drag) return;
  endDrag(e.clientX, e.clientY);
});

// ===================== PLACE / RENDER STICKERS =====================
function placeSticker(sticker, bx, by) {
  // requires sticker in inventory > 0
  if ((state.inventory[sticker.id] || 0) <= 0) {
    showToast('ストックが ないよ');
    return;
  }
  const board = $('board');
  const rect = board.getBoundingClientRect();
  const arr = state.themePlacements[state.currentTheme] = state.themePlacements[state.currentTheme] || [];
  arr.push({
    id: sticker.id,
    x: bx / rect.width,
    y: by / rect.height,
    rot: rand(-15, 15),
    scale: 1
  });
  state.inventory[sticker.id]--;
  saveState();
  renderBoard();
  buildInventory();
  sfxPeta();
  // sparkle
  spawnSparkles(bx + rect.left, by + rect.top, 4, ['✨','💖','⭐']);
}

function renderBoard() {
  const board = $('board');
  const t = THEMES.find(x => x.id === state.currentTheme) || THEMES[0];
  board.innerHTML = t.bg();

  const arr = state.themePlacements[state.currentTheme] || [];
  arr.forEach((p, idx) => {
    const sticker = STICKERS.find(s => s.id === p.id);
    if (!sticker) return;
    const div = document.createElement('div');
    div.className = 'placed';
    div.style.left = (p.x * 100) + '%';
    div.style.top = (p.y * 100) + '%';
    div.style.transform = `translate(-50%,-50%) rotate(${p.rot||0}deg) scale(${p.scale||1})`;
    div.innerHTML = sticker.draw();
    div.dataset.idx = idx;
    attachPlacedHandlers(div, sticker, idx);
    board.appendChild(div);
  });
}

function attachPlacedHandlers(el, sticker, idx) {
  let pressTimer = null;
  let moved = false;
  let startX = 0, startY = 0;
  let dragging = false;

  const startPress = (x, y) => {
    moved = false;
    startX = x; startY = y;
    pressTimer = setTimeout(() => {
      // long press -> ask remove
      if (!moved) {
        confirmRemove(idx);
      }
    }, 600);
  };
  const movePress = (x, y) => {
    const dx = x - startX, dy = y - startY;
    if (!moved && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      moved = true;
      if (pressTimer) clearTimeout(pressTimer);
      // start drag of placed
      dragging = true;
      // remove from rendered to avoid duplicate
      el.classList.add('dragging');
      startDrag(sticker, 'placed', idx, x, y);
    }
    if (dragging) moveDragFollower(x, y);
  };
  const endPress = () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (dragging) { dragging = false; }
  };

  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    startPress(t.clientX, t.clientY);
  }, { passive: false });
  el.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (t) movePress(t.clientX, t.clientY);
  }, { passive: false });
  el.addEventListener('touchend', endPress);
  el.addEventListener('touchcancel', endPress);

  el.addEventListener('mousedown', (e) => {
    startPress(e.clientX, e.clientY);
  });
  el.addEventListener('mousemove', (e) => {
    if (e.buttons) movePress(e.clientX, e.clientY);
  });
  el.addEventListener('mouseup', endPress);
}

function confirmRemove(idx) {
  showModal('はがす？', '<div style="font-size:30px;">🤔</div><div style="margin-top:8px;">このシール はがしちゃう？</div>', [
    { label:'やめる', cls:'gray' },
    { label:'はがす', cls:'yellow', fn: () => {
      const arr = state.themePlacements[state.currentTheme] || [];
      const p = arr[idx];
      if (!p) return;
      // return sticker to inventory
      state.inventory[p.id] = (state.inventory[p.id] || 0) + 1;
      arr.splice(idx, 1);
      saveState();
      renderBoard();
      buildInventory();
      sfxRemove();
      showToast('もどしたよ〜');
    }}
  ]);
}

// ===================== GACHA =====================
function rollRarity() {
  const r = Math.random() * 100;
  if (r < 0.5) return 'ur';
  if (r < 5) return 'sr';
  if (r < 20) return 'r';
  return 'n';
}
function rollSticker() {
  const rarity = rollRarity();
  const pool = STICKERS.filter(s => s.rarity === rarity);
  if (!pool.length) {
    return STICKERS.find(s => s.rarity === 'n');
  }
  return pick(pool);
}

function doGacha() {
  if (state.stars < 5) {
    showToast('⭐が たりないよ〜（5こ ひつよう）');
    sfxNoStar();
    return;
  }
  state.stars -= 5;
  updateStars();
  saveState();

  $('gacha-overlay').classList.add('active');
  $('gacha-result').classList.remove('show');
  $('gacha-buttons').classList.remove('show');
  const box = $('gacha-box');
  box.classList.remove('shake');
  void box.offsetWidth;
  box.classList.add('shake');
  sfxOpen();

  setTimeout(() => {
    const sticker = rollSticker();
    state.inventory[sticker.id] = (state.inventory[sticker.id] || 0) + 1;
    state.collected[sticker.id] = true;
    saveState();
    showGachaResult(sticker);
  }, 1400);
}

function showGachaResult(sticker) {
  $('gacha-svg-wrap').innerHTML = `<div style="width:160px;height:160px;display:inline-block;">${sticker.draw()}</div>`;
  $('gacha-name').textContent = sticker.name;
  const rar = RARITY[sticker.rarity];
  $('gacha-rarity').innerHTML = `<span style="color:${rar.color};">${rar.name}</span>`;
  $('gacha-result').classList.add('show');
  $('gacha-buttons').classList.add('show');
  $('gacha-box').style.opacity = 0;

  if (sticker.rarity === 'n') sfxGet();
  else if (sticker.rarity === 'r') sfxRare();
  else if (sticker.rarity === 'sr') { sfxRare(); spawnBurst(20, ['✨','💜','⭐']); }
  else if (sticker.rarity === 'ur') { sfxUR(); spawnBurst(40, ['✨','🌟','💖','⭐','💎']); }

  buildInventory();
}

function closeGacha() {
  $('gacha-overlay').classList.remove('active');
  $('gacha-box').style.opacity = 1;
}

// ===================== SPARKLES =====================
function spawnSparkles(x, y, n, chars) {
  const cs = chars || ['✨','⭐','💖'];
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = pick(cs);
    s.style.position = 'fixed';
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const tx = (Math.random() - 0.5) * 80;
    const ty = -40 - Math.random() * 60;
    s.style.setProperty('--tx', tx + 'px');
    s.style.setProperty('--ty', ty + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}
function spawnBurst(n, chars) {
  const burst = document.createElement('div');
  burst.className = 'ur-burst';
  document.body.appendChild(burst);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      spawnSparkles(window.innerWidth/2, window.innerHeight/2, 1, chars);
    }, i * 30);
  }
  setTimeout(() => burst.remove(), 2000);
}

// ===================== MINI GAME (Renda) =====================
let miniActive = false;
let miniCount = 0;
let miniTimer = null;
let miniRemain = 3.0;
function startMini() {
  if (miniActive) return;
  miniActive = true;
  miniCount = 0;
  miniRemain = 3.0;
  $('mini-counter').textContent = '0';
  $('mini-timer').textContent = '3';
  $('mini-result').textContent = '';
  $('mini-overlay').classList.add('active');

  const startTs = Date.now();
  miniTimer = setInterval(() => {
    const dt = (Date.now() - startTs) / 1000;
    miniRemain = Math.max(0, 3.0 - dt);
    $('mini-timer').textContent = miniRemain.toFixed(1);
    if (miniRemain <= 0) endMini();
  }, 100);
}
function endMini() {
  if (!miniActive) return;
  miniActive = false;
  clearInterval(miniTimer); miniTimer = null;
  // Reward: 1 star per 5 taps, max +20
  const reward = Math.min(20, Math.floor(miniCount / 5));
  state.stars = Math.min(STAR_MAX, state.stars + reward);
  saveState();
  updateStars();
  $('mini-result').innerHTML = `${miniCount}かい！⭐+${reward} ゲット！`;
  if (reward >= 10) sfxRare(); else sfxGet();
  setTimeout(() => {
    $('mini-overlay').classList.remove('active');
  }, 1800);
}
attachTap($('mini-btn'), () => {
  if (!miniActive) return;
  miniCount++;
  $('mini-counter').textContent = miniCount;
  sfxTap();
});

// ===================== DAILY BONUS =====================
function doBonus() {
  const now = Date.now();
  const last = state.lastBonus || 0;
  // Check different calendar day (local)
  const dLast = new Date(last);
  const dNow = new Date(now);
  const sameDay = (dLast.getFullYear() === dNow.getFullYear() &&
                   dLast.getMonth() === dNow.getMonth() &&
                   dLast.getDate() === dNow.getDate());
  if (sameDay && last !== 0) {
    showToast('きょうは もう もらったよ〜🎁');
    return;
  }
  state.lastBonus = now;
  state.stars = Math.min(STAR_MAX, state.stars + 10);
  saveState();
  updateStars();
  sfxRare();
  spawnBurst(15, ['🎁','✨','⭐']);
  showModal('🎁 きょうの おまけ', '<div style="font-size:40px;">🎀</div><div style="margin-top:8px;">⭐10 もらったよ！</div>', [
    { label:'やったー！', cls:'green' }
  ]);
}

// ===================== PHOTO / CARD MODE =====================
function showCard() {
  const board = $('board');
  const rect = board.getBoundingClientRect();
  const W = 600, H = 800;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,H);

  // gold border
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, '#ffd700');
  grad.addColorStop(0.5, '#ff80c0');
  grad.addColorStop(1, '#ffd700');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 16;
  ctx.strokeRect(8,8,W-16,H-16);

  // theme name
  ctx.fillStyle = '#d63384';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  const t = THEMES.find(x => x.id === state.currentTheme) || THEMES[0];
  ctx.fillText(`${t.emoji} ${t.name}`, W/2, 60);

  // Render board area: capture board via foreignObject? Simpler: draw bg gradient + emojis approximation
  const boardX = 30, boardY = 90, boardW = W - 60, boardH = H - 180;
  ctx.fillStyle = '#ffe0f0';
  ctx.fillRect(boardX, boardY, boardW, boardH);

  // Use SVG to image: render background SVG via Image
  const svgBg = (function(){
    // Extract first <svg> from theme.bg()
    const html = t.bg();
    const m = html.match(/<svg[\s\S]*?<\/svg>/);
    return m ? m[0] : '';
  })();

  const drawAll = () => {
    // Render placed stickers
    const arr = state.themePlacements[state.currentTheme] || [];
    let pending = arr.length;
    if (!pending) {
      finalize();
      return;
    }
    arr.forEach(p => {
      const sticker = STICKERS.find(s => s.id === p.id);
      if (!sticker) { pending--; if (!pending) finalize(); return; }
      const img = new Image();
      img.onload = () => {
        const sw = 64 * (p.scale||1);
        const cx = boardX + (p.x * boardW);
        const cy = boardY + (p.y * boardH);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(((p.rot||0) * Math.PI) / 180);
        ctx.drawImage(img, -sw/2, -sw/2, sw, sw);
        ctx.restore();
        pending--;
        if (!pending) finalize();
      };
      img.onerror = () => { pending--; if (!pending) finalize(); };
      img.src = svgToDataURL(sticker.draw());
    });
  };

  const finalize = () => {
    // date
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${(now.getMonth()+1)}.${now.getDate()}`;
    ctx.fillStyle = '#a060c0';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText(`✨ ${dateStr} ✨`, W/2, H - 50);
    ctx.fillStyle = '#ff80c0';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('キラキラ☆シールちょう', W/2, H - 22);

    // Output as image for long-press save
    const wrap = $('card-canvas-wrap');
    wrap.innerHTML = '';
    const img = document.createElement('img');
    img.src = canvas.toDataURL('image/png');
    img.alt = 'シールカード';
    img.style.width = '100%';
    img.style.borderRadius = '10px';
    wrap.appendChild(img);
    $('card-overlay').classList.add('active');
    sfxRare();
  };

  // First draw bg svg if exists
  if (svgBg) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, boardX, boardY, boardW, boardH);
      drawAll();
    };
    img.onerror = () => { drawAll(); };
    img.src = svgToDataURL(svgBg);
  } else {
    drawAll();
  }
}

// ===================== TITLE / SCENE WIRING =====================
function startNewGame() {
  if (Object.keys(state.inventory).length > 0 || Object.keys(state.collected).length > 0) {
    showModal('あたらしく はじめる？', 'いままでの きろくは きえちゃうよ。<br>ほんとに いい？', [
      { label:'やめる', cls:'gray' },
      { label:'はじめる', cls:'yellow', fn: () => {
        state = defaultState();
        saveState();
        enterMain(true);
      }}
    ]);
  } else {
    enterMain(true);
  }
}

function enterMain(welcome) {
  switchScene('main-scene');
  buildCategoryTabs();
  buildInventory();
  renderBoard();
  updateStars();
  updateThemeName();
  startBgm();
  if (welcome) {
    showToast('シールゲットボタン (🎁) で あつめよう！', 2400);
  }
}

// ===================== EVENTS =====================
function bindEvents() {
  attachTap($('btn-new'), () => { ensureAudio(); startNewGame(); });
  attachTap($('btn-continue'), () => { ensureAudio(); enterMain(false); });
  attachTap($('btn-zukan-from-title'), () => { ensureAudio(); zukanFromMain = false; buildZukan(); switchScene('zukan-scene'); });

  attachTap($('btn-gacha'), () => { ensureAudio(); doGacha(); });
  attachTap($('btn-theme'), () => { ensureAudio(); buildThemeGrid(); switchScene('theme-scene'); });
  attachTap($('btn-zukan'), () => { zukanFromMain = true; buildZukan(); switchScene('zukan-scene'); });
  attachTap($('btn-photo'), () => { showCard(); });
  attachTap($('btn-mini'), () => { ensureAudio(); startMini(); });
  attachTap($('btn-bonus'), () => { doBonus(); });

  attachTap($('btn-gacha-again'), () => { closeGacha(); doGacha(); });
  attachTap($('btn-gacha-ok'), () => { closeGacha(); });

  attachTap($('theme-back'), () => { switchScene('main-scene'); });
  attachTap($('zukan-back'), () => {
    // Return to main if game started (has entered main scene at least once), else title
    if (zukanFromMain) {
      switchScene('main-scene');
    } else {
      switchScene('title-scene');
    }
  });
  attachTap($('card-close'), () => { $('card-overlay').classList.remove('active'); });

  attachTap($('muteBtn'), () => {
    muted = !muted;
    state.muted = muted;
    saveState();
    $('muteBtn').textContent = muted ? '🔇' : '🔊';
    if (muted) stopBgm(); else { ensureAudio(); startBgm(); }
  });

  // Prevent context menu on long press to keep "long press to remove" UX clean
  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest('#board') || e.target.closest('#inventory')) e.preventDefault();
  });
}

// ===================== INIT =====================
function init() {
  loadState();
  muted = !!state.muted;
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
  regenStars();
  updateStars();
  bindEvents();

  // Build initial UI (some lazy)
  buildCategoryTabs();
  buildInventory();
}

window.addEventListener('load', init);
window.addEventListener('beforeunload', saveState);
window.addEventListener('visibilitychange', () => {
  if (document.hidden) saveState();
  else regenStars();
});
</script>
