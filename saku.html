  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const chars = text.split('');
    const lines = [];
    let line = '';
    for (const ch of chars) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = ch;
      } else line = test;
    }
    if (line) lines.push(line);
    ctx.restore();
    return lines;
  }

  // ====== ルビ対応テキスト ======
  // 記法: "ふつうの文章[漢字|かんじ]を[送|おく]る"
  function parseRuby(text) {
    const segs = [];
    let i = 0;
    while (i < text.length) {
      if (text[i] === '[') {
        const end = text.indexOf(']', i);
        if (end < 0) { segs.push({ type: 'plain', s: text.substring(i) }); break; }
        const inner = text.substring(i+1, end);
        const pipe = inner.indexOf('|');
        if (pipe > 0) {
          // 1文字ずつに分割してまとめて rt に入れる（1漢字1hiragana割当の方が綺麗）
          segs.push({ type: 'ruby', s: inner.substring(0, pipe), r: inner.substring(pipe+1) });
        } else {
          segs.push({ type: 'plain', s: '[' + inner + ']' });
        }
        i = end + 1;
      } else {
        let end = text.indexOf('[', i);
        if (end < 0) end = text.length;
        segs.push({ type: 'plain', s: text.substring(i, end) });
        i = end;
      }
    }
    return segs;
  }
  // セグメント列の表示幅（ベース文字幅）を返す
  function measureRuby(segs, font) {
    ctx.save();
    ctx.font = font;
    let w = 0;
    for (const s of segs) w += ctx.measureText(s.s).width;
    ctx.restore();
    return w;
  }
  // ルビ付きテキスト描画。基準 (x,y) に textAlign/textBaseline 従って描く
  function drawRuby(segsOrText, x, y, baseFont, options) {
    options = options || {};
    const segs = Array.isArray(segsOrText) ? segsOrText : parseRuby(segsOrText);
    ctx.save();
    ctx.font = baseFont;
    const baseSize = parseFloat(baseFont.match(/(\d+(?:\.\d+)?)px/)[1]);
    const rubyFont = (options.rubyFont) || `${Math.round(baseSize * 0.45)}px serif`;
    const totalW = measureRuby(segs, baseFont);
    let cx = x;
    if (ctx.textAlign === 'center') cx = x - totalW / 2;
    else if (ctx.textAlign === 'right') cx = x - totalW;
    const savedAlign = ctx.textAlign;
    ctx.textAlign = 'left';

    // 1回目: 縁取り（指定された場合）
    if (options.strokeStyle && options.lineWidth) {
      ctx.strokeStyle = options.strokeStyle;
      ctx.lineWidth = options.lineWidth;
      let px = cx;
      for (const s of segs) {
        const w = ctx.measureText(s.s).width;
        ctx.strokeText(s.s, px, y);
        if (s.type === 'ruby') {
          ctx.save();
          ctx.font = rubyFont;
          const rw = ctx.measureText(s.r).width;
          const rx = px + (w - rw) / 2;
          const ry = y - baseSize * 0.88;
          ctx.strokeText(s.r, rx, ry);
          ctx.restore();
        }
        px += w;
      }
    }
    // 2回目: 本体塗り
    if (options.fillStyle !== false) {
      ctx.fillStyle = options.fillStyle || ctx.fillStyle;
      let px = cx;
      for (const s of segs) {
        const w = ctx.measureText(s.s).width;
        ctx.fillText(s.s, px, y);
        if (s.type === 'ruby') {
          ctx.save();
          ctx.font = rubyFont;
          ctx.fillStyle = options.rubyFill || options.fillStyle || '#fff';
          const rw = ctx.measureText(s.r).width;
          const rx = px + (w - rw) / 2;
          const ry = y - baseSize * 0.88;
          ctx.fillText(s.r, rx, ry);
          ctx.restore();
        }
        px += w;
      }
    }
    ctx.textAlign = savedAlign;
    ctx.restore();
  }
  // ルビを単純に hiragana だけ取り出して通常文字列に変換（簡易）
  function stripRuby(text) {
    return text.replace(/\[([^\|\]]+)\|[^\]]+\]/g, '$1');
  }
  // ルビを考慮した折り返し
  function wrapRuby(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const segs = parseRuby(text);
    const lines = [];
    let lineSegs = [];
    let lineW = 0;
    for (const seg of segs) {
      // セグメント内を 1 文字ずつ進める（ruby 内も 1 文字ずつ）
      const chars = seg.s.split('');
      if (seg.type === 'ruby') {
        // ruby は分割せず1まとめで追加（切れたら不自然）
        const w = ctx.measureText(seg.s).width;
        if (lineW + w > maxWidth && lineW > 0) {
          lines.push(lineSegs); lineSegs = []; lineW = 0;
        }
        lineSegs.push({ type: 'ruby', s: seg.s, r: seg.r });
        lineW += w;
      } else {
        for (const ch of chars) {
          const w = ctx.measureText(ch).width;
          if (lineW + w > maxWidth && lineW > 0) {
            lines.push(lineSegs); lineSegs = []; lineW = 0;
          }
          // 連結：最後が plain なら結合
          if (lineSegs.length > 0 && lineSegs[lineSegs.length-1].type === 'plain') {
            lineSegs[lineSegs.length-1].s += ch;
          } else {
            lineSegs.push({ type: 'plain', s: ch });
          }
          lineW += w;
        }
      }
    }
    if (lineSegs.length) lines.push(lineSegs);
    ctx.restore();
    return lines;
  }

  // カットシーンのキャラ描画
  function drawCutsceneChar(speaker, x, y, id, step) {
    ctx.save();
    const revealed = (id === 'final-reveal' && step >= 4);
    if (speaker === 'nazo') {
      if (id === 'final-reveal' && step >= 3) {
        // フード脱ぐシーン
        drawToto(x, y, step - 3);
      } else {
        drawNazo(x, y);
      }
    } else if (speaker === 'toto') {

      if (id === 'final-reveal' && step >= 9) {
        // ボスに攻撃されてダメージ
        drawToto(x, y, phase, true);
      } else {
        drawToto(x, y, phase);
      }
    } else if (speaker === 'saku') {
      ctx.save();
      ctx.translate(x - 12, y - 45);
      ctx.scale(3, 3);
      const savedSaku = {...saku};
      saku.x = cameraX; saku.y = 0; saku.vx = 0; saku.onGround = true;
      saku.facing = 1; saku.anim = cutscene.charAnim * 0.05;
      saku.invuln = 0; saku.starTimer = 0; saku.swordTimer = 0;
      drawSaku(cameraX, 0);
      Object.assign(saku, savedSaku);
      ctx.restore();
    } else if (speaker === 'boss') {
      drawFinalBossSilhouette(x, y);
    }
    ctx.restore();

  // なぞの男（フード姿）

    ctx.beginPath();

  // とーと（痩せ型・30代・青年感・フード付きスウェット）

  // ラスボスシルエット

  function drawCheckpoint() {
    if (!stageCheckpoint) return;
    const cx = stageCheckpoint.x - cameraX;
    if (cx < -30 || cx > W + 30) return;
    // 支柱の根元は地面の上 (LEVEL_ROWS - 3) * TILE + 32 = 地面ちょうど
    const baseY = (LEVEL_ROWS - 2) * TILE;
    const topY = baseY - 60;
    // 土台
    ctx.fillStyle = '#444';
    ctx.fillRect(cx - 6, baseY - 4, 12, 4);

    ctx.fillStyle = '#888';
    ctx.fillRect(cx - 1.5, topY, 3, baseY - topY - 4);
    // 旗
    const activated = stageCheckpoint.activated;
    const flagT = Math.sin((activated ? 0 : 1) * 10 + (activated ? titleFrame * 0.15 : 0));
    const flagHeight = activated ? 14 : 10;
    const flagY = activated ? topY + 2 : topY + 30;  // 起動後は上に上がる
    // 旗の揺れ
    const wave = Math.sin(titleFrame * 0.2) * 2;
    ctx.save();
    ctx.translate(cx + 1.5, flagY);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(14 + wave, 2, 20, 0);
    ctx.lineTo(20, flagHeight);
    ctx.quadraticCurveTo(14 - wave, flagHeight + 2, 0, flagHeight);
    ctx.closePath();
    ctx.fillStyle = activated ? '#ffe040' : '#aaa';
    ctx.fill();
    ctx.strokeStyle = activated ? '#8a5a10' : '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 印（★）
    if (activated) {
      ctx.fillStyle = '#ff4040';
      ctx.beginPath();
      const sx = 10, sy = flagHeight / 2;
      for (let i = 0; i < 10; i++) {
        const a = i * Math.PI / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? 4 : 2;
        if (i === 0) ctx.moveTo(sx + Math.cos(a)*r, sy + Math.sin(a)*r);
        else ctx.lineTo(sx + Math.cos(a)*r, sy + Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    // 起動時のキラキラ
    if (activated) {
      for (let i = 0; i < 3; i++) {
        const a = (i/3) * Math.PI * 2 + titleFrame * 0.2;
        const rr = 14 + Math.sin(titleFrame * 0.3 + i) * 2;
        const sx = cx + Math.cos(a) * rr;
        const sy = topY + 20 + Math.sin(a) * rr;
        ctx.fillStyle = `rgba(255,240,100,${0.6 + 0.4*Math.sin(titleFrame*0.3+i)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // ロックマン風のHPゲージ
  function drawHPGauge() {
    if (state === 'title') return;
    const x0 = 10, y0 = 10;
    const segW = 10, segH = 6, gap = 2;
    const label = 'HP';
    // ラベル
    ctx.save();
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText(label, x0, y0);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, x0, y0);
    ctx.restore();
    // ゲージの枠
    const bx = x0 + 22, by = y0 + 2;
    const totalW = saku.maxHp * (segW + gap) - gap + 4;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bx - 2, by - 2, totalW, segH + 4);
    for (let i = 0; i < saku.maxHp; i++) {
      const sx = bx + i * (segW + gap);
      if (i < saku.hp) {
        // 残HPに応じて色変化（緑→黄→赤）
        const ratio = saku.hp / saku.maxHp;
        let col;
        if (ratio > 0.6) col = '#34d856';
        else if (ratio > 0.3) col = '#ffd440';
        else col = '#ff4a4a';
        const g = ctx.createLinearGradient(sx, by, sx, by + segH);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.4, col);
        g.addColorStop(1, col);
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = '#333';
      }
      ctx.fillRect(sx, by, segW, segH);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, by + 0.5, segW - 1, segH - 1);
    }
  }

  function loop() {
    try {
      if (state === 'title') {
        titleFrame++;
        drawTitle();
      } else if (state === 'cutscene') {
        update();
        drawCutscene();
      } else if (state === 'tutorial') {
        drawUltTutorial();
      } else if (state === 'stageTransition') {
        render();
        drawStageTransition();
        update();
      } else {
        update();
        render();
      }
    } catch(e) { console.error(e); }
    requestAnimationFrame(loop);
  }

  // ====== デバッグ用: URLパラメータで直接再生 ======
  // 例: ?cs=teach-punch / ?cs=teach-slash / ?cs=final-reveal
  //    ?stage=10-5  ←任意ステージ＋全技解放でスタート
  //    ?stage=10-5&ults=all / ?stage=3-1&ults=punch,slash
  (() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const cs = params.get('cs');
      const stageParam = params.get('stage');
      const ultsParam = params.get('ults');
      // デバッグ: ?infinite=1 で必殺技ゲージ無限
      if (params.get('infinite') === '1') window.DEBUG_INFINITE_ULT = true;

      if (stageParam) {
        ensureAudio();
        // X-Y 形式または数値
        let idx = 0;
        if (stageParam.includes('-')) {
          const [w, s] = stageParam.split('-').map(n => parseInt(n) - 1);
          idx = w * 5 + s;
        } else {
          idx = parseInt(stageParam) || 0;
        }
        idx = Math.max(0, Math.min(STAGES.length - 1, idx));

        // 必殺技の解放
        if (ultsParam) {
          saku.unlockedUlts = [];
          if (ultsParam === 'all') {
            saku.unlockedUlts = ['punch','slash','peropero'];
          } else {
            const wanted = ultsParam.split(',').map(s => s.trim());
            for (const u of ['punch','slash','peropero']) {
              if (wanted.includes(u)) saku.unlockedUlts.push(u);
            }
          }
        } else {
          // デフォルト: ステージ番号に応じた技を自動解放
          saku.unlockedUlts = [];
          if (idx >= 14) saku.unlockedUlts.push('punch');     // 3-5クリア後
          if (idx >= 29) saku.unlockedUlts.push('slash');     // 6-5クリア後
          if (idx >= 44) saku.unlockedUlts.push('peropero');  // 9-5クリア後
        }
        saku.selectedUlt = Math.max(0, saku.unlockedUlts.length - 1);

        currentStage = idx;
        loadStage(idx);
        saku.ultGauge = saku.maxUlt;  // ゲージ満タンでスタート
        state = 'playing';
        startBGM();
        return;
      }

      if (cs && CUTSCENES[cs]) {
        ensureAudio();
        currentStage = 0;
        loadStage(0);
        stopBGM();
        startCutscene(cs);
      }
    } catch(e) { console.error(e); }
  })();

  loop();
})();
</script>
</body>
