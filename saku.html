    ctx.arc(cx + 36, y + H_*0.6, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8a5010';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 頭（大きな口を持った恐竜顔）
    const headCx = cx, headCy = y + H_*0.18, headR = 22;
    // 頭本体
    const headG = ctx.createRadialGradient(headCx - 4, headCy - 6, 2, headCx, headCy, headR);
    headG.addColorStop(0, '#8aab40');
    headG.addColorStop(0.6, '#6a8c28');
    headG.addColorStop(1, '#3a5010');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.arc(headCx, headCy, headR, 0, Math.PI * 2);
    ctx.fill();
    // 口元（黄肌）
    ctx.fillStyle = '#e8c870';
    ctx.beginPath();
    ctx.ellipse(headCx + facing * 4, headCy + 8, 18, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // 口（大きな歯）
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(headCx + facing * 4, headCy + 10, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 牙（上下）
    ctx.fillStyle = '#ffffff';
    for (let i = -1; i <= 1; i++) {
      const tx = headCx + facing * 4 + i * 6;
      ctx.beginPath();
      ctx.moveTo(tx - 1.5, headCy + 7);
      ctx.lineTo(tx + 1.5, headCy + 7);
      ctx.lineTo(tx, headCy + 11);
      ctx.closePath();
      ctx.fill();
    }
    // 左右の大きな牙
    ctx.beginPath();
    ctx.moveTo(headCx + facing * (4 - 11), headCy + 7);
    ctx.lineTo(headCx + facing * (4 - 11) + 3, headCy + 7);
    ctx.lineTo(headCx + facing * (4 - 11) + 1, headCy + 14);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headCx + facing * (4 + 11), headCy + 7);
    ctx.lineTo(headCx + facing * (4 + 11) - 3, headCy + 7);
    ctx.lineTo(headCx + facing * (4 + 11) - 1, headCy + 14);
    ctx.closePath();
    ctx.fill();

    // 眉（太く怒り）
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(headCx - 14, headCy - 5); ctx.lineTo(headCx - 3, headCy - 1);
    ctx.moveTo(headCx + 3, headCy - 1); ctx.lineTo(headCx + 14, headCy - 5);
    ctx.stroke();
    // 目（黒目の下半分ギラリ）
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(headCx - 7, headCy + 1, 4, 3, 0, 0, Math.PI * 2);
    ctx.ellipse(headCx + 7, headCy + 1, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(headCx - 7 + facing, headCy + 2, 2, 2.5, 0, 0, Math.PI * 2);
    ctx.ellipse(headCx + 7 + facing, headCy + 2, 2, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // ツノ（2本のカーブした白い角）
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    // 左角
    ctx.beginPath();
    ctx.moveTo(headCx - 16, headCy - 18);
    ctx.quadraticCurveTo(headCx - 24, headCy - 26, headCx - 18, headCy - 32);
    ctx.quadraticCurveTo(headCx - 14, headCy - 22, headCx - 10, headCy - 18);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 右角
    ctx.beginPath();
    ctx.moveTo(headCx + 16, headCy - 18);
    ctx.quadraticCurveTo(headCx + 24, headCy - 26, headCx + 18, headCy - 32);
    ctx.quadraticCurveTo(headCx + 14, headCy - 22, headCx + 10, headCy - 18);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // 髪（赤いモヒカン）
    ctx.fillStyle = '#d82020';
    for (let i = 0; i < 5; i++) {
      const hx = headCx - 10 + i * 5;
      ctx.beginPath();
      ctx.moveTo(hx - 3, headCy - 14);
      ctx.lineTo(hx, headCy - 24 - Math.abs(i - 2) * 3);
      ctx.lineTo(hx + 3, headCy - 14);
      ctx.closePath();
      ctx.fill();
    }
    // 髪のハイライト
    ctx.fillStyle = '#ff6060';
    ctx.beginPath();
    ctx.moveTo(headCx - 6, headCy - 18);
    ctx.lineTo(headCx - 5, headCy - 23);
    ctx.lineTo(headCx - 4, headCy - 18);
    ctx.closePath();
    ctx.fill();

    // 炎チャージ（次の炎ブレスが近い時）
    if (b.fireCD < 30 && !b.defeated) {
      const glow = ctx.createRadialGradient(headCx + facing * 14, headCy + 10, 1, headCx + facing * 14, headCy + 10, 14);
      glow.addColorStop(0, `rgba(255,220,80,${(30 - b.fireCD) / 30})`);
      glow.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(headCx + facing * 14, headCy + 10, 14, 0, Math.PI * 2);
      ctx.fill();
    }

    // 闇落ちとーと用の上書きオーバーレイ（紫黒で染める＋王冠＋赤い目）
    if (b.isDarkToto) {
      const cx2 = x + b.w / 2;
      const topY = y;
      // 紫黒の multiply 風オーバーレイ
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      const overG = ctx.createLinearGradient(cx2, topY, cx2, y + b.h);
      overG.addColorStop(0, 'rgba(40, 0, 60, 0.55)');
      overG.addColorStop(0.5, 'rgba(20, 0, 30, 0.7)');
      overG.addColorStop(1, 'rgba(10, 0, 20, 0.8)');
      ctx.fillStyle = overG;
      ctx.fillRect(x - 10, y - 10, b.w + 20, b.h + 20);
      ctx.restore();
      // 紫の闇オーラ（外側）
      const auraR2 = 90 + Math.sin(b.anim * 0.4) * 12;
      const auraG2 = ctx.createRadialGradient(cx2, y + b.h/2, 10, cx2, y + b.h/2, auraR2);
      auraG2.addColorStop(0, 'rgba(140, 40, 200, 0.45)');
      auraG2.addColorStop(0.5, 'rgba(60, 10, 100, 0.3)');
      auraG2.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = auraG2;
      ctx.globalCompositeOperation = 'destination-over';
      ctx.beginPath();
      ctx.arc(cx2, y + b.h/2, auraR2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // 王冠（頭上）
      const crownY = topY - 6;
      ctx.fillStyle = '#2a0040';
      ctx.beginPath();
      ctx.moveTo(cx2 - 22, crownY + 8);
      ctx.lineTo(cx2 + 22, crownY + 8);
      ctx.lineTo(cx2 + 20, crownY - 4);
      ctx.lineTo(cx2 + 14, crownY + 2);
      ctx.lineTo(cx2 + 8, crownY - 8);
      ctx.lineTo(cx2, crownY + 2);
      ctx.lineTo(cx2 - 8, crownY - 8);
      ctx.lineTo(cx2 - 14, crownY + 2);
      ctx.lineTo(cx2 - 20, crownY - 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#8a20c0';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // 王冠の宝石（赤い球）
      for (let i = -1; i <= 1; i++) {
        const gx = cx2 + i * 12;
        const gy = crownY + 4;
        const gg = ctx.createRadialGradient(gx - 0.6, gy - 0.6, 0.4, gx, gy, 3.2);
        gg.addColorStop(0, '#ff8080');
        gg.addColorStop(0.5, '#c00020');
        gg.addColorStop(1, '#400010');
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(gx, gy, 2.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // 真っ赤な目のハイライト（もともとの目の上に重ねて発光強調）
      const facing2 = (saku.x + saku.w/2) < cx2 ? -1 : 1;
      const headCx2 = cx2 + facing2 * 8;
      const headCy2 = y + b.h * 0.3;
      ctx.fillStyle = 'rgba(255, 60, 80, 0.7)';
      ctx.beginPath();
      ctx.arc(headCx2 + facing2 * 14, headCy2 + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(headCx2 + facing2 * 14, headCy2 + 10, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // 涙のような血（邪悪化の痕跡）
      ctx.strokeStyle = 'rgba(160, 10, 30, 0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(headCx2 + facing2 * 14, headCy2 + 12);
      ctx.lineTo(headCx2 + facing2 * 14 + 1, headCy2 + 18);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawBossHUD() {
    if (!boss || boss.defeated || !boss.engaged) return;
    const barW = W*0.6, barX = W*0.2, barY = 24;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, 14);
    ctx.fillStyle = '#222';
    ctx.fillRect(barX, barY, barW, 10);
    const hpW = (boss.hp/boss.maxHp) * barW;
    const hpG = ctx.createLinearGradient(barX, barY, barX, barY+10);
    hpG.addColorStop(0, '#ff6a6a'); hpG.addColorStop(1, '#c82020');
    ctx.fillStyle = hpG;
    ctx.fillRect(barX, barY, hpW, 10);
    const DARK_BOSS_NAMES = [
      '骨狼ネクロルフ','双頭水竜ヒュドラ','千眼木妖エントアイ','溶岩鬼マグマギガ',
      '氷の処刑人フロストガロ','砂大蛇ヴォイドワーム','歯車悪魔ギアデモン','毒妃クイーンアラクネ','堕天使ルシフェル',
    ];
    const bossName = boss.isDarkToto ? '闇落ちとーと'
      : (boss.isFinal ? '闇の帝王'
      : (boss.isDarkBoss ? (DARK_BOSS_NAMES[boss.darkWorldIdx - DARK_WORLD_START] || 'モンスター') : 'メガネ部長'));
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.strokeText(bossName, W/2, barY + 5);
    ctx.fillText(bossName, W/2, barY + 5);
  }

  // ====== キノピオ（ゴール） ======
  function drawKinopio() {
    if (!flagPos) return;
    const kx = flagPos.x - cameraX;
    // 地面から少し上に立つ
    const ky = (LEVEL_ROWS - 3) * TILE;
    if (kx < -40 || kx > W + 40) return;

    // 旗竿の頂上に翻る旗
    const flagTopY = 20;
    const wave = Math.sin(titleFrame * 0.15) * 3;
    ctx.save();
    ctx.fillStyle = '#e03030';
    ctx.beginPath();
    ctx.moveTo(kx, flagTopY);
    ctx.lineTo(kx + 22 + wave, flagTopY + 6);
    ctx.lineTo(kx + 20 + wave, flagTopY + 12);
    ctx.lineTo(kx, flagTopY + 14);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', kx + 8, flagTopY + 8);
    // 旗の先端の球
    ctx.fillStyle = '#ffcc40';
    ctx.beginPath();
    ctx.arc(kx, flagTopY - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const jitter = Math.sin(titleFrame * 0.1) * 1.2;
    // ボスがいてまだ engaged されてないならキノピオは「待ってる」
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(kx, ky + 30, 12, 3, 0, 0, Math.PI*2); ctx.fill();
    // 足
    ctx.fillStyle = '#e6c39b';
    ctx.fillRect(kx - 5, ky + 25, 4, 4);
    ctx.fillRect(kx + 1, ky + 25, 4, 4);
    // 靴（茶色）
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(kx - 6, ky + 28, 6, 2);
    ctx.fillRect(kx, ky + 28, 6, 2);
    // 白いズボン
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 7, ky + 18, 14, 9);
    // ベスト（青）
    ctx.fillStyle = '#2a70c8';
    ctx.fillRect(kx - 6, ky + 13, 12, 7);
    // 金ボタン
    ctx.fillStyle = '#ffd840';
    ctx.beginPath(); ctx.arc(kx, ky + 16, 1, 0, Math.PI*2); ctx.fill();
    // 腕（手を振る）
    ctx.fillStyle = '#fff';
    const waveArm = Math.sin(titleFrame*0.2) * 3;
    ctx.save();
    ctx.translate(kx + 6, ky + 12);
    ctx.rotate(-0.3 - waveArm * 0.1);
    ctx.fillRect(0, 0, 3, 8);
    ctx.fillStyle = '#e6c39b';
    ctx.beginPath(); ctx.arc(1.5, 8, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 9, ky + 14, 3, 7);
    ctx.fillStyle = '#e6c39b';
    ctx.beginPath(); ctx.arc(kx - 7.5, ky + 21, 2, 0, Math.PI*2); ctx.fill();
    // 顔
    ctx.fillStyle = '#f7dba5';
    ctx.beginPath();
    ctx.arc(kx, ky + 7 + jitter, 7, 0, Math.PI*2);
    ctx.fill();
    // ほっぺ
    ctx.fillStyle = 'rgba(255,150,180,0.6)';
    ctx.beginPath();
    ctx.ellipse(kx - 5, ky + 9 + jitter, 1.5, 1, 0, 0, Math.PI*2);
    ctx.ellipse(kx + 5, ky + 9 + jitter, 1.5, 1, 0, 0, Math.PI*2);
    ctx.fill();
    // 目
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(kx - 2.5, ky + 7 + jitter, 1.1, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(kx + 2.5, ky + 7 + jitter, 1.1, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    // 口（にっこり）
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(kx, ky + 10 + jitter, 1.2, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
    // キノコの傘（赤に白い斑点）
    const capY = ky + jitter;
    ctx.fillStyle = '#e63030';
    ctx.beginPath();
    ctx.ellipse(kx, capY - 1, 12, 8, 0, 0, Math.PI, true);
    ctx.fill();
    // 傘の縁
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 12, capY - 1, 24, 2);
    // 斑点
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(kx - 6, capY - 3, 2, 0, Math.PI*2);
    ctx.arc(kx + 4, capY - 5, 2, 0, Math.PI*2);
    ctx.arc(kx - 1, capY - 7, 1.5, 0, Math.PI*2);
    ctx.fill();
    // 救出後のキラキラ
    if (state === 'cleared') {
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + stateTimer*0.1;
        const rr = 16 + Math.sin(stateTimer*0.2+i)*6;
        const sx = kx + Math.cos(a)*rr;
        const sy = ky + 8 + Math.sin(a)*rr;
        ctx.fillStyle = `hsl(${(stateTimer*5+i*60)%360},100%,70%)`;
        ctx.beginPath();
        ctx.arc(sx, sy, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
      // 「ありがとう！」
      ctx.save();
      const scale = Math.min(1, stateTimer / 30);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 16px sans-serif';
      ctx.translate(kx, ky - 28);
      ctx.scale(scale, scale);
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText('ありがとう！', 0, 0);
      ctx.fillStyle = '#ffee44';
      ctx.fillText('ありがとう！', 0, 0);
      ctx.restore();
    }
  }

  // ====== さく描画 ======
  function drawSaku(px, py) {
    const x = px - cameraX;
    const y = py;
    ctx.save();
    const cx = x + 12;
    const walking = Math.abs(saku.vx) > 0.5 && saku.onGround;
    const jumping = !saku.onGround;
    // 歩行時はbob、待機時は小さく呼吸
    const idleBreath = (!walking && saku.onGround) ? Math.sin(Date.now() * 0.003) * 0.6 : 0;
    const bob = walking ? Math.sin(saku.anim) * 1 : idleBreath;
    // 剣所持時はさくの周りに青白いオーラ
    if (saku.swordTimer > 0 && saku.swordTimer > 60 || (saku.swordTimer > 0 && Math.floor(saku.swordTimer / 6) % 2 === 0)) {
      const aG = ctx.createRadialGradient(cx, y + 15, 2, cx, y + 15, 22);
      aG.addColorStop(0, 'rgba(180,220,255,0.5)');
      aG.addColorStop(1, 'rgba(180,220,255,0)');
      ctx.fillStyle = aG;
      ctx.beginPath();
      ctx.arc(cx, y + 15, 22, 0, Math.PI * 2);
      ctx.fill();
    }
    // ダッシュ時のモーションブラー残像
    if (Math.abs(saku.vx) > 3.5 && saku.onGround) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#40c0ff';
      // 後ろに向けて3本の残像ライン
      for (let i = 1; i <= 3; i++) {
        const ox = saku.facing > 0 ? -i * 6 : i * 6;
        ctx.globalAlpha = 0.3 - i * 0.08;
        ctx.fillRect(cx + ox - 4, y + 12, 8, 14);
      }
      ctx.restore();
    }
    // スター周辺キラキラ
    if (saku.starTimer > 0) {
      for (let i = 0; i < 6; i++) {
        const ang = (i/6)*Math.PI*2 + saku.starTimer*0.1;
        const rr = 20 + Math.sin(saku.starTimer*0.2+i)*4;
        const sx = cx + Math.cos(ang)*rr;
        const sy = y + 15 + Math.sin(ang)*rr;
        ctx.fillStyle = `hsl(${(saku.starTimer*10+i*60)%360},100%,70%)`;
        ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }
    // ウルトラスター発動中：巨大虹オーラ＋ミニ星の軌跡
    if (saku.ultraStarTimer > 0) {
      const t = saku.ultraStarTimer;
      // 下地の巨大グラデ
      const ag = ctx.createRadialGradient(cx, y + 15, 2, cx, y + 15, 45);
      ag.addColorStop(0, `hsla(${(t*8)%360},100%,80%,0.7)`);
      ag.addColorStop(0.4, `hsla(${(t*8+120)%360},100%,60%,0.45)`);
      ag.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(cx, y + 15, 45, 0, Math.PI*2); ctx.fill();
      // 周囲をぐるぐる回る小さな星（12個）
      for (let i = 0; i < 12; i++) {
        const ang = (i/12)*Math.PI*2 + t*0.15;
        const rr = 32 + Math.sin(t*0.2+i)*5;
        const sx = cx + Math.cos(ang)*rr;
        const sy = y + 15 + Math.sin(ang)*rr;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(t*0.1 + i);
        ctx.fillStyle = `hsl(${(t*12+i*30)%360},100%,75%)`;
        drawStarShape(3);
        ctx.restore();
      }
      // 終了直前（残り1秒）は点滅
      if (t < 60 && Math.floor(t / 6) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(cx - 16, y, 32, 36);
      }
    }
    // ぺろぺろありーな発動後の青オーラ（aftermath 中）
    if (saku.ultActive && saku.ultActive.type === 'peropero' && saku.ultActive.phase === 'aftermath') {
      const af = saku.ultActive.auraFrame;
      // 外側の青いオーラ
      const ag = ctx.createRadialGradient(cx, y + 15, 2, cx, y + 15, 32);
      ag.addColorStop(0, `rgba(140,200,255,${0.6 + 0.2 * Math.sin(af * 0.15)})`);
      ag.addColorStop(0.5, 'rgba(70,130,240,0.4)');
      ag.addColorStop(1, 'rgba(20,40,120,0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(cx, y + 15, 32, 0, Math.PI * 2);
      ctx.fill();
      // オーラ粒子（上昇）
      for (let i = 0; i < 10; i++) {
        const ang = (i / 10) * Math.PI * 2 + af * 0.1;
        const rr = 14 + Math.sin(af * 0.15 + i) * 4;
        const sx2 = cx + Math.cos(ang) * rr;
        const sy2 = y + 18 + Math.sin(ang) * rr - (af * 0.3) % 30;
        ctx.fillStyle = `rgba(200,230,255,${0.6 + 0.4 * Math.sin(af * 0.2 + i)})`;
        ctx.beginPath();
        ctx.arc(sx2, sy2, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // 下から立ち昇る青い線
      ctx.strokeStyle = `rgba(150,210,255,${0.4 + 0.3 * Math.sin(af * 0.2)})`;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const lx = cx + (i - 2) * 6;
        const ly0 = y + 30;
        const ly1 = y + 30 - 30 + Math.sin(af * 0.15 + i) * 3;
        ctx.beginPath();
        ctx.moveTo(lx, ly0);
        ctx.quadraticCurveTo(lx + Math.sin(af * 0.1 + i) * 5, ly0 - 15, lx, ly1);
        ctx.stroke();
      }
    }
    if (saku.invuln > 0 && Math.floor(saku.invuln/4)%2 === 0) ctx.globalAlpha = 0.4;
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(cx, y + 31, 10, 2, 0, 0, Math.PI*2); ctx.fill();
    // 足
    ctx.fillStyle = '#1a1a28';
    const legSwing = walking ? Math.sin(saku.anim) * 3 : 0;
    const leg1x = cx - 5 - (saku.facing > 0 ? legSwing : -legSwing);
    const leg2x = cx + 2 + (saku.facing > 0 ? legSwing : -legSwing);
    if (jumping) {
      ctx.fillRect(cx - 5, y + 24, 4, 6);
      ctx.fillRect(cx + 1, y + 24, 4, 6);
    } else {
      ctx.fillRect(leg1x, y + 24, 4, 6);
      ctx.fillRect(leg2x, y + 24, 4, 6);
    }
    ctx.fillStyle = '#fff';
    if (jumping) { ctx.fillRect(cx - 6, y + 29, 6, 3); ctx.fillRect(cx, y + 29, 6, 3); }
    else { ctx.fillRect(leg1x - 1, y + 29, 6, 3); ctx.fillRect(leg2x - 1, y + 29, 6, 3); }
    // ランドセル（黒）
    const backX = saku.facing > 0 ? cx - 11 : cx + 3;
    ctx.fillStyle = '#0e0e14';
    ctx.fillRect(backX, y + 10 + bob, 8, 15);
    ctx.fillStyle = '#333340';  // ハイライト
    ctx.fillRect(backX + 1, y + 11 + bob, 2, 13);
    // 体（白シャツ）
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 7, y + 12 + bob, 14, 13);
    ctx.fillStyle = '#3a6fb0';
    ctx.beginPath();
    ctx.moveTo(cx - 3, y + 12 + bob); ctx.lineTo(cx, y + 15 + bob); ctx.lineTo(cx + 3, y + 12 + bob);
    ctx.closePath(); ctx.fill();
    // 腕
    ctx.fillStyle = '#f2c8a2';
    const armSwing = walking ? Math.sin(saku.anim) * 2 : 0;
    const armY = y + 16 + bob + (saku.facing > 0 ? -armSwing : armSwing);
    if (jumping) {
      ctx.fillRect(cx + 6, y + 11 + bob, 3, 6);
      ctx.fillRect(cx - 9, y + 11 + bob, 3, 6);
    } else {
      ctx.fillRect(cx + 6, armY, 3, 7);
      ctx.fillRect(cx - 9, armY - armSwing * (saku.facing > 0 ? 2 : -2), 3, 7);
    }
    // 頭
    const headY = y + 5 + bob;
    const headGrad = ctx.createRadialGradient(cx - 2, headY - 2, 1, cx, headY + 2, 10);
    headGrad.addColorStop(0, '#ffe6c8');
    headGrad.addColorStop(0.7, '#f2c8a2');
    headGrad.addColorStop(1, '#b57849');
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(cx, headY + 2, 9, 0, Math.PI*2); ctx.fill();
    // 髪
    ctx.fillStyle = '#1a1410';
    ctx.beginPath();
    ctx.moveTo(cx - 9, headY);
    ctx.quadraticCurveTo(cx - 10, headY - 7, cx - 3, headY - 8);
    ctx.quadraticCurveTo(cx + 4, headY - 9, cx + 9, headY - 6);
    ctx.quadraticCurveTo(cx + 10, headY - 1, cx + 8, headY);
    ctx.lineTo(cx + 6, headY - 2);
    ctx.quadraticCurveTo(cx + 2, headY + 1, cx - 2, headY - 2);
    ctx.quadraticCurveTo(cx - 6, headY - 1, cx - 9, headY);
    ctx.closePath(); ctx.fill();
    // 目
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx - 3, headY + 3, 1.3, 0, Math.PI*2);
    ctx.arc(cx + 3, headY + 3, 1.3, 0, Math.PI*2);
    ctx.fill();
    // 口
    ctx.strokeStyle = '#6a3020'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (jumping) { ctx.arc(cx, headY + 7, 1.5, 0, Math.PI*2); }
    else { ctx.moveTo(cx - 2, headY + 7); ctx.quadraticCurveTo(cx, headY + 8.5, cx + 2, headY + 7); }
    ctx.stroke();
    // 短パン
    ctx.fillStyle = '#2a2a38';
    ctx.fillRect(cx - 6, y + 22 + bob, 12, 4);
    // スターのオーバーレイ
    if (saku.starTimer > 0) {
      const hue = (saku.starTimer*15)%360;
      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      ctx.fillStyle = `hsla(${hue},90%,60%,0.6)`;
      ctx.fillRect(cx - 10, y, 20, 32);
      ctx.restore();
    }
    // 剣
    if (saku.swordTimer > 0) {
      ctx.save();
      const handX = cx + saku.facing * 10;
      const handY = y + 17 + bob;
      ctx.translate(handX, handY);
      ctx.rotate(saku.facing > 0 ? -0.3 : 0.3);
      ctx.fillStyle = '#e8ecf5';
      ctx.fillRect(-1.5, -14, 3, 14);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-0.5, -14, 1, 14);
      ctx.strokeStyle = '#8a95a8'; ctx.lineWidth = 0.5;
      ctx.strokeRect(-1.5, -14, 3, 14);
      ctx.fillStyle = '#c8a030';
      ctx.fillRect(-4, 0, 8, 2);
      ctx.fillStyle = '#6a3a1a';
      ctx.fillRect(-1.5, 2, 3, 4);
      ctx.restore();
      if (saku.swordTimer < 120 && Math.floor(saku.swordTimer/6)%2 === 0) ctx.globalAlpha = 0.5;
    }
    ctx.restore();
  }

  // ====== FF7風タイトル画面 ======
  const titleStars = Array.from({length: 80}, () => ({
    x: Math.random(), y: Math.random(),
    s: 0.5 + Math.random() * 1.8,
    v: 0.1 + Math.random() * 0.5,
    ph: Math.random() * Math.PI * 2,
  }));
  const titleParticles = Array.from({length: 25}, () => ({
    x: Math.random(), y: 0.6 + Math.random() * 0.4,
    v: 0.15 + Math.random() * 0.4,
    s: 1 + Math.random() * 2,
    ph: Math.random() * Math.PI * 2,
  }));

  function drawTitle() {
    // 深い青黒グラデ（FF7 OP 風）
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#010314');
    bg.addColorStop(0.55, '#0a1a32');
    bg.addColorStop(1, '#1a2848');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 星
    for (const s of titleStars) {
      const sx = s.x * W;
      const sy = ((s.y + titleFrame * 0.0002 * s.v) % 1) * H;
      const tw = 0.6 + 0.4 * Math.sin(titleFrame * 0.05 + s.ph);
      ctx.fillStyle = `rgba(220,235,255,${0.3 + tw * 0.5})`;
      ctx.beginPath();
      ctx.arc(sx, sy, s.s * tw, 0, Math.PI * 2);
      ctx.fill();
    }

    // 放射状グロー（中央に青白い光）
    const glow = ctx.createRadialGradient(W/2, H*0.38, 10, W/2, H*0.38, Math.max(W, H) * 0.8);
    glow.addColorStop(0, 'rgba(60, 120, 200, 0.55)');
    glow.addColorStop(0.3, 'rgba(30, 60, 140, 0.3)');
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // 遠景シルエットの山々（FF7ぽい暗い山影）
    ctx.fillStyle = '#060a1a';
    const silhouetteY = H * 0.66;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, silhouetteY);
    for (let i = 0; i <= 8; i++) {
      const px = (i / 8) * W;
      const py = silhouetteY - 15 - Math.sin(i * 1.3) * 35 - (i % 2 === 0 ? 25 : 0);
      ctx.lineTo(px, py);
    }
    ctx.lineTo(W, silhouetteY);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // 前景のシルエット（もう少し低い山）
    ctx.fillStyle = '#020410';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H * 0.8);
    for (let i = 0; i <= 10; i++) {
      const px = (i / 10) * W;
      const py = H * 0.8 - 10 - Math.abs(Math.sin(i * 1.7)) * 25;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(W, H * 0.8);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // 上昇パーティクル（光の粒）
    for (const p of titleParticles) {
      const px = p.x * W;
      const py = ((p.y - titleFrame * 0.001 * p.v) % 1 + 1) % 1 * H;
      const tw = 0.5 + 0.5 * Math.sin(titleFrame * 0.06 + p.ph);
      ctx.fillStyle = `rgba(140,200,255,${tw * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py, p.s * (0.7 + tw * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }

    // タイトルロゴ（メタリック / FF7 風）
    ctx.save();
    const titleY = H * 0.28;
    ctx.translate(W/2, titleY);
    // ロゴバック光
    const halo = ctx.createRadialGradient(0, 0, 2, 0, 0, 180);
    halo.addColorStop(0, 'rgba(160, 200, 255, 0.35)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.ellipse(0, 0, 220, 70, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // さく
    ctx.font = 'bold 52px "Times New Roman", serif';
    const title = 'さくの大ぼうけん';
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(title, 4, 6);
    // 輪郭
    ctx.lineWidth = 6; ctx.strokeStyle = '#0a1a3a';
    ctx.strokeText(title, 0, 0);
    ctx.lineWidth = 3; ctx.strokeStyle = '#a0b8e0';
    ctx.strokeText(title, 0, 0);
    // メタリック本体
    const mg = ctx.createLinearGradient(0, -28, 0, 28);
    mg.addColorStop(0, '#e8f0ff');
    mg.addColorStop(0.35, '#b8c8e8');
    mg.addColorStop(0.5, '#6a80b0');
    mg.addColorStop(0.55, '#7890c0');
    mg.addColorStop(0.85, '#c8d8f0');
    mg.addColorStop(1, '#5a6e9a');
    ctx.fillStyle = mg;
    ctx.fillText(title, 0, 0);
    // 上部ハイライト
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    const hl = ctx.createLinearGradient(0, -26, 0, -5);
    hl.addColorStop(0, 'rgba(255,255,255,0.7)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    ctx.fillText(title, 0, 0);
    ctx.restore();
    ctx.restore();

    // サブタイトル（淡い青文字、FF7ぽい細字）
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'italic 14px serif';
    ctx.fillStyle = 'rgba(160, 200, 255, 0.85)';
    ctx.fillText('〜 キノピオをたすけるたび 〜', W/2, titleY + 48);
    ctx.restore();

    // キャラ（小さく、左下にシルエット風に浮かばせる）
    ctx.save();
    ctx.translate(W * 0.14, H * 0.75);
    ctx.scale(1.8, 1.8);
    const savedSaku = {...saku};
    saku.x = cameraX; saku.y = 0; saku.vx = 0; saku.onGround = true;
    saku.facing = 1; saku.anim = titleFrame * 0.08;
    saku.invuln = 0; saku.starTimer = 0; saku.swordTimer = 0; saku.ultraStarTimer = 0;
    drawSaku(cameraX, 0);
    Object.assign(saku, savedSaku);
    ctx.restore();
    // キノピオ（右下）
    ctx.save();
    ctx.translate(W * 0.86, H * 0.78);
    ctx.scale(1.6, 1.6);
    const fakeFlag = { x: cameraX, y: 0 };
    const savedFlag = flagPos; flagPos = fakeFlag;
    const savedRows = LEVEL_ROWS; LEVEL_ROWS = 3;
    drawKinopio();
    LEVEL_ROWS = savedRows;
    flagPos = savedFlag;
    ctx.restore();

    // ===== メニュー =====
    drawTitleMenu();

    // フッターのコピー表記風
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '9px serif';
    ctx.fillStyle = 'rgba(160,180,220,0.55)';
    ctx.fillText('© SAKU ADVENTURE', W/2, H - 12);
    ctx.restore();
  }

  // タイトルメニュー
  const titleMenu = {
    items: ['はじめから', 'つづきから'],
    selected: 0,
    holdCooldown: 0,
  };
  function hasNormalCleared() {
    try { return localStorage.getItem('saku_normal_cleared') === '1'; } catch(e) { return false; }
  }
  function markNormalCleared() {
    try { localStorage.setItem('saku_normal_cleared', '1'); } catch(e) {}
  }
  function hasTrueCleared() {
    try { return localStorage.getItem('saku_true_cleared') === '1'; } catch(e) { return false; }
  }
  function markTrueCleared() {
    try { localStorage.setItem('saku_true_cleared', '1'); } catch(e) {}
  }
  function getTitleMenuItems() {
    const items = ['はじめから', 'つづきから'];
    if (hasNormalCleared()) items.push('ダークコース');
    return items;
  }

  function drawTitleMenu() {
    const save = loadSave();
    const hasSave = !!save;
    titleMenu.items = getTitleMenuItems();
    if (titleMenu.selected >= titleMenu.items.length) titleMenu.selected = 0;
    const menuY = H * 0.50;
    const gap = 48;

    for (let i = 0; i < titleMenu.items.length; i++) {
      const label = titleMenu.items[i];
      const y = menuY + i * gap;
      const selected = (titleMenu.selected === i);
      const disabled = (i === 1 && !hasSave);

      // 行の背景パネル（FF7メニュー風・青い枠）
      if (selected) {
        // 光るハイライト
        const hg = ctx.createLinearGradient(W*0.2, y, W*0.8, y);
        hg.addColorStop(0, 'rgba(60,120,220,0)');
        hg.addColorStop(0.5, 'rgba(80,150,255,0.5)');
        hg.addColorStop(1, 'rgba(60,120,220,0)');
        ctx.fillStyle = hg;
        ctx.fillRect(W*0.2, y - 20, W*0.6, 40);
        // 枠
        ctx.strokeStyle = '#7aa0e0';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(W*0.2 + 1, y - 19, W*0.6 - 2, 38);
        ctx.strokeStyle = 'rgba(180,210,255,0.5)';
        ctx.lineWidth = 0.8;
        ctx.strokeRect(W*0.2 + 4, y - 16, W*0.6 - 8, 32);
      }

      // カーソル（▶）
      if (selected) {
        const blink = Math.floor(titleFrame / 15) % 2;
        ctx.save();
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.font = 'bold 20px serif';
        ctx.fillStyle = blink ? '#a0d0ff' : '#6a90d0';
        ctx.fillText('▶', W*0.24, y);
        ctx.restore();
      }

      // テキスト本体
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 22px serif';
      if (disabled) {
        ctx.fillStyle = 'rgba(140,160,190,0.35)';
        ctx.fillText(label, W/2, y);
      } else {
        // 影
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillText(label, W/2 + 2, y + 2);
        if (selected) {
          const tg = ctx.createLinearGradient(0, y - 14, 0, y + 14);
          tg.addColorStop(0, '#ffffff');
          tg.addColorStop(0.5, '#c8dcff');
          tg.addColorStop(1, '#7ba0d8');
          ctx.fillStyle = tg;
        } else {
          ctx.fillStyle = '#a8bfe0';
        }
        ctx.fillText(label, W/2, y);
      }
      ctx.restore();

      // 「つづきから」にセーブ情報を表示
      if (i === 1) {
        ctx.save();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = 'italic 11px serif';
        if (hasSave) {
          const prog = STAGES[Math.min(save.currentStage || 0, STAGES.length - 1)];
          ctx.fillStyle = 'rgba(200,220,255,0.75)';
          ctx.fillText(`${prog.label}  SCORE ${save.score || 0}`, W/2, y + 18);
        } else {
          ctx.fillStyle = 'rgba(140,160,190,0.35)';
          ctx.fillText('(セーブなし)', W/2, y + 18);
        }
        ctx.restore();
      }
    }

    // ハイスコア＆進捗
    const hi = getHighScore();
    if (hi > 0) {
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 12px serif';
      ctx.fillStyle = 'rgba(255,220,120,0.9)';
      ctx.fillText('HI SCORE: ' + hi.toLocaleString(), W/2, H * 0.43);
      ctx.restore();
    }
    const saveData = loadSave();
    if (saveData) {
      const stageIdx = saveData.currentStage || 0;
      const worldsCleared = Math.floor(stageIdx / 5);
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '11px serif';
      ctx.fillStyle = 'rgba(200,255,220,0.75)';
      ctx.fillText('制覇ワールド: ' + worldsCleared + ' / 10', W/2, H * 0.46);
      ctx.restore();
    }
    // 操作ヒント
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '11px serif';
    ctx.fillStyle = 'rgba(160,190,230,0.6)';
    ctx.fillText('↑↓ : 選択  /  Space・Z・タップ : けってい', W/2, H - 30);
    ctx.restore();
  }

  function drawStageTransition() {
    // 背景グラデ（黒→紺）＋輝く星
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(5,5,20,0.92)');
    bg.addColorStop(1, 'rgba(20,10,40,0.92)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    // 背景の星
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 47 + stateTimer * 0.3) % W);
      const sy = ((i * 31) % H);
      const tw = 0.3 + 0.7 * Math.abs(Math.sin(stateTimer * 0.05 + i));
      ctx.fillStyle = `rgba(255,255,255,${tw * 0.6})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + (i % 2), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const next = STAGES[currentStage + 1];

    // 前ステージ結果
    const prev = STAGES[currentStage];
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#8ab';
    ctx.fillText('CLEAR!', W/2, H * 0.2);
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#fff';
    if (prev) ctx.fillText(prev.label + ' ' + prev.name, W/2, H * 0.27);

    // 統計
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#ffcc60';
    ctx.fillText('SCORE: ' + score.toLocaleString().toLocaleString(), W/2, H * 0.36);
    ctx.fillText('🍣 ' + coinCount + '  MAX COMBO: ×' + comboMax, W/2, H * 0.42);

    // 次ステージ
    if (next) {
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = '#8fc';
      ctx.fillText('NEXT', W/2, H * 0.55);
      ctx.font = 'bold 28px sans-serif';
      ctx.lineWidth = 6; ctx.strokeStyle = '#000';
      const txt = next.label + '  ' + next.name;
      ctx.strokeText(txt, W/2, H * 0.63);
      ctx.fillStyle = '#fff';
      ctx.fillText(txt, W/2, H * 0.63);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#ffee44';
      const pulse = 0.7 + 0.3 * Math.sin(stateTimer * 0.2);
      ctx.globalAlpha = pulse;
      ctx.fillText('スタート！', W/2, H * 0.73);
      ctx.globalAlpha = 1;
    }
  }

  function render() {
    // 画面揺れ適用
    ctx.save();
    if (screenShake > 0) {
      const sx = (Math.random() - 0.5) * screenShake;
      const sy = (Math.random() - 0.5) * screenShake;
      ctx.translate(sx, sy);
      screenShake *= 0.85;
      if (screenShake < 0.2) screenShake = 0;
    }
    drawBackground();
    drawTiles();
    drawCheckpoint();
    drawCoins();
    drawItems();
    drawEnemies();
    drawBoss();
    drawKinopio();
    drawSaku(saku.x, saku.y);
    drawParticles();
    drawUltEffect();
    drawBossHUD();
    drawHPGauge();
    drawUltGauge();
    drawUltPopups();
    drawUltBanner();
    drawCombo();
    drawStageProgress();
    drawHpWarning();
    drawWorldIntro();
    drawClearOverlay();
    drawPauseOverlay();
    if (saku.ultActive && saku.ultActive.type === 'peropero') {
      drawPeroperoCutin();
      // aftermath フェーズではさくを再描画して前面に表示（青オーラ付き）
      if (saku.ultActive.phase === 'aftermath') {
        drawSaku(saku.x, saku.y);
      }
    }
    ctx.restore();
  }

  function drawUltBanner() {
    if (!ultBanner) return;
    ultBanner.timer--;
    if (ultBanner.timer <= 0) { ultBanner = null; return; }
    const t = 1 - ultBanner.timer / ultBanner.maxTimer;
    // スライドイン〜保持〜フェードアウト
    let slideX = 0;
    let alpha = 1;
    if (t < 0.15) slideX = (0.15 - t) * 800;
    else if (t > 0.75) alpha = (1 - t) * 4;
    if (alpha < 0) alpha = 0;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const y = H * 0.28;
    // 帯
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0 + slideX, y - 22, W, 44);
    ctx.strokeStyle = '#ffee40';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0 + slideX, y - 22, W, 44);
    // 「必殺技」
    ctx.font = 'bold 12px serif';
    ctx.fillStyle = '#ffcc80';
    ctx.fillText('必殺技', W/2 + slideX, y - 10);
    // 技名
    ctx.font = 'bold 22px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText(ultBanner.name, W/2 + slideX, y + 6);
    const tg = ctx.createLinearGradient(0, y, 0, y + 15);
    tg.addColorStop(0, '#fff');
    tg.addColorStop(0.5, '#ffcc60');
    tg.addColorStop(1, '#ff4488');
    ctx.fillStyle = tg;
    ctx.fillText(ultBanner.name, W/2 + slideX, y + 6);
    ctx.restore();
  }

  // コンボ表示（画面右上に大きくポップ。高ティアで色変化）
  function drawCombo() {
    if (comboCount < 2) return;
    const fade = comboTimer < 30 ? comboTimer / 30 : 1;
    const cx = W - 70;
    const cy = 70;
    // 高コンボほど派手に揺れる
    const shakeAmt = Math.min(6, comboCount * 0.3);
    const shakeX = (Math.random() - 0.5) * shakeAmt;
    const shakeY = (Math.random() - 0.5) * shakeAmt;
    const scale = 1 + Math.min(0.25, comboCount * 0.01) + 0.08 * Math.sin(Date.now() * 0.01);
    // ティア別タイトル
    let tierLabel = 'COMBO';
    let tg1 = '#fff', tg2 = '#ffcc40', tg3 = '#ff6020';
    if (comboCount >= 20) { tierLabel = 'LEGENDARY!'; tg1 = '#fff'; tg2 = '#ff40ff'; tg3 = '#8a00ff'; }
    else if (comboCount >= 10) { tierLabel = 'GREAT!'; tg1 = '#fff'; tg2 = '#40d0ff'; tg3 = '#1060c0'; }
    else if (comboCount >= 5) { tierLabel = 'GOOD!'; tg1 = '#fff'; tg2 = '#60ff60'; tg3 = '#207020'; }
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(cx + shakeX, cy + shakeY);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 14px sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    ctx.strokeText(tierLabel, 0, -14);
    ctx.fillStyle = tg2;
    ctx.fillText(tierLabel, 0, -14);
    ctx.font = 'bold 28px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.strokeText(`×${comboCount}`, 0, 10);
    const tg = ctx.createLinearGradient(0, -8, 0, 20);
    tg.addColorStop(0, tg1);
    tg.addColorStop(0.6, tg2);
    tg.addColorStop(1, tg3);
    ctx.fillStyle = tg;
    ctx.fillText(`×${comboCount}`, 0, 10);
    // コンボタイマー横棒
    ctx.fillStyle = `rgba(255,220,120,${fade * 0.8})`;
    const w = 60 * (comboTimer / COMBO_WINDOW);
    ctx.fillRect(-30, 28, w, 3);
    ctx.restore();
  }

  // ステージクリア時の大バナー
  function drawClearOverlay() {
    if (state !== 'cleared') return;
    const t = Math.min(1, stateTimer / 30);
    // 上下から黒帯が寄る
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    const barH = H * 0.18 * t;
    ctx.fillRect(0, H * 0.35, W, barH);
    ctx.fillRect(0, H * 0.65 - barH, W, barH);
    // STAGE CLEAR!
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const scale = 0.5 + 0.5 * Math.min(1, stateTimer / 20);
    ctx.translate(W/2, H * 0.5);
    ctx.scale(scale, scale);
    ctx.rotate(-0.03);
    ctx.font = 'bold 44px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.lineWidth = 10; ctx.strokeStyle = '#000';
    ctx.strokeText('STAGE CLEAR!', 0, 0);
    const g = ctx.createLinearGradient(0, -30, 0, 30);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.5, '#ffee40');
    g.addColorStop(1, '#ff6020');
    ctx.fillStyle = g;
    ctx.fillText('STAGE CLEAR!', 0, 0);
    ctx.restore();
  }

  // HPがピンチの時に赤い縁を脈打たせる
  function drawHpWarning() {
    if (state !== 'playing' && state !== 'paused') return;
    if (saku.hp > 2) return;
    const intensity = saku.hp === 1 ? 0.5 : 0.3;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.008);
    const grad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H) * 0.3, W/2, H/2, Math.max(W,H) * 0.65);
    grad.addColorStop(0, 'rgba(255,0,0,0)');
    grad.addColorStop(1, `rgba(255,20,20,${intensity * pulse})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // 新ワールド突入時の大バナー
  function drawWorldIntro() {
    if (!worldIntro) return;
    worldIntro.timer--;
    if (worldIntro.timer <= 0) { worldIntro = null; return; }
    const t = 1 - worldIntro.timer / worldIntro.maxTimer;
    // スライドイン→保持→フェードアウト
    let alpha = 1;
    let offX = 0;
    if (t < 0.2) offX = (0.2 - t) * 1000;
    else if (t > 0.75) alpha = Math.max(0, (1 - t) * 4);

    ctx.save();
    ctx.globalAlpha = alpha;
    // 黒帯
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, H * 0.4 + offX, W, H * 0.2);
    // 上下ライン
    ctx.strokeStyle = '#ffee40';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H * 0.4 + offX); ctx.lineTo(W, H * 0.4 + offX);
    ctx.moveTo(0, H * 0.6 + offX); ctx.lineTo(W, H * 0.6 + offX);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // WORLD 番号
    ctx.font = 'bold 13px serif';
    ctx.fillStyle = '#ffcc60';
    ctx.fillText('WORLD ' + worldIntro.num, W/2 + offX, H * 0.44);
    // ワールド名
    ctx.font = 'bold 32px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText(worldIntro.name, W/2 + offX, H * 0.52);
    const tg = ctx.createLinearGradient(0, H * 0.47, 0, H * 0.57);
    tg.addColorStop(0, '#ffffff');
    tg.addColorStop(0.5, '#ffcc60');
    tg.addColorStop(1, '#ff6040');
    ctx.fillStyle = tg;
    ctx.fillText(worldIntro.name, W/2 + offX, H * 0.52);
    ctx.restore();
  }

  function drawUltPopups() {
    if (!ultPopups.length) return;
    for (let i = ultPopups.length - 1; i >= 0; i--) {
      const p = ultPopups[i];
      p.life--;
      if (p.life <= 0) { ultPopups.splice(i, 1); continue; }
      const t = 1 - p.life / p.maxLife;
      const x = p.x - cameraX;
      const y = p.y - t * 30;
      const alpha = p.life > 20 ? 1 : p.life / 20;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 14px sans-serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText(p.text, x, y);
      ctx.fillStyle = p.color || '#ff70d8';
      ctx.fillText(p.text, x, y);
      ctx.restore();
    }
  }

  // 必殺技ゲージ（大きめで目立つデザイン）
  function drawUltGauge() {
    if (state === 'title') return;
    if (saku.unlockedUlts.length === 0) {
      // 必殺ボタンを隠す
      const b = document.querySelector('#pad button.ult');
      if (b) b.style.display = 'none';
      const sw = document.querySelector('#pad button.ultswitch');
      if (sw) sw.style.display = 'none';
      return;
    } else {
      const b = document.querySelector('#pad button.ult');
      if (b) b.style.display = '';
      const sw = document.querySelector('#pad button.ultswitch');
      // 複数技を持っている時だけ切替ボタン表示
      if (sw) sw.style.display = saku.unlockedUlts.length > 1 ? '' : 'none';
    }

    const pct = saku.ultGauge / saku.maxUlt;
    const ready = (pct >= 1);
    // 必殺ボタンに ready クラス付与
    const btn = document.querySelector('#pad button.ult');
    if (btn) {
      if (ready && !btn.classList.contains('ready')) btn.classList.add('ready');
      else if (!ready && btn.classList.contains('ready')) btn.classList.remove('ready');
    }
    const ult = ULTIMATES.find(u => u.id === saku.unlockedUlts[saku.selectedUlt]);

    // 画面下中央に大きめのゲージを配置
    const barW = 200;
    const barH = 16;
    const bx = (W - barW) / 2;
    const by = H - 34;

    ctx.save();
    // 背景パネル
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(bx - 8, by - 14, barW + 16, barH + 24);
    ctx.strokeStyle = ready ? '#ffee40' : '#80a0d0';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 8, by - 14, barW + 16, barH + 24);

    // 技名とゲージ値
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(ult ? ult.name : '必殺技', bx, by - 6);

    ctx.textAlign = 'right';
    ctx.fillStyle = ready ? '#ffee40' : '#c0d0ee';
    ctx.fillText(Math.floor(saku.ultGauge) + '/' + saku.maxUlt, bx + barW, by - 6);

    // バー本体
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by, barW, barH);
    const fillW = pct * barW;
    const g = ctx.createLinearGradient(bx, by, bx, by + barH);
    if (ready) {
      const f = Math.sin(titleFrame * 0.3) * 0.2 + 0.8;
      g.addColorStop(0, `rgba(255,255,200,${f})`);
      g.addColorStop(0.5, '#ffaa20');
      g.addColorStop(1, '#ff4488');
    } else {
      g.addColorStop(0, '#ff60d0');
      g.addColorStop(0.5, '#c81890');
      g.addColorStop(1, '#80105a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(bx, by, fillW, barH);
    // セグメント区切り線
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const x = bx + (barW * i / 4);
      ctx.beginPath();
      ctx.moveTo(x, by);
      ctx.lineTo(x, by + barH);
      ctx.stroke();
    }
    ctx.strokeStyle = ready ? '#ffffff' : '#446090';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx, by, barW, barH);

    // READY! 表示
    if (ready) {
      const pulse = 1 + 0.15 * Math.sin(titleFrame * 0.25);
      ctx.save();
      ctx.translate(bx + barW / 2, by + barH / 2);
      ctx.scale(pulse, pulse);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 13px sans-serif';
      ctx.lineWidth = 3.5; ctx.strokeStyle = '#000';
      ctx.strokeText('READY!  押して発動', 0, 0);
      ctx.fillStyle = '#ffff60';
      ctx.fillText('READY!  押して発動', 0, 0);
      ctx.restore();
      // 光の矢（必殺ボタンを指す）
      const arrowX = W - 80;
      const arrowY = by + barH / 2 + Math.sin(titleFrame * 0.2) * 4;
      ctx.save();
      ctx.fillStyle = '#ffee40';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY);
      ctx.lineTo(arrowX - 14, arrowY - 8);
      ctx.lineTo(arrowX - 14, arrowY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // 必殺技エフェクト（プレイヤー周辺）
  function drawUltEffect() {
    if (!saku.ultActive) return;
    const type = saku.ultActive.type;
    const timer = saku.ultActive.timer;
    const sx = saku.x - cameraX + saku.w/2;
    const sy = saku.y + saku.h/2;
    if (type === 'punch') {
      // スーパーパンチ：前方にエネルギー拳
      const ph = 40 - timer;
      const reach = Math.min(1, ph / 20) * 110;
      const dir = saku.facing;
      const gx = sx + dir * reach;
      ctx.save();
      // 軌跡
      const g = ctx.createLinearGradient(sx, sy, gx, sy);
      g.addColorStop(0, 'rgba(255,150,80,0)');
      g.addColorStop(0.5, 'rgba(255,200,100,0.8)');
      g.addColorStop(1, 'rgba(255,255,220,1)');
      ctx.fillStyle = g;
      ctx.fillRect(Math.min(sx, gx), sy - 14, Math.abs(gx - sx), 28);
      // 拳
      const fg = ctx.createRadialGradient(gx, sy, 2, gx, sy, 24);
      fg.addColorStop(0, '#ffffff');
      fg.addColorStop(0.4, '#ffc040');
      fg.addColorStop(1, 'rgba(200,60,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(gx, sy, 22, 0, Math.PI * 2);
      ctx.fill();
      // スピード線
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(sx - dir * 20, sy + (i-2)*6);
        ctx.lineTo(sx - dir * 60, sy + (i-2)*8);
        ctx.stroke();
      }
      ctx.restore();
    } else if (type === 'slash') {
      // ジャンプ斬り：空中停止中に光の軌跡＋斬撃波
      // さくの周りに輝くオーラ
      const t = saku.ultActive.timer;
      if (t <= 80 && t >= 35) {
        ctx.save();
        ctx.translate(sx, sy);
        for (let i = 0; i < 6; i++) {
          const a = (i/6)*Math.PI*2 + (110-t)*0.2;
          const rr = 22 + Math.sin((110-t)*0.3 + i) * 4;
          ctx.fillStyle = `rgba(180,230,255,${0.5 + 0.5 * Math.sin((110-t)*0.2 + i)})`;
          ctx.beginPath();
          ctx.arc(Math.cos(a)*rr, Math.sin(a)*rr, 2.5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
      // 斬撃波
      if (saku.ultActive.slashWaves) {
        for (const w of saku.ultActive.slashWaves) {
          drawSlashWave(w);
        }
      }
    }
  }

  function drawSlashWave(w) {
    const x = w.x - cameraX;
    const y = w.y;
    const a = w.life / w.maxLife;
    const phase = 1 - a;
    ctx.save();
    ctx.translate(x, y);
    // 軌跡（残像）
    for (let i = 0; i < 5; i++) {
      const off = -i * 8 * Math.sign(w.vx);
      ctx.globalAlpha = a * (1 - i * 0.2);
      ctx.save();
      ctx.translate(off, 0);
      ctx.rotate(w.angle + phase * Math.sign(w.vx) * 0.3);
      // 外側のグロー
      const g = ctx.createLinearGradient(-40, 0, 40, 0);
      g.addColorStop(0, 'rgba(160,210,255,0)');
      g.addColorStop(0.4, 'rgba(200,235,255,0.7)');
      g.addColorStop(0.5, 'rgba(255,255,255,1)');
      g.addColorStop(0.6, 'rgba(200,235,255,0.7)');
      g.addColorStop(1, 'rgba(160,210,255,0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = 16;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-35, -22);
      ctx.quadraticCurveTo(0, -5, 35, 22);
      ctx.stroke();
      // 中核の白線
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-30, -18);
      ctx.quadraticCurveTo(0, -3, 30, 18);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // ぺろぺろありーなカットイン（百式観音＋バキバキ連撃＋青オーラ余韻）
  function drawPeroperoCutin() {
    const fx = saku.ultActive;
    const t = fx.timer;  // 280→0
    const tMax = 280;
    const progress = (tMax - t) / tMax;  // 0→1

    // === フェーズ 1: init (t: 280-220) === 観音出現＋暗転
    // === フェーズ 2: attack (t: 220-120) === バキバキ連撃
    // === フェーズ 3: aftermath (t: 120-0) === 青オーラ余韻

    const isInit = t > 220;
    const isAttack = t <= 220 && t > 120;
    const isAftermath = t <= 120;

    // 背景の暗転度
    let bgAlpha = 0;
    if (isInit) bgAlpha = ((tMax - t) / 60) * 0.85;  // 0→0.85
    else if (isAttack) bgAlpha = 0.85;
    else if (isAftermath) bgAlpha = Math.max(0, 0.5 * (t / 120));  // 0.5→0
    ctx.fillStyle = `rgba(5, 3, 20, ${bgAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // 金色の光源（観音の光輪）
    const halo = ctx.createRadialGradient(W/2, H*0.4, 20, W/2, H*0.4, Math.max(W, H) * 0.8);
    let haloStrength = 0;
    if (isInit) haloStrength = (tMax - t) / 60 * 0.5;
    else if (isAttack) haloStrength = 0.4 + 0.2 * Math.sin(t * 0.3);
    else if (isAftermath) haloStrength = Math.max(0, (t / 120) * 0.3);
    halo.addColorStop(0, `rgba(255, 220, 100, ${haloStrength})`);
    halo.addColorStop(0.4, `rgba(200, 100, 40, ${haloStrength * 0.5})`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, W, H);

    // 百式観音（attackフェーズは白の上にうっすら描き直すので、ここではスキップ）
    if (!isAttack && (!isAftermath || t > 30)) {
      let kannonAlpha = 0;
      if (isInit) kannonAlpha = Math.min(1, (tMax - t) / 60);
      else if (isAftermath) kannonAlpha = Math.max(0, (t - 30) / 90);
      drawKannon(W/2, H * 0.48, kannonAlpha);
    }

    // 桜吹雪（attackフェーズは白で隠れるのでスキップ）
    const sakuraCount = isAftermath ? 40 : (isAttack ? 0 : 25);
    for (let i = 0; i < sakuraCount; i++) {
      const seed = i * 37;
      const sx = ((seed + fx.auraFrame * 2) % W);
      const sy = ((seed * 3 + fx.auraFrame * 2.5 + i * 40) % H);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate((fx.auraFrame * 0.08 + i) % (Math.PI * 2));
      const grad = ctx.createRadialGradient(0, 0, 1, 0, 0, 6);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.5, '#ffc0d8');
      grad.addColorStop(1, '#ff7faa');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 3.5, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // タイトル「ぺろぺろありーな」— init 中のみ表示（attack中は真っ白なので隠す）
    if (isInit) {
      ctx.save();
      ctx.translate(W/2, H * 0.28);
      const scale = 1 + 0.05 * Math.sin(fx.auraFrame * 0.3);
      const shake = isAttack ? (Math.random() - 0.5) * 5 : 0;
      ctx.translate(shake, shake);
      ctx.scale(scale, scale);
      ctx.rotate(-0.03);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 40px "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif';
      ctx.lineWidth = 13; ctx.strokeStyle = '#000';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 8; ctx.strokeStyle = '#7a1a5a';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      const tg = ctx.createLinearGradient(0, -28, 0, 28);
      tg.addColorStop(0, '#ffffff');
      tg.addColorStop(0.5, '#ffccf0');
      tg.addColorStop(1, '#ff4488');
      ctx.fillStyle = tg;
      ctx.fillText('ぺろぺろありーな', 0, 0);
      ctx.restore();
    }

    // 「秘奥義」表記（init 中のみ）
    if (isInit) {
      const op = Math.min(1, (tMax - t) / 30);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 24px serif';
      ctx.globalAlpha = op;
      ctx.lineWidth = 6; ctx.strokeStyle = '#000';
      ctx.strokeText('秘奥義', W/2, H * 0.18);
      ctx.fillStyle = '#ffeb4a';
      ctx.fillText('秘奥義', W/2, H * 0.18);
      ctx.restore();
    }

    // ★ 攻撃フェーズ: ずっと真っ白、うっすら観音様だけ透ける（チカチカしない）
    if (isAttack) {
      // 画面を完全に真っ白で覆う（常に同じ不透明度、点滅なし）
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // 白の上にうっすらと観音様を再描画（ゆらぎなし、固定の薄さ）
      drawKannon(W/2, H * 0.48, 0.2);

      // 桜吹雪（白地に映えるピンク濃いめ）
      for (let i = 0; i < 30; i++) {
        const seed = i * 53;
        const sx = ((seed + fx.auraFrame * 2) % (W + 40)) - 20;
        const sy = ((seed * 3 + fx.auraFrame * 2.3 + i * 37) % (H + 40)) - 20;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate((fx.auraFrame * 0.07 + i) % (Math.PI * 2));
        const grad = ctx.createRadialGradient(0, 0, 1, 0, 0, 7);
        grad.addColorStop(0, '#ffd0e0');
        grad.addColorStop(0.6, '#ff7faa');
        grad.addColorStop(1, '#e04080');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0, 0, 4, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // 「ぺろぺろありーな」タイトル（attack中も表示）
      ctx.save();
      ctx.translate(W/2, H * 0.28);
      const scale = 1 + 0.04 * Math.sin(fx.auraFrame * 0.25);
      ctx.scale(scale, scale);
      ctx.rotate(-0.03);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 40px "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif';
      ctx.lineWidth = 13; ctx.strokeStyle = '#000';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 8; ctx.strokeStyle = '#7a1a5a';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff';

  // 百式観音のシルエット（金色/橙）

  // カットシーン
  function updateCutscene() {
    if (!cutscene) return;
    cutscene.charAnim++;
    const current = cutscene.lines[cutscene.step];
    if (!current) { endCutscene(); return; }
    // ルビ除去したプレーンテキストで字数カウント
    const plain = stripRuby(current.text);
    if (cutscene.charIdx < plain.length && cutscene.charAnim % 2 === 0) {
      cutscene.charIdx++;
      // ルビ記号を維持しつつ charIdx 分だけ表示するように変換
      cutscene.charText = displayUpTo(current.text, cutscene.charIdx);
      if (cutscene.charIdx % 3 === 0) beep(900 + Math.random()*200, 0.02, 'square', 0.05);
      if (cutscene.charIdx >= plain.length) cutscene.waitInput = true;
    }
  }
  // text の "表示上" 最初から n 文字分を、[kanji|furigana] のルビを温存した形で返す
  function displayUpTo(text, n) {
    let out = '';
    let visible = 0;
    let i = 0;
    while (i < text.length && visible < n) {
      if (text[i] === '[') {
        const end = text.indexOf(']', i);
        if (end < 0) { out += text.substring(i); break; }
        const inner = text.substring(i+1, end);
        const pipe = inner.indexOf('|');
        if (pipe > 0) {
          const base = inner.substring(0, pipe);
          const remain = n - visible;
          if (remain >= base.length) {
            out += '[' + inner + ']';
            visible += base.length;
            i = end + 1;
          } else {
            // 途中まで表示：ルビは付けずにプレーンで
            out += base.substring(0, remain);
            visible += remain;
            i = end + 1;
          }
        } else {
          // 閉じてない/妙な記法は素通り
          out += '[' + inner + ']';
          visible += (inner.length + 2);
          i = end + 1;
        }
      } else {
        out += text[i];
        visible++;
        i++;
      }
    }
    return out;
  }
  // advanceCutscene で即時全表示にするときも修正


  function drawCutscene() {
    if (!cutscene) return;
    // 背景：暗いオーバーレイ
    ctx.fillStyle = '#050610';
    ctx.fillRect(0, 0, W, H);
    const current = cutscene.lines[cutscene.step];
    if (!current) return;

    // 背景の輝きグロー
    const glowX = W/2, glowY = H*0.4;
    const g = ctx.createRadialGradient(glowX, glowY, 10, glowX, glowY, 260);
    let gColor = 'rgba(70,100,180,0.35)';
    if (cutscene.id === 'final-reveal' && cutscene.step >= 9) gColor = 'rgba(180,30,60,0.4)';
    else if (cutscene.id === 'final-reveal' && cutscene.step >= 3) gColor = 'rgba(200,170,80,0.4)';
    g.addColorStop(0, gColor);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // キャラクター描画（中央）
    const charY = H * 0.42;
    drawCutsceneChar(current.speaker, W/2, charY, cutscene.id, cutscene.step);

    // 名前と台詞ウィンドウ
    const boxH = 100;
    const boxY = H - boxH - 10;
    ctx.save();
    // ウィンドウ
    ctx.fillStyle = 'rgba(10, 20, 40, 0.92)';
    ctx.fillRect(20, boxY, W - 40, boxH);
    ctx.strokeStyle = '#80a0d0';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, boxY, W - 40, boxH);
    ctx.strokeStyle = 'rgba(200,230,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(24, boxY + 4, W - 48, boxH - 8);
    // 名前タブ
    const speakerNames = { nazo: 'なぞの男', toto: 'とーと', saku: 'さく', boss: '謎の声', kurumi: 'くるみ' };
    let name = speakerNames[current.speaker] || '？？？';
    // final-revealのreveal前後で「なぞの男」→「とーと」に
    ctx.fillStyle = 'rgba(30, 50, 100, 0.95)';
    ctx.fillRect(30, boxY - 18, 140, 22);
    ctx.strokeStyle = '#80a0d0';
    ctx.lineWidth = 2;
    ctx.strokeRect(30, boxY - 18, 140, 22);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, 40, boxY - 7);

    // 台詞テキスト（途中まで表示・ルビ対応）
    ctx.fillStyle = '#e8f0ff';

    ctx.font = dlgFont;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    const textToShow = cutscene.charText || '';
    const lineSegs = wrapRuby(textToShow, W - 80, dlgFont);
    for (let i = 0; i < lineSegs.length; i++) {
      drawRuby(lineSegs[i], 40, boxY + 32 + i * 26, dlgFont, {
        fillStyle: '#e8f0ff',
        rubyFill: '#bcd0ff',
      });
    }

    // 続きマーカー
    if (cutscene.waitInput && Math.floor(cutscene.charAnim / 20) % 2 === 0) {
      ctx.fillStyle = '#ffc040';
      ctx.font = '18px serif';
      ctx.fillText('▼', W - 60, boxY + boxH - 18);
    }
    ctx.restore();

    // 操作ヒント
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '10px serif';
    ctx.fillStyle = 'rgba(200,220,255,0.6)';
    ctx.fillText('Space/Z/タップ : つぎへ', W/2, H - 4);
    ctx.restore();
  }
  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const chars = text.split('');
    const lines = [];
    let line = '';
    for (const ch of chars) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = ch;
      } else line = test;
    }
    if (line) lines.push(line);
    ctx.restore();
    return lines;
  }

  // ====== ルビ対応テキスト ======
  // 記法: "ふつうの文章[漢字|かんじ]を[送|おく]る"
  function parseRuby(text) {
    const segs = [];
    let i = 0;
    while (i < text.length) {
      if (text[i] === '[') {
        const end = text.indexOf(']', i);
        if (end < 0) { segs.push({ type: 'plain', s: text.substring(i) }); break; }
        const inner = text.substring(i+1, end);
        const pipe = inner.indexOf('|');
        if (pipe > 0) {
          // 1文字ずつに分割してまとめて rt に入れる（1漢字1hiragana割当の方が綺麗）
          segs.push({ type: 'ruby', s: inner.substring(0, pipe), r: inner.substring(pipe+1) });
        } else {
          segs.push({ type: 'plain', s: '[' + inner + ']' });
        }
        i = end + 1;
      } else {
        let end = text.indexOf('[', i);
        if (end < 0) end = text.length;
        segs.push({ type: 'plain', s: text.substring(i, end) });
        i = end;
      }
    }
    return segs;
  }
  // セグメント列の表示幅（ベース文字幅）を返す
  function measureRuby(segs, font) {
    ctx.save();
    ctx.font = font;
    let w = 0;
    for (const s of segs) w += ctx.measureText(s.s).width;
    ctx.restore();
    return w;
  }
  // ルビ付きテキスト描画。基準 (x,y) に textAlign/textBaseline 従って描く
  function drawRuby(segsOrText, x, y, baseFont, options) {
    options = options || {};
    const segs = Array.isArray(segsOrText) ? segsOrText : parseRuby(segsOrText);
    ctx.save();
    ctx.font = baseFont;
    const baseSize = parseFloat(baseFont.match(/(\d+(?:\.\d+)?)px/)[1]);
    const rubyFont = (options.rubyFont) || `${Math.round(baseSize * 0.45)}px serif`;
    const totalW = measureRuby(segs, baseFont);
    let cx = x;
    if (ctx.textAlign === 'center') cx = x - totalW / 2;
    else if (ctx.textAlign === 'right') cx = x - totalW;
    const savedAlign = ctx.textAlign;
    ctx.textAlign = 'left';

    // 1回目: 縁取り（指定された場合）
    if (options.strokeStyle && options.lineWidth) {
      ctx.strokeStyle = options.strokeStyle;
      ctx.lineWidth = options.lineWidth;
      let px = cx;
      for (const s of segs) {
        const w = ctx.measureText(s.s).width;
        ctx.strokeText(s.s, px, y);
        if (s.type === 'ruby') {
          ctx.save();
          ctx.font = rubyFont;
          const rw = ctx.measureText(s.r).width;
          const rx = px + (w - rw) / 2;
          const ry = y - baseSize * 0.88;
          ctx.strokeText(s.r, rx, ry);
          ctx.restore();
        }
        px += w;
      }
    }
    // 2回目: 本体塗り
    if (options.fillStyle !== false) {
      ctx.fillStyle = options.fillStyle || ctx.fillStyle;
      let px = cx;
      for (const s of segs) {
        const w = ctx.measureText(s.s).width;
        ctx.fillText(s.s, px, y);
        if (s.type === 'ruby') {
          ctx.save();
          ctx.font = rubyFont;
          ctx.fillStyle = options.rubyFill || options.fillStyle || '#fff';
          const rw = ctx.measureText(s.r).width;
          const rx = px + (w - rw) / 2;
          const ry = y - baseSize * 0.88;
          ctx.fillText(s.r, rx, ry);
          ctx.restore();
        }
        px += w;
      }
    }
    ctx.textAlign = savedAlign;
    ctx.restore();
  }
  // ルビを単純に hiragana だけ取り出して通常文字列に変換（簡易）
  function stripRuby(text) {
    return text.replace(/\[([^\|\]]+)\|[^\]]+\]/g, '$1');
  }
  // ルビを考慮した折り返し
  function wrapRuby(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const segs = parseRuby(text);
    const lines = [];
    let lineSegs = [];
    let lineW = 0;
    for (const seg of segs) {
      // セグメント内を 1 文字ずつ進める（ruby 内も 1 文字ずつ）
      const chars = seg.s.split('');
      if (seg.type === 'ruby') {
        // ruby は分割せず1まとめで追加（切れたら不自然）
        const w = ctx.measureText(seg.s).width;
        if (lineW + w > maxWidth && lineW > 0) {
          lines.push(lineSegs); lineSegs = []; lineW = 0;
        }
        lineSegs.push({ type: 'ruby', s: seg.s, r: seg.r });
        lineW += w;
      } else {
        for (const ch of chars) {
          const w = ctx.measureText(ch).width;
          if (lineW + w > maxWidth && lineW > 0) {
            lines.push(lineSegs); lineSegs = []; lineW = 0;
          }
          // 連結：最後が plain なら結合
          if (lineSegs.length > 0 && lineSegs[lineSegs.length-1].type === 'plain') {
            lineSegs[lineSegs.length-1].s += ch;
          } else {
            lineSegs.push({ type: 'plain', s: ch });
          }
          lineW += w;
        }
      }
    }
    if (lineSegs.length) lines.push(lineSegs);
    ctx.restore();
    return lines;
  }

  // カットシーンのキャラ描画
  function drawCutsceneChar(speaker, x, y, id, step) {
    ctx.save();
    const revealed = (id === 'final-reveal' && step >= 4);
    if (speaker === 'nazo') {
      if (id === 'final-reveal' && step >= 3) {
        // フード脱ぐシーン
        drawToto(x, y, step - 3);
      } else {
        drawNazo(x, y);
      }
    } else if (speaker === 'toto') {
      const phase = step - 3;  // reveal開始を基準
      if (id === 'final-reveal' && step >= 9) {
        // ボスに攻撃されてダメージ
        drawToto(x, y, phase, true);
      } else {
        drawToto(x, y, phase);
      }
    } else if (speaker === 'saku') {
      ctx.save();
      ctx.translate(x - 12, y - 45);
      ctx.scale(3, 3);
      const savedSaku = {...saku};
      saku.x = cameraX; saku.y = 0; saku.vx = 0; saku.onGround = true;
      saku.facing = 1; saku.anim = cutscene.charAnim * 0.05;
      saku.invuln = 0; saku.starTimer = 0; saku.swordTimer = 0; saku.ultraStarTimer = 0;
      drawSaku(cameraX, 0);
      Object.assign(saku, savedSaku);
      ctx.restore();
    } else if (speaker === 'boss') {
      drawFinalBossSilhouette(x, y);
    } else if (speaker === 'kurumi') {
      drawKurumi(x, y, cutscene.charAnim);
    }
    ctx.restore();
  }
  // くるみ（3〜5歳の幼女・栗色ツインテール・白ワンピース＋ピンクリボン）

    ctx.moveTo(cx - 7, cy - 5.5); ctx.lineTo(cx - 5, cy - 5.5);

  function drawCheckpoint() {
    if (!stageCheckpoint) return;
    const cx = stageCheckpoint.x - cameraX;
    if (cx < -30 || cx > W + 30) return;
    // 支柱の根元は地面の上 (LEVEL_ROWS - 3) * TILE + 32 = 地面ちょうど
    const baseY = (LEVEL_ROWS - 2) * TILE;
    const topY = baseY - 60;
    // 土台
    ctx.fillStyle = '#444';
    ctx.fillRect(cx - 6, baseY - 4, 12, 4);
    // 支柱
    ctx.fillStyle = '#888';
    ctx.fillRect(cx - 1.5, topY, 3, baseY - topY - 4);
    // 旗
    const activated = stageCheckpoint.activated;
    const flagT = Math.sin((activated ? 0 : 1) * 10 + (activated ? titleFrame * 0.15 : 0));
    const flagHeight = activated ? 14 : 10;
    const flagY = activated ? topY + 2 : topY + 30;  // 起動後は上に上がる
    // 旗の揺れ
    const wave = Math.sin(titleFrame * 0.2) * 2;
    ctx.save();
    ctx.translate(cx + 1.5, flagY);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(14 + wave, 2, 20, 0);
    ctx.lineTo(20, flagHeight);
    ctx.quadraticCurveTo(14 - wave, flagHeight + 2, 0, flagHeight);
    ctx.closePath();
    ctx.fillStyle = activated ? '#ffe040' : '#aaa';
    ctx.fill();
    ctx.strokeStyle = activated ? '#8a5a10' : '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 印（★）
    if (activated) {
      ctx.fillStyle = '#ff4040';
      ctx.beginPath();
      const sx = 10, sy = flagHeight / 2;
      for (let i = 0; i < 10; i++) {
        const a = i * Math.PI / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? 4 : 2;
        if (i === 0) ctx.moveTo(sx + Math.cos(a)*r, sy + Math.sin(a)*r);
        else ctx.lineTo(sx + Math.cos(a)*r, sy + Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    // 起動時のキラキラ
    if (activated) {
      for (let i = 0; i < 3; i++) {
        const a = (i/3) * Math.PI * 2 + titleFrame * 0.2;
        const rr = 14 + Math.sin(titleFrame * 0.3 + i) * 2;
        const sx = cx + Math.cos(a) * rr;
        const sy = topY + 20 + Math.sin(a) * rr;
        ctx.fillStyle = `rgba(255,240,100,${0.6 + 0.4*Math.sin(titleFrame*0.3+i)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // ロックマン風のHPゲージ
  // ステージ進行度バー（上部中央）
  function drawStageProgress() {
    if (state !== 'playing' && state !== 'paused') return;
    const stage = STAGES[currentStage];
    if (!stage) return;
    const progress = Math.max(0, Math.min(1, (saku.x + saku.w/2) / (LEVEL_W - TILE * 2)));
    const bw = W * 0.5;
    const bx = (W - bw) / 2;
    const by = 8;
    ctx.save();
    // 背景
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx, by, bw, 10);
    // 進行度
    const pg = ctx.createLinearGradient(bx, by, bx + bw, by);
    pg.addColorStop(0, '#40d0ff');
    pg.addColorStop(0.5, '#ffee40');
    pg.addColorStop(1, '#ff4080');
    ctx.fillStyle = pg;
    ctx.fillRect(bx + 1, by + 1, (bw - 2) * progress, 8);
    // さくマーカー
    const mx = bx + (bw - 2) * progress;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(mx, by + 5, 4, 0, Math.PI * 2);
    ctx.fill();
    // 旗マーカー（右端）
    ctx.fillStyle = '#ffee40';
    ctx.fillRect(bx + bw - 4, by - 4, 3, 18);
    // ステージラベル
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText(stage.label + ' ' + stage.name, W/2, by + 14);
    ctx.fillStyle = '#fff';
    ctx.fillText(stage.label + ' ' + stage.name, W/2, by + 14);
    ctx.restore();
  }

  function drawHPGauge() {
    if (state === 'title') return;
    const x0 = 10, y0 = 10;
    const segW = 10, segH = 6, gap = 2;
    const label = 'HP';
    // ラベル
    ctx.save();
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.strokeText(label, x0, y0);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, x0, y0);
    ctx.restore();
    // ゲージの枠
    const bx = x0 + 22, by = y0 + 2;
    const totalW = saku.maxHp * (segW + gap) - gap + 4;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bx - 2, by - 2, totalW, segH + 4);
    for (let i = 0; i < saku.maxHp; i++) {
      const sx = bx + i * (segW + gap);
      if (i < saku.hp) {
        // 残HPに応じて色変化（緑→黄→赤）
        const ratio = saku.hp / saku.maxHp;
        let col;
        if (ratio > 0.6) col = '#34d856';
        else if (ratio > 0.3) col = '#ffd440';
        else col = '#ff4a4a';
        const g = ctx.createLinearGradient(sx, by, sx, by + segH);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.4, col);
        g.addColorStop(1, col);
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = '#333';
      }
      ctx.fillRect(sx, by, segW, segH);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, by + 0.5, segW - 1, segH - 1);
    }
  }

  function loop() {
    try {
      if (state === 'title') {
        titleFrame++;
        drawTitle();
      } else if (state === 'cutscene') {
        update();
        drawCutscene();
      } else if (state === 'tutorial') {
        drawUltTutorial();
      } else if (state === 'stageTransition') {
        render();
        drawStageTransition();
        update();
      } else {
        update();
        render();
      }
    } catch(e) { console.error(e); }
    requestAnimationFrame(loop);
  }

  // ====== デバッグ用: URLパラメータで直接再生 ======
  // 例: ?cs=teach-punch / ?cs=teach-slash / ?cs=final-reveal
  //    ?stage=10-5  ←任意ステージ＋全技解放でスタート
  //    ?stage=10-5&ults=all / ?stage=3-1&ults=punch,slash
  (() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const cs = params.get('cs');
      const stageParam = params.get('stage');
      const ultsParam = params.get('ults');
      // デバッグ: ?infinite=1 で必殺技ゲージ無限
      if (params.get('infinite') === '1') window.DEBUG_INFINITE_ULT = true;

      if (stageParam) {
        ensureAudio();
        // X-Y 形式または数値
        let idx = 0;
        if (stageParam.includes('-')) {
          const [w, s] = stageParam.split('-').map(n => parseInt(n) - 1);
          idx = w * 5 + s;
        } else {
          idx = parseInt(stageParam) || 0;
        }
        idx = Math.max(0, Math.min(STAGES.length - 1, idx));

        // 必殺技の解放
        if (ultsParam) {
          saku.unlockedUlts = [];
          if (ultsParam === 'all') {
            saku.unlockedUlts = ['punch','slash','peropero'];
          } else {
            const wanted = ultsParam.split(',').map(s => s.trim());
            for (const u of ['punch','slash','peropero']) {
              if (wanted.includes(u)) saku.unlockedUlts.push(u);
            }
          }
        } else {
          // デフォルト: ステージ番号に応じた技を自動解放
          saku.unlockedUlts = [];
          if (idx >= 14) saku.unlockedUlts.push('punch');     // 3-5クリア後
          if (idx >= 29) saku.unlockedUlts.push('slash');     // 6-5クリア後
          if (idx >= 44) saku.unlockedUlts.push('peropero');  // 9-5クリア後
        }
        saku.selectedUlt = Math.max(0, saku.unlockedUlts.length - 1);

        currentStage = idx;
        loadStage(idx);
        saku.ultGauge = saku.maxUlt;  // ゲージ満タンでスタート
        state = 'playing';
        startBGM();
        return;
      }

      if (cs && CUTSCENES[cs]) {
        ensureAudio();
        currentStage = 0;
        loadStage(0);
        stopBGM();
        startCutscene(cs);
      }
    } catch(e) { console.error(e); }
  })();

  loop();
})();
</script>
</body>
</html>
