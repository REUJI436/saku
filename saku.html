    stageEl.textContent = '1-1';
  }
  document.getElementById('continueBtn').addEventListener('click', continueFromGameOver);
  document.getElementById('continueBtn').addEventListener('touchstart', e => { e.preventDefault(); continueFromGameOver(); }, { passive: false });
  document.getElementById('titleBtn').addEventListener('click', returnToTitle);
  document.getElementById('titleBtn').addEventListener('touchstart', e => { e.preventDefault(); returnToTitle(); }, { passive: false });

  // ====== 描画 ======
  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, theme.sky[0]);
    sky.addColorStop(1, theme.sky[1]);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 丘
    ctx.fillStyle = theme.hillColor;
    const parHill = cameraX * 0.4;
    for (let i = 0; i < 12; i++) {
      const cx = 400 * i + 100 - parHill;
      if (cx < -250 || cx > W + 250) continue;
      ctx.beginPath();
      ctx.ellipse(cx, H - 32, 220, 80, 0, 0, Math.PI, true);
      ctx.fill();
    }

    // 雲
    const parX = cameraX * 0.3;
    const clouds = [
      {x:100,y:40},{x:300,y:20},{x:500,y:50},{x:800,y:30},{x:1100,y:55},
      {x:1400,y:25},{x:1700,y:45},{x:2000,y:35},{x:2300,y:50},{x:2600,y:20},
      {x:2900,y:45},{x:3200,y:30},{x:3500,y:55},{x:3800,y:20}
    ];
    ctx.fillStyle = theme.sky[0] === '#0a0818' ? '#ffffff22' : '#fff';
    for (const c of clouds) {
      const cx = c.x - parX;
      if (cx < -100 || cx > W + 100) continue;
      ctx.beginPath();
      ctx.arc(cx, c.y, 14, 0, Math.PI*2);
      ctx.arc(cx + 12, c.y - 4, 12, 0, Math.PI*2);
      ctx.arc(cx + 24, c.y, 14, 0, Math.PI*2);
      ctx.arc(cx + 34, c.y, 10, 0, Math.PI*2);
      ctx.fill();
    }

    // どうくつの場合、鍾乳石
    if (theme.sky[0].startsWith('#0a') || theme.sky[0].startsWith('#1a') || theme.sky[0].startsWith('#20')) {
      ctx.fillStyle = theme.hillColor;
      const parS = cameraX * 0.6;
      for (let i = 0; i < 20; i++) {
        const sx = 300 * i + 150 - parS;
        if (sx < -30 || sx > W + 30) continue;
        ctx.beginPath();
        ctx.moveTo(sx - 14, 0);
        ctx.lineTo(sx + 14, 0);
        ctx.lineTo(sx, 60 + (i%3)*20);
        ctx.closePath();
        ctx.fill();
      }
    }

    // ワールド別雰囲気パーティクル
    drawAmbientParticles();
  }

  // 時間とともに更新される擬似乱数（スプライトの位置にaudioSafe）
  let ambientFrame = 0;
  function drawAmbientParticles() {
    ambientFrame++;
    const themeName = STAGES[currentStage]?.theme;
    if (!themeName) return;
    if (themeName === 'ice') {
      // 雪が降る
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 40; i++) {
        const seed = i * 73;
        const sx = ((seed + ambientFrame * 0.7) % (W + 40)) - 20;
        const sy = ((seed * 3 + ambientFrame * 1.6 + i * 31) % (H + 40)) - 20;
        const r = 1 + (i % 3);
        ctx.globalAlpha = 0.7 - (i % 3) * 0.15;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (themeName === 'water') {
      // 気泡が上に昇る
      for (let i = 0; i < 25; i++) {
        const seed = i * 91;
        const sx = ((seed + cameraX * 0.3) % (W + 40)) - 20;
        const sy = H - ((seed * 7 + ambientFrame * 0.9 + i * 43) % (H + 80));
        const r = 2 + (i % 4);
        ctx.fillStyle = 'rgba(180,230,255,' + (0.2 + (i % 3) * 0.15) + ')';
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(220,255,255,0.6)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    } else if (themeName === 'fire') {
      // 火の粉が上昇
      for (let i = 0; i < 35; i++) {
        const seed = i * 61;
        const sx = ((seed + ambientFrame * 1.2) % (W + 40)) - 20;
        const sy = H - ((seed * 5 + ambientFrame * 2 + i * 37) % (H + 80));
        const r = 1 + (i % 3);
        ctx.fillStyle = ['#ffee60','#ff9020','#ff4000'][i % 3];
        ctx.globalAlpha = 0.6 + 0.3 * Math.sin(ambientFrame * 0.1 + i);
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // 遠景の溶岩発光（画面下）
      const lavaGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
      lavaGrad.addColorStop(0, 'rgba(255,80,0,0)');
      lavaGrad.addColorStop(1, 'rgba(255,120,0,0.25)');
      ctx.fillStyle = lavaGrad;
      ctx.fillRect(0, H * 0.7, W, H * 0.3);
    } else if (themeName === 'space') {
      // 星が瞬く
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 80; i++) {
        const seed = i * 47;
        const sx = ((seed + cameraX * 0.1) % W);
        const sy = ((seed * 11) % (H * 0.7));
        const tw = 0.4 + 0.6 * Math.abs(Math.sin(ambientFrame * 0.05 + i));
        ctx.globalAlpha = tw;
        const r = 0.8 + (i % 3) * 0.4;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // 遠くに惑星
      const planetX = W * 0.85 - (cameraX * 0.05) % (W * 0.3);
      const planetY = H * 0.2;
      const pg = ctx.createRadialGradient(planetX - 5, planetY - 5, 2, planetX, planetY, 30);
      pg.addColorStop(0, '#ff8040');
      pg.addColorStop(0.6, '#a04020');
      pg.addColorStop(1, '#300810');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(planetX, planetY, 28, 0, Math.PI * 2);
      ctx.fill();
    } else if (themeName === 'heaven') {
      // 光の粒子がふわふわ
      for (let i = 0; i < 30; i++) {
        const seed = i * 89;
        const sx = ((seed + cameraX * 0.2 + ambientFrame * 0.3) % (W + 40)) - 20;
        const sy = ((seed * 5 + Math.sin(ambientFrame * 0.02 + i) * 30 + i * 25) % H);
        ctx.fillStyle = 'rgba(255,240,200,' + (0.3 + 0.4 * Math.sin(ambientFrame * 0.03 + i)) + ')';
        ctx.beginPath();
        ctx.arc(sx, sy, 3 + (i % 2), 0, Math.PI * 2);
        ctx.fill();
      }
      // 天国は背景に大きな虹アーチ
      ctx.save();
      const arcCx = W * 0.5 - cameraX * 0.1;
      const arcCy = H * 1.1;
      const rainbowColors = ['#ff8080','#ffaa60','#ffee60','#80ff80','#60d0ff','#a080ff','#ff80d0'];
      for (let i = 0; i < 7; i++) {
        ctx.strokeStyle = rainbowColors[i];
        ctx.globalAlpha = 0.25;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(arcCx, arcCy, 200 + i * 10, Math.PI, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    } else if (themeName === 'forest') {
      // 木の葉が舞う
      for (let i = 0; i < 20; i++) {
        const seed = i * 67;
        const sx = ((seed + ambientFrame * 1.1) % (W + 40)) - 20;
        const sy = ((seed * 7 + ambientFrame * 1.3 + i * 41) % (H + 40));
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate((ambientFrame * 0.04 + i) % (Math.PI * 2));
        ctx.fillStyle = ['#4a8a3a', '#6aa050', '#8ab068'][i % 3];
        ctx.beginPath();
        ctx.ellipse(0, 0, 3, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // 遠景の大きな木シルエット
      ctx.fillStyle = 'rgba(20,40,20,0.4)';
      for (let ti = 0; ti < 3; ti++) {
        const tx = (W * (0.2 + ti * 0.35) - cameraX * 0.2) % (W * 1.2);
        ctx.beginPath();
        ctx.arc(tx, H * 0.55, 50, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(tx - 4, H * 0.55, 8, H * 0.2);
      }
    } else if (themeName === 'desert') {
      // 砂塵が風で流れる
      ctx.fillStyle = 'rgba(220,180,120,0.35)';
      for (let i = 0; i < 25; i++) {
        const seed = i * 79;
        const sx = ((seed + ambientFrame * 3) % (W + 40)) - 20;
        const sy = ((seed * 9 + i * 37) % H);
        ctx.beginPath();
        ctx.ellipse(sx, sy, 8, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // 遠景ピラミッドのシルエット
      ctx.fillStyle = 'rgba(160,110,60,0.4)';
      const pyramidX = W * 0.75 - (cameraX * 0.15) % (W * 0.5);
      const pyramidY = H * 0.65;
      ctx.beginPath();
      ctx.moveTo(pyramidX, pyramidY);
      ctx.lineTo(pyramidX - 50, pyramidY + 60);
      ctx.lineTo(pyramidX + 50, pyramidY + 60);
      ctx.closePath();
      ctx.fill();
    } else if (themeName === 'sky') {
      // 小鳥のような点が横切る
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (let i = 0; i < 10; i++) {
        const seed = i * 131;
        const sx = ((seed + ambientFrame * 2) % (W + 80)) - 40;
        const sy = ((seed * 13) % (H * 0.5));
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // 遠景に浮かぶ雲の城シルエット
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      const castleX = W * 0.7 - (cameraX * 0.08) % (W * 0.5);
      const cy0 = H * 0.35;
      ctx.fillRect(castleX - 30, cy0, 60, 20);
      ctx.fillRect(castleX - 35, cy0 - 6, 10, 6);
      ctx.fillRect(castleX - 5, cy0 - 10, 10, 10);
      ctx.fillRect(castleX + 25, cy0 - 6, 10, 6);
    }
  }

  function drawTiles() {
    const tx0 = Math.max(0, Math.floor(cameraX / TILE));
    const tx1 = Math.min(LEVEL_COLS - 1, Math.ceil((cameraX + W) / TILE));
    for (let ty = 0; ty < LEVEL_ROWS; ty++) {
      for (let tx = tx0; tx <= tx1; tx++) {
        const t = tiles[ty][tx];
        if (t === T_EMPTY) continue;
        const x = tx * TILE - cameraX;
        const y = ty * TILE;
        drawTile(t, x, y);
      }
    }
  }
  function drawTile(t, x, y) {
    switch (t) {
      case T_GROUND: {
        ctx.fillStyle = theme.groundBot;
        ctx.fillRect(x, y + 8, TILE, TILE - 8);
        ctx.fillStyle = theme.groundDetail;
        for (let i = 0; i < 4; i++) ctx.fillRect(x + i*8 + 2, y + 14 + (i%2)*4, 4, 2);
        ctx.fillStyle = theme.groundTop;
        ctx.fillRect(x, y, TILE, 10);
        ctx.fillStyle = theme.grass;
        ctx.fillRect(x, y, TILE, 3);
        break;
      }
      case T_BRICK: {
        ctx.fillStyle = theme.brick;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = theme.brickDark;
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        ctx.beginPath();
        ctx.moveTo(x, y + TILE/2); ctx.lineTo(x + TILE, y + TILE/2);
        ctx.moveTo(x + TILE/2, y); ctx.lineTo(x + TILE/2, y + TILE/2);
        ctx.moveTo(x + TILE/4, y + TILE/2); ctx.lineTo(x + TILE/4, y + TILE);
        ctx.moveTo(x + 3*TILE/4, y + TILE/2); ctx.lineTo(x + 3*TILE/4, y + TILE);
        ctx.stroke();
        break;
      }
      case T_QUESTION: {
        ctx.fillStyle = '#e0a020';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#7a4c0f';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', x + TILE/2, y + TILE/2 + 2);
        break;
      }
      case T_QUESTION_USED: {
        ctx.fillStyle = '#8a6020';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#4a3010';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        break;
      }
      case T_PIPE_TOP: {
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x - 4, y, TILE + 8, TILE);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(x - 4, y, 5, TILE);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(x + TILE + 3, y, 5, TILE);
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x, y + TILE - 1, TILE, 2);
        break;
      }
      case T_PIPE_BODY: {
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(x, y, 5, TILE);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(x + TILE - 5, y, 5, TILE);
        break;
      }
      case T_STAIR: {
        ctx.fillStyle = theme.stair;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = theme.stairDark;
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        break;
      }
      case T_FLAG: {
        // キノピオが立っているマス：背景は旗竿、キノピオ本体は drawKinopio で描く
        ctx.fillStyle = '#ccc';
        ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
        break;
      }
    }
  }

  // ====== 寿司 ======
  function drawCoins() {
    for (const coin of coins) {
      if (coin.taken) continue;
      const x = coin.x - cameraX;
      const y = coin.y + Math.sin(coin.anim) * 1.5;
      if (x < -24 || x > W + 24) continue;
      drawSushi(x, y, coin.type || 'maguro');
    }
  }
  function drawSushi(cx, cy, type) {
    if (type === 'rainbow') {
      drawRainbowSushi(cx, cy);
      return;
    }
    switch (type) {
      case 'maguro': drawMaguro(cx, cy); break;
      case 'tamago': drawTamago(cx, cy); break;
      case 'ebi': drawEbi(cx, cy); break;
      case 'salmoncheese': drawSalmonCheese(cx, cy); break;
      case 'chawanmushi': drawChawanmushi(cx, cy); break;
      case 'ramen': drawRamen(cx, cy); break;
      default: drawMaguro(cx, cy);
    }
  }
  function drawRainbowSushi(cx, cy) {
    // 虹色オーラ
    const hue = (Date.now() * 0.1) % 360;
    const aura = ctx.createRadialGradient(cx, cy, 2, cx, cy, 18);
    aura.addColorStop(0, `hsla(${hue},100%,75%,0.7)`);
    aura.addColorStop(1, `hsla(${(hue + 120) % 360},100%,50%,0)`);
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fill();
    // 握り（虹色）
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = `hsl(${(hue + i * 60) % 360},100%,65%)`;
      ctx.beginPath();
      ctx.arc(Math.cos(i * Math.PI / 3) * 2, Math.sin(i * Math.PI / 3) * 2 + 2, 6 - i * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    // ネタ
    ctx.fillStyle = `hsl(${hue},100%,75%)`;
    ctx.beginPath();
    ctx.ellipse(0, -3, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // キラキラ
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✦', 0, -3);
    ctx.restore();
  }
  function drawRice(cx, cy) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(cx, cy + 8, 11, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(cx, cy + 3, 10, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#eee7d8';
    for (let i = -2; i <= 2; i++) {
      ctx.fillRect(cx + i * 3 - 0.5, cy + 2, 1, 1);
      ctx.fillRect(cx + i * 3 + 1, cy + 4, 1, 1);
    }
  }
  function drawMaguro(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx-9, cy-4, cx+9, cy+2);
    g.addColorStop(0, '#d3434a'); g.addColorStop(0.5, '#b01e22'); g.addColorStop(1, '#7d0d10');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 3.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(cx - 7, cy - 1); ctx.quadraticCurveTo(cx, cy - 3, cx + 7, cy - 1); ctx.stroke();
  }
  function drawTamago(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx, cy-4, cx, cy+2);
    g.addColorStop(0, '#ffe870'); g.addColorStop(1, '#e6a820');
    ctx.fillStyle = g; ctx.fillRect(cx - 9, cy - 5, 18, 6);
    ctx.strokeStyle = '#a67010'; ctx.lineWidth = 0.8;
    ctx.strokeRect(cx - 9, cy - 5, 18, 6);
    ctx.fillStyle = '#15150a'; ctx.fillRect(cx - 3, cy - 5, 6, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(cx - 8, cy - 4, 4, 1);
  }
  function drawEbi(cx, cy) {
    drawRice(cx, cy);
    ctx.fillStyle = '#ffa88a';
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e95c2e';
    for (let i = -1; i <= 2; i++) {
      ctx.beginPath(); ctx.ellipse(cx + i * 4 - 1, cy - 1, 1.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#d63c20';
    ctx.beginPath(); ctx.moveTo(cx + 8, cy - 1); ctx.lineTo(cx + 12, cy - 4); ctx.lineTo(cx + 12, cy + 2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(cx - 6, cy - 3, 3, 1);
  }
  function drawSalmonCheese(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx, cy - 4, cx, cy + 2);
    g.addColorStop(0, '#ffb680'); g.addColorStop(1, '#e76a28');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 3.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx - 8, cy - 2); ctx.quadraticCurveTo(cx - 2, cy - 4, cx + 4, cy - 2);
    ctx.moveTo(cx - 4, cy + 0); ctx.quadraticCurveTo(cx + 2, cy - 2, cx + 8, cy + 0);
    ctx.stroke();
    ctx.fillStyle = '#ffeb6b';
    ctx.fillRect(cx - 4, cy - 5, 8, 3);
    ctx.strokeStyle = '#b88c10'; ctx.lineWidth = 0.6;
    ctx.strokeRect(cx - 4, cy - 5, 8, 3);
    ctx.fillStyle = '#ffeb6b';
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 2); ctx.lineTo(cx - 1, cy + 0.5);
    ctx.lineTo(cx + 1, cy - 2); ctx.lineTo(cx + 3, cy + 0.5);
    ctx.lineTo(cx + 4, cy - 2); ctx.closePath(); ctx.fill();
  }
  function drawChawanmushi(cx, cy) {
    ctx.fillStyle = '#654434';
    ctx.beginPath();
    ctx.moveTo(cx - 10, cy - 2); ctx.lineTo(cx + 10, cy - 2);
    ctx.lineTo(cx + 8, cy + 8); ctx.lineTo(cx - 8, cy + 8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a1a10'; ctx.fillRect(cx - 10, cy - 3, 20, 2);
    ctx.fillStyle = '#f6d25c';
    ctx.beginPath(); ctx.ellipse(cx, cy - 2, 9, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3ea43e'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 2, cy - 2); ctx.lineTo(cx + 2, cy - 4);
    ctx.moveTo(cx, cy - 2); ctx.lineTo(cx + 1, cy - 5);
    ctx.stroke();
    ctx.fillStyle = '#ff7777';
    ctx.beginPath(); ctx.arc(cx - 4, cy - 2.5, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 6); ctx.quadraticCurveTo(cx - 5, cy - 8, cx - 3, cy - 10);
    ctx.moveTo(cx + 3, cy - 6); ctx.quadraticCurveTo(cx + 5, cy - 8, cx + 3, cy - 10);
    ctx.stroke();
  }
  function drawRamen(cx, cy) {
    ctx.fillStyle = '#c02020';
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy - 2); ctx.lineTo(cx + 12, cy - 2);
    ctx.lineTo(cx + 9, cy + 8); ctx.lineTo(cx - 9, cy + 8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = -5; i <= 5; i++) {
      const sx = cx + i * 2;
      if (i === -5) ctx.moveTo(sx, cy + 2);
      else ctx.quadraticCurveTo(sx - 1, cy + (i%2===0?4:2), sx, cy + 2);
    }
    ctx.stroke();
    ctx.fillStyle = '#6a0f0f'; ctx.fillRect(cx - 12, cy - 3, 24, 1.5);
    ctx.fillStyle = '#e6a038';
    ctx.beginPath(); ctx.ellipse(cx, cy - 2, 11, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#f5d680'; ctx.lineWidth = 0.8;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(cx - 8 + i * 3, cy - 2.5);
      ctx.quadraticCurveTo(cx - 5 + i * 3, cy - 4, cx - 2 + i * 3, cy - 2.5);
      ctx.stroke();
    }
    ctx.fillStyle = '#d2a273';
    ctx.beginPath(); ctx.arc(cx - 5, cy - 3, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a7e87a';
    ctx.fillRect(cx + 2, cy - 3.5, 1, 1);
    ctx.fillRect(cx + 4, cy - 3, 1, 1);
    ctx.fillRect(cx + 6, cy - 3.5, 1, 1);
  }

  // ====== アイテム ======
  function drawItems() {
    for (const item of items) {
      if (item.taken) continue;
      const x = item.x - cameraX;
      const y = item.y + Math.sin(item.anim) * 3;
      if (x < -24 || x > W + 24) continue;
      if (item.type === 'star') drawStarItem(x, y, item.anim);
      else if (item.type === 'ultraStar') drawUltraStarItem(x, y, item.anim);
      else if (item.type === 'sword') drawSwordItem(x, y, item.anim);
    }
  }
  function drawStarShape(size) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = i * Math.PI / 5 - Math.PI/2;
      const r = (i % 2 === 0) ? size : size * 0.45;
      if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
  }
  function drawStarItem(cx, cy, anim) {
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 + anim*0.6;
      const rr = 14 + Math.sin(anim*2+i)*3;
      const sx = Math.cos(a)*rr, sy = Math.sin(a)*rr;
      ctx.fillStyle = `rgba(255,255,200,${0.4+0.4*Math.sin(anim*3+i)})`;
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.rotate(anim*0.4);
    const hue = (anim*40)%360;
    const g = ctx.createRadialGradient(-2, -3, 1, 0, 0, 10);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.3, `hsl(${hue},100%,70%)`);
    g.addColorStop(1, `hsl(${(hue+180)%360},100%,45%)`);
    ctx.fillStyle = g;
    drawStarShape(10);
    ctx.lineWidth = 1.2; ctx.strokeStyle = '#ffdd40'; ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-2.5, -1, 1, 0, Math.PI*2);
    ctx.arc(2.5, -1, 1, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0, 2, 1.5, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();
    ctx.restore();
  }
  function drawUltraStarItem(cx, cy, anim) {
    ctx.save();
    ctx.translate(cx, cy);
    // 外側の巨大オーラ（脈動）
    const pulse = 1 + Math.sin(anim * 3) * 0.15;
    const auraR = 40 * pulse;
    const aurG = ctx.createRadialGradient(0, 0, 5, 0, 0, auraR);
    aurG.addColorStop(0, `hsla(${(anim*60)%360},100%,80%,0.6)`);
    aurG.addColorStop(0.5, `hsla(${(anim*60+120)%360},100%,60%,0.3)`);
    aurG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = aurG;
    ctx.beginPath(); ctx.arc(0, 0, auraR, 0, Math.PI*2); ctx.fill();
    // 周囲を回るキラキラ
    for (let i = 0; i < 12; i++) {
      const a = (i/12)*Math.PI*2 + anim*0.8;
      const rr = 26 + Math.sin(anim*3+i)*4;
      const sx = Math.cos(a)*rr, sy = Math.sin(a)*rr;
      ctx.fillStyle = `hsl(${(anim*50+i*30)%360},100%,75%)`;
      ctx.beginPath(); ctx.arc(sx, sy, 2.5 + Math.sin(anim*4+i)*0.8, 0, Math.PI*2); ctx.fill();
    }
    // 星本体（通常の2倍強）
    ctx.rotate(anim*0.5);
    const hue = (anim*60)%360;
    const g = ctx.createRadialGradient(-3, -4, 1, 0, 0, 22);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.25, `hsl(${hue},100%,85%)`);
    g.addColorStop(0.7, `hsl(${(hue+120)%360},100%,60%)`);
    g.addColorStop(1, `hsl(${(hue+240)%360},100%,40%)`);
    ctx.fillStyle = g;
    drawStarShape(22);
    // 外縁光る
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = `hsl(${(hue+60)%360},100%,70%)`;
    ctx.stroke();
    // 内側の白い縁
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#ffffff';
    ctx.stroke();
    // かわいい顔（通常より大きめ）
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-5, -2, 1.8, 0, Math.PI*2);
    ctx.arc(5, -2, 1.8, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(0, 3, 3, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();
    // ほっぺ
    ctx.fillStyle = 'rgba(255,120,160,0.7)';
    ctx.beginPath();
    ctx.arc(-8, 2, 1.8, 0, Math.PI*2);
    ctx.arc(8, 2, 1.8, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  function drawSwordItem(cx, cy, anim) {
    ctx.save();
    ctx.translate(cx, cy);
    const bg = ctx.createRadialGradient(0, 0, 1, 0, 0, 14);
    bg.addColorStop(0, 'rgba(180,220,255,0.8)');
    bg.addColorStop(0.6, 'rgba(80,140,240,0.4)');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
    ctx.rotate(Math.sin(anim)*0.2 - 0.35);
    ctx.fillStyle = '#e8ecf5';
    ctx.beginPath(); ctx.moveTo(-2, -10); ctx.lineTo(2, -10); ctx.lineTo(3, 5); ctx.lineTo(-3, 5); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8a95a8'; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-1, -10, 1, 14);
    ctx.fillStyle = '#c8a030';
    ctx.fillRect(-6, 5, 12, 2.5);
    ctx.strokeStyle = '#7a5f10';
    ctx.strokeRect(-6, 5, 12, 2.5);
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(-2, 7.5, 4, 5);
    ctx.fillStyle = '#c8a030';
    ctx.beginPath(); ctx.arc(0, 13, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ====== 敵（スウェットおじさん） ======
  function drawEnemies() {
    const isDark = !!STAGES[currentStage]?.dark;
    for (const en of enemies) {
      const x = en.x - cameraX;
      const y = en.y;
      if (x < -32 || x > W + 32) continue;
      // さくに近い敵は微妙に振動（警戒モーション）
      let wob = 0;
      if (en.alive && !en.flying) {
        const dx = Math.abs(saku.x + saku.w/2 - en.x - 14);
        if (dx < 120) wob = (120 - dx) / 120 * Math.sin(Date.now() * 0.02) * 0.8;
      }
      if (isDark) {
        if (en.type === 'kuri') drawDarkKuri(x, y + wob, en);
        else if (en.type === 'kame') drawDarkKame(x, y + wob, en);
        else if (en.type === 'tori') drawDarkTori(x, y, en);
      } else {
        if (en.type === 'kuri') drawKuri(x, y + wob, en);
        else if (en.type === 'kame') drawKame(x, y + wob, en);
        else if (en.type === 'tori') drawTori(x, y, en);
      }
    }
  }
  // ====== ダークコース専用モンスター描画 ======
  // 骸骨歩兵（kuri の闇版）
  function drawDarkKuri(x, y, en) {
    const t = Date.now() * 0.008;
    if (!en.alive && !en.flying) {
      // 潰れて骨になる
      ctx.fillStyle = '#c8c0a8';
      ctx.beginPath();
      ctx.ellipse(x + 14, y + 24, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // 骨のバラけ
      ctx.strokeStyle = '#6a6858';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + 6, y + 22); ctx.lineTo(x + 12, y + 26);
      ctx.moveTo(x + 20, y + 22); ctx.lineTo(x + 14, y + 26);
      ctx.stroke();
      return;
    }
    const sway = Math.sin(t + en.x * 0.1) * 1.2;
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 30, 10, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 体（ボロボロのローブ）
    ctx.fillStyle = '#2a1a3a';
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 30);
    ctx.lineTo(x + 24, y + 30);
    ctx.lineTo(x + 22 + sway * 0.3, y + 16);
    ctx.lineTo(x + 6 + sway * 0.3, y + 16);
    ctx.closePath();
    ctx.fill();
    // ローブのほつれ
    ctx.fillStyle = '#1a0a28';
    for (let i = 0; i < 5; i++) {
      const fx = x + 5 + i * 4;
      ctx.fillRect(fx, y + 27, 2, 3);
    }
    // 骨の腕（両脇）
    ctx.strokeStyle = '#e8e0c8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 18); ctx.lineTo(x + 1 + sway, y + 25);
    ctx.moveTo(x + 23, y + 18); ctx.lineTo(x + 27 - sway, y + 25);
    ctx.stroke();
    // 骸骨の手
    ctx.fillStyle = '#e8e0c8';
    ctx.beginPath();
    ctx.arc(x + 1 + sway, y + 26, 1.5, 0, Math.PI * 2);
    ctx.arc(x + 27 - sway, y + 26, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // 頭蓋骨
    ctx.fillStyle = '#e8e0c8';
    ctx.beginPath();
    ctx.arc(x + 14 + sway * 0.5, y + 10, 7, 0, Math.PI * 2);
    ctx.fill();
    // 頭蓋骨の影
    ctx.fillStyle = '#a8a090';
    ctx.beginPath();
    ctx.arc(x + 16 + sway * 0.5, y + 11, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8e0c8';
    ctx.beginPath();
    ctx.arc(x + 14 + sway * 0.5, y + 10, 7, Math.PI, Math.PI * 2);
    ctx.fill();
    // 目（赤く光る）
    ctx.fillStyle = '#ff2030';
    ctx.beginPath();
    ctx.arc(x + 11.5 + sway * 0.5, y + 10, 1.4, 0, Math.PI * 2);
    ctx.arc(x + 16.5 + sway * 0.5, y + 10, 1.4, 0, Math.PI * 2);
    ctx.fill();
    // 目の光オーラ
    ctx.fillStyle = 'rgba(255,40,60,0.4)';
    ctx.beginPath();
    ctx.arc(x + 11.5 + sway * 0.5, y + 10, 3, 0, Math.PI * 2);
    ctx.arc(x + 16.5 + sway * 0.5, y + 10, 3, 0, Math.PI * 2);
    ctx.fill();
    // 口（ギザギザの歯）
    ctx.fillStyle = '#1a0a18';
    ctx.fillRect(x + 11 + sway * 0.5, y + 13.5, 6, 2.5);
    ctx.strokeStyle = '#a8a090';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      ctx.moveTo(x + 11 + i * 1.5 + sway * 0.5, y + 13.5);
      ctx.lineTo(x + 11 + i * 1.5 + sway * 0.5, y + 16);
    }
    ctx.stroke();
  }
  // 影の獣（kame の闇版）
  function drawDarkKame(x, y, en) {
    const t = Date.now() * 0.006;
    if (!en.alive && !en.flying) {
      // 煙になって消える
      ctx.fillStyle = 'rgba(40,10,60,0.5)';
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(x + 8 + i * 3, y + 24 + Math.sin(t + i) * 2, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      return;
    }
    const pulse = 1 + Math.sin(t * 2) * 0.08;
    // 影のオーラ
    const aurG = ctx.createRadialGradient(x + 14, y + 18, 2, x + 14, y + 18, 22);
    aurG.addColorStop(0, 'rgba(120,40,200,0.35)');
    aurG.addColorStop(1, 'rgba(20,0,40,0)');
    ctx.fillStyle = aurG;
    ctx.beginPath();
    ctx.arc(x + 14, y + 18, 22, 0, Math.PI * 2);
    ctx.fill();
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 30, 12, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 本体（黒い塊・ゼリー状）
    ctx.fillStyle = '#180828';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 22, 11 * pulse, 8 * pulse, 0, 0, Math.PI * 2);
    ctx.fill();
    // とげのような突起（上向き・振動する）
    ctx.fillStyle = '#2a1040';
    for (let i = 0; i < 5; i++) {
      const sx = x + 6 + i * 4;
      const sh = 5 + Math.sin(t * 3 + i) * 1.5;
      ctx.beginPath();
      ctx.moveTo(sx, y + 18);
      ctx.lineTo(sx + 2, y + 18 - sh);
      ctx.lineTo(sx + 4, y + 18);
      ctx.closePath();
      ctx.fill();
    }
    // 内側の紫（発光）
    ctx.fillStyle = 'rgba(120,40,200,0.6)';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 23, 7 * pulse, 4 * pulse, 0, 0, Math.PI * 2);
    ctx.fill();
    // 目（紫に光る・複数）
    ctx.fillStyle = '#ffa0ff';
    ctx.beginPath();
    ctx.arc(x + 10, y + 20, 1.2, 0, Math.PI * 2);
    ctx.arc(x + 14, y + 19, 1.5, 0, Math.PI * 2);
    ctx.arc(x + 18, y + 20, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + 10, y + 20, 0.5, 0, Math.PI * 2);
    ctx.arc(x + 14, y + 19, 0.6, 0, Math.PI * 2);
    ctx.arc(x + 18, y + 20, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  // 悪魔コウモリ（tori の闇版）
  function drawDarkTori(x, y, en) {
    const t = Date.now() * 0.01;
    if (!en.alive) {
      // 黒い羽根が散る
      ctx.fillStyle = '#1a0a2a';
      ctx.beginPath();
      ctx.ellipse(x + 14, y + 22, 10, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    const flap = Math.sin(t * 3) * 0.6;
    // 影（小さめ）
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 32, 9, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // 左翼
    ctx.save();
    ctx.translate(x + 10, y + 14);
    ctx.rotate(-0.4 + flap);
    ctx.fillStyle = '#1a0a28';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-12, -4);
    ctx.lineTo(-14, 2);
    ctx.lineTo(-11, 4);
    ctx.lineTo(-8, 2);
    ctx.lineTo(-5, 4);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a1048';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
    // 右翼
    ctx.save();
    ctx.translate(x + 18, y + 14);
    ctx.rotate(0.4 - flap);
    ctx.fillStyle = '#1a0a28';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(12, -4);
    ctx.lineTo(14, 2);
    ctx.lineTo(11, 4);
    ctx.lineTo(8, 2);
    ctx.lineTo(5, 4);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a1048';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
    // 胴体（黒い毛むくじゃら）
    ctx.fillStyle = '#2a1038';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 15, 5, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // 頭
    ctx.fillStyle = '#180620';
    ctx.beginPath();
    ctx.arc(x + 14, y + 10, 5, 0, Math.PI * 2);
    ctx.fill();
    // 耳（三角・2つ）
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 7);
    ctx.lineTo(x + 11, y + 3);
    ctx.lineTo(x + 13, y + 7);
    ctx.closePath();
    ctx.moveTo(x + 18, y + 7);
    ctx.lineTo(x + 17, y + 3);
    ctx.lineTo(x + 15, y + 7);
    ctx.closePath();
    ctx.fill();
    // 目（赤く光る）
    ctx.fillStyle = '#ff3040';
    ctx.beginPath();
    ctx.arc(x + 12, y + 9.5, 1.2, 0, Math.PI * 2);
    ctx.arc(x + 16, y + 9.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,60,80,0.4)';
    ctx.beginPath();
    ctx.arc(x + 12, y + 9.5, 2.5, 0, Math.PI * 2);
    ctx.arc(x + 16, y + 9.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 牙（下向き・2本）
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(x + 13, y + 12);
    ctx.lineTo(x + 12.3, y + 14);
    ctx.lineTo(x + 13.5, y + 13);
    ctx.closePath();
    ctx.moveTo(x + 15, y + 12);
    ctx.lineTo(x + 15.7, y + 14);
    ctx.lineTo(x + 14.5, y + 13);
    ctx.closePath();
    ctx.fill();
  }

  // とり（空飛ぶおじさん）
  function drawTori(x, y, en) {
    if (!en.alive) {
      // 墜落したおじさん
      ctx.fillStyle = '#4a4a58';
      ctx.beginPath();
      ctx.ellipse(x + 14, y + 22, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    const facing = en.vx >= 0 ? 1 : -1;
    const flap = Math.sin(en.anim * 2) * 0.5;
    ctx.save();
    ctx.translate(x + 14, y + 14);
    if (facing < 0) ctx.scale(-1, 1);
    // 翼（羽ばたき）
    ctx.fillStyle = '#c8dcff';
    ctx.strokeStyle = '#446080';
    ctx.lineWidth = 1;
    // 左翼
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.quadraticCurveTo(-18, -10 + flap * 5, -22, 2 + flap * 3);
    ctx.quadraticCurveTo(-14, -2 + flap * 2, -4, 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 右翼
    ctx.beginPath();
    ctx.moveTo(4, -2);
    ctx.quadraticCurveTo(18, -10 + flap * 5, 22, 2 + flap * 3);
    ctx.quadraticCurveTo(14, -2 + flap * 2, 4, 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 胴（スーツおじさん）
    ctx.fillStyle = '#2a3a6a';
    ctx.fillRect(-6, -4, 12, 12);
    // 襟・シャツ
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-3, -4);
    ctx.lineTo(0, -1);
    ctx.lineTo(3, -4);
    ctx.closePath();
    ctx.fill();
    // ネクタイ
    ctx.fillStyle = '#c22';
    ctx.fillRect(-1.5, -4, 3, 7);
    // 頭
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath();
    ctx.arc(0, -8, 5, 0, Math.PI * 2);
    ctx.fill();
    // 髪
    ctx.fillStyle = '#1a1008';
    ctx.beginPath();
    ctx.arc(0, -10, 5, Math.PI, 0);
    ctx.fill();
    // メガネ
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(-2, -7, 1.8, 0, Math.PI * 2);
    ctx.arc(2, -7, 1.8, 0, Math.PI * 2);
    ctx.moveTo(-0.3, -7);
    ctx.lineTo(0.3, -7);
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.fillRect(-2.5, -7.3, 1, 0.6);
    ctx.fillRect(1.5, -7.3, 1, 0.6);
    // 足（スーツ）
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(-5, 8, 3, 4);
    ctx.fillRect(2, 8, 3, 4);
    ctx.restore();
  }
  function drawSquashedOji(x, y, topCol, frameCol = '#000') {
    ctx.fillStyle = topCol;
    ctx.beginPath(); ctx.ellipse(x + 14, y + 24, 14, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath(); ctx.ellipse(x + 14, y + 22, 6, 2.3, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = frameCol; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(x + 11, y + 22, 1.5, 0, Math.PI*2);
    ctx.arc(x + 17, y + 22, 1.5, 0, Math.PI*2);
    ctx.moveTo(x + 12.5, y + 22); ctx.lineTo(x + 15.5, y + 22);
    ctx.stroke();
  }
  function drawSweatOji(x, y, en, opts) {
    ctx.save();
    if (en.flying) ctx.rotate(0);

  // ====== ボス ======
  function drawBoss() {
    if (!boss) return;
    const x = boss.x - cameraX;
    const y = boss.y;
    if (x < -100 || x > W + 100) return;
    const curLabel = STAGES[currentStage]?.label;
    const isFinalBoss = (curLabel === '10-5' || curLabel === '20-10');

    // 炎玉描画（ラスボスの攻撃）
    if (isFinalBoss && boss.fireballs) {
      for (const fb of boss.fireballs) {
        drawFireball(fb.x - cameraX, fb.y, fb.anim);
      }
    }

    // 着地衝撃波描画
    if (boss.shockwaves) {
      for (const sw of boss.shockwaves) {
        const t = 1 - sw.life / sw.maxLife;
        const alpha = (1 - t) * 0.7;
        ctx.save();
        ctx.translate(sw.x - cameraX, sw.y);
        // 外側リング
        ctx.strokeStyle = `rgba(255,180,60,${alpha})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 0, sw.radius, sw.radius * 0.35, 0, 0, Math.PI * 2);
        ctx.stroke();
        // 内側リング
        ctx.strokeStyle = `rgba(255,255,200,${alpha * 0.8})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, sw.radius * 0.7, sw.radius * 0.25, 0, 0, Math.PI * 2);
        ctx.stroke();
        // 地面のヒビ（赤系）
        ctx.strokeStyle = `rgba(200,40,40,${alpha})`;
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * sw.radius * 0.9, Math.sin(a) * sw.radius * 0.3);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // ラスボスはクッパ風の専用描画
    if (isFinalBoss) {
      drawFinalBoss(x, y, boss);
      return;
    }
    ctx.save();
    if (boss.defeated) {
      const a = Math.max(0, 1 - boss.defeatTimer / 180);
      ctx.globalAlpha = a;
      ctx.translate(x + boss.w/2, y + boss.h/2);
      ctx.rotate(boss.defeatTimer * 0.2);
      ctx.translate(-(x + boss.w/2), -(y + boss.h/2));
    }
    if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/4)%2 === 0) ctx.globalAlpha = 0.5;

    const W_ = boss.w, H_ = boss.h, cx = x + W_/2;

      // 激昂モード時は常に赤い波動
    if (boss.hp / boss.maxHp < 0.35 && !boss.defeated) {
      const rageR = 70 + Math.sin(boss.anim * 0.5) * 10;
      const rageG = ctx.createRadialGradient(cx, y + H_/2, 10, cx, y + H_/2, rageR);
      rageG.addColorStop(0, 'rgba(255,40,40,0.45)');
      rageG.addColorStop(1, 'rgba(120,0,0,0)');
      ctx.fillStyle = rageG;
      ctx.beginPath();
      ctx.arc(cx, y + H_/2, rageR, 0, Math.PI * 2);
      ctx.fill();
    }
  // ラスボス（10-5）は禍々しい赤黒オーラ
    if (isFinalBoss) {
      const auraR = 60 + Math.sin(boss.anim * 0.5) * 8;
      const auraG = ctx.createRadialGradient(cx, y + H_/2, 5, cx, y + H_/2, auraR);
      auraG.addColorStop(0, 'rgba(220, 20, 30, 0.55)');
      auraG.addColorStop(0.4, 'rgba(120, 0, 20, 0.4)');
      auraG.addColorStop(1, 'rgba(40, 0, 10, 0)');
      ctx.fillStyle = auraG;
      ctx.beginPath();
      ctx.arc(cx, y + H_/2, auraR, 0, Math.PI * 2);
      ctx.fill();
      // 禍々しい電撃（複数の赤い線）

      for (let i = 0; i < 5; i++) {

        ctx.moveTo(cx + Math.cos(a) * r1, y + H_/2 + Math.sin(a) * r1);
        ctx.lineTo(cx + Math.cos(a + 0.1) * r2, y + H_/2 + Math.sin(a + 0.1) * r2);

    }

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(cx, y + H_ - 2, W_*0.45, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 8, y + H_ - 8, 14, 6);
    ctx.fillRect(x + W_ - 22, y + H_ - 8, 14, 6);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 8, y + H_ - 3, 14, 2);
    ctx.fillRect(x + W_ - 22, y + H_ - 3, 14, 2);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x + 6, y + H_*0.55, W_ - 12, H_*0.33);
    const body = ctx.createLinearGradient(cx, y + H_*0.2, cx, y + H_*0.6);
    if (isFinalBoss) {
      body.addColorStop(0, '#5a0a1a'); body.addColorStop(1, '#1a0005');
    } else {
      body.addColorStop(0, '#1a2a4a'); body.addColorStop(1, '#0a1630');
    }
    ctx.fillStyle = body;
    ctx.fillRect(x + 3, y + H_*0.25, W_ - 6, H_*0.38);
    ctx.fillStyle = isFinalBoss ? '#1a0005' : '#0a1630';
    ctx.beginPath();
    ctx.moveTo(x + 12, y + H_*0.25); ctx.lineTo(cx - 4, y + H_*0.4); ctx.lineTo(cx - 10, y + H_*0.25); ctx.closePath();
    ctx.moveTo(x + W_ - 12, y + H_*0.25); ctx.lineTo(cx + 4, y + H_*0.4); ctx.lineTo(cx + 10, y + H_*0.25); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx - 8, y + H_*0.25); ctx.lineTo(cx, y + H_*0.45); ctx.lineTo(cx + 8, y + H_*0.25); ctx.closePath(); ctx.fill();
    ctx.fillStyle = isFinalBoss ? '#8a0a28' : '#c8a030';
    ctx.beginPath();
    ctx.moveTo(cx - 4, y + H_*0.25); ctx.lineTo(cx + 4, y + H_*0.25); ctx.lineTo(cx + 5, y + H_*0.55); ctx.lineTo(cx - 5, y + H_*0.55); ctx.closePath(); ctx.fill();
    ctx.fillStyle = isFinalBoss ? '#3a0010' : '#8a6010';
    ctx.fillRect(cx - 4, y + H_*0.25, 8, 3);
    ctx.fillStyle = isFinalBoss ? '#5a0a1a' : '#1a2a4a';
    ctx.fillRect(x, y + H_*0.3, 6, H_*0.3);
    ctx.fillRect(x + W_ - 6, y + H_*0.3, 6, H_*0.3);
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath();
    ctx.arc(x + 3, y + H_*0.62, 4, 0, Math.PI*2);
    ctx.arc(x + W_ - 3, y + H_*0.62, 4, 0, Math.PI*2);
    ctx.fill();
    const headCx = cx, headCy = y + H_*0.15, headR = 15;
    const headG = ctx.createRadialGradient(headCx - 4, headCy - 4, 2, headCx, headCy, headR);
    headG.addColorStop(0, '#ffe0c0'); headG.addColorStop(1, '#c98850');
    ctx.fillStyle = headG;
    ctx.beginPath(); ctx.arc(headCx, headCy, headR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1008';
    ctx.beginPath();
    ctx.moveTo(headCx - 15, headCy - 3);
    ctx.quadraticCurveTo(headCx - 16, headCy - 16, headCx - 6, headCy - 17);
    ctx.quadraticCurveTo(headCx + 4, headCy - 18, headCx + 14, headCy - 14);
    ctx.quadraticCurveTo(headCx + 16, headCy - 4, headCx + 14, headCy - 3);
    ctx.lineTo(headCx + 10, headCy - 5);
    ctx.quadraticCurveTo(headCx + 5, headCy - 2, headCx, headCy - 6);
    ctx.quadraticCurveTo(headCx - 5, headCy - 2, headCx - 10, headCy - 5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(headCx - 10, headCy - 1); ctx.lineTo(headCx - 3, headCy + 2);
    ctx.moveTo(headCx + 3, headCy + 2); ctx.lineTo(headCx + 10, headCy - 1);
    ctx.stroke();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(headCx - 6, headCy + 4, 4, 0, Math.PI*2);
    ctx.arc(headCx + 6, headCy + 4, 4, 0, Math.PI*2);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(headCx - 2, headCy + 4); ctx.lineTo(headCx + 2, headCy + 4);

    ctx.fillStyle = '#000';

  // 炎玉
  function drawFireball(x, y, anim) {
    ctx.save();

    const aura = ctx.createRadialGradient(x, y, 2, x, y, 18);
    aura.addColorStop(0, 'rgba(255,220,120,1)');
    aura.addColorStop(0.4, 'rgba(255,120,30,0.8)');
    aura.addColorStop(1, 'rgba(180,20,0,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(x, y, 18 + Math.sin(anim) * 2, 0, Math.PI * 2);

    ctx.arc(x, y, 5, 0, Math.PI * 2);

      ctx.beginPath();
      ctx.arc(x - i * 6 + Math.sin(anim + i) * 2, y, 4 - i * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

  // ラスボス（クッパ風）
  function drawFinalBoss(x, y, b) {
    ctx.save();
    if (b.defeated) {
      const a = Math.max(0, 1 - b.defeatTimer / 180);
      ctx.globalAlpha = a;
      ctx.translate(x + b.w/2, y + b.h/2);
      ctx.rotate(b.defeatTimer * 0.15);
      ctx.translate(-(x + b.w/2), -(y + b.h/2));
    }
    if (b.hurtTimer > 0 && Math.floor(b.hurtTimer/4)%2 === 0) ctx.globalAlpha = 0.5;
    // 激昂モード（HP35%以下）: 周囲に赤い強いオーラ
    if (b.hp / b.maxHp < 0.35 && !b.defeated) {
      const fcx = x + b.w/2, fcy = y + b.h/2;
      const rageR = 120 + Math.sin(b.anim * 0.5) * 15;
      const rageG = ctx.createRadialGradient(fcx, fcy, 20, fcx, fcy, rageR);
      rageG.addColorStop(0, 'rgba(255,60,30,0.5)');
      rageG.addColorStop(0.5, 'rgba(200,0,40,0.3)');
      rageG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rageG;

      ctx.arc(fcx, fcy, rageR, 0, Math.PI * 2);

    }

    const W_ = b.w, H_ = b.h, cx = x + W_/2, bottomY = y + H_;
    const breathe = Math.sin(b.anim * 0.3) * 2;

    const auraR = 70 + Math.sin(b.anim * 0.5) * 10;
    const auraG = ctx.createRadialGradient(cx, y + H_/2, 5, cx, y + H_/2, auraR);
    auraG.addColorStop(0, 'rgba(220,30,40,0.5)');
    auraG.addColorStop(0.4, 'rgba(120,0,20,0.35)');
    auraG.addColorStop(1, 'rgba(40,0,10,0)');

    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';

    ctx.ellipse(cx, bottomY - 2, W_*0.5, 5, 0, 0, Math.PI*2);

    // 甲羅（背中）— 描くのは顔より少し後ろに見える
    ctx.save();
    // 甲羅の上部のスパイク帯（金色スパイク）
