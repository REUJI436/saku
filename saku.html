  // ====== 描画 ======
  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, theme.sky[0]);
    sky.addColorStop(1, theme.sky[1]);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 丘
    ctx.fillStyle = theme.hillColor;
    const parHill = cameraX * 0.4;
    for (let i = 0; i < 12; i++) {
      const cx = 400 * i + 100 - parHill;
      if (cx < -250 || cx > W + 250) continue;
      ctx.beginPath();
      ctx.ellipse(cx, H - 32, 220, 80, 0, 0, Math.PI, true);
      ctx.fill();
    }

    // 雲
    const parX = cameraX * 0.3;
    const clouds = [
      {x:100,y:40},{x:300,y:20},{x:500,y:50},{x:800,y:30},{x:1100,y:55},
      {x:1400,y:25},{x:1700,y:45},{x:2000,y:35},{x:2300,y:50},{x:2600,y:20},
      {x:2900,y:45},{x:3200,y:30},{x:3500,y:55},{x:3800,y:20}
    ];
    ctx.fillStyle = theme.sky[0] === '#0a0818' ? '#ffffff22' : '#fff';
    for (const c of clouds) {
      const cx = c.x - parX;
      if (cx < -100 || cx > W + 100) continue;
      ctx.beginPath();
      ctx.arc(cx, c.y, 14, 0, Math.PI*2);
      ctx.arc(cx + 12, c.y - 4, 12, 0, Math.PI*2);
      ctx.arc(cx + 24, c.y, 14, 0, Math.PI*2);
      ctx.arc(cx + 34, c.y, 10, 0, Math.PI*2);
      ctx.fill();
    }

    // どうくつの場合、鍾乳石
    if (theme.sky[0].startsWith('#0a') || theme.sky[0].startsWith('#1a') || theme.sky[0].startsWith('#20')) {
      ctx.fillStyle = theme.hillColor;
      const parS = cameraX * 0.6;
      for (let i = 0; i < 20; i++) {
        const sx = 300 * i + 150 - parS;
        if (sx < -30 || sx > W + 30) continue;
        ctx.beginPath();
        ctx.moveTo(sx - 14, 0);
        ctx.lineTo(sx + 14, 0);
        ctx.lineTo(sx, 60 + (i%3)*20);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  function drawTiles() {
    const tx0 = Math.max(0, Math.floor(cameraX / TILE));
    const tx1 = Math.min(LEVEL_COLS - 1, Math.ceil((cameraX + W) / TILE));
    for (let ty = 0; ty < LEVEL_ROWS; ty++) {
      for (let tx = tx0; tx <= tx1; tx++) {
        const t = tiles[ty][tx];
        if (t === T_EMPTY) continue;
        const x = tx * TILE - cameraX;
        const y = ty * TILE;
        drawTile(t, x, y);
      }
    }
  }
  function drawTile(t, x, y) {
    switch (t) {
      case T_GROUND: {
        ctx.fillStyle = theme.groundBot;
        ctx.fillRect(x, y + 8, TILE, TILE - 8);
        ctx.fillStyle = theme.groundDetail;
        for (let i = 0; i < 4; i++) ctx.fillRect(x + i*8 + 2, y + 14 + (i%2)*4, 4, 2);
        ctx.fillStyle = theme.groundTop;
        ctx.fillRect(x, y, TILE, 10);
        ctx.fillStyle = theme.grass;
        ctx.fillRect(x, y, TILE, 3);
        break;
      }
      case T_BRICK: {
        ctx.fillStyle = theme.brick;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = theme.brickDark;
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        ctx.beginPath();
        ctx.moveTo(x, y + TILE/2); ctx.lineTo(x + TILE, y + TILE/2);
        ctx.moveTo(x + TILE/2, y); ctx.lineTo(x + TILE/2, y + TILE/2);
        ctx.moveTo(x + TILE/4, y + TILE/2); ctx.lineTo(x + TILE/4, y + TILE);
        ctx.moveTo(x + 3*TILE/4, y + TILE/2); ctx.lineTo(x + 3*TILE/4, y + TILE);
        ctx.stroke();
        break;
      }
      case T_QUESTION: {
        ctx.fillStyle = '#e0a020';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#7a4c0f';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', x + TILE/2, y + TILE/2 + 2);
        break;
      }
      case T_QUESTION_USED: {
        ctx.fillStyle = '#8a6020';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#4a3010';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        break;
      }
      case T_PIPE_TOP: {
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x - 4, y, TILE + 8, TILE);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(x - 4, y, 5, TILE);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(x + TILE + 3, y, 5, TILE);
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x, y + TILE - 1, TILE, 2);
        break;
      }
      case T_PIPE_BODY: {
        ctx.fillStyle = theme.pipe;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(x, y, 5, TILE);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(x + TILE - 5, y, 5, TILE);
        break;
      }
      case T_STAIR: {
        ctx.fillStyle = theme.stair;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = theme.stairDark;
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        break;
      }
      case T_FLAG: {
        // キノピオが立っているマス：背景は旗竿、キノピオ本体は drawKinopio で描く
        ctx.fillStyle = '#ccc';
        ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
        break;
      }
    }
  }

  // ====== 寿司 ======
  function drawCoins() {
    for (const coin of coins) {
      if (coin.taken) continue;
      const x = coin.x - cameraX;
      const y = coin.y + Math.sin(coin.anim) * 1.5;
      if (x < -24 || x > W + 24) continue;
      drawSushi(x, y, coin.type || 'maguro');
    }
  }
  function drawSushi(cx, cy, type) {
    switch (type) {
      case 'maguro': drawMaguro(cx, cy); break;
      case 'tamago': drawTamago(cx, cy); break;
      case 'ebi': drawEbi(cx, cy); break;
      case 'salmoncheese': drawSalmonCheese(cx, cy); break;
      case 'chawanmushi': drawChawanmushi(cx, cy); break;
      case 'ramen': drawRamen(cx, cy); break;
      default: drawMaguro(cx, cy);
    }
  }
  function drawRice(cx, cy) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(cx, cy + 8, 11, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(cx, cy + 3, 10, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#eee7d8';
    for (let i = -2; i <= 2; i++) {
      ctx.fillRect(cx + i * 3 - 0.5, cy + 2, 1, 1);
      ctx.fillRect(cx + i * 3 + 1, cy + 4, 1, 1);
    }
  }
  function drawMaguro(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx-9, cy-4, cx+9, cy+2);
    g.addColorStop(0, '#d3434a'); g.addColorStop(0.5, '#b01e22'); g.addColorStop(1, '#7d0d10');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 3.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(cx - 7, cy - 1); ctx.quadraticCurveTo(cx, cy - 3, cx + 7, cy - 1); ctx.stroke();
  }
  function drawTamago(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx, cy-4, cx, cy+2);
    g.addColorStop(0, '#ffe870'); g.addColorStop(1, '#e6a820');
    ctx.fillStyle = g; ctx.fillRect(cx - 9, cy - 5, 18, 6);
    ctx.strokeStyle = '#a67010'; ctx.lineWidth = 0.8;
    ctx.strokeRect(cx - 9, cy - 5, 18, 6);
    ctx.fillStyle = '#15150a'; ctx.fillRect(cx - 3, cy - 5, 6, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(cx - 8, cy - 4, 4, 1);
  }
  function drawEbi(cx, cy) {
    drawRice(cx, cy);
    ctx.fillStyle = '#ffa88a';
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e95c2e';
    for (let i = -1; i <= 2; i++) {
      ctx.beginPath(); ctx.ellipse(cx + i * 4 - 1, cy - 1, 1.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#d63c20';
    ctx.beginPath(); ctx.moveTo(cx + 8, cy - 1); ctx.lineTo(cx + 12, cy - 4); ctx.lineTo(cx + 12, cy + 2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(cx - 6, cy - 3, 3, 1);
  }
  function drawSalmonCheese(cx, cy) {
    drawRice(cx, cy);
    const g = ctx.createLinearGradient(cx, cy - 4, cx, cy + 2);
    g.addColorStop(0, '#ffb680'); g.addColorStop(1, '#e76a28');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 10, 3.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx - 8, cy - 2); ctx.quadraticCurveTo(cx - 2, cy - 4, cx + 4, cy - 2);
    ctx.moveTo(cx - 4, cy + 0); ctx.quadraticCurveTo(cx + 2, cy - 2, cx + 8, cy + 0);
    ctx.stroke();
    ctx.fillStyle = '#ffeb6b';
    ctx.fillRect(cx - 4, cy - 5, 8, 3);
    ctx.strokeStyle = '#b88c10'; ctx.lineWidth = 0.6;
    ctx.strokeRect(cx - 4, cy - 5, 8, 3);
    ctx.fillStyle = '#ffeb6b';
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 2); ctx.lineTo(cx - 1, cy + 0.5);
    ctx.lineTo(cx + 1, cy - 2); ctx.lineTo(cx + 3, cy + 0.5);
    ctx.lineTo(cx + 4, cy - 2); ctx.closePath(); ctx.fill();
  }
  function drawChawanmushi(cx, cy) {
    ctx.fillStyle = '#654434';
    ctx.beginPath();
    ctx.moveTo(cx - 10, cy - 2); ctx.lineTo(cx + 10, cy - 2);
    ctx.lineTo(cx + 8, cy + 8); ctx.lineTo(cx - 8, cy + 8); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a1a10'; ctx.fillRect(cx - 10, cy - 3, 20, 2);
    ctx.fillStyle = '#f6d25c';
    ctx.beginPath(); ctx.ellipse(cx, cy - 2, 9, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3ea43e'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 2, cy - 2); ctx.lineTo(cx + 2, cy - 4);
    ctx.moveTo(cx, cy - 2); ctx.lineTo(cx + 1, cy - 5);
    ctx.stroke();
    ctx.fillStyle = '#ff7777';
    ctx.beginPath(); ctx.arc(cx - 4, cy - 2.5, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 6); ctx.quadraticCurveTo(cx - 5, cy - 8, cx - 3, cy - 10);
    ctx.moveTo(cx + 3, cy - 6); ctx.quadraticCurveTo(cx + 5, cy - 8, cx + 3, cy - 10);
    ctx.stroke();
  }
  function drawRamen(cx, cy) {
    ctx.fillStyle = '#c02020';
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy - 2); ctx.lineTo(cx + 12, cy - 2);
    ctx.lineTo(cx + 9, cy + 8); ctx.lineTo(cx - 9, cy + 8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = -5; i <= 5; i++) {
      const sx = cx + i * 2;
      if (i === -5) ctx.moveTo(sx, cy + 2);
      else ctx.quadraticCurveTo(sx - 1, cy + (i%2===0?4:2), sx, cy + 2);
    }
    ctx.stroke();
    ctx.fillStyle = '#6a0f0f'; ctx.fillRect(cx - 12, cy - 3, 24, 1.5);
    ctx.fillStyle = '#e6a038';
    ctx.beginPath(); ctx.ellipse(cx, cy - 2, 11, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#f5d680'; ctx.lineWidth = 0.8;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(cx - 8 + i * 3, cy - 2.5);
      ctx.quadraticCurveTo(cx - 5 + i * 3, cy - 4, cx - 2 + i * 3, cy - 2.5);
      ctx.stroke();
    }
    ctx.fillStyle = '#d2a273';
    ctx.beginPath(); ctx.arc(cx - 5, cy - 3, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a7e87a';
    ctx.fillRect(cx + 2, cy - 3.5, 1, 1);
    ctx.fillRect(cx + 4, cy - 3, 1, 1);
    ctx.fillRect(cx + 6, cy - 3.5, 1, 1);
  }

  // ====== アイテム ======
  function drawItems() {
    for (const item of items) {
      if (item.taken) continue;
      const x = item.x - cameraX;
      const y = item.y + Math.sin(item.anim) * 3;
      if (x < -24 || x > W + 24) continue;
      if (item.type === 'star') drawStarItem(x, y, item.anim);
      else if (item.type === 'sword') drawSwordItem(x, y, item.anim);
    }
  }
  function drawStarShape(size) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = i * Math.PI / 5 - Math.PI/2;
      const r = (i % 2 === 0) ? size : size * 0.45;
      if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
  }
  function drawStarItem(cx, cy, anim) {
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 + anim*0.6;
      const rr = 14 + Math.sin(anim*2+i)*3;
      const sx = Math.cos(a)*rr, sy = Math.sin(a)*rr;
      ctx.fillStyle = `rgba(255,255,200,${0.4+0.4*Math.sin(anim*3+i)})`;
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.rotate(anim*0.4);
    const hue = (anim*40)%360;
    const g = ctx.createRadialGradient(-2, -3, 1, 0, 0, 10);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.3, `hsl(${hue},100%,70%)`);
    g.addColorStop(1, `hsl(${(hue+180)%360},100%,45%)`);
    ctx.fillStyle = g;
    drawStarShape(10);
    ctx.lineWidth = 1.2; ctx.strokeStyle = '#ffdd40'; ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-2.5, -1, 1, 0, Math.PI*2);
    ctx.arc(2.5, -1, 1, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0, 2, 1.5, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();
    ctx.restore();
  }
  function drawSwordItem(cx, cy, anim) {
    ctx.save();
    ctx.translate(cx, cy);
    const bg = ctx.createRadialGradient(0, 0, 1, 0, 0, 14);
    bg.addColorStop(0, 'rgba(180,220,255,0.8)');
    bg.addColorStop(0.6, 'rgba(80,140,240,0.4)');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
    ctx.rotate(Math.sin(anim)*0.2 - 0.35);
    ctx.fillStyle = '#e8ecf5';
    ctx.beginPath(); ctx.moveTo(-2, -10); ctx.lineTo(2, -10); ctx.lineTo(3, 5); ctx.lineTo(-3, 5); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8a95a8'; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-1, -10, 1, 14);
    ctx.fillStyle = '#c8a030';
    ctx.fillRect(-6, 5, 12, 2.5);
    ctx.strokeStyle = '#7a5f10';
    ctx.strokeRect(-6, 5, 12, 2.5);
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(-2, 7.5, 4, 5);
    ctx.fillStyle = '#c8a030';
    ctx.beginPath(); ctx.arc(0, 13, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ====== 敵（スウェットおじさん） ======
  function drawEnemies() {
    for (const en of enemies) {
      const x = en.x - cameraX;
      const y = en.y;
      if (x < -32 || x > W + 32) continue;
      if (en.type === 'kuri') drawKuri(x, y, en);
      else if (en.type === 'kame') drawKame(x, y, en);
      else if (en.type === 'tori') drawTori(x, y, en);
    }
  }

  // とり（空飛ぶおじさん）
  function drawTori(x, y, en) {
    if (!en.alive) {
      // 墜落したおじさん
      ctx.fillStyle = '#4a4a58';
      ctx.beginPath();
      ctx.ellipse(x + 14, y + 22, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    const facing = en.vx >= 0 ? 1 : -1;
    const flap = Math.sin(en.anim * 2) * 0.5;
    ctx.save();
    ctx.translate(x + 14, y + 14);
    if (facing < 0) ctx.scale(-1, 1);
    // 翼（羽ばたき）
    ctx.fillStyle = '#c8dcff';
    ctx.strokeStyle = '#446080';
    ctx.lineWidth = 1;
    // 左翼
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.quadraticCurveTo(-18, -10 + flap * 5, -22, 2 + flap * 3);
    ctx.quadraticCurveTo(-14, -2 + flap * 2, -4, 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 右翼
    ctx.beginPath();
    ctx.moveTo(4, -2);
    ctx.quadraticCurveTo(18, -10 + flap * 5, 22, 2 + flap * 3);
    ctx.quadraticCurveTo(14, -2 + flap * 2, 4, 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 胴（スーツおじさん）
    ctx.fillStyle = '#2a3a6a';
    ctx.fillRect(-6, -4, 12, 12);
    // 襟・シャツ
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-3, -4);
    ctx.lineTo(0, -1);
    ctx.lineTo(3, -4);
    ctx.closePath();
    ctx.fill();
    // ネクタイ
    ctx.fillStyle = '#c22';
    ctx.fillRect(-1.5, -4, 3, 7);
    // 頭
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath();
    ctx.arc(0, -8, 5, 0, Math.PI * 2);
    ctx.fill();
    // 髪
    ctx.fillStyle = '#1a1008';
    ctx.beginPath();
    ctx.arc(0, -10, 5, Math.PI, 0);
    ctx.fill();
    // メガネ
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(-2, -7, 1.8, 0, Math.PI * 2);
    ctx.arc(2, -7, 1.8, 0, Math.PI * 2);
    ctx.moveTo(-0.3, -7);
    ctx.lineTo(0.3, -7);
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.fillRect(-2.5, -7.3, 1, 0.6);
    ctx.fillRect(1.5, -7.3, 1, 0.6);
    // 足（スーツ）
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(-5, 8, 3, 4);
    ctx.fillRect(2, 8, 3, 4);
    ctx.restore();
  }
  function drawSquashedOji(x, y, topCol, frameCol = '#000') {
    ctx.fillStyle = topCol;
    ctx.beginPath(); ctx.ellipse(x + 14, y + 24, 14, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath(); ctx.ellipse(x + 14, y + 22, 6, 2.3, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = frameCol; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(x + 11, y + 22, 1.5, 0, Math.PI*2);
    ctx.arc(x + 17, y + 22, 1.5, 0, Math.PI*2);
    ctx.moveTo(x + 12.5, y + 22); ctx.lineTo(x + 15.5, y + 22);
    ctx.stroke();
  }
  function drawSweatOji(x, y, en, opts) {
    ctx.save();
    if (en.flying) ctx.rotate(0);
    const sweatTop = opts.sweatTop, sweatTopDark = opts.sweatTopDark;
    const sweatPants = opts.sweatPants, hairCol = opts.hairCol, glassCol = opts.glassCol;
    // スニーカー
    ctx.fillStyle = opts.sneaker || '#fff';
    ctx.fillRect(x + 4, y + 24, 8, 3);
    ctx.fillRect(x + 16, y + 24, 8, 3);
    ctx.fillStyle = opts.sneakerSole || '#222';
    ctx.fillRect(x + 4, y + 27, 8, 1.5);
    ctx.fillRect(x + 16, y + 27, 8, 1.5);
    // パンツ
    ctx.fillStyle = sweatPants;
    ctx.fillRect(x + 5, y + 17, 18, 8);
    ctx.fillStyle = sweatTopDark;
    ctx.fillRect(x + 5, y + 16.8, 18, 1);
    // トップス
    ctx.fillStyle = sweatTop;
    ctx.fillRect(x + 3, y + 10, 22, 8);
    ctx.fillStyle = sweatTopDark;
    ctx.fillRect(x + 3, y + 17, 22, 1);
    if (opts.hoodie) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(x + 12, y + 11); ctx.lineTo(x + 12, y + 14);
      ctx.moveTo(x + 16, y + 11); ctx.lineTo(x + 16, y + 14);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x + 12, y + 14.5, 0.8, 0, Math.PI*2);
      ctx.arc(x + 16, y + 14.5, 0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = sweatTopDark;
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 10);
      ctx.quadraticCurveTo(x + 14, y + 6, x + 20, y + 10);
      ctx.lineTo(x + 18, y + 12);
      ctx.quadraticCurveTo(x + 14, y + 10, x + 10, y + 12);
      ctx.closePath(); ctx.fill();
    }
    // 腕・手
    ctx.fillStyle = sweatTop;
    ctx.fillRect(x + 1, y + 11, 3, 7);
    ctx.fillRect(x + 24, y + 11, 3, 7);
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath();
    ctx.arc(x + 2.5, y + 19, 2, 0, Math.PI*2);
    ctx.arc(x + 25.5, y + 19, 2, 0, Math.PI*2);
    ctx.fill();
    // 頭
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath(); ctx.arc(x + 14, y + 6, 6.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 7.8, y + 6, 1, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(x + 20.2, y + 6, 1, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    // 髪
    ctx.fillStyle = hairCol;
    ctx.beginPath();
    ctx.moveTo(x + 8.5, y + 4);
    ctx.quadraticCurveTo(x + 8, y + 0.5, x + 14, y + 0);
    ctx.quadraticCurveTo(x + 20, y + 0.5, x + 19.5, y + 4);
    ctx.lineTo(x + 18, y + 4.5);
    ctx.quadraticCurveTo(x + 14, y + 2, x + 9.5, y + 4);
    ctx.closePath(); ctx.fill();
    ctx.fillRect(x + 7.5, y + 5, 1.5, 2.5);
    ctx.fillRect(x + 19, y + 5, 1.5, 2.5);
    // 眉
    ctx.strokeStyle = hairCol; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 4.8); ctx.lineTo(x + 12.5, y + 4.8);
    ctx.moveTo(x + 15.5, y + 4.8); ctx.lineTo(x + 18, y + 4.8);
    ctx.stroke();
    // メガネ
    ctx.strokeStyle = glassCol; ctx.lineWidth = opts.glassLine || 1.2;
    const eyeR = opts.glassR || 2.2;
    ctx.beginPath();
    ctx.arc(x + 11, y + 6.8, eyeR, 0, Math.PI*2);
    ctx.arc(x + 17, y + 6.8, eyeR, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 11 + eyeR, y + 6.8); ctx.lineTo(x + 17 - eyeR, y + 6.8);
    ctx.moveTo(x + 11 - eyeR, y + 6.8); ctx.lineTo(x + 8.5, y + 7);
    ctx.moveTo(x + 17 + eyeR, y + 6.8); ctx.lineTo(x + 19.5, y + 7);
    ctx.stroke();
    // 目
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 10.2, y + 6.5, 1.6, 1.2);
    ctx.fillRect(x + 16.2, y + 6.5, 1.6, 1.2);
    // 口
    ctx.strokeStyle = '#5a3a28'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (opts.mouth === 'smile') ctx.arc(x + 14, y + 10.5, 1.5, 0.15*Math.PI, 0.85*Math.PI);
    else { ctx.moveTo(x + 12.5, y + 10.5); ctx.lineTo(x + 15.5, y + 10.5); }
    ctx.stroke();
    ctx.restore();
  }
  function drawKuri(x, y, en) {
    if (!en.alive && !en.flying) { drawSquashedOji(x, y, '#666', '#000'); return; }
    drawSweatOji(x, y, en, {
      sweatTop: '#8a8a90', sweatTopDark: '#4a4a50', sweatPants: '#5a5a60',
      hairCol: '#2a1a12', glassCol: '#000', glassLine: 1.5, hoodie: true,
      sneaker: '#fff', sneakerSole: '#222', mouth: 'flat',
    });
  }
  function drawKame(x, y, en) {
    if (!en.alive && !en.flying) { drawSquashedOji(x, y, '#1a2a5a', '#3a3a3a'); return; }
    drawSweatOji(x, y, en, {
      sweatTop: '#2a3a6a', sweatTopDark: '#14234a', sweatPants: '#1a2a5a',
      hairCol: '#1a1008', glassCol: '#3a3a3a', glassLine: 1, hoodie: false,
      sneaker: '#1a1a1a', sneakerSole: '#fff', mouth: 'smile',
    });
  }

  // ====== ボス ======
  function drawBoss() {
    if (!boss) return;
    const x = boss.x - cameraX;
    const y = boss.y;
    if (x < -100 || x > W + 100) return;
    const isFinalBoss = STAGES[currentStage]?.label === '10-5';

    // 炎玉描画（ラスボスの攻撃）
    if (isFinalBoss && boss.fireballs) {
      for (const fb of boss.fireballs) {
        drawFireball(fb.x - cameraX, fb.y, fb.anim);
      }
    }

    // ラスボスはクッパ風の専用描画
    if (isFinalBoss) {
      drawFinalBoss(x, y, boss);
      return;
    }
    ctx.save();
    if (boss.defeated) {
      const a = Math.max(0, 1 - boss.defeatTimer / 180);
      ctx.globalAlpha = a;
      ctx.translate(x + boss.w/2, y + boss.h/2);
      ctx.rotate(boss.defeatTimer * 0.2);
      ctx.translate(-(x + boss.w/2), -(y + boss.h/2));
    }
    if (boss.hurtTimer > 0 && Math.floor(boss.hurtTimer/4)%2 === 0) ctx.globalAlpha = 0.5;

    const W_ = boss.w, H_ = boss.h, cx = x + W_/2;

    // ラスボス（10-5）は禍々しい赤黒オーラ
    if (isFinalBoss) {
      const auraR = 60 + Math.sin(boss.anim * 0.5) * 8;
      const auraG = ctx.createRadialGradient(cx, y + H_/2, 5, cx, y + H_/2, auraR);
      auraG.addColorStop(0, 'rgba(220, 20, 30, 0.55)');
      auraG.addColorStop(0.4, 'rgba(120, 0, 20, 0.4)');
      auraG.addColorStop(1, 'rgba(40, 0, 10, 0)');
      ctx.fillStyle = auraG;
      ctx.beginPath();
      ctx.arc(cx, y + H_/2, auraR, 0, Math.PI * 2);
      ctx.fill();
      // 禍々しい電撃（複数の赤い線）
      ctx.strokeStyle = 'rgba(255,50,80,0.7)';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 5; i++) {
        const a = (i/5) * Math.PI * 2 + boss.anim * 0.2;
        const r1 = auraR * 0.7, r2 = auraR * 1.1;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r1, y + H_/2 + Math.sin(a) * r1);
        ctx.lineTo(cx + Math.cos(a + 0.1) * r2, y + H_/2 + Math.sin(a + 0.1) * r2);
        ctx.stroke();
      }
    }

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(cx, y + H_ - 2, W_*0.45, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 8, y + H_ - 8, 14, 6);
    ctx.fillRect(x + W_ - 22, y + H_ - 8, 14, 6);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 8, y + H_ - 3, 14, 2);
    ctx.fillRect(x + W_ - 22, y + H_ - 3, 14, 2);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x + 6, y + H_*0.55, W_ - 12, H_*0.33);
    const body = ctx.createLinearGradient(cx, y + H_*0.2, cx, y + H_*0.6);
    if (isFinalBoss) {
      body.addColorStop(0, '#5a0a1a'); body.addColorStop(1, '#1a0005');
    } else {
      body.addColorStop(0, '#1a2a4a'); body.addColorStop(1, '#0a1630');
    }
    ctx.fillStyle = body;
    ctx.fillRect(x + 3, y + H_*0.25, W_ - 6, H_*0.38);
    ctx.fillStyle = isFinalBoss ? '#1a0005' : '#0a1630';
    ctx.beginPath();
    ctx.moveTo(x + 12, y + H_*0.25); ctx.lineTo(cx - 4, y + H_*0.4); ctx.lineTo(cx - 10, y + H_*0.25); ctx.closePath();
    ctx.moveTo(x + W_ - 12, y + H_*0.25); ctx.lineTo(cx + 4, y + H_*0.4); ctx.lineTo(cx + 10, y + H_*0.25); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx - 8, y + H_*0.25); ctx.lineTo(cx, y + H_*0.45); ctx.lineTo(cx + 8, y + H_*0.25); ctx.closePath(); ctx.fill();
    ctx.fillStyle = isFinalBoss ? '#8a0a28' : '#c8a030';
    ctx.beginPath();
    ctx.moveTo(cx - 4, y + H_*0.25); ctx.lineTo(cx + 4, y + H_*0.25); ctx.lineTo(cx + 5, y + H_*0.55); ctx.lineTo(cx - 5, y + H_*0.55); ctx.closePath(); ctx.fill();
    ctx.fillStyle = isFinalBoss ? '#3a0010' : '#8a6010';
    ctx.fillRect(cx - 4, y + H_*0.25, 8, 3);
    ctx.fillStyle = isFinalBoss ? '#5a0a1a' : '#1a2a4a';
    ctx.fillRect(x, y + H_*0.3, 6, H_*0.3);
    ctx.fillRect(x + W_ - 6, y + H_*0.3, 6, H_*0.3);
    ctx.fillStyle = '#f2c8a2';
    ctx.beginPath();
    ctx.arc(x + 3, y + H_*0.62, 4, 0, Math.PI*2);
    ctx.arc(x + W_ - 3, y + H_*0.62, 4, 0, Math.PI*2);
    ctx.fill();
    const headCx = cx, headCy = y + H_*0.15, headR = 15;
    const headG = ctx.createRadialGradient(headCx - 4, headCy - 4, 2, headCx, headCy, headR);
    headG.addColorStop(0, '#ffe0c0'); headG.addColorStop(1, '#c98850');
    ctx.fillStyle = headG;
    ctx.beginPath(); ctx.arc(headCx, headCy, headR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1008';
    ctx.beginPath();
    ctx.moveTo(headCx - 15, headCy - 3);
    ctx.quadraticCurveTo(headCx - 16, headCy - 16, headCx - 6, headCy - 17);
    ctx.quadraticCurveTo(headCx + 4, headCy - 18, headCx + 14, headCy - 14);
    ctx.quadraticCurveTo(headCx + 16, headCy - 4, headCx + 14, headCy - 3);
    ctx.lineTo(headCx + 10, headCy - 5);
    ctx.quadraticCurveTo(headCx + 5, headCy - 2, headCx, headCy - 6);
    ctx.quadraticCurveTo(headCx - 5, headCy - 2, headCx - 10, headCy - 5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(headCx - 10, headCy - 1); ctx.lineTo(headCx - 3, headCy + 2);
    ctx.moveTo(headCx + 3, headCy + 2); ctx.lineTo(headCx + 10, headCy - 1);
    ctx.stroke();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(headCx - 6, headCy + 4, 4, 0, Math.PI*2);
    ctx.arc(headCx + 6, headCy + 4, 4, 0, Math.PI*2);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(headCx - 2, headCy + 4); ctx.lineTo(headCx + 2, headCy + 4);
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.fillRect(headCx - 7.5, headCy + 3, 3, 1.6);
    ctx.fillRect(headCx + 4.5, headCy + 3, 3, 1.6);
    ctx.fillStyle = '#4a1a10';
    ctx.beginPath();
    ctx.moveTo(headCx - 5, headCy + 9); ctx.lineTo(headCx + 5, headCy + 9);
    ctx.lineTo(headCx + 3, headCy + 12); ctx.lineTo(headCx - 3, headCy + 12); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(headCx - 4, headCy + 9, 1.8, 1.5);
    ctx.fillRect(headCx + 2, headCy + 9, 1.8, 1.5);
    ctx.restore();
  }
  // 炎玉
  function drawFireball(x, y, anim) {
    ctx.save();
    // 外側のオーラ
    const aura = ctx.createRadialGradient(x, y, 2, x, y, 18);
    aura.addColorStop(0, 'rgba(255,220,120,1)');
    aura.addColorStop(0.4, 'rgba(255,120,30,0.8)');
    aura.addColorStop(1, 'rgba(180,20,0,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(x, y, 18 + Math.sin(anim) * 2, 0, Math.PI * 2);
    ctx.fill();
    // コア
    ctx.fillStyle = '#fff0a0';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    // 尾っぽ（トレイル）
    ctx.fillStyle = 'rgba(255,140,40,0.6)';
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.arc(x - i * 6 + Math.sin(anim + i) * 2, y, 4 - i * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ラスボス（クッパ風）
  function drawFinalBoss(x, y, b) {
    ctx.save();
    if (b.defeated) {
      const a = Math.max(0, 1 - b.defeatTimer / 180);
      ctx.globalAlpha = a;
      ctx.translate(x + b.w/2, y + b.h/2);
      ctx.rotate(b.defeatTimer * 0.15);
      ctx.translate(-(x + b.w/2), -(y + b.h/2));
    }
    if (b.hurtTimer > 0 && Math.floor(b.hurtTimer/4)%2 === 0) ctx.globalAlpha = 0.5;

    const W_ = b.w, H_ = b.h, cx = x + W_/2, bottomY = y + H_;
    const breathe = Math.sin(b.anim * 0.3) * 2;
    const facing = (saku.x + saku.w/2) < cx ? -1 : 1;

    // 赤黒オーラ
    const auraR = 70 + Math.sin(b.anim * 0.5) * 10;
    const auraG = ctx.createRadialGradient(cx, y + H_/2, 5, cx, y + H_/2, auraR);
    auraG.addColorStop(0, 'rgba(220,30,40,0.5)');
    auraG.addColorStop(0.4, 'rgba(120,0,20,0.35)');
    auraG.addColorStop(1, 'rgba(40,0,10,0)');
    ctx.fillStyle = auraG;
    ctx.beginPath();
    ctx.arc(cx, y + H_/2, auraR, 0, Math.PI * 2);
    ctx.fill();

    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(cx, bottomY - 2, W_*0.5, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // 脚（太い短脚）
    ctx.fillStyle = '#6a8030';
    ctx.fillRect(cx - 30, bottomY - 26, 22, 24);
    ctx.fillRect(cx + 8, bottomY - 26, 22, 24);
    // 爪先の白いツメ
    ctx.fillStyle = '#ffe0a0';
    for (let s of [-1, 1]) {
      for (let i = 0; i < 3; i++) {
        const fx = cx + s * 19 + (i - 1) * 6;
        ctx.beginPath();
        ctx.moveTo(fx - 2, bottomY - 6);
        ctx.lineTo(fx, bottomY);
        ctx.lineTo(fx + 2, bottomY - 6);
        ctx.closePath();
        ctx.fill();
      }
    }
    ctx.strokeStyle = '#3a4a18';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - 30, bottomY - 26, 22, 24);
    ctx.strokeRect(cx + 8, bottomY - 26, 22, 24);

    // 甲羅（背中）— 描くのは顔より少し後ろに見える
    ctx.save();
    // 甲羅の上部のスパイク帯（金色スパイク）
    ctx.fillStyle = '#ffcb4a';
    for (let i = 0; i < 6; i++) {
      const sx = cx - 35 + i * 14;
      const sy = y + H_*0.22;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + 5, sy - 10);
      ctx.lineTo(sx + 10, sy);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#8a5a10';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();

    // 体（緑のクッパボディ）
    const body = ctx.createLinearGradient(cx, y + H_*0.2, cx, bottomY - 20);
    body.addColorStop(0, '#6c9030');
    body.addColorStop(1, '#4a6818');
    ctx.fillStyle = body;
    ctx.fillRect(cx - 32 + breathe * 0.5, y + H_*0.28, 64 - breathe, H_*0.55);
    // お腹（白黄、クッパのお腹）
    const belly = ctx.createLinearGradient(cx, y + H_*0.3, cx, bottomY - 30);
    belly.addColorStop(0, '#f8e080');
    belly.addColorStop(1, '#c8a040');
    ctx.fillStyle = belly;
    ctx.fillRect(cx - 20, y + H_*0.38, 40, H_*0.42);
    // 腹のスジ（うろこ風）
    ctx.strokeStyle = '#a07820';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 4; i++) {
      const ly = y + H_*0.45 + i * 12;
      ctx.beginPath();
      ctx.moveTo(cx - 18, ly);
      ctx.quadraticCurveTo(cx, ly + 3, cx + 18, ly);
      ctx.stroke();
    }

    // 腕（太く）＋スパイクリストバンド
    ctx.fillStyle = '#6c9030';
    ctx.fillRect(cx - 42, y + H_*0.34, 12, 24);
    ctx.fillRect(cx + 30, y + H_*0.34, 12, 24);
    ctx.strokeStyle = '#3a4a18';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - 42, y + H_*0.34, 12, 24);
    ctx.strokeRect(cx + 30, y + H_*0.34, 12, 24);
    // 黒リストバンド
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - 44, y + H_*0.5, 16, 7);
    ctx.fillRect(cx + 28, y + H_*0.5, 16, 7);
    // スパイク
    ctx.fillStyle = '#e8e8e8';
    for (let s of [-1, 1]) {
      for (let i = 0; i < 3; i++) {
        const spx = cx + s * (36 + i * 2);
        const spy = y + H_*0.53;
        ctx.beginPath();
        ctx.moveTo(spx - 2, spy);
        ctx.lineTo(spx, spy - 6);
        ctx.lineTo(spx + 2, spy);
        ctx.closePath();
        ctx.fill();
      }
    }
    // 拳
    ctx.fillStyle = '#ffe0a0';
    ctx.beginPath();
    ctx.arc(cx - 36, y + H_*0.6, 8, 0, Math.PI * 2);
    ctx.arc(cx + 36, y + H_*0.6, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8a5010';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 頭（大きな口を持った恐竜顔）
    const headCx = cx, headCy = y + H_*0.18, headR = 22;
    // 頭本体
    const headG = ctx.createRadialGradient(headCx - 4, headCy - 6, 2, headCx, headCy, headR);
    headG.addColorStop(0, '#8aab40');
    headG.addColorStop(0.6, '#6a8c28');
    headG.addColorStop(1, '#3a5010');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.arc(headCx, headCy, headR, 0, Math.PI * 2);
    ctx.fill();
    // 口元（黄肌）
    ctx.fillStyle = '#e8c870';
    ctx.beginPath();
    ctx.ellipse(headCx + facing * 4, headCy + 8, 18, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // 口（大きな歯）
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(headCx + facing * 4, headCy + 10, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 牙（上下）
    ctx.fillStyle = '#ffffff';
    for (let i = -1; i <= 1; i++) {
      const tx = headCx + facing * 4 + i * 6;
      ctx.beginPath();
      ctx.moveTo(tx - 1.5, headCy + 7);
      ctx.lineTo(tx + 1.5, headCy + 7);
      ctx.lineTo(tx, headCy + 11);
      ctx.closePath();
      ctx.fill();
    }
    // 左右の大きな牙
    ctx.beginPath();
    ctx.moveTo(headCx + facing * (4 - 11), headCy + 7);
    ctx.lineTo(headCx + facing * (4 - 11) + 3, headCy + 7);
    ctx.lineTo(headCx + facing * (4 - 11) + 1, headCy + 14);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headCx + facing * (4 + 11), headCy + 7);
    ctx.lineTo(headCx + facing * (4 + 11) - 3, headCy + 7);
    ctx.lineTo(headCx + facing * (4 + 11) - 1, headCy + 14);
    ctx.closePath();
    ctx.fill();

    // 眉（太く怒り）
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(headCx - 14, headCy - 5); ctx.lineTo(headCx - 3, headCy - 1);
    ctx.moveTo(headCx + 3, headCy - 1); ctx.lineTo(headCx + 14, headCy - 5);
    ctx.stroke();
    // 目（黒目の下半分ギラリ）
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(headCx - 7, headCy + 1, 4, 3, 0, 0, Math.PI * 2);
    ctx.ellipse(headCx + 7, headCy + 1, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(headCx - 7 + facing, headCy + 2, 2, 2.5, 0, 0, Math.PI * 2);
    ctx.ellipse(headCx + 7 + facing, headCy + 2, 2, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // ツノ（2本のカーブした白い角）
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    // 左角
    ctx.beginPath();
    ctx.moveTo(headCx - 16, headCy - 18);
    ctx.quadraticCurveTo(headCx - 24, headCy - 26, headCx - 18, headCy - 32);
    ctx.quadraticCurveTo(headCx - 14, headCy - 22, headCx - 10, headCy - 18);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 右角
    ctx.beginPath();
    ctx.moveTo(headCx + 16, headCy - 18);
    ctx.quadraticCurveTo(headCx + 24, headCy - 26, headCx + 18, headCy - 32);
    ctx.quadraticCurveTo(headCx + 14, headCy - 22, headCx + 10, headCy - 18);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // 髪（赤いモヒカン）
    ctx.fillStyle = '#d82020';
    for (let i = 0; i < 5; i++) {
      const hx = headCx - 10 + i * 5;
      ctx.beginPath();
      ctx.moveTo(hx - 3, headCy - 14);
      ctx.lineTo(hx, headCy - 24 - Math.abs(i - 2) * 3);
      ctx.lineTo(hx + 3, headCy - 14);
      ctx.closePath();
      ctx.fill();
    }
    // 髪のハイライト
    ctx.fillStyle = '#ff6060';
    ctx.beginPath();
    ctx.moveTo(headCx - 6, headCy - 18);
    ctx.lineTo(headCx - 5, headCy - 23);
    ctx.lineTo(headCx - 4, headCy - 18);
    ctx.closePath();
    ctx.fill();

    // 炎チャージ（次の炎ブレスが近い時）
    if (b.fireCD < 30 && !b.defeated) {
      const glow = ctx.createRadialGradient(headCx + facing * 14, headCy + 10, 1, headCx + facing * 14, headCy + 10, 14);
      glow.addColorStop(0, `rgba(255,220,80,${(30 - b.fireCD) / 30})`);
      glow.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(headCx + facing * 14, headCy + 10, 14, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBossHUD() {
    if (!boss || boss.defeated || !boss.engaged) return;
    const barW = W*0.6, barX = W*0.2, barY = 24;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, 14);
    ctx.fillStyle = '#222';
    ctx.fillRect(barX, barY, barW, 10);
    const hpW = (boss.hp/boss.maxHp) * barW;
    const hpG = ctx.createLinearGradient(barX, barY, barX, barY+10);
    hpG.addColorStop(0, '#ff6a6a'); hpG.addColorStop(1, '#c82020');
    ctx.fillStyle = hpG;
    ctx.fillRect(barX, barY, hpW, 10);
    const bossName = boss.isFinal ? '闇の帝王' : 'メガネ部長';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.strokeText(bossName, W/2, barY + 5);
    ctx.fillText(bossName, W/2, barY + 5);
  }

  // ====== キノピオ（ゴール） ======
  function drawKinopio() {
    if (!flagPos) return;
    const kx = flagPos.x - cameraX;
    // 地面から少し上に立つ
    const ky = (LEVEL_ROWS - 3) * TILE;
    if (kx < -40 || kx > W + 40) return;
    const jitter = Math.sin(titleFrame * 0.1) * 1.2;
    // ボスがいてまだ engaged されてないならキノピオは「待ってる」
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(kx, ky + 30, 12, 3, 0, 0, Math.PI*2); ctx.fill();
    // 足
    ctx.fillStyle = '#e6c39b';
    ctx.fillRect(kx - 5, ky + 25, 4, 4);
    ctx.fillRect(kx + 1, ky + 25, 4, 4);
    // 靴（茶色）
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(kx - 6, ky + 28, 6, 2);
    ctx.fillRect(kx, ky + 28, 6, 2);
    // 白いズボン
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 7, ky + 18, 14, 9);
    // ベスト（青）
    ctx.fillStyle = '#2a70c8';
    ctx.fillRect(kx - 6, ky + 13, 12, 7);
    // 金ボタン
    ctx.fillStyle = '#ffd840';
    ctx.beginPath(); ctx.arc(kx, ky + 16, 1, 0, Math.PI*2); ctx.fill();
    // 腕（手を振る）
    ctx.fillStyle = '#fff';
    const waveArm = Math.sin(titleFrame*0.2) * 3;
    ctx.save();
    ctx.translate(kx + 6, ky + 12);
    ctx.rotate(-0.3 - waveArm * 0.1);
    ctx.fillRect(0, 0, 3, 8);
    ctx.fillStyle = '#e6c39b';
    ctx.beginPath(); ctx.arc(1.5, 8, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 9, ky + 14, 3, 7);
    ctx.fillStyle = '#e6c39b';
    ctx.beginPath(); ctx.arc(kx - 7.5, ky + 21, 2, 0, Math.PI*2); ctx.fill();
    // 顔
    ctx.fillStyle = '#f7dba5';
    ctx.beginPath();
    ctx.arc(kx, ky + 7 + jitter, 7, 0, Math.PI*2);
    ctx.fill();
    // ほっぺ
    ctx.fillStyle = 'rgba(255,150,180,0.6)';
    ctx.beginPath();
    ctx.ellipse(kx - 5, ky + 9 + jitter, 1.5, 1, 0, 0, Math.PI*2);
    ctx.ellipse(kx + 5, ky + 9 + jitter, 1.5, 1, 0, 0, Math.PI*2);
    ctx.fill();
    // 目
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(kx - 2.5, ky + 7 + jitter, 1.1, 1.6, 0, 0, Math.PI*2);
    ctx.ellipse(kx + 2.5, ky + 7 + jitter, 1.1, 1.6, 0, 0, Math.PI*2);
    ctx.fill();
    // 口（にっこり）
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(kx, ky + 10 + jitter, 1.2, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
    // キノコの傘（赤に白い斑点）
    const capY = ky + jitter;
    ctx.fillStyle = '#e63030';
    ctx.beginPath();
    ctx.ellipse(kx, capY - 1, 12, 8, 0, 0, Math.PI, true);
    ctx.fill();
    // 傘の縁
    ctx.fillStyle = '#fff';
    ctx.fillRect(kx - 12, capY - 1, 24, 2);
    // 斑点
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(kx - 6, capY - 3, 2, 0, Math.PI*2);
    ctx.arc(kx + 4, capY - 5, 2, 0, Math.PI*2);
    ctx.arc(kx - 1, capY - 7, 1.5, 0, Math.PI*2);
    ctx.fill();
    // 救出後のキラキラ
    if (state === 'cleared') {
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + stateTimer*0.1;
        const rr = 16 + Math.sin(stateTimer*0.2+i)*6;
        const sx = kx + Math.cos(a)*rr;
        const sy = ky + 8 + Math.sin(a)*rr;
        ctx.fillStyle = `hsl(${(stateTimer*5+i*60)%360},100%,70%)`;
        ctx.beginPath();
        ctx.arc(sx, sy, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
      // 「ありがとう！」
      ctx.save();
      const scale = Math.min(1, stateTimer / 30);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 16px sans-serif';
      ctx.translate(kx, ky - 28);
      ctx.scale(scale, scale);
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText('ありがとう！', 0, 0);
      ctx.fillStyle = '#ffee44';
      ctx.fillText('ありがとう！', 0, 0);
      ctx.restore();
    }
  }

  // ====== さく描画 ======
  function drawSaku(px, py) {
    const x = px - cameraX;
    const y = py;
    ctx.save();
    const cx = x + 12;
    const walking = Math.abs(saku.vx) > 0.5 && saku.onGround;
    const jumping = !saku.onGround;
    const bob = walking ? Math.sin(saku.anim) * 1 : 0;
    // スター周辺キラキラ
    if (saku.starTimer > 0) {
      for (let i = 0; i < 6; i++) {
        const ang = (i/6)*Math.PI*2 + saku.starTimer*0.1;
        const rr = 20 + Math.sin(saku.starTimer*0.2+i)*4;
        const sx = cx + Math.cos(ang)*rr;
        const sy = y + 15 + Math.sin(ang)*rr;
        ctx.fillStyle = `hsl(${(saku.starTimer*10+i*60)%360},100%,70%)`;
        ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }
    // ぺろぺろありーな発動後の青オーラ（aftermath 中）
    if (saku.ultActive && saku.ultActive.type === 'peropero' && saku.ultActive.phase === 'aftermath') {
      const af = saku.ultActive.auraFrame;
      // 外側の青いオーラ
      const ag = ctx.createRadialGradient(cx, y + 15, 2, cx, y + 15, 32);
      ag.addColorStop(0, `rgba(140,200,255,${0.6 + 0.2 * Math.sin(af * 0.15)})`);
      ag.addColorStop(0.5, 'rgba(70,130,240,0.4)');
      ag.addColorStop(1, 'rgba(20,40,120,0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(cx, y + 15, 32, 0, Math.PI * 2);
      ctx.fill();
      // オーラ粒子（上昇）
      for (let i = 0; i < 10; i++) {
        const ang = (i / 10) * Math.PI * 2 + af * 0.1;
        const rr = 14 + Math.sin(af * 0.15 + i) * 4;
        const sx2 = cx + Math.cos(ang) * rr;
        const sy2 = y + 18 + Math.sin(ang) * rr - (af * 0.3) % 30;
        ctx.fillStyle = `rgba(200,230,255,${0.6 + 0.4 * Math.sin(af * 0.2 + i)})`;
        ctx.beginPath();
        ctx.arc(sx2, sy2, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // 下から立ち昇る青い線
      ctx.strokeStyle = `rgba(150,210,255,${0.4 + 0.3 * Math.sin(af * 0.2)})`;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const lx = cx + (i - 2) * 6;
        const ly0 = y + 30;
        const ly1 = y + 30 - 30 + Math.sin(af * 0.15 + i) * 3;
        ctx.beginPath();
        ctx.moveTo(lx, ly0);
        ctx.quadraticCurveTo(lx + Math.sin(af * 0.1 + i) * 5, ly0 - 15, lx, ly1);
        ctx.stroke();
      }
    }
    if (saku.invuln > 0 && Math.floor(saku.invuln/4)%2 === 0) ctx.globalAlpha = 0.4;
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(cx, y + 31, 10, 2, 0, 0, Math.PI*2); ctx.fill();
    // 足
    ctx.fillStyle = '#1a1a28';
    const legSwing = walking ? Math.sin(saku.anim) * 3 : 0;
    const leg1x = cx - 5 - (saku.facing > 0 ? legSwing : -legSwing);
    const leg2x = cx + 2 + (saku.facing > 0 ? legSwing : -legSwing);
    if (jumping) {
      ctx.fillRect(cx - 5, y + 24, 4, 6);
      ctx.fillRect(cx + 1, y + 24, 4, 6);
    } else {
      ctx.fillRect(leg1x, y + 24, 4, 6);
      ctx.fillRect(leg2x, y + 24, 4, 6);
    }
    ctx.fillStyle = '#fff';
    if (jumping) { ctx.fillRect(cx - 6, y + 29, 6, 3); ctx.fillRect(cx, y + 29, 6, 3); }
    else { ctx.fillRect(leg1x - 1, y + 29, 6, 3); ctx.fillRect(leg2x - 1, y + 29, 6, 3); }
    // ランドセル（黒）
    const backX = saku.facing > 0 ? cx - 11 : cx + 3;
    ctx.fillStyle = '#0e0e14';
    ctx.fillRect(backX, y + 10 + bob, 8, 15);
    ctx.fillStyle = '#333340';  // ハイライト
    ctx.fillRect(backX + 1, y + 11 + bob, 2, 13);
    // 体（白シャツ）
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 7, y + 12 + bob, 14, 13);
    ctx.fillStyle = '#3a6fb0';
    ctx.beginPath();
    ctx.moveTo(cx - 3, y + 12 + bob); ctx.lineTo(cx, y + 15 + bob); ctx.lineTo(cx + 3, y + 12 + bob);
    ctx.closePath(); ctx.fill();
    // 腕
    ctx.fillStyle = '#f2c8a2';
    const armSwing = walking ? Math.sin(saku.anim) * 2 : 0;
    const armY = y + 16 + bob + (saku.facing > 0 ? -armSwing : armSwing);
    if (jumping) {
      ctx.fillRect(cx + 6, y + 11 + bob, 3, 6);
      ctx.fillRect(cx - 9, y + 11 + bob, 3, 6);
    } else {
      ctx.fillRect(cx + 6, armY, 3, 7);
      ctx.fillRect(cx - 9, armY - armSwing * (saku.facing > 0 ? 2 : -2), 3, 7);
    }
    // 頭
    const headY = y + 5 + bob;
    const headGrad = ctx.createRadialGradient(cx - 2, headY - 2, 1, cx, headY + 2, 10);
    headGrad.addColorStop(0, '#ffe6c8');
    headGrad.addColorStop(0.7, '#f2c8a2');
    headGrad.addColorStop(1, '#b57849');
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(cx, headY + 2, 9, 0, Math.PI*2); ctx.fill();
    // 髪
    ctx.fillStyle = '#1a1410';
    ctx.beginPath();
    ctx.moveTo(cx - 9, headY);
    ctx.quadraticCurveTo(cx - 10, headY - 7, cx - 3, headY - 8);
    ctx.quadraticCurveTo(cx + 4, headY - 9, cx + 9, headY - 6);
    ctx.quadraticCurveTo(cx + 10, headY - 1, cx + 8, headY);
    ctx.lineTo(cx + 6, headY - 2);
    ctx.quadraticCurveTo(cx + 2, headY + 1, cx - 2, headY - 2);
    ctx.quadraticCurveTo(cx - 6, headY - 1, cx - 9, headY);
    ctx.closePath(); ctx.fill();
    // 目
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx - 3, headY + 3, 1.3, 0, Math.PI*2);
    ctx.arc(cx + 3, headY + 3, 1.3, 0, Math.PI*2);
    ctx.fill();
    // 口
    ctx.strokeStyle = '#6a3020'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (jumping) { ctx.arc(cx, headY + 7, 1.5, 0, Math.PI*2); }
    else { ctx.moveTo(cx - 2, headY + 7); ctx.quadraticCurveTo(cx, headY + 8.5, cx + 2, headY + 7); }
    ctx.stroke();
    // 短パン
    ctx.fillStyle = '#2a2a38';
    ctx.fillRect(cx - 6, y + 22 + bob, 12, 4);
    // スターのオーバーレイ
    if (saku.starTimer > 0) {
      const hue = (saku.starTimer*15)%360;
      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      ctx.fillStyle = `hsla(${hue},90%,60%,0.6)`;
      ctx.fillRect(cx - 10, y, 20, 32);
      ctx.restore();
    }
    // 剣
    if (saku.swordTimer > 0) {
      ctx.save();
      const handX = cx + saku.facing * 10;
      const handY = y + 17 + bob;
      ctx.translate(handX, handY);
      ctx.rotate(saku.facing > 0 ? -0.3 : 0.3);
      ctx.fillStyle = '#e8ecf5';
      ctx.fillRect(-1.5, -14, 3, 14);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-0.5, -14, 1, 14);
      ctx.strokeStyle = '#8a95a8'; ctx.lineWidth = 0.5;
      ctx.strokeRect(-1.5, -14, 3, 14);
      ctx.fillStyle = '#c8a030';
      ctx.fillRect(-4, 0, 8, 2);
      ctx.fillStyle = '#6a3a1a';
      ctx.fillRect(-1.5, 2, 3, 4);
      ctx.restore();
      if (saku.swordTimer < 120 && Math.floor(saku.swordTimer/6)%2 === 0) ctx.globalAlpha = 0.5;
    }
    ctx.restore();
  }

  // ====== FF7風タイトル画面 ======
  const titleStars = Array.from({length: 80}, () => ({
    x: Math.random(), y: Math.random(),
    s: 0.5 + Math.random() * 1.8,
    v: 0.1 + Math.random() * 0.5,
    ph: Math.random() * Math.PI * 2,
  }));
  const titleParticles = Array.from({length: 25}, () => ({
    x: Math.random(), y: 0.6 + Math.random() * 0.4,
    v: 0.15 + Math.random() * 0.4,
    s: 1 + Math.random() * 2,
    ph: Math.random() * Math.PI * 2,
  }));

  function drawTitle() {
    // 深い青黒グラデ（FF7 OP 風）
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#010314');
    bg.addColorStop(0.55, '#0a1a32');
    bg.addColorStop(1, '#1a2848');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 星
    for (const s of titleStars) {
      const sx = s.x * W;
      const sy = ((s.y + titleFrame * 0.0002 * s.v) % 1) * H;
      const tw = 0.6 + 0.4 * Math.sin(titleFrame * 0.05 + s.ph);
      ctx.fillStyle = `rgba(220,235,255,${0.3 + tw * 0.5})`;
      ctx.beginPath();
      ctx.arc(sx, sy, s.s * tw, 0, Math.PI * 2);
      ctx.fill();
    }

    // 放射状グロー（中央に青白い光）
    const glow = ctx.createRadialGradient(W/2, H*0.38, 10, W/2, H*0.38, Math.max(W, H) * 0.8);
    glow.addColorStop(0, 'rgba(60, 120, 200, 0.55)');
    glow.addColorStop(0.3, 'rgba(30, 60, 140, 0.3)');
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // 遠景シルエットの山々（FF7ぽい暗い山影）
    ctx.fillStyle = '#060a1a';
    const silhouetteY = H * 0.66;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, silhouetteY);
    for (let i = 0; i <= 8; i++) {
      const px = (i / 8) * W;
      const py = silhouetteY - 15 - Math.sin(i * 1.3) * 35 - (i % 2 === 0 ? 25 : 0);
      ctx.lineTo(px, py);
    }
    ctx.lineTo(W, silhouetteY);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // 前景のシルエット（もう少し低い山）
    ctx.fillStyle = '#020410';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H * 0.8);
    for (let i = 0; i <= 10; i++) {
      const px = (i / 10) * W;
      const py = H * 0.8 - 10 - Math.abs(Math.sin(i * 1.7)) * 25;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(W, H * 0.8);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // 上昇パーティクル（光の粒）
    for (const p of titleParticles) {
      const px = p.x * W;
      const py = ((p.y - titleFrame * 0.001 * p.v) % 1 + 1) % 1 * H;
      const tw = 0.5 + 0.5 * Math.sin(titleFrame * 0.06 + p.ph);
      ctx.fillStyle = `rgba(140,200,255,${tw * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py, p.s * (0.7 + tw * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }

    // タイトルロゴ（メタリック / FF7 風）
    ctx.save();
    const titleY = H * 0.28;
    ctx.translate(W/2, titleY);
    // ロゴバック光
    const halo = ctx.createRadialGradient(0, 0, 2, 0, 0, 180);
    halo.addColorStop(0, 'rgba(160, 200, 255, 0.35)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.ellipse(0, 0, 220, 70, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // さく
    ctx.font = 'bold 52px "Times New Roman", serif';
    const title = 'さくの大ぼうけん';
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(title, 4, 6);
    // 輪郭
    ctx.lineWidth = 6; ctx.strokeStyle = '#0a1a3a';
    ctx.strokeText(title, 0, 0);
    ctx.lineWidth = 3; ctx.strokeStyle = '#a0b8e0';
    ctx.strokeText(title, 0, 0);
    // メタリック本体
    const mg = ctx.createLinearGradient(0, -28, 0, 28);
    mg.addColorStop(0, '#e8f0ff');
    mg.addColorStop(0.35, '#b8c8e8');
    mg.addColorStop(0.5, '#6a80b0');
    mg.addColorStop(0.55, '#7890c0');
    mg.addColorStop(0.85, '#c8d8f0');
    mg.addColorStop(1, '#5a6e9a');
    ctx.fillStyle = mg;
    ctx.fillText(title, 0, 0);
    // 上部ハイライト
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    const hl = ctx.createLinearGradient(0, -26, 0, -5);
    hl.addColorStop(0, 'rgba(255,255,255,0.7)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    ctx.fillText(title, 0, 0);
    ctx.restore();
    ctx.restore();

    // サブタイトル（淡い青文字、FF7ぽい細字）
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'italic 14px serif';
    ctx.fillStyle = 'rgba(160, 200, 255, 0.85)';
    ctx.fillText('〜 キノピオをたすけるたび 〜', W/2, titleY + 48);
    ctx.restore();

    // キャラ（小さく、左下にシルエット風に浮かばせる）
    ctx.save();
    ctx.translate(W * 0.14, H * 0.75);
    ctx.scale(1.8, 1.8);
    const savedSaku = {...saku};
    saku.x = cameraX; saku.y = 0; saku.vx = 0; saku.onGround = true;
    saku.facing = 1; saku.anim = titleFrame * 0.08;
    saku.invuln = 0; saku.starTimer = 0; saku.swordTimer = 0;
    drawSaku(cameraX, 0);
    Object.assign(saku, savedSaku);
    ctx.restore();
    // キノピオ（右下）
    ctx.save();
    ctx.translate(W * 0.86, H * 0.78);
    ctx.scale(1.6, 1.6);
    const fakeFlag = { x: cameraX, y: 0 };
    const savedFlag = flagPos; flagPos = fakeFlag;
    const savedRows = LEVEL_ROWS; LEVEL_ROWS = 3;
    drawKinopio();
    LEVEL_ROWS = savedRows;
    flagPos = savedFlag;
    ctx.restore();

    // ===== メニュー =====
    drawTitleMenu();

    // フッターのコピー表記風
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '9px serif';
    ctx.fillStyle = 'rgba(160,180,220,0.55)';
    ctx.fillText('© SAKU ADVENTURE', W/2, H - 12);
    ctx.restore();
  }

  // タイトルメニュー
  const titleMenu = {
    items: ['はじめから', 'つづきから'],
    selected: 0,
    holdCooldown: 0,
  };

  function drawTitleMenu() {
    const save = loadSave();
    const hasSave = !!save;
    const menuY = H * 0.50;
    const gap = 48;

    for (let i = 0; i < titleMenu.items.length; i++) {
      const label = titleMenu.items[i];
      const y = menuY + i * gap;
      const selected = (titleMenu.selected === i);
      const disabled = (i === 1 && !hasSave);

      // 行の背景パネル（FF7メニュー風・青い枠）
      if (selected) {
        // 光るハイライト
        const hg = ctx.createLinearGradient(W*0.2, y, W*0.8, y);
        hg.addColorStop(0, 'rgba(60,120,220,0)');
        hg.addColorStop(0.5, 'rgba(80,150,255,0.5)');
        hg.addColorStop(1, 'rgba(60,120,220,0)');
        ctx.fillStyle = hg;
        ctx.fillRect(W*0.2, y - 20, W*0.6, 40);
        // 枠
        ctx.strokeStyle = '#7aa0e0';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(W*0.2 + 1, y - 19, W*0.6 - 2, 38);
        ctx.strokeStyle = 'rgba(180,210,255,0.5)';
        ctx.lineWidth = 0.8;
        ctx.strokeRect(W*0.2 + 4, y - 16, W*0.6 - 8, 32);
      }

      // カーソル（▶）
      if (selected) {
        const blink = Math.floor(titleFrame / 15) % 2;
        ctx.save();
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.font = 'bold 20px serif';
        ctx.fillStyle = blink ? '#a0d0ff' : '#6a90d0';
        ctx.fillText('▶', W*0.24, y);
        ctx.restore();
      }

      // テキスト本体
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 22px serif';
      if (disabled) {
        ctx.fillStyle = 'rgba(140,160,190,0.35)';
        ctx.fillText(label, W/2, y);
      } else {
        // 影
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillText(label, W/2 + 2, y + 2);
        if (selected) {
          const tg = ctx.createLinearGradient(0, y - 14, 0, y + 14);
          tg.addColorStop(0, '#ffffff');
          tg.addColorStop(0.5, '#c8dcff');
          tg.addColorStop(1, '#7ba0d8');
          ctx.fillStyle = tg;
        } else {
          ctx.fillStyle = '#a8bfe0';
        }
        ctx.fillText(label, W/2, y);
      }
      ctx.restore();

      // 「つづきから」にセーブ情報を表示
      if (i === 1) {
        ctx.save();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = 'italic 11px serif';
        if (hasSave) {
          const prog = STAGES[Math.min(save.currentStage || 0, STAGES.length - 1)];
          ctx.fillStyle = 'rgba(200,220,255,0.75)';
          ctx.fillText(`${prog.label}  SCORE ${save.score || 0}`, W/2, y + 18);
        } else {
          ctx.fillStyle = 'rgba(140,160,190,0.35)';
          ctx.fillText('(セーブなし)', W/2, y + 18);
        }
        ctx.restore();
      }
    }

    // 操作ヒント
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '11px serif';
    ctx.fillStyle = 'rgba(160,190,230,0.6)';
    ctx.fillText('↑↓ : 選択  /  Space・Z・タップ : けってい', W/2, H - 30);
    ctx.restore();
  }

  function drawStageTransition() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const next = STAGES[currentStage + 1];
    const txt = next ? `${next.label}  ${next.name}` : '';
    ctx.font = 'bold 28px sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText(txt, W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.fillText(txt, W/2, H/2 - 20);
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#ffee44';
    ctx.fillText('スタート！', W/2, H/2 + 20);
  }

  function render() {
    drawBackground();
    drawTiles();
    drawCheckpoint();
    drawCoins();
    drawItems();
    drawEnemies();
    drawBoss();
    drawKinopio();
    drawSaku(saku.x, saku.y);
    drawUltEffect();
    drawBossHUD();
    drawHPGauge();
    drawUltGauge();
    drawUltPopups();
    drawUltBanner();
    if (saku.ultActive && saku.ultActive.type === 'peropero') {
      drawPeroperoCutin();
      // aftermath フェーズではさくを再描画して前面に表示（青オーラ付き）
      if (saku.ultActive.phase === 'aftermath') {
        drawSaku(saku.x, saku.y);
      }
    }
  }

  function drawUltBanner() {
    if (!ultBanner) return;
    ultBanner.timer--;
    if (ultBanner.timer <= 0) { ultBanner = null; return; }
    const t = 1 - ultBanner.timer / ultBanner.maxTimer;
    // スライドイン〜保持〜フェードアウト
    let slideX = 0;
    let alpha = 1;
    if (t < 0.15) slideX = (0.15 - t) * 800;
    else if (t > 0.75) alpha = (1 - t) * 4;
    if (alpha < 0) alpha = 0;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const y = H * 0.28;
    // 帯
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0 + slideX, y - 22, W, 44);
    ctx.strokeStyle = '#ffee40';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0 + slideX, y - 22, W, 44);
    // 「必殺技」
    ctx.font = 'bold 12px serif';
    ctx.fillStyle = '#ffcc80';
    ctx.fillText('必殺技', W/2 + slideX, y - 10);
    // 技名
    ctx.font = 'bold 22px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.strokeText(ultBanner.name, W/2 + slideX, y + 6);
    const tg = ctx.createLinearGradient(0, y, 0, y + 15);
    tg.addColorStop(0, '#fff');
    tg.addColorStop(0.5, '#ffcc60');
    tg.addColorStop(1, '#ff4488');
    ctx.fillStyle = tg;
    ctx.fillText(ultBanner.name, W/2 + slideX, y + 6);
    ctx.restore();
  }

  function drawUltPopups() {
    if (!ultPopups.length) return;
    for (let i = ultPopups.length - 1; i >= 0; i--) {
      const p = ultPopups[i];
      p.life--;
      if (p.life <= 0) { ultPopups.splice(i, 1); continue; }
      const t = 1 - p.life / p.maxLife;
      const x = p.x - cameraX;
      const y = p.y - t * 30;
      const alpha = p.life > 20 ? 1 : p.life / 20;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 14px sans-serif';
      ctx.lineWidth = 4; ctx.strokeStyle = '#000';
      ctx.strokeText(p.text, x, y);
      ctx.fillStyle = p.color || '#ff70d8';
      ctx.fillText(p.text, x, y);
      ctx.restore();
    }
  }

  // 必殺技ゲージ（大きめで目立つデザイン）
  function drawUltGauge() {
    if (state === 'title') return;
    if (saku.unlockedUlts.length === 0) {
      // 必殺ボタンを隠す
      const b = document.querySelector('#pad button.ult');
      if (b) b.style.display = 'none';
      return;
    } else {
      const b = document.querySelector('#pad button.ult');
      if (b) b.style.display = '';
    }

    const pct = saku.ultGauge / saku.maxUlt;
    const ready = (pct >= 1);
    // 必殺ボタンに ready クラス付与
    const btn = document.querySelector('#pad button.ult');
    if (btn) {
      if (ready && !btn.classList.contains('ready')) btn.classList.add('ready');
      else if (!ready && btn.classList.contains('ready')) btn.classList.remove('ready');
    }
    const ult = ULTIMATES.find(u => u.id === saku.unlockedUlts[saku.selectedUlt]);

    // 画面下中央に大きめのゲージを配置
    const barW = 200;
    const barH = 16;
    const bx = (W - barW) / 2;
    const by = H - 34;

    ctx.save();
    // 背景パネル
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(bx - 8, by - 14, barW + 16, barH + 24);
    ctx.strokeStyle = ready ? '#ffee40' : '#80a0d0';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 8, by - 14, barW + 16, barH + 24);

    // 技名とゲージ値
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(ult ? ult.name : '必殺技', bx, by - 6);

    ctx.textAlign = 'right';
    ctx.fillStyle = ready ? '#ffee40' : '#c0d0ee';
    ctx.fillText(Math.floor(saku.ultGauge) + '/' + saku.maxUlt, bx + barW, by - 6);

    // バー本体
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by, barW, barH);
    const fillW = pct * barW;
    const g = ctx.createLinearGradient(bx, by, bx, by + barH);
    if (ready) {
      const f = Math.sin(titleFrame * 0.3) * 0.2 + 0.8;
      g.addColorStop(0, `rgba(255,255,200,${f})`);
      g.addColorStop(0.5, '#ffaa20');
      g.addColorStop(1, '#ff4488');
    } else {
      g.addColorStop(0, '#ff60d0');
      g.addColorStop(0.5, '#c81890');
      g.addColorStop(1, '#80105a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(bx, by, fillW, barH);
    // セグメント区切り線
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const x = bx + (barW * i / 4);
      ctx.beginPath();
      ctx.moveTo(x, by);
      ctx.lineTo(x, by + barH);
      ctx.stroke();
    }
    ctx.strokeStyle = ready ? '#ffffff' : '#446090';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx, by, barW, barH);

    // READY! 表示
    if (ready) {
      const pulse = 1 + 0.15 * Math.sin(titleFrame * 0.25);
      ctx.save();
      ctx.translate(bx + barW / 2, by + barH / 2);
      ctx.scale(pulse, pulse);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 13px sans-serif';
      ctx.lineWidth = 3.5; ctx.strokeStyle = '#000';
      ctx.strokeText('READY!  押して発動', 0, 0);
      ctx.fillStyle = '#ffff60';
      ctx.fillText('READY!  押して発動', 0, 0);
      ctx.restore();
      // 光の矢（必殺ボタンを指す）
      const arrowX = W - 80;
      const arrowY = by + barH / 2 + Math.sin(titleFrame * 0.2) * 4;
      ctx.save();
      ctx.fillStyle = '#ffee40';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY);
      ctx.lineTo(arrowX - 14, arrowY - 8);
      ctx.lineTo(arrowX - 14, arrowY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // 必殺技エフェクト（プレイヤー周辺）
  function drawUltEffect() {
    if (!saku.ultActive) return;
    const type = saku.ultActive.type;
    const timer = saku.ultActive.timer;
    const sx = saku.x - cameraX + saku.w/2;
    const sy = saku.y + saku.h/2;
    if (type === 'punch') {
      // スーパーパンチ：前方にエネルギー拳
      const ph = 40 - timer;
      const reach = Math.min(1, ph / 20) * 110;
      const dir = saku.facing;
      const gx = sx + dir * reach;
      ctx.save();
      // 軌跡
      const g = ctx.createLinearGradient(sx, sy, gx, sy);
      g.addColorStop(0, 'rgba(255,150,80,0)');
      g.addColorStop(0.5, 'rgba(255,200,100,0.8)');
      g.addColorStop(1, 'rgba(255,255,220,1)');
      ctx.fillStyle = g;
      ctx.fillRect(Math.min(sx, gx), sy - 14, Math.abs(gx - sx), 28);
      // 拳
      const fg = ctx.createRadialGradient(gx, sy, 2, gx, sy, 24);
      fg.addColorStop(0, '#ffffff');
      fg.addColorStop(0.4, '#ffc040');
      fg.addColorStop(1, 'rgba(200,60,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(gx, sy, 22, 0, Math.PI * 2);
      ctx.fill();
      // スピード線
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(sx - dir * 20, sy + (i-2)*6);
        ctx.lineTo(sx - dir * 60, sy + (i-2)*8);
        ctx.stroke();
      }
      ctx.restore();
    } else if (type === 'slash') {
      // ジャンプ斬り：空中停止中に光の軌跡＋斬撃波
      // さくの周りに輝くオーラ
      const t = saku.ultActive.timer;
      if (t <= 80 && t >= 35) {
        ctx.save();
        ctx.translate(sx, sy);
        for (let i = 0; i < 6; i++) {
          const a = (i/6)*Math.PI*2 + (110-t)*0.2;
          const rr = 22 + Math.sin((110-t)*0.3 + i) * 4;
          ctx.fillStyle = `rgba(180,230,255,${0.5 + 0.5 * Math.sin((110-t)*0.2 + i)})`;
          ctx.beginPath();
          ctx.arc(Math.cos(a)*rr, Math.sin(a)*rr, 2.5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
      // 斬撃波
      if (saku.ultActive.slashWaves) {
        for (const w of saku.ultActive.slashWaves) {
          drawSlashWave(w);
        }
      }
    }
  }

  function drawSlashWave(w) {
    const x = w.x - cameraX;
    const y = w.y;
    const a = w.life / w.maxLife;
    const phase = 1 - a;
    ctx.save();
    ctx.translate(x, y);
    // 軌跡（残像）
    for (let i = 0; i < 5; i++) {
      const off = -i * 8 * Math.sign(w.vx);
      ctx.globalAlpha = a * (1 - i * 0.2);
      ctx.save();
      ctx.translate(off, 0);
      ctx.rotate(w.angle + phase * Math.sign(w.vx) * 0.3);
      // 外側のグロー
      const g = ctx.createLinearGradient(-40, 0, 40, 0);
      g.addColorStop(0, 'rgba(160,210,255,0)');
      g.addColorStop(0.4, 'rgba(200,235,255,0.7)');
      g.addColorStop(0.5, 'rgba(255,255,255,1)');
      g.addColorStop(0.6, 'rgba(200,235,255,0.7)');
      g.addColorStop(1, 'rgba(160,210,255,0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = 16;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-35, -22);
      ctx.quadraticCurveTo(0, -5, 35, 22);
      ctx.stroke();
      // 中核の白線
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-30, -18);
      ctx.quadraticCurveTo(0, -3, 30, 18);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // ぺろぺろありーなカットイン（百式観音＋バキバキ連撃＋青オーラ余韻）
  function drawPeroperoCutin() {
    const fx = saku.ultActive;
    const t = fx.timer;  // 280→0
    const tMax = 280;
    const progress = (tMax - t) / tMax;  // 0→1

    // === フェーズ 1: init (t: 280-220) === 観音出現＋暗転
    // === フェーズ 2: attack (t: 220-120) === バキバキ連撃
    // === フェーズ 3: aftermath (t: 120-0) === 青オーラ余韻

    const isInit = t > 220;
    const isAttack = t <= 220 && t > 120;
    const isAftermath = t <= 120;

    // 背景の暗転度
    let bgAlpha = 0;
    if (isInit) bgAlpha = ((tMax - t) / 60) * 0.85;  // 0→0.85
    else if (isAttack) bgAlpha = 0.85;
    else if (isAftermath) bgAlpha = Math.max(0, 0.5 * (t / 120));  // 0.5→0
    ctx.fillStyle = `rgba(5, 3, 20, ${bgAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // 金色の光源（観音の光輪）
    const halo = ctx.createRadialGradient(W/2, H*0.4, 20, W/2, H*0.4, Math.max(W, H) * 0.8);
    let haloStrength = 0;
    if (isInit) haloStrength = (tMax - t) / 60 * 0.5;
    else if (isAttack) haloStrength = 0.4 + 0.2 * Math.sin(t * 0.3);
    else if (isAftermath) haloStrength = Math.max(0, (t / 120) * 0.3);
    halo.addColorStop(0, `rgba(255, 220, 100, ${haloStrength})`);
    halo.addColorStop(0.4, `rgba(200, 100, 40, ${haloStrength * 0.5})`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, W, H);

    // 百式観音（attackフェーズは白の上にうっすら描き直すので、ここではスキップ）
    if (!isAttack && (!isAftermath || t > 30)) {
      let kannonAlpha = 0;
      if (isInit) kannonAlpha = Math.min(1, (tMax - t) / 60);
      else if (isAftermath) kannonAlpha = Math.max(0, (t - 30) / 90);
      drawKannon(W/2, H * 0.48, kannonAlpha);
    }

    // 桜吹雪（attackフェーズは白で隠れるのでスキップ）
    const sakuraCount = isAftermath ? 40 : (isAttack ? 0 : 25);
    for (let i = 0; i < sakuraCount; i++) {
      const seed = i * 37;
      const sx = ((seed + fx.auraFrame * 2) % W);
      const sy = ((seed * 3 + fx.auraFrame * 2.5 + i * 40) % H);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate((fx.auraFrame * 0.08 + i) % (Math.PI * 2));
      const grad = ctx.createRadialGradient(0, 0, 1, 0, 0, 6);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.5, '#ffc0d8');
      grad.addColorStop(1, '#ff7faa');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 3.5, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // タイトル「ぺろぺろありーな」— init 中のみ表示（attack中は真っ白なので隠す）
    if (isInit) {
      ctx.save();
      ctx.translate(W/2, H * 0.28);
      const scale = 1 + 0.05 * Math.sin(fx.auraFrame * 0.3);
      const shake = isAttack ? (Math.random() - 0.5) * 5 : 0;
      ctx.translate(shake, shake);
      ctx.scale(scale, scale);
      ctx.rotate(-0.03);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 40px "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif';
      ctx.lineWidth = 13; ctx.strokeStyle = '#000';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 8; ctx.strokeStyle = '#7a1a5a';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      const tg = ctx.createLinearGradient(0, -28, 0, 28);
      tg.addColorStop(0, '#ffffff');
      tg.addColorStop(0.5, '#ffccf0');
      tg.addColorStop(1, '#ff4488');
      ctx.fillStyle = tg;
      ctx.fillText('ぺろぺろありーな', 0, 0);
      ctx.restore();
    }

    // 「秘奥義」表記（init 中のみ）
    if (isInit) {
      const op = Math.min(1, (tMax - t) / 30);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 24px serif';
      ctx.globalAlpha = op;
      ctx.lineWidth = 6; ctx.strokeStyle = '#000';
      ctx.strokeText('秘奥義', W/2, H * 0.18);
      ctx.fillStyle = '#ffeb4a';
      ctx.fillText('秘奥義', W/2, H * 0.18);
      ctx.restore();
    }

    // ★ 攻撃フェーズ: ずっと真っ白、うっすら観音様だけ透ける（チカチカしない）
    if (isAttack) {
      // 画面を完全に真っ白で覆う（常に同じ不透明度、点滅なし）
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // 白の上にうっすらと観音様を再描画（ゆらぎなし、固定の薄さ）
      drawKannon(W/2, H * 0.48, 0.2);

      // 桜吹雪（白地に映えるピンク濃いめ）
      for (let i = 0; i < 30; i++) {
        const seed = i * 53;
        const sx = ((seed + fx.auraFrame * 2) % (W + 40)) - 20;
        const sy = ((seed * 3 + fx.auraFrame * 2.3 + i * 37) % (H + 40)) - 20;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate((fx.auraFrame * 0.07 + i) % (Math.PI * 2));
        const grad = ctx.createRadialGradient(0, 0, 1, 0, 0, 7);
        grad.addColorStop(0, '#ffd0e0');
        grad.addColorStop(0.6, '#ff7faa');
        grad.addColorStop(1, '#e04080');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0, 0, 4, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // 「ぺろぺろありーな」タイトル（attack中も表示）
      ctx.save();
      ctx.translate(W/2, H * 0.28);
      const scale = 1 + 0.04 * Math.sin(fx.auraFrame * 0.25);
      ctx.scale(scale, scale);
      ctx.rotate(-0.03);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 40px "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif';
      ctx.lineWidth = 13; ctx.strokeStyle = '#000';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 8; ctx.strokeStyle = '#7a1a5a';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff';
      ctx.strokeText('ぺろぺろありーな', 0, 0);
      const tg = ctx.createLinearGradient(0, -28, 0, 28);
      tg.addColorStop(0, '#ffffff');
      tg.addColorStop(0.5, '#ffccf0');
      tg.addColorStop(1, '#ff4488');
      ctx.fillStyle = tg;
      ctx.fillText('ぺろぺろありーな', 0, 0);
      ctx.restore();
    }
  }

  // 百式観音のシルエット（金色/橙）
  function drawKannon(cx, cy, alpha) {
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    // 大きな光輪
    const ringR = 160;
    const ringG = ctx.createRadialGradient(cx, cy - 40, 30, cx, cy - 40, ringR);
    ringG.addColorStop(0, 'rgba(255, 230, 120, 0.5)');
    ringG.addColorStop(0.5, 'rgba(255, 180, 50, 0.35)');
    ringG.addColorStop(1, 'rgba(255, 120, 40, 0)');
    ctx.fillStyle = ringG;
    ctx.beginPath();
    ctx.arc(cx, cy - 40, ringR, 0, Math.PI * 2);
    ctx.fill();

    // 観音本体（金色シルエット）
    const bodyG = ctx.createLinearGradient(cx, cy - 120, cx, cy + 120);
    bodyG.addColorStop(0, '#ffd880');
    bodyG.addColorStop(0.5, '#c88620');
    bodyG.addColorStop(1, '#663a08');
    ctx.fillStyle = bodyG;

    // 胴体（大きな衣のような）
    ctx.beginPath();
    ctx.moveTo(cx - 55, cy + 120);
    ctx.lineTo(cx - 80, cy + 180);
    ctx.lineTo(cx + 80, cy + 180);
    ctx.lineTo(cx + 55, cy + 120);
    ctx.quadraticCurveTo(cx + 50, cy + 20, cx + 30, cy - 30);
    ctx.quadraticCurveTo(cx + 20, cy - 60, cx, cy - 65);
    ctx.quadraticCurveTo(cx - 20, cy - 60, cx - 30, cy - 30);
    ctx.quadraticCurveTo(cx - 50, cy + 20, cx - 55, cy + 120);
    ctx.closePath();
    ctx.fill();

    // 左右に広がる多腕（3本ずつ）
    for (let side of [-1, 1]) {
      for (let i = 0; i < 3; i++) {
        const a = (i - 1) * 0.4;
        const ax1 = cx + side * 30;
        const ay1 = cy - 10;
        const ax2 = cx + side * (70 + i * 10);
        const ay2 = cy + 20 + i * 30;
        ctx.fillStyle = `rgba(200, 130, 40, ${alpha * 0.9})`;
        ctx.beginPath();
        ctx.moveTo(ax1, ay1);
        ctx.quadraticCurveTo(ax2, ay1 + a * 20, ax2, ay2);
        ctx.quadraticCurveTo(ax2 - side * 10, ay2 + 10, ax1 - side * 5, ay1 + 40);
        ctx.closePath();
        ctx.fill();
      }
    }

    // 頭（楕円）
    ctx.fillStyle = '#e8b854';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 80, 30, 38, 0, 0, Math.PI * 2);
    ctx.fill();
    // 髪飾り/冠
    ctx.fillStyle = '#ffd880';
    ctx.beginPath();
    ctx.moveTo(cx - 26, cy - 100);
    ctx.lineTo(cx - 14, cy - 120);
    ctx.lineTo(cx, cy - 110);
    ctx.lineTo(cx + 14, cy - 120);
    ctx.lineTo(cx + 26, cy - 100);
    ctx.closePath();
    ctx.fill();
    // 顔の閉じた目（慈悲の表情）
    ctx.strokeStyle = '#4a2a10';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cx - 10, cy - 80, 4, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.arc(cx + 10, cy - 80, 4, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
    // 口
    ctx.beginPath();
    ctx.arc(cx, cy - 68, 3, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
    // 額の印
    ctx.fillStyle = '#ff4040';
    ctx.beginPath();
    ctx.arc(cx, cy - 96, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // カットシーン
  function updateCutscene() {
    if (!cutscene) return;
    cutscene.charAnim++;
    const current = cutscene.lines[cutscene.step];
    if (!current) { endCutscene(); return; }
    // ルビ除去したプレーンテキストで字数カウント
    const plain = stripRuby(current.text);
    if (cutscene.charIdx < plain.length && cutscene.charAnim % 2 === 0) {
      cutscene.charIdx++;
      // ルビ記号を維持しつつ charIdx 分だけ表示するように変換
      cutscene.charText = displayUpTo(current.text, cutscene.charIdx);
      if (cutscene.charIdx % 3 === 0) beep(900 + Math.random()*200, 0.02, 'square', 0.05);
      if (cutscene.charIdx >= plain.length) cutscene.waitInput = true;
    }
  }
  // text の "表示上" 最初から n 文字分を、[kanji|furigana] のルビを温存した形で返す
  function displayUpTo(text, n) {
    let out = '';
    let visible = 0;
    let i = 0;
    while (i < text.length && visible < n) {
      if (text[i] === '[') {
        const end = text.indexOf(']', i);
        if (end < 0) { out += text.substring(i); break; }
        const inner = text.substring(i+1, end);
        const pipe = inner.indexOf('|');
        if (pipe > 0) {
          const base = inner.substring(0, pipe);
          const remain = n - visible;
          if (remain >= base.length) {
            out += '[' + inner + ']';
            visible += base.length;
            i = end + 1;
          } else {
            // 途中まで表示：ルビは付けずにプレーンで
            out += base.substring(0, remain);
            visible += remain;
            i = end + 1;
          }
        } else {
          // 閉じてない/妙な記法は素通り
          out += '[' + inner + ']';
          visible += (inner.length + 2);
          i = end + 1;
        }
      } else {
        out += text[i];
        visible++;
        i++;
      }
    }
    return out;
  }
  // advanceCutscene で即時全表示にするときも修正


  function drawCutscene() {
    if (!cutscene) return;
    // 背景：暗いオーバーレイ
    ctx.fillStyle = '#050610';
    ctx.fillRect(0, 0, W, H);
    const current = cutscene.lines[cutscene.step];
    if (!current) return;

    // 背景の輝きグロー
    const glowX = W/2, glowY = H*0.4;
    const g = ctx.createRadialGradient(glowX, glowY, 10, glowX, glowY, 260);
    let gColor = 'rgba(70,100,180,0.35)';
    if (cutscene.id === 'final-reveal' && cutscene.step >= 9) gColor = 'rgba(180,30,60,0.4)';
    else if (cutscene.id === 'final-reveal' && cutscene.step >= 3) gColor = 'rgba(200,170,80,0.4)';
    g.addColorStop(0, gColor);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // キャラクター描画（中央）
    const charY = H * 0.42;
    drawCutsceneChar(current.speaker, W/2, charY, cutscene.id, cutscene.step);

    // 名前と台詞ウィンドウ
    const boxH = 100;
    const boxY = H - boxH - 10;
    ctx.save();
    // ウィンドウ
    ctx.fillStyle = 'rgba(10, 20, 40, 0.92)';
    ctx.fillRect(20, boxY, W - 40, boxH);
    ctx.strokeStyle = '#80a0d0';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, boxY, W - 40, boxH);
    ctx.strokeStyle = 'rgba(200,230,255,0.4)';
    ctx.lineWidth = 1;

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    const textToShow = cutscene.charText || '';
    const lineSegs = wrapRuby(textToShow, W - 80, dlgFont);
    for (let i = 0; i < lineSegs.length; i++) {
      drawRuby(lineSegs[i], 40, boxY + 32 + i * 26, dlgFont, {

    ctx.save();
