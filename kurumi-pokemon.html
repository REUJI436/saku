function makeMon(id, lvl) {
  const def = getMonsterDef(id);
  const mon = {
    id: id,
    lvl: lvl,
    exp: 0,
    hp: 0, mp: 0,
    skills: ['tail']
  };
  // skills based on level
  mon.skills = [];
  if (Array.isArray(def.startSkills) && def.startSkills.length) {
    // 伝説とーとん用: Lv1から全技習得済み
    mon.skills = def.startSkills.slice();
  } else {
    Object.keys(def.learn).forEach(k => {
      if (lvl >= +k) mon.skills.push(def.learn[k]);
    });
  }
  if (mon.skills.length === 0) mon.skills.push('tail');
  const stats = monStats(mon);
  mon.hp = stats.hp; mon.mp = stats.mp;
  return mon;
}

function monStats(mon) {
  const def = getMonsterDef(mon.id);
  const lv = mon.lvl;
  return {
    hp:  Math.floor(def.hp  + (def.hp  * 0.06 + 2) * (lv-1)),
    atk: Math.floor(def.atk + (def.atk * 0.06 + 1) * (lv-1)),
    def: Math.floor(def.def + (def.def * 0.06 + 1) * (lv-1)),
    spd: Math.floor(def.spd + (def.spd * 0.05 + 1) * (lv-1)),
    mp:  Math.floor(15 + lv * 1.5)
  };
}

function expForNext(lvl) { return Math.floor(8 + lvl * lvl * 1.2); }

// ===================== SAVE / LOAD =====================
const SAVE_KEY = 'kurumi_pokemon_v1';
const BACKUP_KEY = 'kurumi_pokemon_v1_backup';
const SAVE_VERSION = 3;
let lastSaveToastAt = 0;

function showSaveToast(isError) {
  const now = Date.now();
  // Spam protection: skip if displayed within the last 1 sec (errors always show)
  if (!isError && now - lastSaveToastAt < 1000) return;
  lastSaveToastAt = now;
  const el = $('save-toast');
  if (!el) return;
  el.classList.toggle('warn', !!isError);
  el.innerHTML = isError ? '⚠️ セーブできませんでした' : '💾 セーブしました';
  // Restart animation
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function saveGame(silent) {
  // Don't overwrite a real save with the empty default state
  // (when user is still on the title screen and hasn't started/loaded yet)
  if (!state || !state.party || state.party.length === 0) return;
  // デモモード中は本番セーブを汚染しないためスキップ
  if (_isDemoMode) return;
  try {
    // 直前バックアップ：保存前のメインを退避（1世代だけ）
    try {
      const prev = localStorage.getItem(SAVE_KEY);
      if (prev) localStorage.setItem(BACKUP_KEY, prev);
    } catch(eBak) {
      console.warn('backup save failed:', eBak);
    }
    state.version = SAVE_VERSION;
    state.lastSavedAt = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    showSaveToast(false);
    if (!silent) showToast('💾 <ruby>保存<rt>ほぞん</rt></ruby>しました！');
  } catch(e) {
    console.warn('saveGame failed:', e);
    showSaveToast(true);
    if (!silent) showToast('<ruby>保存<rt>ほぞん</rt></ruby>に しっぱい');
  }
}

// 各モンスターの欠落フィールドを補完（本ゲームの形：lvl/exp/hp/mp/skills）
function ensureMonsterFields(m) {
  if (!m || typeof m !== 'object') return null;
  if (typeof m.id !== 'number') return null;
  if (typeof m.lvl !== 'number') m.lvl = 5;
  if (typeof m.exp !== 'number') m.exp = 0;
  if (typeof m.hp !== 'number') m.hp = 10;
  if (typeof m.mp !== 'number') m.mp = 5;
  if (!Array.isArray(m.skills) || m.skills.length === 0) m.skills = ['tail'];
  return m;
}

// 旧形式のセーブを安全に新形式へ変換
function migrateSaveData(data) {
  if (!data || typeof data !== 'object') return null;
  if (!Array.isArray(data.party)) return null; // 致命的に壊れている

  // version未設定は v1 とみなす
  if (typeof data.version !== 'number') data.version = 1;

  // 必須フィールドのデフォルト補完（v1 → v2 共通）
  if (!Array.isArray(data.box)) data.box = [];
  if (typeof data.coins !== 'number') data.coins = 0;
  if (!Array.isArray(data.cleared)) data.cleared = [];
  if (!data.bag || typeof data.bag !== 'object') data.bag = { ball: 5, potion: 3 };
  if (!Array.isArray(data.fieldMobs)) data.fieldMobs = [];
  if (typeof data.field === 'undefined') data.field = null;
  if (typeof data.curStage === 'undefined') data.curStage = null;

  // === v3: 25ステージ・ワールドマップ移行 ===
  // 旧 cleared が数値配列なら新形式へ。手持ち/ボックス/コインは温存。
  const oldNumberCleared = data.cleared.some(v => typeof v === 'number');
  if (oldNumberCleared) {
    data.cleared = [];
    data.curStage = null;
    data.fieldMobs = [];
    data.field = null;
    data.fieldChests = {};
    data.v2WorldMapShown = false;
  }
  // 不要になった旧 unlocked は保持しても害は無いが、curStage が数値ならリセット
  if (typeof data.curStage === 'number') {
    data.curStage = null;
    data.field = null;
    data.fieldMobs = [];
  }
  if (typeof data.v2WorldMapShown !== 'boolean') data.v2WorldMapShown = false;
  // 旧 unlocked プロパティは新ロジックでは未使用（互換のため残置）
  // === 宝箱・ミニマップ（v2.1で追加） 旧セーブにない場合は初期化 ===
  if (!data.fieldChests || typeof data.fieldChests !== 'object' || Array.isArray(data.fieldChests)) {
    data.fieldChests = {};
  }
  if (typeof data.minimapVisible !== 'boolean') data.minimapVisible = true;
  if (typeof data.invertDrag !== 'boolean') data.invertDrag = true;

  // ===== STUDY QUIZ migration =====
  const validStudyModes = { youchien: 1, shogakusei: 1, muzukashii: 1 };
  if (typeof data.studyMode !== 'string' || !validStudyModes[data.studyMode]) {
    data.studyMode = 'shogakusei';
  }
  if (!data.studyStats || typeof data.studyStats !== 'object') data.studyStats = { correct: 0, wrong: 0, streakBest: 0 };
  if (typeof data.studyStats.correct !== 'number') data.studyStats.correct = 0;
  if (typeof data.studyStats.wrong !== 'number') data.studyStats.wrong = 0;
  if (typeof data.studyStats.streakBest !== 'number') data.studyStats.streakBest = 0;
  if (typeof data._quizStreak !== 'number') data._quizStreak = 0;

  // モンスターのフィールド補完
  data.party = data.party.map(m => ensureMonsterFields(m)).filter(Boolean);
  data.box = data.box.map(m => ensureMonsterFields(m)).filter(Boolean);

  if (data.version < SAVE_VERSION) data.version = SAVE_VERSION;
  return data;
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return loadFromBackup();
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(eParse) {
      console.warn('loadGame parse failed, trying backup:', eParse);
      return loadFromBackup();
    }
    const migrated = migrateSaveData(parsed);
    if (!migrated) {
      console.warn('loadGame migration failed, trying backup');
      return loadFromBackup();
    }
    state = migrated;
    applyDemoMode();
    return true;
  } catch(e) {
    console.warn('loadGame failed:', e);
    return loadFromBackup();
  }
}

// バックアップから読み込み（メインが壊れた時のフォールバック）
function loadFromBackup() {
  try {
    const raw = localStorage.getItem(BACKUP_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    const migrated = migrateSaveData(parsed);
    if (!migrated) return false;
    state = migrated;
    applyDemoMode();
    console.warn('loaded from backup');
    return true;
  } catch(e) {
    console.warn('backup load failed:', e);
    return false;
  }
}

function hasSave() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}
function hasBackup() {
  try { return !!localStorage.getItem(BACKUP_KEY); } catch(e) { return false; }
}
function getSavedMeta() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj) return null;
    return { lastSavedAt: obj.lastSavedAt || null, version: obj.version || 1 };
  } catch(e) { return null; }
}

// バックアップをメインに書き戻す（バックアップは消さない）
function restoreFromBackup() {
  try {
    const raw = localStorage.getItem(BACKUP_KEY);
    if (!raw) {
      showToast('<ruby>戻<rt>もど</rt></ruby>せるセーブが ありません');
      return false;
    }
    // 軽くバリデーション
    const parsed = JSON.parse(raw);
    if (!migrateSaveData(parsed)) {
      showToast('バックアップが <ruby>壊<rt>こわ</rt></ruby>れてます');
      return false;
    }
    localStorage.setItem(SAVE_KEY, raw);
    showToast('ひとつ<ruby>前<rt>まえ</rt></ruby>のセーブに<ruby>戻<rt>もど</rt></ruby>しました！');
    updateTitleLastSave();
    return true;
  } catch(e) {
    console.warn('restoreFromBackup failed:', e);
    showToast('<ruby>戻<rt>もど</rt></ruby>すのに しっぱい');
    return false;
  }
}

// セーブをJSON文字列でクリップボードへ
function exportSaveToClipboard() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      showToast('<ruby>保存<rt>ほぞん</rt></ruby>データが ないよ');
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(raw).then(() => {
        showToast('📋 コピーしたよ！');
      }).catch(() => {
        // フォールバック：ダウンロード
        downloadSave(raw);
      });
    } else {
      downloadSave(raw);
    }
  } catch(e) {
    console.warn('export failed:', e);
    showToast('コピーに しっぱい');
  }
}
function downloadSave(raw) {
  try {
    const blob = new Blob([raw], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kurumi-pokemon-save.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('💾 ファイルに<ruby>保存<rt>ほぞん</rt></ruby>したよ');
  } catch(e) {
    showToast('<ruby>保存<rt>ほぞん</rt></ruby>に しっぱい');
  }
}

// プロンプトからセーブを読み込み
function importSaveFromPrompt() {
  try {
    const text = prompt('ほぞんデータ（JSON）を はりつけてね');
    if (!text) return;
    let parsed;
    try { parsed = JSON.parse(text); }
    catch(e) {
      showToast('JSONが おかしいよ');
      return;
    }
    const migrated = migrateSaveData(parsed);
    if (!migrated) {
      showToast('セーブの <ruby>中<rt>なか</rt></ruby>みが おかしいよ');
      return;
    }
    // 念のため：取り込み前のメインをバックアップへ退避
    try {
      const prev = localStorage.getItem(SAVE_KEY);
      if (prev) localStorage.setItem(BACKUP_KEY, prev);
    } catch(eBak) {}
    localStorage.setItem(SAVE_KEY, JSON.stringify(migrated));
    showToast('📥 <ruby>読<rt>よ</rt></ruby>みこんだよ！');
    updateTitleLastSave();
  } catch(e) {
    console.warn('import failed:', e);
    showToast('<ruby>読<rt>よ</rt></ruby>みこみに しっぱい');
  }
}
function formatSavedTime(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const M = d.getMonth() + 1;
  const D = d.getDate();
  const h = d.getHours();
  const m = ('0' + d.getMinutes()).slice(-2);
  return `<ruby>最終<rt>さいしゅう</rt></ruby>セーブ：${M}<ruby>月<rt>がつ</rt></ruby>${D}<ruby>日<rt>にち</rt></ruby> ${h}<ruby>時<rt>じ</rt></ruby>${m}<ruby>分<rt>ふん</rt></ruby>`;
}
function updateTitleLastSave() {
  const el = $('title-last-save');
  if (!el) return;
  const meta = getSavedMeta();
  if (meta && meta.lastSavedAt) {
    el.innerHTML = formatSavedTime(meta.lastSavedAt);
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

// ===================== TITLE =====================
function goTitle() {
  switchScene('title-scene');
  updateTitleLastSave();
}
function initTitle() {
  $('title-art-svg').innerHTML = svgKurumi();
  updateTitleLastSave();
  // セーブがある場合は誤タップ防止のため「はじめから」ボタンを非表示にする
  // （代わりに右下の小さい「ぜんぶ けして〜」リンクから2段確認でリセット可能）
  // デモモード(?demo=1)の時は本番セーブを汚さないので常に「はじめから」を許可
  const hasSv = !_isDemoMode && hasSave();
  const btnNew = $('btn-new');
  const btnReset = $('btn-reset-danger');
  if (btnNew) btnNew.style.display = hasSv ? 'none' : '';
  if (btnReset) btnReset.style.display = hasSv ? '' : 'none';
  attachTap(btnNew, () => {
    startNewGame();
  });
  attachTap(btnReset, (e) => {
    if (e && e.preventDefault) e.preventDefault();
    // 2段階確認：1回目「ほんとうに？」→ 2回目「ほぞんデータも きえちゃうよ。それでも？」
    showModal('ほんとうに <ruby>消<rt>け</rt></ruby>すの？', 'いままで <ruby>育<rt>そだ</rt></ruby>てた ポケモンが<br>ぜんぶ <ruby>消<rt>き</rt></ruby>えちゃうよ。', [
      { label: 'やめる', cls: 'gray' },
      { label: 'つづける', cls: '', fn: () => {
        showModal('さいごの <ruby>確認<rt>かくにん</rt></ruby>', 'これを <ruby>押<rt>お</rt></ruby>したら<br><ruby>元<rt>もと</rt></ruby>には <ruby>戻<rt>もど</rt></ruby>せないよ！<br><br>(まちがいじゃ ない？)', [
          { label: 'やっぱり やめる', cls: 'gray' },
          { label: '<ruby>消<rt>け</rt></ruby>して <ruby>新<rt>あたら</rt></ruby>しく <ruby>始<rt>はじ</rt></ruby>める', cls: '', fn: () => {
            // セーブを直前バックアップに退避してから消去（万が一に備え）
            try {
              const prev = localStorage.getItem(SAVE_KEY);
              if (prev) localStorage.setItem(BACKUP_KEY, prev);
            } catch(e2) {}
            localStorage.removeItem(SAVE_KEY);
            startNewGame();
          } }
        ]);
      } }
    ]);
  });
  attachTap($('btn-continue'), () => {
    if (loadGame()) {
      showToast('<ruby>保存<rt>ほぞん</rt></ruby>データを <ruby>読<rt>よ</rt></ruby>みこみました！');
      goStageSelect();
    } else {
      showToast('<ruby>保存<rt>ほぞん</rt></ruby>データが ないよ');
    }
  });
  // セーブ保存（クリップボードコピー / フォールバックでDL）
  const exportBtn = $('btn-save-export');
  if (exportBtn) attachTap(exportBtn, () => exportSaveToClipboard());
  // セーブ読み込み（プロンプトから貼り付け）
  const importBtn = $('btn-save-import');
  if (importBtn) attachTap(importBtn, () => importSaveFromPrompt());
  // 「ひとつ前にもどす」
  const restoreBtn = $('btn-restore-backup');
  if (restoreBtn) attachTap(restoreBtn, (e) => {
    if (e && e.preventDefault) e.preventDefault();
    restoreFromBackup();
  });
  // ドラッグ方向トグル
  const dragModeBtn = $('btn-drag-mode');
  if (dragModeBtn) {
    const refreshDragModeLabel = () => {
      const mode = (state && state.invertDrag) ? 'ひく' : 'おす';
      dragModeBtn.innerHTML = '<ruby>操作<rt>そうさ</rt></ruby>: ' + mode;
    };
    refreshDragModeLabel();
    attachTap(dragModeBtn, () => {
      if (!state) state = {};
      state.invertDrag = !state.invertDrag;
      refreshDragModeLabel();
      try { saveGame(true); } catch (e) {}
    });
    // タイトル表示時にラベル再描画（state読み込み後の状態を反映）
    window._refreshDragModeLabel = refreshDragModeLabel;
  }
  // べんきょうモード切替トグル
  const studyBtn = $('btn-study-mode');
  if (studyBtn) {
    const cycle = ['youchien', 'shogakusei', 'muzukashii'];
    const refreshStudyLabel = () => {
      const mode = (state && state.studyMode) || 'shogakusei';
      const lbl = $('study-mode-label');
      if (lbl) lbl.innerHTML = (STUDY_MODES[mode] && STUDY_MODES[mode].label) || '小学生';
    };
    refreshStudyLabel();
    attachTap(studyBtn, () => {
      if (!state) state = {};
      const cur = state.studyMode || 'shogakusei';
      const idx = cycle.indexOf(cur);
      state.studyMode = cycle[(idx + 1) % cycle.length];
      refreshStudyLabel();
      try { saveGame(true); } catch (e) {}
      try { sfxTap(); } catch (e) {}
    });
    window._refreshStudyModeLabel = refreshStudyLabel;
  }
}

function startNewGame() {
  // 新規ゲームは空partyで開始 → スターター選択へ
  // タイトルで設定された studyMode は引き継ぐ（無ければデフォルト）
  const prevStudyMode = (state && typeof state.studyMode === 'string') ? state.studyMode : 'shogakusei';
  state = {
    party: [],
    box: [],
    bag: { ball: 5, potion: 3 },
    coins: 200,
    cleared: [],
    curStage: null,
    fieldMobs: [],
    field: null,
    fieldChests: {},
    minimapVisible: true,
    invertDrag: true,
    v2WorldMapShown: true,
    studyMode: prevStudyMode,
    studyStats: { correct: 0, wrong: 0, streakBest: 0 },
    _quizStreak: 0
  };
  applyDemoMode();
  // ※ ここでは saveGame しない（party空のため saveGame ガードで保存されない & タイトル既存セーブを温存）
  goStarterSelect();
}

// ===================== STARTER SELECT =====================
const STARTER_IDS = [31, 100, 101, 102]; // ポッチョマ・トカゲー・ハートん・ピウー
const STARTER_PICK_LIMIT = 2;
let pickedStarterIds = []; // 選択順に最大2匹

function updateStarterConfirmBtn() {
  const btn = $('starter-confirm');
  const n = pickedStarterIds.length;
  if (n === 0) {
    btn.disabled = true;
    btn.innerHTML = 'あと2<ruby>匹<rt>ひき</rt></ruby><ruby>選<rt>えら</rt></ruby>んで！';
  } else if (n === 1) {
    btn.disabled = true;
    btn.innerHTML = 'あと1<ruby>匹<rt>ひき</rt></ruby><ruby>選<rt>えら</rt></ruby>んで！';
  } else {
    btn.disabled = false;
    btn.innerHTML = 'これに する！';
  }
}

function refreshStarterCardBadges() {
  document.querySelectorAll('.starter-card').forEach(c => {
    const id = parseInt(c.dataset.id, 10);
    const idx = pickedStarterIds.indexOf(id);
    const badge = c.querySelector('.pick-badge');
    if (idx >= 0) {
      c.classList.add('selected');
      if (badge) badge.textContent = (idx === 0 ? '①' : '②');
    } else {
      c.classList.remove('selected');
      if (badge) badge.textContent = '';
    }
  });
}

function goStarterSelect() {
  pickedStarterIds = [];
  switchScene('starter-scene');
  const grid = $('starter-grid');
  grid.innerHTML = '';
  STARTER_IDS.forEach(id => {
    const def = getMonsterDef(id);
    if (!def) return;
    const t = TYPES[def.type] || { name: def.type, color: '#888', dark: '#444' };
    const card = document.createElement('div');
    card.className = 'starter-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="pick-badge"></div>
      <div class="art">${svgMon(id)}</div>
      <div class="name">${def.name}</div>
      <div class="typebadge" style="background:${t.dark}">${t.name}</div>
      <div class="stats">HP${def.hp}・<ruby>攻<rt>こう</rt></ruby>${def.atk}・<ruby>防<rt>ぼう</rt></ruby>${def.def}・<ruby>速<rt>そく</rt></ruby>${def.spd}</div>
    `;
    attachTap(card, () => {
      const cardId = parseInt(card.dataset.id, 10);
      const existIdx = pickedStarterIds.indexOf(cardId);
      if (existIdx >= 0) {
        // 既に選択中 → 選択解除（トグル）
        pickedStarterIds.splice(existIdx, 1);
        sfxTap();
      } else {
        if (pickedStarterIds.length >= STARTER_PICK_LIMIT) {
          // 上限ブロック
          showToast('2<ruby>匹<rt>ひき</rt></ruby>までだよ！<ruby>選<rt>えら</rt></ruby>びなおすには<br><ruby>選<rt>えら</rt></ruby>んでるカードを もういちど タップしてね');
          return;
        }
        pickedStarterIds.push(cardId);
        sfxTap();
      }
      refreshStarterCardBadges();
      updateStarterConfirmBtn();
    });
    grid.appendChild(card);
  });
  refreshStarterCardBadges();
  updateStarterConfirmBtn();
}

function confirmStarter() {
  if (pickedStarterIds.length !== STARTER_PICK_LIMIT) return;
  const ids = pickedStarterIds.slice();
  const defs = ids.map(id => getMonsterDef(id)).filter(Boolean);
  if (defs.length !== STARTER_PICK_LIMIT) return;
  // パーティに LV5 で追加（2匹）
  state.party = ids.map(id => makeMon(id, 5));
  // 演出: 2匹を順番に中央に飛ばす + キラキラ + バナー
  sfxLevel();
  const fly = $('starter-fly');

  function flyOne(id, delay) {
    setTimeout(() => {
      fly.innerHTML = svgMon(id);
      fly.classList.remove('show');
      void fly.offsetWidth;
      fly.classList.add('show');
      const sparks = ['✨','💖','⭐','💫','🌟'];
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'starter-spark';
        s.textContent = sparks[i % sparks.length];
        const ang = (i / 12) * Math.PI * 2;
        const dist = 120 + Math.random() * 80;
        s.style.left = '50%';
        s.style.top = '50%';
        s.style.setProperty('--tx', Math.cos(ang) * dist + 'px');
        s.style.setProperty('--ty', Math.sin(ang) * dist + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1500);
      }
    }, delay);
  }
  flyOne(ids[0], 0);
  flyOne(ids[1], 900);

  setTimeout(() => {
    showToast(`💗 ${defs[0].name}と${defs[1].name}が <ruby>仲間<rt>なかま</rt></ruby>に なった！`, 1500);
  }, 1500);
  setTimeout(() => {
    fly.classList.remove('show');
    fly.innerHTML = '';
    // partyに入ったので saveGame できる
    saveGame(true);
    goStageSelect();
  }, 3100);
}

}

// 各ワールドの「巨大SVG地形」を返す。viewBox は worldW x MAP_H
function worldArtSVG(worldId, w, h) {
  if (worldId === 1) return worldArt_PinkForest(w, h);
  if (worldId === 2) return worldArt_YellowPlain(w, h);
  if (worldId === 3) return worldArt_Sky(w, h);
  if (worldId === 4) return worldArt_DeepForest(w, h);
  if (worldId === 5) return worldArt_RainbowCastle(w, h);
  return '';
}

function worldArt_PinkForest(W, H) {
  // 背景：ピンク空→草原。中央にピンクの川が流れる。桜の木と花を散らす。
  let s = `<svg class="world-art" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;
  s += MAP_SYMBOLS;
  // 空
  s += `<rect x="0" y="0" width="${W}" height="380" fill="#ffe6f2"/>`;
  s += `<rect x="0" y="380" width="${W}" height="${H-380}" fill="url(#grad-grass-pink)"/>`;
  // 遠景の丸い丘
  s += `<use href="#sym-hill" x="-40"  y="320" width="240" height="120" fill="#f4b8d4"/>`;
  s += `<use href="#sym-hill" x="160"  y="300" width="280" height="140"/>`;
  s += `<use href="#sym-hill" x="350"  y="320" width="240" height="120"/>`;
  // ピンクの川（蛇行）
  s += `<path d="M0 560 Q120 520 220 560 T440 560 T${W} 580 L${W} 640 Q400 660 220 620 Q120 600 0 620 Z"
              fill="url(#grad-river-pink)" stroke="#e070a0" stroke-width="3"/>`;
  // 草テクスチャ（小楕円）
  for (let i = 0; i < 40; i++) {
    const x = (i*47) % W, y = 460 + ((i*31)%280);
    s += `<ellipse cx="${x}" cy="${y}" rx="6" ry="2" fill="#e88abf" opacity="0.45"/>`;
  }
  // 雲
  s += `<use class="anim-cloud"  href="#sym-cloud" x="30"  y="80"  width="120" height="60"/>`;
  s += `<use class="anim-cloud2" href="#sym-cloud" x="240" y="110" width="140" height="70"/>`;
  s += `<use class="anim-cloud"  href="#sym-cloud" x="400" y="70"  width="110" height="55"/>`;
  // 桜の木（前景・大）
  s += `<use href="#sym-sakura" x="40"  y="240" width="120" height="160"/>`;
  s += `<use href="#sym-sakura" x="190" y="260" width="110" height="150"/>`;
  s += `<use href="#sym-sakura" x="340" y="230" width="130" height="170"/>`;
  // 桜の木（背景・小）
  s += `<use href="#sym-sakura" x="100" y="320" width="80"  height="110" opacity="0.85"/>`;
  s += `<use href="#sym-sakura" x="280" y="330" width="80"  height="110" opacity="0.85"/>`;
  s += `<use href="#sym-sakura" x="440" y="320" width="80"  height="110" opacity="0.85"/>`;
  // 花クラスタ
  for (let i = 0; i < 14; i++) {
    const x = 20 + (i*37) % (W-40);
    const y = 700 + ((i*17)%80);
    s += `<use class="anim-bob${i%2?'2':''}" href="#sym-sakura-flower" x="${x}" y="${y}" width="26" height="26"/>`;
  }
  // 蝶
  s += `<use class="anim-cloud"  href="#sym-butterfly" x="200" y="440" width="36" height="28"/>`;
  s += `<use class="anim-cloud2" href="#sym-butterfly" x="380" y="380" width="32" height="24"/>`;
  s += `</svg>`;
  return s;
}

function worldArt_Sky(W, H) {
  let s = `<svg class="world-art" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;

  s += `<use class="anim-bob2" href="#sym-mushroom" x="450" y="720" width="34" height="42"/>`;

function worldArt_RainbowCastle(W, H) {
  let s = `<svg class="world-art" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;

  for (let i = 0; i < 12; i++) {

  s += `<use href="#sym-castle" x="160" y="220" width="220" height="240"/>`;

  s += `<use class="anim-bob"  href="#sym-crystal" x="60"  y="560" width="36" height="54"/>`;

  // きらめき・星を多めに
  for (let i = 0; i < 16; i++) {

// バナーSVG（巻物風）
function worldBannerSVG(worldId, w) {
  const t = WORLD_THEME[worldId-1] || WORLD_THEME[0];
  const iconMap = {
    1: `<g transform="translate(22,32)"><circle cx="0" cy="-8" r="6" fill="#ffb6d8" stroke="#c0327a" stroke-width="1.2"/><circle cx="6" cy="0" r="6" fill="#ffb6d8" stroke="#c0327a" stroke-width="1.2"/><circle cx="-6" cy="0" r="6" fill="#ffb6d8" stroke="#c0327a" stroke-width="1.2"/><circle cx="3" cy="7" r="6" fill="#ffb6d8" stroke="#c0327a" stroke-width="1.2"/><circle cx="-3" cy="7" r="6" fill="#ffb6d8" stroke="#c0327a" stroke-width="1.2"/><circle cx="0" cy="0" r="3" fill="#ffe070"/></g>`,
    2: `<g transform="translate(22,32)"><circle cx="0" cy="0" r="11" fill="#fff080" stroke="#c47010" stroke-width="1.5"/><g stroke="#c47010" stroke-width="2" stroke-linecap="round"><line x1="0" y1="-16" x2="0" y2="-12"/><line x1="0" y1="12" x2="0" y2="16"/><line x1="-16" y1="0" x2="-12" y2="0"/><line x1="12" y1="0" x2="16" y2="0"/></g></g>`,
    3: `<g transform="translate(22,32)"><ellipse cx="-2" cy="0" rx="10" ry="6" fill="#fff" stroke="#3070b0" stroke-width="1.2"/><ellipse cx="6" cy="-3" rx="8" ry="5" fill="#fff" stroke="#3070b0" stroke-width="1.2"/></g>`,
    4: `<g transform="translate(22,32)"><rect x="-2" y="2" width="4" height="14" fill="#5a3818"/><circle cx="0" cy="-3" r="11" fill="#3a7a30" stroke="#1f4a18" stroke-width="1.5"/></g>`,
    5: `<g transform="translate(22,32)"><rect x="-12" y="-4" width="24" height="16" fill="#e8d8c0" stroke="#7a5a3a" stroke-width="1.2"/><polygon points="-12,-4 -6,-12 0,-4" fill="#c83060"/><polygon points="0,-4 6,-12 12,-4" fill="#c83060"/></g>`,
  };
  const icon = iconMap[worldId] || '';
  return `<svg viewBox="0 0 ${w} 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bn${worldId}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0" stop-color="#fffaf0"/><stop offset="1" stop-color="${t.light}"/>
      </linearGradient>
    </defs>
    <!-- リボンの両端の三角 -->
    <polygon points="0,32 14,8 14,56" fill="${t.deep}"/>
    <polygon points="${w},32 ${w-14},8 ${w-14},56" fill="${t.deep}"/>
    <!-- メイン巻物 -->
    <path d="M10 8 Q ${w/2} 0 ${w-10} 8 L ${w-10} 56 Q ${w/2} 64 10 56 Z"
          fill="url(#bn${worldId})" stroke="${t.banner}" stroke-width="3"/>
    <!-- アイコン -->
    ${icon}
    <!-- テキスト -->
    <text x="${w/2 + 12}" y="30" text-anchor="middle" font-family="sans-serif"
          font-size="16" font-weight="bold" fill="${t.deep}">ワールド ${worldId}</text>
    <text x="${w/2 + 12}" y="50" text-anchor="middle" font-family="sans-serif"
          font-size="13" font-weight="bold" fill="${t.deep}" opacity="0.95">〜 ${_worldNamePlain(worldId)} 〜</text>
  </svg>`;
}

// SVGの<text>にruby用タグは入れられないので、振り仮名(<rt>)を取り除いた素のテキストにする
function _worldNamePlain(worldId) {
  const w = WORLD_DEFS.find(x => x.id === worldId);
  if (!w) return '';
  return String(w.name).replace(/<rt>.*?<\/rt>/g, '').replace(/<\/?ruby>/g, '');
}

// ノードSVG: state ごとに違うアイコン
function nodeIconSVG(s, opts) {
  // opts: {cleared, current, locked, isBoss, isMidBoss}
  const sz = opts.isBoss ? 96 : opts.isMidBoss ? 84 : 76;
  let inner = '';
  if (opts.locked) {
    // 南京錠
    inner = `
      <circle cx="${sz/2}" cy="${sz/2}" r="${sz/2-6}" fill="#cfd5db" stroke="#5a6068" stroke-width="3"/>

function renderWorldMap() {
  const decor = $('map-decor');
  const nodesEl = $('map-nodes');
  const svg = $('map-paths');
  const avatar = $('map-avatar');
  if (!decor || !nodesEl || !svg || !avatar) return;

  decor.innerHTML = '';
  nodesEl.innerHTML = '';
  svg.innerHTML = '';

  const worldW = MAP_W / WORLD_DEFS.length;

  // ワールドごとの地形ベース（巨大SVG）＋ バナー
  WORLD_DEFS.forEach((w, wi) => {
    // 地形ベース：1ワールド = 1 region 内に巨大SVG
    const region = document.createElement('div');
    region.className = 'world-region region-w' + w.id;
    region.style.left = (wi * worldW) + 'px';
    region.style.width = worldW + 'px';
    region.innerHTML = worldArtSVG(w.id, worldW, MAP_H);
    decor.appendChild(region);

    // バナー（SVG巻物）
    const cx = Math.round(wi * worldW + worldW / 2);
    const banner = document.createElement('div');
    banner.className = 'world-banner';
    banner.style.left = cx + 'px';
    banner.innerHTML = worldBannerSVG(w.id, 210);
    decor.appendChild(banner);

    // ワールド境界（木の柵）
    if (wi > 0) {
      const fence = document.createElement('div');
      fence.className = 'world-fence';
      fence.style.left = (wi * worldW) + 'px';
      fence.innerHTML = worldFenceSVG();
      decor.appendChild(fence);
    }
  });

  // ゴール（5-5）城門＋旗
  const goal = STAGES.find(s => s.id === '5-5');
  if (goal) {
    const flag = document.createElement('div');
    flag.className = 'goal-flag';
    flag.style.left = goal.mapPos.x + 'px';
    flag.style.top  = (goal.mapPos.y - 40) + 'px';
    flag.innerHTML = goalCastleSVG() + '<span class="ribbon">ゴール！</span>';
    decor.appendChild(flag);
  }

  const target = getCurrentTargetStageId();

  // パスを先に描く（ノードの下）— 土色の道（外枠＋本体＋ステップ点）
  for (let i = 0; i < STAGES.length - 1; i++) {
    const a = STAGES[i], b = STAGES[i+1];
    const cleared = state.cleared.includes(a.id);
    const nextUnlocked = isStageUnlocked(b.id);
    let outer, fill, dash, width, stepDots = false;
    if (cleared && state.cleared.includes(b.id)) {
      // クリア済区間：明るい土色＋金縁
      outer = '#8a5828'; fill = '#e8b870'; dash = '0'; width = 14; stepDots = true;
    } else if (cleared || nextUnlocked) {
      // 解禁中：標準の土色
      outer = '#7a4818'; fill = '#caa070'; dash = '0'; width = 12; stepDots = true;
    } else {
      // ロック区間：薄いグレーの点線
      outer = 'rgba(120,120,120,0.5)'; fill = '#cccccc'; dash = '6 12'; width = 8;
    }
    const x1 = a.mapPos.x, y1 = a.mapPos.y;
    const x2 = b.mapPos.x, y2 = b.mapPos.y;
    const mx = (x1 + x2) / 2;
    const cy1 = y1 + (y2 - y1) * 0.2 + (i % 2 === 0 ? -40 : 40);
    const cy2 = y2 - (y2 - y1) * 0.2 + (i % 2 === 0 ? -40 : 40);
    const d = `M ${x1} ${y1} C ${mx} ${cy1}, ${mx} ${cy2}, ${x2} ${y2}`;
    // 影
    const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    shadow.setAttribute('d', `M ${x1} ${y1+4} C ${mx} ${cy1+4}, ${mx} ${cy2+4}, ${x2} ${y2+4}`);
    shadow.setAttribute('fill', 'none');
    shadow.setAttribute('stroke', 'rgba(0,0,0,0.22)');
    shadow.setAttribute('stroke-width', String(width + 4));
    shadow.setAttribute('stroke-linecap', 'round');
    svg.appendChild(shadow);
    // 外枠（道の縁）
    const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    outline.setAttribute('d', d);
    outline.setAttribute('fill', 'none');
    outline.setAttribute('stroke', outer);
    outline.setAttribute('stroke-width', String(width + 4));
    outline.setAttribute('stroke-linecap', 'round');
    if (dash !== '0') outline.setAttribute('stroke-dasharray', dash);
    svg.appendChild(outline);
    // 本体（道の中央）
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', fill);
    path.setAttribute('stroke-width', String(width));
    path.setAttribute('stroke-linecap', 'round');
    if (dash !== '0') path.setAttribute('stroke-dasharray', dash);
    svg.appendChild(path);
    // ステップ点（足跡風の点線）
    if (stepDots) {
      const dots = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      dots.setAttribute('d', d);
      dots.setAttribute('fill', 'none');
      dots.setAttribute('stroke', '#fff5e0');
      dots.setAttribute('stroke-width', '3');
      dots.setAttribute('stroke-linecap', 'round');
      dots.setAttribute('stroke-dasharray', '2 18');
      dots.setAttribute('opacity', '0.7');
      svg.appendChild(dots);
    }
  }

  // ノード（SVGアイコン）
  STAGES.forEach(s => {
    const cleared = state.cleared.includes(s.id);
    const unlocked = isStageUnlocked(s.id);
    const isCurrent = (s.id === target) && unlocked && !cleared;
    const isBoss = !!s.boss;
    const isMidBoss = !!s.midBoss;
    const div = document.createElement('button');
    div.type = 'button';
    div.className = 'map-node';
    if (cleared) div.classList.add('cleared');
    if (isCurrent) div.classList.add('current');
    if (!unlocked) div.classList.add('locked');
    if (isBoss) div.classList.add('boss');
    else if (isMidBoss) div.classList.add('midboss');
    div.style.left = s.mapPos.x + 'px';
    div.style.top  = s.mapPos.y + 'px';
    div.innerHTML = nodeIconSVG(s, {
      cleared, current: isCurrent, locked: !unlocked,
      isBoss, isMidBoss
    }) + `<span class="node-label">${s.id}</span>`;
    if (unlocked) attachTap(div, () => {
      // アバターを移動演出してから入場
      moveAvatarTo(s, () => enterStage(s));
    });
    nodesEl.appendChild(div);
  });

  // アバター（ココ）の初期位置
  const here = STAGES.find(s => s.id === target) || STAGES[0];
  avatar.innerHTML = svgKurumi();
  avatar.style.left = here.mapPos.x + 'px';
  avatar.style.top  = here.mapPos.y + 'px';

  // スクロール: アバター位置を中心に
  const wrap = $('map-area');
  if (wrap) {
    setTimeout(() => {
      const cx = here.mapPos.x - wrap.clientWidth / 2;
      wrap.scrollLeft = Math.max(0, cx);
    }, 0);
  }
}

function moveAvatarTo(stage, done) {
  const avatar = $('map-avatar');
  if (!avatar) { if (done) done(); return; }
  // ぴょんっとジャンプアニメ
  avatar.classList.remove('hopping');
  // reflowでアニメ再起動
  void avatar.offsetWidth;
  avatar.classList.add('hopping');
  avatar.style.left = stage.mapPos.x + 'px';
  avatar.style.top  = stage.mapPos.y + 'px';
  // CSS transition は 0.5s。短めに 320ms で入場へ
  setTimeout(() => {
    avatar.classList.remove('hopping');
    if (done) done();
  }, 360);
}

// ===================== FIELD (walk + encounter) =====================
// World coordinate system in pixels. Camera follows the player.
const WORLD_W = 1600;  // wide
const WORLD_H = 2200;  // tall
const PLAYER_SIZE = 44;
const MOB_SIZE = 56;
const BOSS_SIZE = 92;
const PLAYER_SPEED = 2.8; // px / frame ≈ 168 px/sec at 60fps

// SVG image cache so we don't re-parse SVG every frame.
const svgImgCache = {};
function getSvgImg(key, svgStr) {
  if (svgImgCache[key]) return svgImgCache[key];
  const img = new Image();
  // Encode SVG as data URI
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  svgImgCache[key] = img;
  return img;
}
function getMonImg(id) {
  return getSvgImg('mon_' + id, svgMon(id));
}
function getKurumiImg() {
  return getSvgImg('kurumi', svgKurumi());
}

let fieldLoop = null;
let fieldKeys = { up:false, down:false, left:false, right:false };
let fieldRunning = false;
let fieldAutoSaveTimer = null;

function enterStage(stage) {
  if (!stage || !stage.id) {
    console.error('[enterStage] invalid stage:', stage);
    return;
  }
  console.log('[enterStage] entering', stage.id, stage.name);
  state.curStage = stage.id;
  $('field-stage-name').innerHTML = stage.name;
  $('field-coins').textContent = state.coins;
  document.body.style.background = stage.bg;
  generateFieldMobs(stage);
  ensureFieldChests(stage);
  // Place player at top-center of the world
  state.field = {
    px: WORLD_W / 2,
    py: 80,
    dir: 'down',
    walkPhase: 0,
    walking: false,
    bgKey: stage.bg
  };
  switchScene('field-scene');
  applyMinimapVisibility();
  saveGame(true);
  startFieldLoop();
}

function generateFieldMobs(stage) {
  state.fieldMobs = [];
  const count = stage.mobCount || 8;
  // grid 3 x ceil(count/3) に分散配置（既存ロジックを流用）
  const cols = 3;
  const rows = Math.max(1, Math.ceil(count / cols));
  const cellW = WORLD_W / cols;
  const cellH = (WORLD_H - 400) / rows;
  for (let i = 0; i < count; i++) {
    const id = pick(stage.mobs);
    const lvl = rand(stage.lvl[0], stage.lvl[1]);
    const col = i % cols, row = Math.floor(i / cols);
    const cx = col * cellW + 60 + Math.random() * (cellW - 120);
    const cy = 260 + row * cellH + Math.random() * (cellH - 80);
    state.fieldMobs.push({
      id, lvl,
      x: cx, y: cy,
      defeated: false,
      isBoss: false,
      dx: (Math.random() - 0.5) * 0.8,
      dy: (Math.random() - 0.5) * 0.8,
      wanderTimer: rand(40, 120)
    });
  }
  // 中ボス（N-3）：見た目は isBoss:true で大きく出すが、isMidBoss でクリア判定を分離
  if (stage.midBoss) {
    state.fieldMobs.push({
      id: stage.midBoss.id, lvl: stage.midBoss.lvl,
      x: WORLD_W / 2, y: WORLD_H - 140,
      defeated: false,
      isBoss: true,
      isMidBoss: true,
      dx: 0, dy: 0,
      wanderTimer: 0
    });
  }
  // ワールドボス（N-5）
  if (stage.boss) {
    state.fieldMobs.push({
      id: stage.boss.id, lvl: stage.boss.lvl,
      x: WORLD_W / 2, y: WORLD_H - 140,
      defeated: false,
      isBoss: true,
      dx: 0, dy: 0,
      wanderTimer: 0
    });
  }

  // ===== STUDY: 📚 べんきょうモンスター（5%でステージに1体） =====
  if (Math.random() < 0.05) {
    const sx = 100 + Math.random() * (WORLD_W - 200);
    const sy = 280 + Math.random() * (WORLD_H - 500);
    state.fieldMobs.push({
      id: -1,                  // sentinel: study mob, no monster
      lvl: 1,
      isStudyMob: true,
      x: sx, y: sy,
      defeated: false,
      isBoss: false,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      wanderTimer: rand(40, 120)
    });
  }

  // ===== 隠しキャラ「とーとん」スポーン処理 =====
  // 対応ステージで 1.5% / デモ50% で1体スポーン
  const totonRate = _isDemoMode ? 0.5 : 0.015;
  // 通常とーとん（id:99）: 5-4
  if (stage.id === '5-4' && Math.random() < totonRate) {
    const tx = 100 + Math.random() * (WORLD_W - 200);
    const ty = 320 + Math.random() * (WORLD_H - 500);
    state.fieldMobs.push({
      id: 99,
      lvl: rand(stage.lvl[0], stage.lvl[1]),
      x: tx, y: ty,
      defeated: false,
      isBoss: false,
      isToton: true,
      dx: (Math.random() - 0.5) * 0.6,
      dy: (Math.random() - 0.5) * 0.6,
      wanderTimer: rand(40, 120)
    });
  }
  // 雷とーとん（id:96）: 2-4
  if (stage.id === '2-4' && Math.random() < totonRate) {
    spawnLegendaryToton(96, stage);
  }
  // 炎とーとん（id:97）: 3-4
  if (stage.id === '3-4' && Math.random() < totonRate) {
    spawnLegendaryToton(97, stage);
  }
  // 氷とーとん（id:98）: 4-4
  if (stage.id === '4-4' && Math.random() < totonRate) {
    spawnLegendaryToton(98, stage);
  }
}

let _terastalTapCount = 0;
let _terastalTapTimer = null;

function tryTerastalSpawn() {
  const haveCaught = id => state.party.some(m => m.id === id) || state.box.some(m => m.id === id);
  const ids = [99, 96, 97, 98];
  if (!ids.every(haveCaught)) return; // 静かに失敗（ヒントを与えない）
  const top4 = state.party.slice(0, 4).map(m => m.id).sort();
  const want = ids.slice().sort();
  if (top4.length < 4 || top4.join(',') !== want.join(',')) return;
  if (state.fieldMobs.some(m => m.id === 95 && !m.defeated)) return;

  const stage = STAGES.find(s => s.id === '5-5') || STAGES.find(s => s.worldId === 5);
  spawnLegendaryToton(95, stage, { lvl: 1, godTier: true });
  showToast('!? せかいが <ruby>揺<rt>ゆ</rt></ruby>れている…');
  if (typeof sfxLevel === 'function') sfxLevel();
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:radial-gradient(circle, #fff 0%, #ff00ff 50%, transparent 100%);z-index:9000;pointer-events:none;animation:terastalFlash 1.2s forwards;';
  document.body.appendChild(flash);
  if (!document.getElementById('terastalStyle')) {
    const st = document.createElement('style');
    st.id = 'terastalStyle';
    st.textContent = '@keyframes terastalFlash{0%{opacity:0}30%{opacity:0.85}100%{opacity:0}}';
    document.head.appendChild(st);
  }
  setTimeout(() => flash.remove(), 1300);
}

// ===================== FIELD CHESTS =====================
const CHEST_SIZE = 36; // ワールド上のヒットボックス基準
// 中身抽選（合計100% にしたいが指定通り 40+25+15+10+5+3+2 = 100）
const CHEST_LOOT_TABLE = [
  { type:'coins',  amount:[50,200], weight:40 },
  { type:'item', key:'xpcandy-s',  weight:25 },
  { type:'item', key:'xpcandy-m',  weight:15 },
  { type:'item', key:'xpcandy-l',  weight:10 },
  { type:'item', key:'evostone',   weight:5  },
  { type:'item', key:'wondercandy',weight:3  },
  { type:'item', key:'ball',       weight:2, count:5 }
];

function rollChestLoot() {
  const total = CHEST_LOOT_TABLE.reduce((s,r) => s + r.weight, 0);
  let r = Math.random() * total;
  for (let i = 0; i < CHEST_LOOT_TABLE.length; i++) {
    r -= CHEST_LOOT_TABLE[i].weight;
    if (r <= 0) {
      const e = CHEST_LOOT_TABLE[i];
      if (e.type === 'coins') {
        return { type:'coins', amount: rand(e.amount[0], e.amount[1]) };
      }
      return { type:'item', key: e.key, count: e.count || 1 };
    }
  }
  // フォールバック
  return { type:'coins', amount: 50 };
}

// 既存の宝箱データがあれば復元、なければ新規生成
function ensureFieldChests(stage) {
  if (!state.fieldChests || typeof state.fieldChests !== 'object' || Array.isArray(state.fieldChests)) {
    state.fieldChests = {};
  }
  const sid = String(stage.id);
  const existing = state.fieldChests[sid];
  if (Array.isArray(existing) && existing.length > 0) return; // 既に生成済み（取得済みフラグも保持）
  // 新規生成: 3〜5個。ボス（画面下方）から離れたエリアに偏らせる
  const count = rand(3, 5);
  const list = [];
  // ボス座標
  const bossX = WORLD_W / 2;
  const bossY = WORLD_H - 140;
  let attempts = 0;
  while (list.length < count && attempts < 200) {
    attempts++;
    // 上方〜中央エリアを優先（ボスから離す）
    const cx = 80 + Math.random() * (WORLD_W - 160);
    // y は 200〜(WORLD_H - 350) 範囲 = ボスから最低 ~210px 離れる
    const cy = 200 + Math.random() * (WORLD_H - 550);
    // ボスから 280px 以上離す
    if (Math.hypot(cx - bossX, cy - bossY) < 280) continue;
    // 既存モブから 60px 以上離す
    let tooClose = false;
    for (const m of state.fieldMobs) {
      if (Math.hypot(cx - m.x, cy - m.y) < 60) { tooClose = true; break; }
    }
    if (tooClose) continue;
    // 他の宝箱と 80px 以上離す
    for (const c of list) {
      if (Math.hypot(cx - c.x, cy - c.y) < 80) { tooClose = true; break; }
    }
    if (tooClose) continue;
    list.push({ x: cx, y: cy, opened: false, item: rollChestLoot() });
  }
  state.fieldChests[sid] = list;
}

// ===================== MINIMAP =====================
function applyMinimapVisibility() {
  const wrap = document.getElementById('minimap-wrap');
  const btn  = document.getElementById('minimap-toggle');
  if (!wrap || !btn) return;
  if (state.minimapVisible) {
    wrap.classList.remove('hidden');
    btn.textContent = '×';
  } else {
    wrap.classList.add('hidden');
    btn.textContent = '🗺';
  }
}

let _minimapSized = false;
function drawMinimap() {
  const cv = document.getElementById('minimap-canvas');
  if (!cv) return;
  const f = state.field;
  if (!f) return;
  const cssW = cv.clientWidth || 100;
  const cssH = cv.clientHeight || 140;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (!_minimapSized || cv.width !== cssW * dpr || cv.height !== cssH * dpr) {
    cv.width = cssW * dpr; cv.height = cssH * dpr;
    _minimapSized = true;
  }
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);
  const sx = cssW / WORLD_W;
  const sy = cssH / WORLD_H;
  // mobs
  state.fieldMobs.forEach(m => {
    if (m.defeated) return;
    const mx = m.x * sx, my = m.y * sy;
    if (m.isToton) {
      // とーとん系は ★ で表示（モンスター固有色、伝説は大きめ・グロー付き）
      const def = getMonsterDef(m.id);
      const isGod = !!m.isGodToton;
      const isLegend = !!m.isLegendaryToton;
      const star = isGod ? '✨' : '★';
      const size = isGod ? 13 : (isLegend ? 11 : 9);
      ctx.save();
      if (isGod || isLegend) {
        ctx.shadowColor = (def && def.color) ? def.color : '#ffd040';
        ctx.shadowBlur = 6;
      }
      ctx.fillStyle = (def && def.color) ? def.color : '#ffd040';
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(star, mx, my);
      ctx.restore();
    } else if (m.isStudyMob) {
      ctx.fillStyle = '#5cb8f5';
      ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI * 2); ctx.fill();
    } else if (m.isBoss) {
      ctx.fillStyle = '#ff3030';
      ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#ff8fc0';
      ctx.beginPath(); ctx.arc(mx, my, 2, 0, Math.PI * 2); ctx.fill();
    }
  });
  // chests (closed only)
  const chestList = (state.fieldChests && state.curStage != null) ? state.fieldChests[String(state.curStage)] : null;
  if (Array.isArray(chestList)) {
    ctx.fillStyle = '#ffd54a';
    chestList.forEach(c => {
      if (c.opened) return;
      ctx.fillRect(c.x * sx - 2, c.y * sy - 2, 4, 4);
    });
  }
  // player on top
  ctx.fillStyle = '#3070ff';
  ctx.beginPath(); ctx.arc(f.px * sx, f.py * sy, 3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// 宝箱を開ける（拾得処理＋演出＋セーブ）
function openFieldChest(c) {
  if (!c || c.opened) return;
  c.opened = true;
  let burstHTML = '';
  let toastMsg  = '';
  if (c.item && c.item.type === 'coins') {
    const amt = c.item.amount || 0;
    state.coins += amt;
    const coinsEl = $('field-coins');
    if (coinsEl) coinsEl.textContent = state.coins;
    burstHTML = `💰 +${amt}`;
    toastMsg  = `<ruby>宝箱<rt>たからばこ</rt></ruby>！💰${amt}コイン`;
  } else if (c.item && c.item.type === 'item') {
    const key = c.item.key;
    const cnt = c.item.count || 1;
    state.bag[key] = (state.bag[key] || 0) + cnt;
    const def = ITEMS[key];
    const icon = def ? def.icon : '🎁';
    const nm   = def ? def.name : key;
    burstHTML = `${icon} ${nm}${cnt > 1 ? ' ×' + cnt : ''}`;
    // toast はrubyを除去した平文にしておく
    const plainName = nm.replace(/<[^>]+>/g, '');
    toastMsg = `<ruby>宝箱<rt>たからばこ</rt></ruby>！${icon}${plainName}${cnt > 1 ? ' ×' + cnt : ''}`;
  }
  // burst element at chest's screen position（drawField が直前に走っているのでカメラを再計算して使う）
  const fieldArea = document.getElementById('field-area');
  const cv = $('field-canvas');
  if (fieldArea && cv && state.field) {
    const cw = cv.clientWidth, ch = cv.clientHeight;
    let camX = state.field.px - cw / 2;
    let camY = state.field.py - ch / 2;
    camX = clamp(camX, 0, Math.max(0, WORLD_W - cw));
    camY = clamp(camY, 0, Math.max(0, WORLD_H - ch));
    const sx = c.x - camX, sy = c.y - camY;
    const el = document.createElement('div');
    el.className = 'chest-burst';
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    el.innerHTML = burstHTML;
    fieldArea.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 1000);
  }
  if (toastMsg) showToast(toastMsg, 1600);
  if (typeof sfxLevel === 'function') sfxLevel();
  else if (typeof sfxCatch === 'function') sfxCatch();
  else if (typeof sfxCrit === 'function') sfxCrit();
  saveGame(true);
}

// === Canvas drawing ===
function drawField() {
  try {
  const cv = $('field-canvas');
  const f = state.field;
  if (!cv || !f) {
    if (!f) console.warn('[drawField] state.field is null — skip frame');
    return;
  }
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let cw = cv.clientWidth, ch = cv.clientHeight;
  // iOS Safari等でCSSフレックスが効かずcanvasのclientサイズが0のまま
  // 戻ってくることがあるので、親要素のboundingRectから手動でpxを書き込む。
  // それでも0なら viewport から推定（ヘッダ+フッタ約140pxを引く）。
  if (cw === 0 || ch === 0) {
    const parent = cv.parentElement;
    const pr = parent ? parent.getBoundingClientRect() : { width: 0, height: 0 };
    const ww = window.innerWidth || 360;
    const wh = window.innerHeight || 640;
    cw = Math.round(pr.width  || (ww - 4));
    ch = Math.round(pr.height || (wh - 140));
    if (cw < 50) cw = Math.max(320, ww - 4);
    if (ch < 50) ch = Math.max(400, wh - 140);
    cv.style.width  = cw + 'px';
    cv.style.height = ch + 'px';
  }
  if (cv.width !== cw * dpr || cv.height !== ch * dpr) {
    cv.width = cw * dpr; cv.height = ch * dpr;
  }
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cw, ch);

  // camera follows player
  let camX = f.px - cw / 2;
  let camY = f.py - ch / 2;
  camX = clamp(camX, 0, Math.max(0, WORLD_W - cw));
  camY = clamp(camY, 0, Math.max(0, WORLD_H - ch));
  f._camX = camX; f._camY = camY;

  // ---- background ----
  // Soft pastel field with some grass tufts
  const stage = STAGES.find(s => s.id === state.curStage);
  // Base gradient
  const grd = ctx.createLinearGradient(0, 0, 0, ch);
  grd.addColorStop(0, '#ffe6f5');
  grd.addColorStop(0.6, '#d6f0ff');
  grd.addColorStop(1, '#c0e8c0');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, cw, ch);

  // Soft grid tufts (use a deterministic pattern)
  ctx.save();
  for (let gx = -((camX) % 80); gx < cw; gx += 80) {
    for (let gy = -((camY) % 80); gy < ch; gy += 80) {
      const wx = Math.floor((gx + camX) / 80);
      const wy = Math.floor((gy + camY) / 80);
      const seed = ((wx * 73856093) ^ (wy * 19349663)) >>> 0;
      const r = (seed % 100) / 100;
      if (r < 0.3) {
        ctx.fillStyle = 'rgba(120,200,120,0.35)';
        ctx.beginPath();
        ctx.ellipse(gx + 40, gy + 50, 9, 4, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (r < 0.45) {
        ctx.fillStyle = 'rgba(255,200,230,0.5)';
        ctx.beginPath();
        ctx.arc(gx + 30, gy + 30, 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (r < 0.55) {
        ctx.fillStyle = 'rgba(255,230,140,0.5)';
        ctx.beginPath();
        ctx.arc(gx + 60, gy + 60, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.restore();

  // World border indicator (subtle)
  ctx.strokeStyle = 'rgba(214,51,132,0.25)';
  ctx.lineWidth = 4;
  ctx.strokeRect(-camX, -camY, WORLD_W, WORLD_H);

  // ---- Chests ----
  const chestList = (state.fieldChests && state.curStage != null) ? state.fieldChests[String(state.curStage)] : null;
  if (Array.isArray(chestList)) {
    const t = (typeof performance !== 'undefined') ? performance.now() : Date.now();
    chestList.forEach(c => {
      if (c.opened) return;
      const sx = c.x - camX, sy = c.y - camY;
      const size = 40;
      if (sx + size < -20 || sx - size > cw + 20 || sy + size < -20 || sy - size > ch + 20) return;
      // 影
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + size * 0.42, size * 0.4, size * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
      // ぴょこぴょこ動く
      const bob = Math.sin(t / 320 + (c.x + c.y) * 0.01) * 2;
      // 金色グロー
      ctx.save();
      const glow = 0.4 + 0.25 * Math.sin(t / 260);
      ctx.fillStyle = `rgba(255,215,0,${glow * 0.35})`;
      ctx.beginPath();
      ctx.arc(sx, sy + bob, size * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // 宝箱本体
      const cimg = getChestImg(false);
      if (cimg && cimg.complete && cimg.naturalWidth) {
        ctx.drawImage(cimg, sx - size / 2, sy - size / 2 + bob, size, size);
      } else {
        // フォールバック: 茶色四角
        ctx.fillStyle = '#a06840';
        ctx.fillRect(sx - size / 2, sy - size / 4 + bob, size, size * 0.6);
        ctx.fillStyle = '#ffd54a';
        ctx.fillRect(sx - 4, sy - size / 4 + bob, 8, size * 0.6);
      }
      // キラキラ
      const sparkPhase = (t / 600) % 1;
      ctx.save();
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = `rgba(255,255,150,${1 - sparkPhase})`;
      ctx.fillText('✨', sx + size * 0.35, sy - size * 0.25 - sparkPhase * 8 + bob);
      ctx.restore();
    });
  }

  // ---- Mobs ----
  state.fieldMobs.forEach(m => {
    if (m.defeated) return;
    const sx = m.x - camX, sy = m.y - camY;
    const size = m.isBoss ? BOSS_SIZE : MOB_SIZE;
    // off-screen culling
    if (sx + size < -20 || sx - size > cw + 20 || sy + size < -20 || sy - size > ch + 20) return;
    // ===== STUDY: 📚 べんきょうモンスター描画 =====
    if (m.isStudyMob) {
      const t = (typeof performance !== 'undefined') ? performance.now() : Date.now();
      const pulse = 1 + 0.1 * Math.sin(t / 220);
      const bob = Math.sin(t / 320 + (m.x + m.y) * 0.01) * 3;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + size * 0.4, size * 0.4, size * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
      // soft glow
      ctx.save();
      const glow = 0.35 + 0.2 * Math.sin(t / 260);
      ctx.fillStyle = `rgba(120,200,255,${glow * 0.4})`;
      ctx.beginPath();
      ctx.arc(sx, sy + bob, size * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // 📚 emoji
      ctx.save();
      ctx.font = 'bold ' + Math.floor(size * 0.85 * pulse) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('📚', sx, sy + bob);
      ctx.restore();
      // sparkle
      const sparkPhase = (t / 600) % 1;
      ctx.save();
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = `rgba(150,220,255,${1 - sparkPhase})`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('✨', sx + size * 0.35, sy - size * 0.25 - sparkPhase * 8 + bob);
      ctx.restore();
      return;
    }
    // Boss: golden ring
    if (m.isBoss) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,215,0,0.35)';
      ctx.beginPath(); ctx.arc(sx, sy, size * 0.85, 0, Math.PI * 2); ctx.fill();
      ctx.lineWidth = 5;
      ctx.strokeStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(sx, sy, size * 0.65, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    } else {
      // simple shadow disc
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + size * 0.4, size * 0.45, size * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // mob art
    const img = getMonImg(m.id);
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, sx - size / 2, sy - size / 2, size, size);
    } else {
      ctx.fillStyle = '#ffb0d8';
      ctx.beginPath(); ctx.arc(sx, sy, size / 2, 0, Math.PI * 2); ctx.fill();
    }
    // level badge
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#ff4090';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    const lt = 'Lv' + m.lvl;
    const tw = ctx.measureText(lt).width;
    const lx = sx + size * 0.4 - tw / 2;
    const ly = sy + size * 0.5;
    ctx.strokeText(lt, lx, ly);
    ctx.fillText(lt, lx, ly);
  });

  // ---- Player (kurumi) ----
  const psx = f.px - camX, psy = f.py - camY;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(psx, psy + PLAYER_SIZE * 0.45, PLAYER_SIZE * 0.4, PLAYER_SIZE * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  // walk bob
  const bob = f.walking ? Math.sin(f.walkPhase / 6) * 2 : 0;
  // direction tilt
  let rot = 0;
  if (f.dir === 'left') rot = -0.1;
  else if (f.dir === 'right') rot = 0.1;
  ctx.save();
  ctx.translate(psx, psy + bob);
  if (f.dir === 'left') ctx.scale(-1, 1);
  ctx.rotate(rot);
  const kImg = getKurumiImg();
  const ks = PLAYER_SIZE;
  if (kImg && kImg.complete && kImg.naturalWidth) {
    ctx.drawImage(kImg, -ks / 2, -ks / 2, ks, ks);
  } else {
    ctx.fillStyle = '#ffb0d8';
    ctx.beginPath(); ctx.arc(0, 0, ks / 2, 0, Math.PI * 2); ctx.fill();
  }
  // tiny feet (bob)
  ctx.fillStyle = '#d63384';
  const footY = ks / 2 - 2;
  const footOff = (Math.sin(f.walkPhase / 5) * (f.walking ? 4 : 0));
  ctx.beginPath(); ctx.ellipse(-6, footY + footOff, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, footY - footOff, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Minimap overlay
  if (state.minimapVisible) drawMinimap();
  } catch (err) {
    console.error('[drawField] threw:', err);
  }
}

function updateField() {
  const f = state.field;
  if (!f) return;
  // input -> velocity
  let vx = 0, vy = 0;
  if (fieldKeys.left)  vx -= 1;
  if (fieldKeys.right) vx += 1;
  if (fieldKeys.up)    vy -= 1;
  if (fieldKeys.down)  vy += 1;
  if (vx !== 0 && vy !== 0) { vx *= 0.7071; vy *= 0.7071; }
  const moving = (vx !== 0 || vy !== 0);
  if (moving) {
    f.px = clamp(f.px + vx * PLAYER_SPEED, 24, WORLD_W - 24);
    f.py = clamp(f.py + vy * PLAYER_SPEED, 24, WORLD_H - 24);
    // direction by dominant axis
    if (Math.abs(vx) > Math.abs(vy)) f.dir = vx < 0 ? 'left' : 'right';
    else f.dir = vy < 0 ? 'up' : 'down';
    f.walkPhase = (f.walkPhase + 1) % 6000;
    f.walking = true;
  } else if (!f._dragWalking) {
    // キーボードもドラッグも動いてないとき（ドラッグ側はwindowスコープのフラグで通知）
    f.walking = false;
  }
  // ドラッグ側のwalkingフラグはこのフレームの最後にリセット（次フレームのドラッグmoveで再セット）
  f._dragWalking = false;

  // chest pickup check（モブよりも先に：宝箱はぶつかってもバトルにならないため）
  const chestList = (state.fieldChests && state.curStage != null) ? state.fieldChests[String(state.curStage)] : null;
  if (Array.isArray(chestList)) {
    for (let ci = 0; ci < chestList.length; ci++) {
      const c = chestList[ci];
      if (c.opened) continue;
      if (Math.hypot(f.px - c.x, f.py - c.y) < 36) {
        openFieldChest(c);
      }
    }
  }

  // mob wandering + encounter check
  const pBox = { x: f.px - PLAYER_SIZE * 0.35, y: f.py - PLAYER_SIZE * 0.35, w: PLAYER_SIZE * 0.7, h: PLAYER_SIZE * 0.7 };
  for (let i = 0; i < state.fieldMobs.length; i++) {
    const m = state.fieldMobs[i];
    if (m.defeated) continue;
    if (!m.isBoss) {
      m.wanderTimer--;
      if (m.wanderTimer <= 0) {
        m.dx = (Math.random() - 0.5) * 1.2;
        m.dy = (Math.random() - 0.5) * 1.2;
        m.wanderTimer = rand(40, 140);
      }
      m.x = clamp(m.x + m.dx, 30, WORLD_W - 30);
      m.y = clamp(m.y + m.dy, 220, WORLD_H - 60);
    }
    const sz = m.isBoss ? BOSS_SIZE : MOB_SIZE;
    const mBox = { x: m.x - sz * 0.35, y: m.y - sz * 0.35, w: sz * 0.7, h: sz * 0.7 };
    if (rectsOverlap(pBox, mBox)) {
      triggerEncounter(m, i);
      return;
    }
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function triggerEncounter(fieldMob, idx) {
  if (!fieldRunning) return;
  fieldRunning = false; // freeze field
  // Mark spot to step back to after battle
  if (state.field) {
    const f = state.field;
    // step away from mob a bit
    const dx = f.px - fieldMob.x, dy = f.py - fieldMob.y;
    const len = Math.hypot(dx, dy) || 1;
    state.field.lastSafePx = clamp(fieldMob.x + (dx / len) * 80, 24, WORLD_W - 24);
    state.field.lastSafePy = clamp(fieldMob.y + (dy / len) * 80, 24, WORLD_H - 24);
  }
  // ===== STUDY: 📚 べんきょうモンスター =====
  if (fieldMob.isStudyMob) {
    showQuiz({
      context: '📚 べんきょうモンスター！クイズに <ruby>正解<rt>せいかい</rt></ruby>すると、ごほうび GET！',
      mandatory: false,
      mode: state.studyMode,
      onCorrect: () => {
        const c = 200 + rand(0, 300);
        state.coins += c;
        const items = ['xpcandy-s','xpcandy-m','potion','hipotion'];
        const item = pick(items);
        if (!state.bag) state.bag = {};
        state.bag[item] = (state.bag[item] || 0) + 1;
        showToast('💰+' + c + 'コイン！ ' + ITEMS[item].name + 'を 1こ <ruby>手<rt>て</rt></ruby>に <ruby>入<rt>い</rt></ruby>れた！', 2200);
        fieldMob.defeated = true;
        try { saveGame(true); } catch(e) {}
        // フィールドに戻ってループ再開
        try { startFieldLoop(); } catch(e) { fieldRunning = true; }
      },
      onWrong: () => {
        showToast('べんきょうモンスターは <ruby>逃<rt>に</rt></ruby>げた！');
        fieldMob.defeated = true;
        try { startFieldLoop(); } catch(e) { fieldRunning = true; }
      },
      onSkip: () => {
        // close, keep mob (player can come back later)
        try { startFieldLoop(); } catch(e) { fieldRunning = true; }
      }
    });
    return;
  }
  // ===== STUDY: ボス・中ボス前のクイズゲート =====
  if ((fieldMob.isBoss === true || fieldMob.isMidBoss === true) && !fieldMob.isToton) {
    const isWB = fieldMob.isBoss && !fieldMob.isMidBoss;
    showQuiz({
      context: isWB ? 'ワールドボスとの <ruby>戦<rt>たたか</rt></ruby>い！<br>クイズに <ruby>正解<rt>せいかい</rt></ruby>して すすもう！'
                    : '<ruby>中<rt>ちゅう</rt></ruby>ボスとの <ruby>戦<rt>たたか</rt></ruby>い！<br>クイズに <ruby>正解<rt>せいかい</rt></ruby>して すすもう！',
      mandatory: true,
      mode: state.studyMode,
      onCorrect: () => {
        // 正解 → 通常エンカウント演出を経て startBattle へ
        const fieldArea = document.querySelector('#field-scene #field-area');
        $('encounter-mark').classList.add('show');
        if (fieldArea) fieldArea.classList.add('shake');
        sfxCrit();
        setTimeout(() => {
          $('encounter-mark').classList.remove('show');
          if (fieldArea) fieldArea.classList.remove('shake');
          stopFieldLoop();
          startBattle(fieldMob, idx);
        }, 700);
      }
    });
    return;
  }
  // ===== とーとん 専用エンカウント演出（暗転＋!?＋テキスト） =====
  if (fieldMob.isToton) {
    triggerTotonEncounter(fieldMob, idx);
    return;
  }
  // visuals
  const fieldArea = document.querySelector('#field-scene #field-area');
  $('encounter-mark').classList.add('show');
  if (fieldArea) fieldArea.classList.add('shake');
  sfxCrit();
  setTimeout(() => {
    $('encounter-mark').classList.remove('show');
    if (fieldArea) fieldArea.classList.remove('shake');
    stopFieldLoop();
    startBattle(fieldMob, idx);
  }, 700);
}

function startFieldLoop() {
  fieldRunning = true;
  if (fieldLoop) cancelAnimationFrame(fieldLoop);
  // Force one paint to ensure scene is laid out before reading sizes
  const tick = () => {
    if (!fieldRunning) return;
    try { updateField(); } catch (e) { console.error('[updateField] threw:', e); }
    drawField();
    fieldLoop = requestAnimationFrame(tick);
  };
  // 2 rAF defers + force layout via offsetHeight to ensure canvas has size
  requestAnimationFrame(() => {
    const cv = document.getElementById('field-canvas');
    if (cv) void cv.offsetHeight; // force layout
    requestAnimationFrame(() => {
      if (fieldRunning) fieldLoop = requestAnimationFrame(tick);
    });
  });
  // Auto-save every 5 seconds while exploring the field
  if (fieldAutoSaveTimer) clearInterval(fieldAutoSaveTimer);
  fieldAutoSaveTimer = setInterval(() => {
    if (fieldRunning) saveGame(true);
  }, 5000);
}

function stopFieldLoop() {
  fieldRunning = false;
  if (fieldLoop) cancelAnimationFrame(fieldLoop);
  fieldLoop = null;
  if (fieldAutoSaveTimer) { clearInterval(fieldAutoSaveTimer); fieldAutoSaveTimer = null; }
  // release any held keys
  fieldKeys.up = fieldKeys.down = fieldKeys.left = fieldKeys.right = false;
  // ドラッグ操作は fieldRunning フラグで自動停止される（dragMoveHandler内でチェック）
}

let battle = null; // { foe:{def, lvl, hp, hpMax, mp, skills}, my:..., turn, ended, fieldIdx }

function activeMon() {
  return state.party.find(m => m.hp > 0);
}

function startBattle(fieldMob, idx) {
  // 安全網：エンカウント時の「!」マークから戦闘画面に進めず固まるバグを防止
  try {
    if (!activeMon()) {
      showToast('<ruby>戦<rt>たたか</rt></ruby>える モンスターが いないよ！<br><ruby>回復<rt>かいふく</rt></ruby>してね');
      return;
    }
    const foe = makeMon(fieldMob.id, fieldMob.lvl);
    const foeStats = monStats(foe);
    battle = {
      foe: { mon: foe, def: getMonsterDef(foe.id), stats: foeStats, hpMax: foeStats.hp },
      me: { mon: activeMon() },
      fieldIdx: idx,
      isBoss: fieldMob.isBoss,
      isToton: !!fieldMob.isToton || foe.id === 99,
      turn: 'me',
      ended: false,
      confused: false  // 自分の次ターン技外し用
    };
    battle.foe.mon.hp = foeStats.hp;
    refreshBattleUI();
    if (battle.isToton) {
      const fid = battle.foe.mon.id;
      if (fid === 96)      setBattleMessage('⚡ <ruby>雷<rt>かみなり</rt></ruby>とーとん が <ruby>現<rt>あらわ</rt></ruby>れた！');
      else if (fid === 97) setBattleMessage('🔥 <ruby>炎<rt>ほのお</rt></ruby>とーとん が <ruby>現<rt>あらわ</rt></ruby>れた！');
      else if (fid === 98) setBattleMessage('❄️ <ruby>氷<rt>こおり</rt></ruby>とーとん が <ruby>現<rt>あらわ</rt></ruby>れた！');
      else if (fid === 95) setBattleMessage('!? テラスタルとーとんキョダイマックス…！？<br>せかいの あいだから <ruby>現<rt>あらわ</rt></ruby>れた！');
      else                 setBattleMessage('まさかの <ruby>人間<rt>にんげん</rt></ruby> 「とーとん」 が <ruby>現<rt>あらわ</rt></ruby>れた！');
    } else {
      setBattleMessage('やせいの ' + (battle.foe.def.name) + ' が <ruby>現<rt>あらわ</rt></ruby>れた！');
    }
    switchScene('battle-scene');
    setTurnUI('me');
    showCommands();
  } catch (err) {
    console.error('[startBattle]', err);
    showToast('<ruby>戦闘<rt>せんとう</rt></ruby>の じゅんびに しっぱい… フィールドに <ruby>戻<rt>もど</rt></ruby>るね');
    // フィールドに戻して、ループを再開（フリーズ回避）
    try { switchScene('field-scene'); } catch(e) {}
    try { fieldRunning = true; if (typeof startFieldLoop === 'function') startFieldLoop(); } catch(e) {}
  }
}

function refreshBattleUI() {
  // 安全網：ここで例外を出すと doMyAttack が止まり戦闘が固まる。
  try {
    // foe (% only, lighter info)
    const f = battle.foe;
    $('foe-art').innerHTML = svgMon(f.mon.id);
    $('foe-name').innerHTML = `👾 ${f.def.name} <small style="font-size:10px">Lv${f.mon.lvl}</small>`;
    const fpct = (f.mon.hp / f.hpMax) * 100;
    const fill = $('foe-hpfill');
    fill.style.width = fpct + '%';
    fill.classList.toggle('mid', fpct < 50 && fpct >= 25);
    fill.classList.toggle('low', fpct < 25);
    $('foe-hptext').textContent = `HP ${Math.ceil(fpct)}%`;
    // me (full HP/MP detail)
    const m = battle.me.mon;
    const mDef = getMonsterDef(m.id);
    const mStats = monStats(m);
    $('my-art').innerHTML = svgMon(m.id);
    $('my-name').innerHTML = `💗 ${mDef.name} <small style="font-size:10px">Lv${m.lvl}</small>`;
    const mpct = (m.hp / mStats.hp) * 100;
    const mfill = $('my-hpfill');
    mfill.style.width = mpct + '%';
    mfill.classList.toggle('mid', mpct < 50 && mpct >= 25);
    mfill.classList.toggle('low', mpct < 25);
    $('my-hptext').textContent = `HP ${m.hp}/${mStats.hp}  MP ${m.mp}/${mStats.mp}`;
    $('my-mpfill').style.width = clamp(m.mp / mStats.mp * 100, 0, 100) + '%';
  } catch (err) {
    console.error('[refreshBattleUI]', err);
  }
}

// ----- TAP ARENA -----
let tap = null;
// パワーゲージ満タンとなる目安タップ数（クリティカルゾーンと連動）
const TAP_POWER_FULL = 30;
const TAP_CRIT_ZONE  = 25;
function _resetTapPowerUI() {
  const bar  = $('tap-power-bar');
  const fill = $('tap-power-fill');
  const lbl  = $('tap-power-label');
  const tb   = $('tap-button');
