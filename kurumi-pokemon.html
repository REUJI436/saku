function startFieldLoop() {
  fieldRunning = true;
  if (fieldLoop) cancelAnimationFrame(fieldLoop);
  // Force one paint to ensure scene is laid out before reading sizes
  const tick = () => {
    if (!fieldRunning) return;
    updateField();
    drawField();
    fieldLoop = requestAnimationFrame(tick);
  };
  // Defer start by a frame to give layout a chance
  requestAnimationFrame(() => {
    if (fieldRunning) fieldLoop = requestAnimationFrame(tick);
  });
  // Auto-save every 5 seconds while exploring the field
  if (fieldAutoSaveTimer) clearInterval(fieldAutoSaveTimer);
  fieldAutoSaveTimer = setInterval(() => {
    if (fieldRunning) saveGame(true);
  }, 5000);
}

function stopFieldLoop() {
  fieldRunning = false;
  if (fieldLoop) cancelAnimationFrame(fieldLoop);
  fieldLoop = null;
  if (fieldAutoSaveTimer) { clearInterval(fieldAutoSaveTimer); fieldAutoSaveTimer = null; }
  // release any held keys
  fieldKeys.up = fieldKeys.down = fieldKeys.left = fieldKeys.right = false;
  // ドラッグ操作は fieldRunning フラグで自動停止される（dragMoveHandler内でチェック）
}

// ===================== BATTLE =====================
let battle = null; // { foe:{def, lvl, hp, hpMax, mp, skills}, my:..., turn, ended, fieldIdx }

function activeMon() {
  return state.party.find(m => m.hp > 0);
}

function startBattle(fieldMob, idx) {
  if (!activeMon()) {
    showToast('たたかえる モンスターが いないよ！<br>かいふくしてね');
    return;
  }
  const foe = makeMon(fieldMob.id, fieldMob.lvl);
  const foeStats = monStats(foe);
  battle = {
    foe: { mon: foe, def: getMonsterDef(foe.id), stats: foeStats, hpMax: foeStats.hp },
    me: { mon: activeMon() },
    fieldIdx: idx,
    isBoss: fieldMob.isBoss,
    isToton: !!fieldMob.isToton || foe.id === 99,
    turn: 'me',
    ended: false,
    confused: false  // 自分の次ターン技外し用
  };
  battle.foe.mon.hp = foeStats.hp;
  refreshBattleUI();
  if (battle.isToton) {
    const fid = battle.foe.mon.id;
    if (fid === 96)      setBattleMessage('⚡ <ruby>雷<rt>かみなり</rt></ruby>とーとん が あらわれた！');
    else if (fid === 97) setBattleMessage('🔥 <ruby>炎<rt>ほのお</rt></ruby>とーとん が あらわれた！');
    else if (fid === 98) setBattleMessage('❄️ <ruby>氷<rt>こおり</rt></ruby>とーとん が あらわれた！');
    else if (fid === 95) setBattleMessage('!? テラスタルとーとんキョダイマックス…！？<br>せかいの あいだから あらわれた！');
    else                 setBattleMessage('まさかの <ruby>人間<rt>にんげん</rt></ruby> 「とーとん」 が あらわれた！');
  } else {
    setBattleMessage('やせいの ' + (battle.foe.def.name) + ' が あらわれた！');
  }
  switchScene('battle-scene');
  setTurnUI('me');
  showCommands();
}

function refreshBattleUI() {
  // foe (% only, lighter info)
  const f = battle.foe;
  $('foe-art').innerHTML = svgMon(f.mon.id);
  $('foe-name').innerHTML = `👾 ${f.def.name} <small style="font-size:10px">Lv${f.mon.lvl}</small>`;
  const fpct = (f.mon.hp / f.hpMax) * 100;
  const fill = $('foe-hpfill');
  fill.style.width = fpct + '%';
  fill.classList.toggle('mid', fpct < 50 && fpct >= 25);
  fill.classList.toggle('low', fpct < 25);
  $('foe-hptext').textContent = `HP ${Math.ceil(fpct)}%`;
  // me (full HP/MP detail)
  const m = battle.me.mon;
  const mDef = getMonsterDef(m.id);
  const mStats = monStats(m);
  $('my-art').innerHTML = svgMon(m.id);
  $('my-name').innerHTML = `💗 ${mDef.name} <small style="font-size:10px">Lv${m.lvl}</small>`;
  const mpct = (m.hp / mStats.hp) * 100;
  const mfill = $('my-hpfill');
  mfill.style.width = mpct + '%';
  mfill.classList.toggle('mid', mpct < 50 && mpct >= 25);
  mfill.classList.toggle('low', mpct < 25);
  $('my-hptext').textContent = `HP ${m.hp}/${mStats.hp}  MP ${m.mp}/${mStats.mp}`;
  $('my-mpfill').style.width = clamp(m.mp / mStats.mp * 100, 0, 100) + '%';
}

function setTurnUI(who) {
  // who: 'me' | 'foe' | null
  const myRow = $('my-row');
  const foeRow = $('foe-row');
  const label = $('turn-label');
  if (!myRow || !foeRow || !label) return;
  myRow.classList.remove('active-turn');
  foeRow.classList.remove('active-turn', 'attacking');
  label.classList.remove('me', 'foe');
  if (who === 'me') {
    myRow.classList.add('active-turn');
    label.classList.add('me');
    label.innerHTML = '🔆 あなたのターン！';
  } else if (who === 'foe') {
    foeRow.classList.add('active-turn');
    label.classList.add('foe');
    label.innerHTML = '👾 あいてのターン';
  }
}

function showCritText() {
  const el = $('crit-text');
  if (!el) return;
  el.classList.remove('show');
  // force reflow to restart animation
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1100);
}

function setBattleMessage(msg) {
  $('battle-message').innerHTML = msg;
}

function hideAllSubPanels() {
  document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
}

function showCommands() {
  hideAllSubPanels();
  $('cmd-grid').style.display = 'grid';
  $('tap-arena').classList.remove('active');
  // enable buttons
  ['cmd-attack','cmd-skill','cmd-item','cmd-ball','cmd-swap','cmd-run'].forEach(id => $(id).disabled = false);
  if (battle && battle.isBoss) $('cmd-run').disabled = true;
}

function hideCommands() {
  $('cmd-grid').style.display = 'none';
}

// ----- TAP ARENA -----
let tap = null;
function startTapPhase(skillKey) {
  hideCommands();
  hideAllSubPanels();
  $('tap-arena').classList.add('active');
  tap = { count: 0, end: null, skill: skillKey, raf: 0, duration: 3000 };
  $('tap-count').textContent = '0';
  // タイマーは止めて初期表示（1回目のタップで動き出す）
  $('tap-timer-text').textContent = (tap.duration / 1000).toFixed(1);
  $('tap-timer-fill').style.width = (tap.duration / 30) + '%';
  setBattleMessage(skillKey ? SKILLS[skillKey].name + ' を じゅんびちゅう！<br>1かいタップで タイマースタート！' : '1かいタップで タイマースタート！');
}

function tapHit() {
  if (!tap) return;
  // 初回タップでタイマー起動
  if (tap.end == null) {
    tap.end = Date.now() + tap.duration;
    setBattleMessage('れんだ！');
    const tick = () => {
      if (!tap) return;
      const left = tap.end - Date.now();
      if (left <= 0) { endTapPhase(); return; }
      $('tap-timer-text').textContent = (left / 1000).toFixed(1);
      $('tap-timer-fill').style.width = (left / 30) + '%';
      tap.raf = requestAnimationFrame(tick);
    };
    tap.raf = requestAnimationFrame(tick);
  }
  tap.count++;
  $('tap-count').textContent = tap.count;
  sfxTap();
  // small visual punch
  const tb = $('tap-button');
  tb.style.transform = 'scale(0.94)';
  setTimeout(() => { tb.style.transform = ''; }, 50);
}

function endTapPhase() {
  if (!tap) return;
  cancelAnimationFrame(tap.raf);
  const count = tap.count;
  const skillKey = tap.skill;
  tap = null;
  $('tap-arena').classList.remove('active');
  doMyAttack(count, skillKey);
}

function doMyAttack(tapCount, skillKey) {
  if (battle.ended) return;
  // 混乱状態：技を外す
  if (battle.confused) {
    battle.confused = false;
    const meDefC = getMonsterDef(battle.me.mon.id);
    setBattleMessage(meDefC.name + 'は こんらんして わざを はずした！');
    sfxHit();
    refreshBattleUI();
    setTimeout(() => {
      if (battle.foe.mon.hp <= 0) { winBattle(); return; }
      foeTurn();
    }, 1100);
    return;
  }
  const skill = skillKey ? SKILLS[skillKey] : SKILLS.tail;
  const meStats = monStats(battle.me.mon);
  const foeStats = battle.foe.stats;
  // base damage formula
  const power = skill.power;
  const tapMul = clamp(0.4 + tapCount * 0.05, 0.4, 2.5);
  let dmg = Math.floor((meStats.atk * power * tapMul - foeStats.def * 0.4) * (0.85 + Math.random() * 0.3));
  dmg = Math.max(1, dmg);
  // type bonus: same type as user
  const meDef = getMonsterDef(battle.me.mon.id);
  if (skill.type === meDef.type) dmg = Math.floor(dmg * 1.2);
  // type chart (defender side)
  const foeDef0 = getMonsterDef(battle.foe.mon.id);
  if (foeDef0 && skill.type) {
    const tm = typeMul(skill.type, foeDef0.type);
    if (tm !== 1.0) dmg = Math.max(1, Math.floor(dmg * tm));
  }
  // crit on lots of taps
  let crit = false;
  if (tapCount >= 25 && Math.random() < 0.3) { dmg = Math.floor(dmg * 1.6); crit = true; }
  // heal skill
  if (skill.heal) {
    const heal = Math.floor(meStats.hp * skill.healAmt);
    battle.me.mon.hp = Math.min(meStats.hp, battle.me.mon.hp + heal);
    spawnDmg('my-row', heal, 'heal');
    sfxHeal();
    setBattleMessage(meDef.name + 'は ' + skill.msg + '<br>HPが ' + heal + ' かいふく！');
  } else {
    battle.foe.mon.hp = Math.max(0, battle.foe.mon.hp - dmg);
    if (skill.superFlash) {
      // ペロペロアリーナ: 通常フラッシュではなく専用エフェクト
      playPeroperoEffect();
    } else {
      flashScreen();
    }
    spawnParticles('foe-row', skill.fx);
    spawnDmg('foe-row', dmg, crit ? 'crit' : '');
    shakeRow('foe-row');
    hitFlashRow('foe-row');
    if (crit) { sfxCrit(); showCritText(); } else if (!skill.superFlash) sfxHit();
    setBattleMessage(meDef.name + 'の ' + skill.msg + '<br>(' + tapCount + 'タップ)' + (crit?' クリティカル！':'') + ' ' + dmg + ' ダメージ！');
    // Heal side-effect (e.g. ラブラブビーム): damage + self-heal
    if (skill.healSelf && skill.healAmt) {
      const sHeal = Math.floor(meStats.hp * skill.healAmt);
      if (sHeal > 0) {
        battle.me.mon.hp = Math.min(meStats.hp, battle.me.mon.hp + sHeal);
        setTimeout(() => {
          // 緑のキラキラパーティクル＋「+◯HP」のグリーンテキスト
          spawnParticles('my-row', '✨');
          spawnParticles('my-row', '💚');
          spawnDmg('my-row', sHeal, 'heal');
          sfxHeal();
          refreshBattleUI();
          // メッセージにも回復を追記
          const cur = $('battle-message');
          if (cur) cur.innerHTML += '<br>あいの ちからで +' + sHeal + ' HP かいふく！';
        }, 400);
      }
    }
  }
  // mp cost
  if (skill.mp) battle.me.mon.mp = Math.max(0, battle.me.mon.mp - skill.mp);
  refreshBattleUI();

  // 必殺技演出があるときは敵ターンを遅らせる
  const turnDelay = (skill.superFlash) ? 1800 : 1100;
  setTimeout(() => {
    if (battle.foe.mon.hp <= 0) { winBattle(); return; }
    // foe turn
    foeTurn();
  }, turnDelay);
}

// とーとんの ぼそぼそ独り言
const TOTON_MUTTERS = [
  'えーっと…つぎの さぎょうは…',
  'あー、もう つかれた',
  'おなか すいた',
  'あしたの あさ なに たべよう',
  'はやく かえりたい…',
  'コーヒー おかわり ほしい'
];

function foeTurn() {
  battle.turn = 'foe';
  if (battle.ended) return;
  setTurnUI('foe');
  // brief attack motion before the hit lands
  const foeRow = $('foe-row');
  if (foeRow) {
    foeRow.classList.add('attacking');
    setTimeout(() => foeRow.classList.remove('attacking'), 500);
  }
  const skills = battle.foe.mon.skills || ['tail'];
  // pick random skill it can afford
  const usable = skills.filter(s => (SKILLS[s].mp || 0) <= battle.foe.mon.mp);
  const skillKey = usable.length ? pick(usable) : 'tail';
  const skill = SKILLS[skillKey];
  const foeStats = battle.foe.stats;
  const meStats = monStats(battle.me.mon);
  const foeDef = battle.foe.def;
  // とーとんの場合は独り言を先にちらっと表示
  let preMsg = '';
  if (battle.isToton) {
    preMsg = '<span style="color:#888;font-size:13px;">「' + pick(TOTON_MUTTERS) + '」</span><br>';
  }
  if (skill.heal && battle.foe.mon.hp < battle.foe.hpMax * 0.5) {
    const heal = Math.floor(battle.foe.hpMax * (skill.healAmt || 0.15));
    battle.foe.mon.hp = Math.min(battle.foe.hpMax, battle.foe.mon.hp + heal);
    setBattleMessage(preMsg + foeDef.name + 'は ' + skill.msg);
    spawnDmg('foe-row', heal, 'heal');
    sfxHeal();
  } else {
    let dmg = Math.floor((foeStats.atk * skill.power - meStats.def * 0.4) * (0.85 + Math.random() * 0.3));
    dmg = Math.max(1, dmg);
    if (skill.type === foeDef.type) dmg = Math.floor(dmg * 1.2);
    battle.me.mon.hp = Math.max(0, battle.me.mon.hp - dmg);
    spawnParticles('my-row', skill.fx);
    spawnDmg('my-row', dmg);
    shakeRow('my-row');
    hitFlashRow('my-row');
    sfxHit();
    let extraMsg = '';
    // 営業トーク：30%で混乱
    if (skill.confuseChance && Math.random() < skill.confuseChance) {
      battle.confused = true;
      extraMsg = '<br>あいては こんらんした！';
    }
    // リーマン突進：反動ダメージ
    if (skill.recoil) {
      const recoil = Math.max(1, Math.floor(battle.foe.hpMax * skill.recoil));
      battle.foe.mon.hp = Math.max(0, battle.foe.mon.hp - recoil);
      spawnDmg('foe-row', recoil, '');
      extraMsg += '<br>はんどうで ' + recoil + ' ダメージ！';
    }
    setBattleMessage(preMsg + foeDef.name + 'の ' + skill.msg + ' ' + dmg + 'ダメージ！' + extraMsg);
  }
  // 事務作業：自分のMP+3回復
  if (skill.mpRecover) {
    battle.foe.mon.mp = Math.min((monStats(battle.foe.mon).mp || 30), battle.foe.mon.mp + skill.mpRecover);
  }
  if (skill.mp) battle.foe.mon.mp = Math.max(0, battle.foe.mon.mp - skill.mp);
  refreshBattleUI();
  setTimeout(() => {
    // 反動で とーとん自身が倒れた場合
    if (battle.foe.mon.hp <= 0) { winBattle(); return; }
    if (battle.me.mon.hp <= 0) {
      onMyFaint();
      return;
    }
    battle.turn = 'me';
    setTurnUI('me');
    showCommands();
    setBattleMessage('どうする？');
  }, 1100);
}

function onMyFaint() {
  showToast(getMonsterDef(battle.me.mon.id).name + ' は たおれた！');
  // try next mon
  const next = state.party.find(m => m.hp > 0 && m !== battle.me.mon);
  if (next) {
    battle.me.mon = next;
    refreshBattleUI();
    setTimeout(() => { battle.turn = 'me'; setTurnUI('me'); showCommands(); setBattleMessage(getMonsterDef(next.id).name + 'が とびだした！'); }, 800);
  } else {
    loseBattle();
  }
}

function rollBattleDrops(isBoss) {
  // 通常モブ・ボスで分岐。返り値は ['xpcandy-s', 'evostone', ...] のキー配列
  const drops = [];
  if (isBoss) {
    // ボス: けいけんアメ大は確定で1個
    drops.push('xpcandy-l');
    // 50%でけいけんアメ特大
    if (Math.random() < 0.50) drops.push('xpcandy-xl');
    // 30%でレアアイテム1個（重み付き抽選）
    if (Math.random() < 0.30) {
      const r = Math.random();
      // evostone:0.40 / wondercandy:0.30 / goldcoin:0.25 / masterball:0.05
      if      (r < 0.40) drops.push('evostone');
      else if (r < 0.70) drops.push('wondercandy');
      else if (r < 0.95) drops.push('goldcoin');
      else               drops.push('masterball');
    }
  } else {
    // 通常モブ: 各けいけんアメは独立試行
    if (Math.random() < 0.20)   drops.push('xpcandy-s');
    if (Math.random() < 0.05)   drops.push('xpcandy-m');
    if (Math.random() < 0.01)   drops.push('xpcandy-l');
    if (Math.random() < 0.002)  drops.push('xpcandy-xl');
  }
  return drops;
}

function winBattle() {
  battle.ended = true;
  hideCommands();
  hideAllSubPanels();
  setTurnUI(null);
  $('turn-label').innerHTML = '🎉 かった！';
  sfxWin();
  // exp + coins
  const foe = battle.foe;
  // とーとんは経験値少なめ、コイン報酬は+500ボーナス
  let expGain = Math.floor(8 + foe.mon.lvl * 4 + (battle.isBoss ? foe.mon.lvl * 5 : 0));
  let coinGain = Math.floor(10 + foe.mon.lvl * (battle.isBoss ? 6 : 2));
  let totonTier = 0; // 0:なし 1:通常 2:伝説4兄弟 3:神
  if (battle.isToton) {
    expGain = Math.max(4, Math.floor(expGain * 0.4)); // 経験値は少なめ
    const fid = battle.foe.mon.id;
    if (fid === 95)                                  { coinGain += 5000; totonTier = 3; }
    else if (fid === 96 || fid === 97 || fid === 98) { coinGain += 1500; totonTier = 2; }
    else                                             { coinGain += 500;  totonTier = 1; }
  }
  state.coins += coinGain;

  // ----- ドロップ判定 -----
  const drops = rollBattleDrops(!!battle.isBoss);
  // 個数は1個ずつ。bag に追加
  drops.forEach(k => { state.bag[k] = (state.bag[k] || 0) + 1; });
  // ドロップ表示用HTML
  let dropHtml = '';
  if (drops.length) {
    // 同じキーを集計
    const counts = {};
    drops.forEach(k => { counts[k] = (counts[k] || 0) + 1; });
    dropHtml = '<br><br>▼ ひろったアイテム ▼';
    Object.keys(counts).forEach(k => {
      const it = ITEMS[k];
      if (!it) return;
      dropHtml += '<br>' + it.icon + ' ' + it.name + ' ×' + counts[k];
    });
  }

  if (battle.isToton) {
    let bonusLabel = 'ボーナス+500！';
    let title = '🎉 とーとん を たおした！？';
    if (totonTier === 2) {
      bonusLabel = 'ボーナス+1500！';
      title = '🎉 でんせつの とーとん を たおした！';
    } else if (totonTier === 3) {
      bonusLabel = 'ボーナス+5000！！';
      title = '🌈 テラスタルとーとんキョダイマックス を たおした！！';
    }
    setBattleMessage(title + '<br>けいけんち ' + expGain + '・コイン ' + coinGain + ' （' + bonusLabel + '）を てに いれた！' + dropHtml);
  } else {
    setBattleMessage('🎉 かった！<br>' + foe.def.name + 'を たおして、けいけんち ' + expGain + '・コイン ' + coinGain + ' を てに いれた！' + dropHtml);
  }
  // ドロップ獲得SE（あれば）
  if (drops.length) setTimeout(() => sfxCatch(), 350);

  // give exp to all alive party
  setTimeout(() => {
    const levelups = [];
    state.party.forEach(m => { if (m.hp > 0) levelups.push(...giveExp(m, expGain)); });
    if (battle.fieldIdx != null && state.fieldMobs[battle.fieldIdx]) {
      state.fieldMobs[battle.fieldIdx].defeated = true;
    }
    // Boss clear
    if (battle.isBoss) {
      const stage = STAGES.find(s => s.id === state.curStage);
      if (!state.cleared.includes(stage.id)) state.cleared.push(stage.id);
      if (stage.id + 1 <= STAGES.length && state.unlocked < stage.id + 1) state.unlocked = stage.id + 1;
      showToast('🎊 ボスを たおした！つぎのステージが ひらいた！', 2400);
    }
    saveGame(true);

    const proceed = () => {
      if (levelups.length) {
        showLevelup(levelups, () => maybeEvolve(levelups, () => returnToFieldOrStage()));
      } else {
        returnToFieldOrStage();
      }
    };
    setTimeout(proceed, 800);
  }, 1400);
}

function returnToFieldOrStage() {
  if (battle.isBoss) {
    state.field = null;
    state.curStage = null;
    goStageSelect();
  } else {
    enterStageRefresh();
  }
  saveGame(true);
}

function enterStageRefresh() {
  const stage = STAGES.find(s => s.id === state.curStage);
  $('field-stage-name').innerHTML = stage.name;
  $('field-coins').textContent = state.coins;
  document.body.style.background = stage.bg;
  // Move player back to safe position (just before encounter)
  if (state.field) {
    if (state.field.lastSafePx != null) state.field.px = state.field.lastSafePx;
    if (state.field.lastSafePy != null) state.field.py = state.field.lastSafePy;
    state.field.walking = false;
  }
  ensureFieldChests(stage);
  switchScene('field-scene');
  applyMinimapVisibility();
  startFieldLoop();
}

function loseBattle() {
  battle.ended = true;
  hideCommands();
  hideAllSubPanels();
  setTurnUI(null);
  $('turn-label').innerHTML = '💧 まけちゃった...';
  sfxLose();
  setBattleMessage('まけてしまった... <br>すこし HPを かいふくして もどろう。');
  // revive minimum
  state.party.forEach(m => {
    const s = monStats(m);
    if (m.hp <= 0) m.hp = Math.floor(s.hp * 0.4);
  });
  state.field = null;
  state.curStage = null;
  saveGame(true);
  setTimeout(() => goStageSelect(), 2200);
}

function giveExp(mon, amt) {
  const ups = [];
  mon.exp += amt;
  while (mon.exp >= expForNext(mon.lvl) && mon.lvl < 100) {
    mon.exp -= expForNext(mon.lvl);
    mon.lvl++;
    // learn new skill if any
    const def = getMonsterDef(mon.id);
    if (def.learn[mon.lvl] && !mon.skills.includes(def.learn[mon.lvl])) {
      mon.skills.push(def.learn[mon.lvl]);
    }
    // refill HP partly
    const s = monStats(mon);
    mon.hp = Math.min(s.hp, mon.hp + Math.floor(s.hp * 0.2));
    mon.mp = s.mp;
    ups.push({ mon, lvl: mon.lvl, def });
  }
  return ups;
}

function showLevelup(ups, after) {
  if (ups.length === 0) { after(); return; }
  const up = ups.shift();
  $('levelup-text').innerHTML = up.def.name + ' は<br>レベル ' + up.lvl + ' に なった！';
  const banner = $('levelup-banner');
  banner.classList.add('show');
  sfxLevel();
  // Save after each individual level-up
  saveGame(true);
  setTimeout(() => {
    banner.classList.remove('show');
    setTimeout(() => showLevelup(ups, after), 200);
  }, 1400);
}

function maybeEvolve(ups, after) {
  // ups already consumed, but we tracked them; just check all party
  const evos = [];
  state.party.forEach(m => {
    const def = getMonsterDef(m.id);
    if (def.evo && m.lvl >= def.evo.lvl) {
      evos.push({ mon: m, fromDef: def, toDef: getMonsterDef(def.evo.to) });
    }
  });
  if (evos.length === 0) { after(); return; }
  doEvolution(evos, after);
}

function doEvolution(evos, after) {
  if (evos.length === 0) { after(); return; }
  const e = evos.shift();
  switchScene('evo-scene');
  $('evo-art-wrap').innerHTML = svgMon(e.mon.id);
  $('evo-text').innerHTML = e.fromDef.name + ' は しんかしている...';
  $('evo-next').classList.remove('show');
  sfxEvo();
  let step = 0;
  const swap = () => {
    step++;
    if (step > 6) {
      // evolve!
      e.mon.id = e.toDef.id;
      // grant new skills
      Object.keys(e.toDef.learn).forEach(k => {
        if (e.mon.lvl >= +k && !e.mon.skills.includes(e.toDef.learn[k])) e.mon.skills.push(e.toDef.learn[k]);
      });
      $('evo-art-wrap').innerHTML = svgMon(e.toDef.id);
      $('evo-text').innerHTML = '✨ ' + e.fromDef.name + ' は<br>' + e.toDef.name + ' に しんかした！ ✨';
      $('evo-next').classList.add('show');
      sfxWin();
      saveGame(true);
      return;
    }
    $('evo-art-wrap').innerHTML = step % 2 === 0 ? svgMon(e.mon.id) : svgMon(e.toDef.id);
    setTimeout(swap, 200 + step * 30);
  };
  setTimeout(swap, 600);
  $('evo-next').onclick = () => doEvolution(evos, after);
  attachTap($('evo-next'), () => doEvolution(evos, after));
}

// ----- ATTACK CMDS -----
function cmdAttack() { startTapPhase(null); }

function cmdSkill() {
  const list = $('skill-list');
  list.innerHTML = '';
  const m = battle.me.mon;
  const stats = monStats(m);
  m.skills.forEach(sk => {
    const s = SKILLS[sk];
    const can = (s.mp || 0) <= m.mp;
    const row = document.createElement('div');
    row.className = 'sub-row' + (can ? '' : ' disabled');
    row.innerHTML = `<div style="font-size:24px">${s.fx}</div>
      <div class="info-block">
        <div class="name">${s.name}</div>

      </div>`;
    if (can) attachTap(row, () => {
      $('skill-panel').classList.remove('active');
      startTapPhase(sk);

function cmdItem() {
  const list = $('item-list');
  list.innerHTML = '';

  Object.keys(state.bag).forEach(key => {

    if (!count) return;

function useItem(key) {
  const it = ITEMS[key];
  if (!it) return;
  // 戦闘中にしか使わない系（HP/MP/ボール）はここで決済
  if (it.heal) {
    state.bag[key]--;
    const m = battle.me.mon;
    const s = monStats(m);
    const heal = Math.min(it.heal, s.hp - m.hp);
    m.hp = Math.min(s.hp, m.hp + it.heal);
    spawnDmg('my-row', heal, 'heal');
    sfxHeal();
    setBattleMessage(it.name + ' を つかった！HP ' + heal + ' かいふく！');
    refreshBattleUI();
    setTimeout(foeTurn, 1100);
  } else if (it.mp) {
    state.bag[key]--;
    const m = battle.me.mon;
    const s = monStats(m);
    m.mp = Math.min(s.mp, m.mp + it.mp);
    sfxHeal();
    setBattleMessage(it.name + ' を つかった！MP ' + it.mp + ' かいふく！');
    refreshBattleUI();
    setTimeout(foeTurn, 1100);
  } else if (key === 'ball' || key === 'superball' || key === 'hyperball' || key === 'masterball') {
    state.bag[key]--;
    tryCatch(key);
  } else if (it.xp || key === 'evostone' || key === 'wondercandy' || key === 'goldcoin') {
    // 戦闘中も使えるが、専用フローへ
    useSpecialItem(key, /*inBattle=*/true, (used) => {
      // 使ったあとは敵ターンへ。キャンセル時はターン消費しない
      refreshBattleUI();
      if (used) setTimeout(foeTurn, 1100);
      else { showCommands(); }
    });
  }
}

// ===================== けいけんアメ・レアアイテム使用 =====================
// inBattle: 戦闘中に使ったか / done(used:boolean): 使い終わったあとのコールバック（used=falseはキャンセル/不可）
function returnFromEvoIfNeeded() {
  // evo-scene がアクティブだったらフィールド/ステージ選択へ戻す
  const evoScene = $('evo-scene');
  if (evoScene && evoScene.classList.contains('active')) {
    if (state.field && state.curStage) enterStageRefresh();
    else goStageSelect();
  }
}
function useSpecialItem(key, inBattle, done) {
  const it = ITEMS[key];
  const finish = (used) => {
    // 戦闘外でevo-sceneに残っていたらフィールドに戻す
    if (!inBattle) returnFromEvoIfNeeded();
    if (done) done(!!used);
  };
  if (!it) { finish(false); return; }
  if (!state.bag[key]) {
    showToast('もってないよ');
    finish(false);
    return;
  }
  // けいけんアメ：パーティ選択 → EXP付与
  if (it.xp) {
    pickPartyMember('だれに あげる？', () => true, (mon) => {
      if (!mon) { finish(false); return; }
      state.bag[key]--;
      sfxHeal();
      const ups = giveExp(mon, it.xp);
      const def = getMonsterDef(mon.id);
      const msg = it.icon + ' ' + def.name + 'は<br>けいけんち +' + it.xp + '！';
      if (inBattle) setBattleMessage(msg.replace(/<br>/g, ' '));
      else showToast(msg);
      saveGame(true);
      if (ups.length) {
        showLevelup(ups, () => maybeEvolve(ups, () => finish(true)));
      } else {
        finish(true);
      }
    });
    return;
  }
  // ふしぎなアメ：パーティ全員 LV+1
  if (key === 'wondercandy') {
    if (!state.party.length) { showToast('パーティが いないよ'); finish(false); return; }
    state.bag[key]--;
    sfxLevel();
    const allUps = [];
    state.party.forEach(m => {
      if (m.lvl >= 100) return;
      m.lvl++;
      const def = getMonsterDef(m.id);
      if (def.learn[m.lvl] && !m.skills.includes(def.learn[m.lvl])) m.skills.push(def.learn[m.lvl]);
      const s = monStats(m);
      m.hp = Math.min(s.hp, m.hp + Math.floor(s.hp * 0.2));
      m.mp = s.mp;
      // +1演出（数字ポップ）
      if (inBattle) spawnDmg('my-row', 1, 'heal');
      allUps.push({ mon: m, lvl: m.lvl, def });
    });
    showToast('🌟 ふしぎなアメで パーティぜんいんが LV+1！');
    saveGame(true);
    if (allUps.length) {
      showLevelup(allUps, () => maybeEvolve(allUps, () => finish(true)));
    } else {
      finish(true);
    }
    return;
  }
  // 進化のいし：パーティ選択 → 進化先があれば強制進化
  if (key === 'evostone') {
    pickPartyMember('だれに あげる？', (m) => {
      const d = getMonsterDef(m.id);
      return !!(d && d.evo && d.evo.to);
    }, (mon) => {
      if (!mon) { finish(false); return; }
      const def = getMonsterDef(mon.id);
      if (!def || !def.evo || !def.evo.to) {
        showToast('これ<ruby>以上<rt>いじょう</rt></ruby> しんかできないよ！');
        finish(false);
        return;
      }
      state.bag[key]--;
      sfxEvo();
      // 既存の進化ロジック流用（LV条件は無視して to を直接代入）
      const toDef = getMonsterDef(def.evo.to);
      const evos = [{ mon, fromDef: def, toDef }];
      saveGame(true);
      doEvolution(evos, () => {
        saveGame(true);
        finish(true); // finish() 側で必要なら scene を戻す
      });
    });
    return;
  }
  // きらきらコイン：コイン+2000
  if (key === 'goldcoin') {
    state.bag[key]--;
    state.coins += 2000;
    sfxCatch(); // コイン入手SE流用
    showToast('💰 コイン +2000！');
    // 残高表示を更新（場面に応じて）
    try { if ($('field-coins')) $('field-coins').textContent = state.coins; } catch(e){}
    try { if ($('stage-coins')) $('stage-coins').textContent = state.coins; } catch(e){}
    try { if ($('shop-coins')) $('shop-coins').textContent = state.coins; } catch(e){}
    try { if ($('party-coins')) $('party-coins').textContent = state.coins; } catch(e){}
    saveGame(true);
    finish(true);
    return;
  }
  finish(false);
}

// パーティ選択モーダル：filterFn(mon) で対象を絞り込み、cb(mon) でコールバック（キャンセル時 null）
function pickPartyMember(title, filterFn, cb) {
  const candidates = state.party.filter(m => !filterFn || filterFn(m));
  if (!candidates.length) {
    showToast('つかえる なかまが いないよ！');
    if (cb) cb(null);
    return;
  }
  let html = '<div style="display:flex; flex-direction:column; gap:8px; max-height:55vh; overflow-y:auto;">';
  state.party.forEach((m, i) => {
    const def = getMonsterDef(m.id);
    const stats = monStats(m);
    const ok = (!filterFn || filterFn(m));
    html += `<button class="btn ${ok?'green':'gray'}" data-pick-idx="${i}" ${ok?'':'disabled'} style="text-align:left; padding:10px; display:flex; align-items:center; gap:8px;">
      <span style="font-size:24px">${def.face || '👾'}</span>
      <span style="flex:1">
        <b>${def.name}</b> Lv${m.lvl}<br>
        <small style="opacity:.85">HP ${m.hp}/${stats.hp}・EXP ${m.exp}/${expForNext(m.lvl)}</small>
      </span>
    </button>`;
  });
  html += '</div>';
  showModal(title, html, [{ label: 'やめる', cls: 'gray', fn: () => { if (cb) cb(null); } }]);
  // 各ボタンにタップを後付け
  setTimeout(() => {
    const body = $('modal-body');
    if (!body) return;
    body.querySelectorAll('button[data-pick-idx]').forEach(btn => {
      if (btn.disabled) return;
      attachTap(btn, () => {
        const idx = +btn.getAttribute('data-pick-idx');
        const m = state.party[idx];
        hideModal();
        if (cb) cb(m);
      });
    });
  }, 0);
}

// フィールドのバッグ：表示＋アイテム使用（戦闘外）
function openFieldBag() {
  const keys = Object.keys(state.bag).filter(k => state.bag[k] > 0 && ITEMS[k]);
  if (keys.length === 0) {
    showModal('🎒 バッグ', '<div style="text-align:center; color:#888; padding:16px;">アイテムが ないよ</div>', [{ label: 'とじる', cls: 'gray' }]);
    return;
  }
  let html = '<div style="display:flex; flex-direction:column; gap:6px; max-height:55vh; overflow-y:auto;">';
  keys.forEach(k => {
    const it = ITEMS[k];
    // 戦闘外で意味のあるアイテムだけ「つかう」ボタンを出す
    // - けいけんアメ系（xp）
    // - evostone / wondercandy / goldcoin
    // - HP/MP回復（戦闘外でも HP/MP 回復したい場面のため、対象を選ぶ簡易版）
    const isXp   = !!it.xp;
    const isRare = (k === 'evostone' || k === 'wondercandy' || k === 'goldcoin');
    const isHeal = !!it.heal;
    const isMp   = !!it.mp;
    const usable = isXp || isRare || isHeal || isMp;
    html += `<div style="display:flex; gap:8px; align-items:center; padding:6px; border-bottom:1px dashed #ffb0d8; background:#fff8fc; border-radius:8px;">
      <span style="font-size:24px">${it.icon}</span>
      <span style="flex:1;"><b>${it.name}</b> ×${state.bag[k]}<br><small style="color:#666">${it.desc}</small></span>
      ${usable ? `<button class="btn yellow" data-bag-use="${k}" style="font-size:12px; padding:6px 10px;">つかう</button>` : ''}
    </div>`;
  });
  html += '</div>';
  showModal('🎒 バッグ', html, [{ label: 'とじる', cls: 'gray' }]);
  // つかうボタンを後付け
  setTimeout(() => {
    const body = $('modal-body');
    if (!body) return;
    body.querySelectorAll('button[data-bag-use]').forEach(btn => {
      attachTap(btn, () => {
        const k = btn.getAttribute('data-bag-use');
        hideModal();
        const it = ITEMS[k];
        if (!it) return;
        // HP/MP 回復は対象選択
        if (it.heal) {
          pickPartyMember('だれに あげる？', () => true, (mon) => {
            if (!mon) { openFieldBag(); return; }
            if (!state.bag[k]) { openFieldBag(); return; }
            state.bag[k]--;
            const s = monStats(mon);
            const heal = Math.min(it.heal, s.hp - mon.hp);
            mon.hp = Math.min(s.hp, mon.hp + it.heal);
            sfxHeal();
            const def = getMonsterDef(mon.id);
            showToast(it.icon + ' ' + def.name + ' HP +' + heal);
            saveGame(true);
            openFieldBag();
          });
          return;
        }
        if (it.mp) {
          pickPartyMember('だれに あげる？', () => true, (mon) => {
            if (!mon) { openFieldBag(); return; }
            if (!state.bag[k]) { openFieldBag(); return; }
            state.bag[k]--;
            const s = monStats(mon);
            mon.mp = Math.min(s.mp, mon.mp + it.mp);
            sfxHeal();
            const def = getMonsterDef(mon.id);
            showToast(it.icon + ' ' + def.name + ' MP +' + it.mp);
            saveGame(true);
            openFieldBag();
          });
          return;
        }
        // けいけんアメ・レアアイテム
        useSpecialItem(k, /*inBattle=*/false, () => { openFieldBag(); });
      });
    });
  }, 0);
}

function tryCatch(ballKey) {
  const f = battle.foe;
  if (battle.isBoss) {
    setBattleMessage('ボスは つかまえられない！');
    setTimeout(foeTurn, 1100);
    return;
  }
  const ratio = f.mon.hp / f.hpMax;
  const ballRate = ITEMS[ballKey].rate;
  // success rate: low HP -> high
  let chance = (1 - ratio) * 0.7 * ballRate + 0.05;
  chance = clamp(chance, 0.05, 0.95);
  // とーとんは捕獲率固定（HP残量・ボール種類に関係なく超レア）
  if (battle.isToton) {
    const fid = battle.foe.mon.id;
    if (fid === 95)                         chance = 0.01;  // テラスタル: 1%
    else if (fid === 96 || fid === 97 || fid === 98) chance = 0.03;  // 4兄弟: 3%
    else                                    chance = 0.05;  // 通常とーとん: 5%
  }
  // マスターボールは100%（とーとんも捕獲可能）
  if (ITEMS[ballKey].masterball) chance = 1.0;
  setBattleMessage('えい！ ' + ITEMS[ballKey].name + ' を なげた！');
  sfxCatch();
  setTimeout(() => {
    if (Math.random() < chance) {
      // success
      const captured = makeMon(f.mon.id, f.mon.lvl);
      captured.hp = f.mon.hp;
      if (state.party.length < 4) state.party.push(captured);
      else state.box.push(captured);
      if (battle.isToton) {
        showTotonCatchBanner();
        const fid = f.mon.id;
        if (fid === 96)      setBattleMessage('⚡ <ruby>雷<rt>かみなり</rt></ruby>とーとん が なかまに なった！');
        else if (fid === 97) setBattleMessage('🔥 <ruby>炎<rt>ほのお</rt></ruby>とーとん が なかまに なった！');
        else if (fid === 98) setBattleMessage('❄️ <ruby>氷<rt>こおり</rt></ruby>とーとん が なかまに なった！');
        else if (fid === 95) setBattleMessage('🌈 テラスタルとーとんキョダイマックス が なかまに なった！！');
        else                 setBattleMessage('！ とーとん が なかまに なった…！？');
      } else {
        setBattleMessage('🎉 ' + f.def.name + ' を つかまえた！');
      }
      sfxWin();
      battle.ended = true;
      // mark defeated on field
      if (battle.fieldIdx != null && state.fieldMobs[battle.fieldIdx]) state.fieldMobs[battle.fieldIdx].defeated = true;
      // give half xp
      const expGain = Math.floor(4 + f.mon.lvl * 2);
      const ups = [];
      state.party.forEach(m => { if (m.hp > 0 && m !== captured) ups.push(...giveExp(m, expGain)); });
      saveGame(true);
      setTimeout(() => {
        if (ups.length) showLevelup(ups, () => maybeEvolve(ups, returnToFieldOrStage));
        else returnToFieldOrStage();
      }, 1500);
    } else {
      setBattleMessage('くっ... にげられた！');
      showToast('つかまえ そこねた！');
      setTimeout(foeTurn, 1100);
    }
  }, 1000);
}

function cmdSwap() {

    });

function cmdRun() {
  if (battle.isBoss) { showToast('ボスからは にげられない！'); return; }
  const meSpd = monStats(battle.me.mon).spd;
  const foeSpd = battle.foe.stats.spd;
  if (Math.random() < clamp(meSpd / (foeSpd + meSpd) + 0.2, 0.4, 0.95)) {
    setBattleMessage('うまく にげられた！');
    sfxTap();
    battle.ended = true;
    saveGame(true);
    setTimeout(() => returnToFieldOrStage(), 1000);
  } else {
    setBattleMessage('にげられない！');
    setTimeout(foeTurn, 1000);
  }
}

      '100% { transform: translate(-50%,-50%) scale(1.0); opacity: 1; }' +
      '} @keyframes peroperoJitter {' +
      '0%,100% { transform: translate(0,0); }' +
      '20% { transform: translate(-2px,2px); }' +
      '40% { transform: translate(2px,-2px); }' +
      '60% { transform: translate(-2px,-2px); }' +
      '80% { transform: translate(2px,2px); }' +
      '}';

  }

  ov.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:99999;pointer-events:none;opacity:1;transition:opacity 0.25s;animation:peroperoJitter 0.12s steps(2) infinite;';
  document.body.appendChild(ov);

  const txt = document.createElement('div');
  txt.textContent = 'ぺろぺろありーな';
  txt.style.cssText = 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.5);opacity:0;font-size:min(18vw,120px);font-weight:900;color:#1a0000;text-shadow:0 0 18px rgba(180,0,0,0.45),0 4px 12px rgba(0,0,0,0.35);letter-spacing:0.05em;white-space:nowrap;font-family:"Hiragino Sans","Yu Gothic",sans-serif;';
  ov.appendChild(txt);

  // 不規則な連打音（瞬獄殺の鬼連打感）
  const hitTimes = [0, 95, 175, 265, 345, 445, 535, 625, 720, 825, 955, 1085];
  hitTimes.forEach(t => setTimeout(() => {

    p.style.setProperty('--ty', (Math.random() * 200 - 100) + 'px');
    layer.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ===================== PARTY UI =====================
function goPartyScene() {
  switchScene('party-scene');
  $('party-coins').textContent = state.coins;
  renderParty();
}

function renderParty() {
  const mineList = $('party-list-mine');
  const boxList = $('party-list-box');
  mineList.innerHTML = '';
  boxList.innerHTML = '';

  state.party.forEach((m, i) => {
    const def = getMonsterDef(m.id);
    const stats = monStats(m);
    const row = document.createElement('div');
    row.className = 'sub-row';
    row.innerHTML = `<div class="mob-art-small">${svgMon(m.id)}</div>
      <div class="info-block">
        <div class="name">${def.name} Lv${m.lvl}</div>
        <div class="stats">HP ${m.hp}/${stats.hp}・MP ${m.mp}/${stats.mp}・<ruby>経験<rt>けいけん</rt></ruby>${m.exp}/${expForNext(m.lvl)}<div class="hpbar"><div class="hpfill" style="width:${m.hp/stats.hp*100}%"></div></div></div>
      </div>
      <button class="btn gray" style="font-size:11px;padding:4px 8px;">⇆</button>`;
    const btn = row.querySelector('button');
    attachTap(btn, (e) => {
      e.stopPropagation && e.stopPropagation();
      // move to box if party > 1
      if (state.party.length <= 1) { showToast('せんとうメンバーは 1ぴき<ruby>残<rt>のこ</rt></ruby>す ひつようがあるよ'); return; }
      state.box.push(m);
      state.party.splice(i, 1);
      saveGame(true);
      renderParty();
    });
    mineList.appendChild(row);
  });
  if (state.party.length === 0) {
    mineList.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">パーティに モンスターが いないよ</div>';
  }

  state.box.forEach((m, i) => {
    const def = getMonsterDef(m.id);
    const stats = monStats(m);
    const can = state.party.length < 4;
    const row = document.createElement('div');
    row.className = 'sub-row' + (can ? '' : ' disabled');
    row.innerHTML = `<div class="mob-art-small">${svgMon(m.id)}</div>
      <div class="info-block">
        <div class="name">${def.name} Lv${m.lvl}</div>
        <div class="stats">HP ${m.hp}/${stats.hp}<div class="hpbar"><div class="hpfill" style="width:${m.hp/stats.hp*100}%"></div></div></div>
      </div>
      <button class="btn green" style="font-size:11px;padding:4px 8px;" ${can?'':'disabled'}>つれてく</button>`;
    const btn = row.querySelector('button');
    if (can) attachTap(btn, (e) => {
      e.stopPropagation && e.stopPropagation();
      state.party.push(m);
      state.box.splice(i, 1);
      saveGame(true);
      renderParty();
    });
    boxList.appendChild(row);
  });
  if (state.box.length === 0) {
    boxList.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">ボックスは からっぽ</div>';
  }
}

// ===================== SHOP =====================
function goShop() {
  switchScene('shop-scene');
  $('shop-coins').textContent = state.coins;
  const list = $('shop-list');
  list.innerHTML = '';
  Object.keys(ITEMS).forEach(key => {
    const it = ITEMS[key];
    if (!it.price) return;
    // dropOnly はショップに並ばない（戦闘ドロップ専用）
    if (it.dropOnly) return;
    // unlockStage 設定があり、まだ解禁してない場合は表示しない
    if (it.unlockStage && (state.unlocked || 0) < it.unlockStage) return;
    const row = document.createElement('div');
    row.className = 'shop-item';
    const have = state.bag[key] || 0;
    row.innerHTML = `<span class="icon">${it.icon}</span>
      <div class="info-block">
        <div class="name">${it.name}<small style="color:#888"> ×${have}</small></div>
        <div class="desc">${it.desc}</div>
        <div class="price">💰${it.price}</div>
      </div>
      <button class="btn yellow">かう</button>`;
    const btn = row.querySelector('button');
    attachTap(btn, () => {
      if (state.coins < it.price) { showToast('コインが たりないよ'); return; }
      state.coins -= it.price;
      state.bag[key] = (state.bag[key] || 0) + 1;
      sfxTap();
      $('shop-coins').textContent = state.coins;
      saveGame(true);
      goShop();
    });
    list.appendChild(row);
  });

  // also offer party heal
  const heal = document.createElement('div');
  heal.className = 'shop-item';
  heal.innerHTML = `<span class="icon">💗</span>
    <div class="info-block">
      <div class="name">パーティ ぜんかい かいふく</div>
      <div class="desc">てもちぜんいんの HP/MP を まんたんに</div>
      <div class="price">💰150</div>
    </div>
    <button class="btn">かいふく</button>`;
  const hbtn = heal.querySelector('button');
  attachTap(hbtn, () => {
    if (state.coins < 150) { showToast('コインが たりないよ'); return; }
    state.coins -= 150;
    state.party.forEach(m => { const s = monStats(m); m.hp = s.hp; m.mp = s.mp; });
    sfxHeal();
    showToast('まんたんに かいふくしたよ💗');
    $('shop-coins').textContent = state.coins;
    saveGame(true);
  });
  list.appendChild(heal);
}

// ===================== SETUP UI =====================
function setupUI() {
  // title
  initTitle();

  // starter select
  attachTap($('starter-confirm'), confirmStarter);

  // stage
  attachTap($('btn-stage-party'), goPartyScene);
  attachTap($('btn-stage-shop'), goShop);
  attachTap($('btn-stage-box'), goPartyScene);
  attachTap($('btn-stage-save'), () => saveGame());

  // field
  attachTap($('btn-field-party'), () => { stopFieldLoop(); goPartyScene(); });
  attachTap($('btn-field-bag'), openFieldBag);
  attachTap($('btn-field-back'), () => {
    stopFieldLoop();
    state.field = null;
    state.curStage = null;
    goStageSelect();
    saveGame(true);
  });
  attachTap($('minimap-toggle'), () => {
    state.minimapVisible = !state.minimapVisible;
    applyMinimapVisibility();
    saveGame(true);

    // 隠しコマンド: 虹のお城で4兄弟連れて10連打 → テラスタルとーとんキョダイマックス出現
    if (state.curStage === 5) {
      _terastalTapCount++;
      clearTimeout(_terastalTapTimer);
      _terastalTapTimer = setTimeout(() => { _terastalTapCount = 0; }, 5000);
      if (_terastalTapCount >= 10) {
        _terastalTapCount = 0;
        tryTerastalSpawn();
      }
    }
  });

  // party
  attachTap($('party-back'), () => {
    // If we entered party from the field, go back to field; otherwise stage select
    if (state.curStage && state.field) {
      enterStageRefresh();
    } else {
      goStageSelect();
    }
  });

  // shop
  attachTap($('shop-back'), () => goStageSelect());

  // battle
  attachTap($('cmd-attack'), cmdAttack);
  attachTap($('cmd-skill'), cmdSkill);
  attachTap($('cmd-item'), cmdItem);
  attachTap($('cmd-ball'), cmdBall);
  attachTap($('cmd-swap'), cmdSwap);
  attachTap($('cmd-run'), cmdRun);
  attachTap($('skill-cancel'), () => $('skill-panel').classList.remove('active'));
  attachTap($('item-cancel'), () => $('item-panel').classList.remove('active'));
  attachTap($('swap-cancel'), () => $('swap-panel').classList.remove('active'));

  // tap button
  attachTap($('tap-button'), tapHit);
  // ----- Field controls (PC keyboard + ドラッグ操作 sakudragon方式) -----
  const keyMap = {
    'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
    'KeyW':'up','KeyS':'down','KeyA':'left','KeyD':'right',
    'w':'up','s':'down','a':'left','d':'right'
  };
  document.addEventListener('keydown', (e) => {
    if (tap && (e.key === ' ' || e.key === 'Enter' || e.code === 'Space')) {
      e.preventDefault();
      tapHit();
      return;
    }
    if (!fieldRunning) return;
    const dir = keyMap[e.code] || keyMap[e.key];
    if (dir) {
      fieldKeys[dir] = true;
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (!state.field) return;
    const dir = keyMap[e.code] || keyMap[e.key];
    if (dir) {
      fieldKeys[dir] = false;
      e.preventDefault();
    }
  });
  // ===== sakudragon式 ドラッグ操作（フィールドCanvas全域・相対ドラッグ・360度自由移動） =====
  // タッチ／マウス開始時にドラッグ開始位置とプレイヤー初期位置を記録、
  // 移動時に差分を加算する相対方式。
  const fieldCanvas = $('field-canvas');
  let dragActive = false;
  let dragTouchId = null;          // 'mouse' or touch identifier
  let dragStart = { x: 0, y: 0 };  // ドラッグ開始のクライアント座標
  let dragStartPlayer = { x: 0, y: 0 };
  let dragHintShown = true;

  function fieldClientToWorldDelta(dx, dy) {
    // canvas表示サイズ→ワールド座標スケール（cssサイズで動かしたぶんを世界座標に変換）
    if (!fieldCanvas) return { dx: 0, dy: 0 };
    const rect = fieldCanvas.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return { dx: 0, dy: 0 };
    // canvas内部座標とCSS表示の比率はキャンバスサイズに対応するが、ワールド座標はピクセル単位なので
    // CSS pxをそのままワールドpxに使う（dpr補正は drawField 側でctx.setTransformで処理済み）
    return { dx, dy };
  }
  function dragHintHide() {
    if (!dragHintShown) return;
    dragHintShown = false;
    const hint = $('drag-hint');
    if (hint) {
      hint.classList.add('fade');
      setTimeout(() => { if (hint && hint.parentNode) hint.style.display = 'none'; }, 500);
    }
  }
  function fieldDragStart(e, touch) {
    if (!fieldRunning) return;
    if (dragActive) return;
    let cx, cy, id;
    if (touch) { cx = touch.clientX; cy = touch.clientY; id = touch.identifier; }
    else { cx = e.clientX; cy = e.clientY; id = 'mouse'; }
    dragActive = true;
    dragTouchId = id;
    dragStart.x = cx; dragStart.y = cy;
    if (state.field) {
      dragStartPlayer.x = state.field.px;
      dragStartPlayer.y = state.field.py;
    }
    dragHintHide();
  }
  function fieldDragMove(e, touch) {
    if (!dragActive) return;
    if (!fieldRunning || !state.field) { dragActive = false; dragTouchId = null; return; }
    let cx, cy;
    if (touch) { cx = touch.clientX; cy = touch.clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    let ddx = cx - dragStart.x;
    let ddy = cy - dragStart.y;
    // 反転モード: ドラッグした向きの逆にキャラが進む（世界を引っ張る感覚）
    if (state.invertDrag) { ddx = -ddx; ddy = -ddy; }
    const w = fieldClientToWorldDelta(ddx, ddy);
    const f = state.field;
    const oldX = f.px, oldY = f.py;
    f.px = clamp(dragStartPlayer.x + w.dx, 24, WORLD_W - 24);
    f.py = clamp(dragStartPlayer.y + w.dy, 24, WORLD_H - 24);
    // 向きを移動方向で更新（4方向）
    const mvX = f.px - oldX, mvY = f.py - oldY;
    if (Math.abs(mvX) > 0.2 || Math.abs(mvY) > 0.2) {
      if (Math.abs(mvX) > Math.abs(mvY)) f.dir = mvX < 0 ? 'left' : 'right';
      else f.dir = mvY < 0 ? 'up' : 'down';
      f.walking = true;
      f._dragWalking = true; // updateFieldにドラッグ中walkingを通知
      f.walkPhase = (f.walkPhase + 1) % 6000;
    }
  }
  function fieldDragEnd() {
    dragActive = false;
    dragTouchId = null;
    if (state.field) state.field.walking = false;
  }

  if (fieldCanvas) {
    fieldCanvas.addEventListener('touchstart', e => {
      if (dragTouchId !== null) return;
      const t = e.changedTouches[0];
      fieldDragStart(e, t);
    }, { passive: true });
    fieldCanvas.addEventListener('touchmove', e => {
      if (dragTouchId === null || dragTouchId === 'mouse') return;
      for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === dragTouchId) {
          fieldDragMove(e, e.touches[i]);
          e.preventDefault();
          return;
        }
      }
    }, { passive: false });
    fieldCanvas.addEventListener('touchend', e => {
      if (dragTouchId === null || dragTouchId === 'mouse') return;
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === dragTouchId) {
          fieldDragEnd();
          return;
        }
      }
    });
    fieldCanvas.addEventListener('touchcancel', () => fieldDragEnd());
    fieldCanvas.addEventListener('mousedown', e => { fieldDragStart(e); });
    window.addEventListener('mousemove', e => { if (dragTouchId === 'mouse') fieldDragMove(e); });
    window.addEventListener('mouseup', () => { if (dragTouchId === 'mouse') fieldDragEnd(); });
    fieldCanvas.addEventListener('contextmenu', e => e.preventDefault());
  }

  // Stop movement / drag when window loses focus
  window.addEventListener('blur', () => {
    fieldKeys.up = fieldKeys.down = fieldKeys.left = fieldKeys.right = false;
    fieldDragEnd();
  });

  // evo next is handled inline in doEvolution (rebound dynamically)

  // prime audio after first gesture
  const _primeAudio = () => {
    ensureAudio();
    if (!_bgm && !_bgmStartPending) {
      const active = document.querySelector('.scene.active');
      if (active && active.id === 'title-scene') playBgm('title');
    }
  };
  document.body.addEventListener('click', _primeAudio, { once: true });
  document.body.addEventListener('touchstart', _primeAudio, { once: true });

  const muteBtn = $('muteBtn');
  if (muteBtn) {
    const refreshMuteIcon = () => { muteBtn.textContent = muted ? '🔇' : '🔊'; };
    refreshMuteIcon();
    muteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      muted = !muted;
      refreshMuteIcon();
      ensureAudio();
      _bgmApplyMute();
    });
  }
}

setupUI();

// auto-load if save exists, but stay on title
window.addEventListener('beforeunload', () => { try { saveGame(true); } catch(e){} });
</script>
